<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ambience Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=EB+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
  :root{
    --void:#07080c;
    --panel:#0e1118;
    --panel-2:#141925;
    --row:#10141d;
    --ink:#e8e9ee;
    --ink-dim:#8b93a7;
    --ink-faint:#5b6275;
    --gold:#c9a23a;
    --gold-bright:#e8c860;
    --holo:#4fd0e0;
    --holo-dim:#2a6b76;
    --danger:#c8543f;
    --line:rgba(201,162,58,0.16);
    --line-holo:rgba(79,208,224,0.22);
    --mono:ui-monospace,"SF Mono","JetBrains Mono","Cascadia Code",Consolas,monospace;
    --sans:"EB Garamond",Georgia,serif;
    --display:"Cinzel",Georgia,serif;
  }

  *{box-sizing:border-box}
  html,body{height:100%}
  body{
    margin:0;
    background:
      radial-gradient(1200px 700px at 78% -8%, rgba(79,208,224,0.06), transparent 60%),
      radial-gradient(900px 600px at 10% 110%, rgba(201,162,58,0.05), transparent 55%),
      var(--void);
    color:var(--ink);
    font-family:var(--sans);
    font-size:16px;
    -webkit-font-smoothing:antialiased;
  }

  .app{max-width:1320px;margin:0 auto;padding:18px 20px 40px}

  /* ---------- top bar ---------- */
  .topbar{
    display:flex;align-items:center;gap:18px;flex-wrap:wrap;
    padding:8px 4px 16px;border-bottom:1px solid var(--line);margin-bottom:18px;
  }
  .brand{
    font-family:var(--display);font-weight:700;letter-spacing:.14em;
    font-size:18px;text-transform:uppercase;color:var(--gold-bright);
    display:flex;align-items:baseline;gap:12px;white-space:nowrap;
    text-shadow:0 0 18px rgba(201,162,58,0.25);
  }
  .brand .mark{color:var(--holo);font-size:15px;text-shadow:0 0 12px var(--holo)}
  .brand .sub{
    font-family:var(--sans);font-size:13px;letter-spacing:.04em;text-transform:none;
    color:var(--ink-faint);font-weight:400;
  }
  .addbar{display:flex;align-items:stretch;gap:8px;margin-left:auto;flex-wrap:wrap}
  .addbar input[type=text]{min-width:280px}

  input[type=text], input[type=search], select{
    background:var(--panel-2);border:1px solid var(--line);color:var(--ink);
    font-family:var(--sans);font-size:15px;padding:9px 12px;border-radius:6px;outline:none;
    transition:border-color .15s, box-shadow .15s;
  }
  input::placeholder{color:var(--ink-faint)}
  input[type=text]:focus, input[type=search]:focus, select:focus{
    border-color:var(--line-holo);box-shadow:0 0 0 3px rgba(79,208,224,0.10);
  }
  select{cursor:pointer;padding-right:28px;
    background-image:linear-gradient(45deg,transparent 50%,var(--ink-dim) 50%),linear-gradient(135deg,var(--ink-dim) 50%,transparent 50%);
    background-position:calc(100% - 16px) 16px,calc(100% - 11px) 16px;background-size:5px 5px,5px 5px;background-repeat:no-repeat;
    -webkit-appearance:none;appearance:none;}

  button{
    font-family:var(--sans);font-size:15px;cursor:pointer;color:var(--ink);
    background:var(--panel-2);border:1px solid var(--line);border-radius:6px;
    padding:9px 14px;transition:background .15s,border-color .15s,color .15s,transform .05s;
  }
  button:hover{border-color:rgba(201,162,58,0.45);background:#1a2030}
  button:active{transform:translateY(1px)}
  button:focus-visible, input:focus-visible, select:focus-visible, [tabindex]:focus-visible{
    outline:2px solid var(--holo);outline-offset:2px;
  }
  .btn-gold{background:linear-gradient(180deg,#1d2231,#141925);border-color:rgba(201,162,58,0.5);color:var(--gold-bright);font-weight:500;letter-spacing:.02em}
  .btn-gold:hover{border-color:var(--gold);background:linear-gradient(180deg,#232a3c,#171c29)}

  /* ---------- grid ---------- */
  .grid{display:grid;grid-template-columns:minmax(0,1.05fr) minmax(0,0.95fr);gap:22px;align-items:start}
  @media (max-width:880px){ .grid{grid-template-columns:1fr} }

  .panel{background:linear-gradient(180deg,rgba(20,25,37,0.55),rgba(14,17,24,0.85));border:1px solid var(--line);border-radius:12px}

  /* ---------- projector ---------- */
  .projector-col{display:flex;flex-direction:column;gap:16px}
  .projector{position:relative;padding:14px;border-radius:14px;
    background:radial-gradient(120% 120% at 50% -20%,rgba(79,208,224,0.10),transparent 55%),var(--panel);
    border:1px solid var(--line-holo);
    box-shadow:0 0 0 1px rgba(0,0,0,0.4) inset, 0 20px 60px -30px rgba(79,208,224,0.5);
  }
  .screen{position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#04050a;
    border:1px solid rgba(79,208,224,0.25);transition:height .25s ease, aspect-ratio .25s ease;}
  .screen #ytframe, .screen iframe{position:absolute;inset:0;width:100%;height:100%;border:0}
  /* holo scanline + vignette overlay */
  .screen-overlay{position:absolute;inset:0;pointer-events:none;z-index:3;
    background:
      repeating-linear-gradient(0deg, rgba(79,208,224,0.035) 0px, rgba(79,208,224,0.035) 1px, transparent 2px, transparent 4px),
      radial-gradient(130% 130% at 50% 50%, transparent 62%, rgba(0,0,0,0.55) 100%);
    mix-blend-mode:screen;opacity:.5;}
  /* corner ticks */
  .screen::before,.screen::after{content:"";position:absolute;width:16px;height:16px;z-index:4;pointer-events:none;border-color:var(--holo);opacity:.7}
  .screen::before{top:6px;left:6px;border-top:1.5px solid;border-left:1.5px solid}
  .screen::after{bottom:6px;right:6px;border-bottom:1.5px solid;border-right:1.5px solid}

  .screen-empty{position:absolute;inset:0;z-index:5;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--ink-faint);font-style:italic;font-size:16px;padding:20px;letter-spacing:.02em}
  .screen-status{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;text-align:center;
    color:var(--gold-bright);font-size:15px;padding:24px;background:rgba(4,5,10,0.9);line-height:1.5}

  .projector.playing{box-shadow:0 0 0 1px rgba(0,0,0,0.4) inset, 0 24px 70px -28px rgba(79,208,224,0.75);animation:beam 4.5s ease-in-out infinite}
  @keyframes beam{0%,100%{border-color:rgba(79,208,224,0.22)}50%{border-color:rgba(79,208,224,0.5)}}

  /* audio-only mode */
  .projector.audio .screen{aspect-ratio:auto;height:60px}
  .projector.audio .screen iframe,.projector.audio .screen #ytframe{opacity:0}
  .audio-banner{position:absolute;left:14px;right:14px;top:14px;height:60px;z-index:7;display:none;
    align-items:center;gap:14px;padding:0 18px;border-radius:8px;border:1px solid var(--line-holo);
    background:linear-gradient(90deg,rgba(79,208,224,0.07),rgba(4,5,10,0.6));color:var(--holo);
    font-family:var(--mono);font-size:13px;letter-spacing:.12em;text-transform:uppercase}
  .projector.audio .audio-banner{display:flex}
  .eq{display:flex;align-items:flex-end;gap:3px;height:20px}
  .eq span{width:3px;height:6px;background:var(--holo);border-radius:1px;opacity:.85}
  .projector.playing .eq span{animation:eq .9s ease-in-out infinite}
  .eq span:nth-child(2){animation-delay:.15s}.eq span:nth-child(3){animation-delay:.3s}
  .eq span:nth-child(4){animation-delay:.45s}.eq span:nth-child(5){animation-delay:.6s}
  @keyframes eq{0%,100%{height:5px}50%{height:20px}}

  /* now playing */
  .nowplaying{padding:2px 4px}
  .np-eyebrow{font-family:var(--display);font-size:11px;letter-spacing:.26em;color:var(--gold);text-transform:uppercase;margin-bottom:6px;opacity:.85}
  .np-title{font-size:21px;line-height:1.25;color:var(--ink);font-weight:500;min-height:1.3em;word-break:break-word}
  .np-title.empty{color:var(--ink-faint);font-style:italic;font-weight:400}
  .np-cat{margin-top:5px;font-family:var(--mono);font-size:12px;letter-spacing:.08em;color:var(--holo);text-transform:uppercase;min-height:1.1em}

  /* transport */
  .transport{padding:16px 16px 18px;border-radius:12px;background:var(--panel);border:1px solid var(--line);display:flex;flex-direction:column;gap:14px}
  .tbtns{display:flex;align-items:center;justify-content:center;gap:12px}
  .tbtn{width:46px;height:46px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:50%;background:var(--panel-2)}
  .tbtn svg{width:20px;height:20px;fill:var(--ink-dim);transition:fill .15s}
  .tbtn:hover svg{fill:var(--gold-bright)}
  .tbtn.primary{width:60px;height:60px;border-color:rgba(79,208,224,0.5);background:radial-gradient(120% 120% at 50% 20%,rgba(79,208,224,0.18),var(--panel-2))}
  .tbtn.primary svg{width:26px;height:26px;fill:var(--holo)}
  .tbtn.primary:hover{border-color:var(--holo);box-shadow:0 0 22px -6px rgba(79,208,224,0.7)}

  .seekrow{display:flex;align-items:center;gap:12px}
  .tc{font-family:var(--mono);font-size:13px;color:var(--ink-dim);min-width:46px;text-align:center;letter-spacing:.02em}
  .tc.dur{color:var(--ink-faint)}

  input[type=range]{-webkit-appearance:none;appearance:none;background:transparent;cursor:pointer;height:20px}
  input[type=range].seek{flex:1}
  input[type=range]::-webkit-slider-runnable-track{height:4px;border-radius:3px;background:linear-gradient(90deg,var(--holo) var(--p,0%),#222a3a var(--p,0%))}
  input[type=range]::-moz-range-track{height:4px;border-radius:3px;background:#222a3a}
  input[type=range]::-moz-range-progress{height:4px;border-radius:3px;background:var(--holo)}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:14px;height:14px;border-radius:50%;background:var(--gold-bright);margin-top:-5px;border:2px solid #1a1407;box-shadow:0 0 10px -1px rgba(232,200,96,0.8)}
  input[type=range]::-moz-range-thumb{width:14px;height:14px;border-radius:50%;background:var(--gold-bright);border:2px solid #1a1407;box-shadow:0 0 10px -1px rgba(232,200,96,0.8)}

  .bottomrow{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
  .iconbtn{width:38px;height:38px;padding:0;display:flex;align-items:center;justify-content:center;border-radius:6px}
  .iconbtn svg{width:18px;height:18px;fill:var(--ink-dim)}
  .iconbtn:hover svg{fill:var(--gold-bright)}
  .iconbtn.active svg{fill:var(--danger)}
  input[type=range].vol{width:120px;flex:0 1 130px}

  .loopseg{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin-left:auto}
  .loopseg button{border:0;border-radius:0;padding:7px 13px;font-size:13px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-dim);background:transparent;border-left:1px solid var(--line)}
  .loopseg button:first-child{border-left:0}
  .loopseg button:hover{background:#1a2030;color:var(--ink)}
  .loopseg button.on{background:linear-gradient(180deg,rgba(201,162,58,0.22),rgba(201,162,58,0.08));color:var(--gold-bright)}
  .hidebtn{font-size:13px;letter-spacing:.04em;padding:7px 12px}
  .hidebtn.on{border-color:rgba(79,208,224,0.5);color:var(--holo)}

  /* ---------- library ---------- */
  .library-col{display:flex;flex-direction:column;gap:0}
  .lib-head{display:flex;gap:8px;margin-bottom:12px}
  .lib-head input{flex:1}
  .lib-list{display:flex;flex-direction:column;gap:10px;min-height:120px}

  .cat{border:1px solid var(--line);border-radius:10px;overflow:hidden;background:var(--panel)}
  .cat-head{display:flex;align-items:center;gap:10px;padding:11px 13px;cursor:pointer;user-select:none;background:linear-gradient(90deg,rgba(201,162,58,0.05),transparent)}
  .cat-head:hover{background:linear-gradient(90deg,rgba(201,162,58,0.10),transparent)}
  .cat-caret{width:14px;color:var(--gold);transition:transform .2s;font-size:11px;flex:0 0 auto}
  .cat.collapsed .cat-caret{transform:rotate(-90deg)}
  .cat-name{font-family:var(--display);font-weight:600;letter-spacing:.05em;font-size:15px;color:var(--ink);flex:1;text-transform:uppercase}
  .cat-count{font-family:var(--mono);font-size:12px;color:var(--ink-faint);background:var(--panel-2);padding:2px 8px;border-radius:10px}
  .cat-tools{display:flex;gap:4px;opacity:0;transition:opacity .15s}
  .cat-head:hover .cat-tools{opacity:1}
  .minibtn{width:26px;height:26px;padding:0;display:flex;align-items:center;justify-content:center;font-size:13px;background:transparent;border:1px solid transparent;color:var(--ink-dim)}
  .minibtn:hover{border-color:var(--line);color:var(--ink)}
  .minibtn.del:hover{color:var(--danger);border-color:rgba(200,84,63,0.4)}

  .cat-body{display:flex;flex-direction:column}
  .cat.collapsed .cat-body{display:none}
  .cat-empty{padding:12px 16px;color:var(--ink-faint);font-style:italic;font-size:14px}

  .track{display:flex;align-items:center;gap:11px;padding:8px 12px;border-top:1px solid rgba(201,162,58,0.07);cursor:pointer;transition:background .12s}
  .track:hover{background:rgba(79,208,224,0.05)}
  .track.active{background:linear-gradient(90deg,rgba(79,208,224,0.12),transparent);box-shadow:inset 3px 0 0 var(--holo)}
  .thumb{width:74px;height:42px;flex:0 0 auto;border-radius:4px;object-fit:cover;background:#04050a;border:1px solid var(--line)}
  .t-main{flex:1;min-width:0}
  .t-title{font-size:15px;color:var(--ink);line-height:1.25;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .t-title.pending{color:var(--ink-faint);font-style:italic}
  .track.active .t-title{color:var(--holo);font-weight:500}
  .t-id{font-family:var(--mono);font-size:11px;color:var(--ink-faint);margin-top:2px}
  .t-tools{display:flex;gap:2px;opacity:0;transition:opacity .15s;flex:0 0 auto}
  .track:hover .t-tools{opacity:1}
  .t-playing{flex:0 0 auto;color:var(--holo);font-family:var(--mono);font-size:10px;letter-spacing:.1em;display:none}
  .track.active .t-playing{display:block}

  .lib-foot{display:flex;align-items:center;gap:8px;margin-top:14px;padding-top:14px;border-top:1px solid var(--line)}
  .lib-foot .count{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--ink-faint)}
  .lib-foot button{font-size:14px;padding:8px 13px}

  .empty-lib{padding:34px 24px;text-align:center;color:var(--ink-faint);font-style:italic;line-height:1.6;border:1px dashed var(--line);border-radius:10px}
  .empty-lib b{color:var(--ink-dim);font-style:normal}

  /* ---------- toast ---------- */
  .toast{position:fixed;left:50%;bottom:26px;transform:translateX(-50%) translateY(20px);
    background:var(--panel-2);border:1px solid var(--line-holo);color:var(--ink);
    padding:12px 20px;border-radius:8px;font-size:14px;opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;z-index:50;max-width:90vw;box-shadow:0 12px 40px -12px rgba(0,0,0,0.8)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast.err{border-color:rgba(200,84,63,0.6);color:#f0b6ab}
  .toast.ok{border-color:rgba(201,162,58,0.5)}

  @media (prefers-reduced-motion:reduce){
    *{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.05ms !important}
  }
</style>
</head>
<body>
<div class="app">
  <header class="topbar">
    <div class="brand"><span class="mark">✦</span> Ambience Console <span class="sub">Dara Dara · GM soundscapes</span></div>
    <div class="addbar">
      <input type="text" id="addInput" placeholder="Paste a YouTube link…" autocomplete="off" spellcheck="false">
      <select id="addCat" aria-label="Add to category"></select>
      <button id="addBtn" class="btn-gold">+ Add</button>
    </div>
  </header>

  <main class="grid">
    <!-- LEFT: projector + transport -->
    <section class="projector-col">
      <div class="projector" id="projector">
        <div class="screen" id="screen">
          <div id="ytframe"></div>
          <div class="screen-overlay"></div>
          <div class="screen-empty" id="screenEmpty">Nothing loaded — pick a track from your library.</div>
          <div class="screen-status" id="screenStatus" hidden></div>
        </div>
        <div class="audio-banner" id="audioBanner">
          <div class="eq" aria-hidden="true"><span></span><span></span><span></span><span></span><span></span></div>
          Audio only
        </div>
      </div>

      <div class="nowplaying">
        <div class="np-eyebrow">Now playing</div>
        <div class="np-title empty" id="npTitle">Nothing playing</div>
        <div class="np-cat" id="npCat"></div>
      </div>

      <div class="transport">
        <div class="tbtns">
          <button class="tbtn" data-act="restart" title="Restart track" aria-label="Restart track">
            <svg viewBox="0 0 24 24"><path d="M12 5V2L7 6l5 4V7a5 5 0 1 1-5 5H5a7 7 0 1 0 7-7z"/></svg>
          </button>
          <button class="tbtn primary" data-act="playpause" id="playBtn" title="Play / pause (space)" aria-label="Play or pause">
            <svg viewBox="0 0 24 24" id="ppIcon"><path d="M8 5v14l11-7z"/></svg>
          </button>
          <button class="tbtn" data-act="stop" title="Stop" aria-label="Stop">
            <svg viewBox="0 0 24 24"><path d="M6 6h12v12H6z"/></svg>
          </button>
          <button class="tbtn" data-act="next" title="Next in category" aria-label="Next track in category">
            <svg viewBox="0 0 24 24"><path d="M6 18l8.5-6L6 6v12zM16 6v12h2V6h-2z"/></svg>
          </button>
        </div>

        <div class="seekrow">
          <span class="tc" id="tcCur">0:00</span>
          <input type="range" id="seek" class="seek" min="0" max="1000" value="0" aria-label="Seek">
          <span class="tc dur" id="tcDur">0:00</span>
        </div>

        <div class="bottomrow">
          <button class="iconbtn" data-act="mute" id="muteBtn" title="Mute" aria-label="Mute">
            <svg viewBox="0 0 24 24" id="muteIcon"><path d="M4 9v6h4l5 5V4L8 9H4zm12.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 2v2a8 8 0 0 1 0 16v2a10 10 0 0 0 0-22z"/></svg>
          </button>
          <input type="range" id="vol" class="vol" min="0" max="100" value="70" aria-label="Volume">
          <div class="loopseg" role="group" aria-label="Loop mode">
            <button data-loop="off" title="No looping">Off</button>
            <button data-loop="one" title="Loop this track">One</button>
            <button data-loop="list" title="Play through category, then repeat">List</button>
          </div>
          <button class="hidebtn" data-act="hide" id="hideBtn" title="Hide video (audio only)">Hide video</button>
        </div>
      </div>
    </section>

    <!-- RIGHT: library -->
    <section class="library-col">
      <div class="lib-head">
        <input type="search" id="search" placeholder="Search library…" autocomplete="off">
        <button id="newCatBtn">+ Category</button>
      </div>
      <div class="lib-list" id="libList"></div>
      <div class="lib-foot">
        <button id="exportBtn" title="Download your library as a JSON file">Export</button>
        <button id="importBtn" title="Load a previously exported library">Import</button>
        <input type="file" id="importFile" accept="application/json,.json" hidden>
        <span class="count" id="totalCount"></span>
      </div>
    </section>
  </main>
</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>
"use strict";
/* ============================================================
   Ambience Console — KOTOR / Dara Dara campaign
   Self-contained. Requires internet (it streams YouTube).
   Library, categories, controls and settings persist locally.
   ============================================================ */

var STORE_KEY = 'kotor_ambience_v1';

/* ---------- state ---------- */
function uid(){ return 'id' + Date.now().toString(36) + Math.random().toString(36).slice(2,7); }

function defaultState(){
  return {
    version: 1,
    categories: [
      {id: uid(), name: 'Space & Travel',   collapsed:false},
      {id: uid(), name: 'Cantina & Social', collapsed:false},
      {id: uid(), name: 'Tension & Combat', collapsed:false},
      {id: uid(), name: 'Sith & Ritual',    collapsed:false},
      {id: uid(), name: 'Ambient / Misc',   collapsed:false}
    ],
    tracks: [],
    settings: { volume:70, muted:false, loopMode:'one', hideVideo:false, lastTrackId:null, lastCategoryId:null }
  };
}

/* Defensive load: merge persisted data over defaults so a missing
   key can never break the app (lesson from the sheet's import footgun). */
function loadState(){
  try{
    var raw = localStorage.getItem(STORE_KEY);
    if(!raw) return defaultState();
    var p = JSON.parse(raw);
    var d = defaultState();
    var cats = Array.isArray(p.categories) && p.categories.length ? p.categories : d.categories;
    cats = cats.map(function(c){ return {id:c.id||uid(), name:String(c.name||'Untitled'), collapsed:!!c.collapsed}; });
    var validCatIds = {}; cats.forEach(function(c){ validCatIds[c.id]=true; });
    var tracks = Array.isArray(p.tracks) ? p.tracks : [];
    tracks = tracks.filter(function(t){ return t && t.videoId; }).map(function(t){
      return {
        id: t.id||uid(),
        videoId: String(t.videoId),
        title: t.title ? String(t.title) : '',
        categoryId: validCatIds[t.categoryId] ? t.categoryId : cats[0].id,
        addedAt: t.addedAt || Date.now()
      };
    });
    var s = Object.assign({}, d.settings, (p.settings||{}));
    if(['off','one','list'].indexOf(s.loopMode) === -1) s.loopMode = 'one';
    s.volume = Math.max(0, Math.min(100, parseInt(s.volume,10) || 70));
    return { version:1, categories:cats, tracks:tracks, settings:s };
  }catch(e){
    console.warn('Ambience: load failed, starting fresh.', e);
    return defaultState();
  }
}

function save(){
  try{ localStorage.setItem(STORE_KEY, JSON.stringify(state)); }
  catch(e){ console.warn('Ambience: save failed', e); toast('Couldn\u2019t save — storage may be full or blocked.', 'err'); }
}

var state = loadState();

/* ---------- player runtime ---------- */
var player = null, apiReady = false, currentId = null, pendingId = null;
var isScrubbing = false, progTimer = null, apiTimeout = null;

/* ---------- element refs ---------- */
var $ = function(id){ return document.getElementById(id); };
var projector = $('projector'), screenEmpty = $('screenEmpty'), screenStatus = $('screenStatus');
var npTitle = $('npTitle'), npCat = $('npCat');
var playBtn = $('playBtn'), ppIcon = $('ppIcon'), muteBtn = $('muteBtn'), muteIcon = $('muteIcon');
var seek = $('seek'), tcCur = $('tcCur'), tcDur = $('tcDur'), vol = $('vol');
var libList = $('libList'), addInput = $('addInput'), addCat = $('addCat'), search = $('search');
var audioBanner = $('audioBanner'), hideBtn = $('hideBtn'), totalCount = $('totalCount');

/* ---------- helpers ---------- */
function trackById(id){ for(var i=0;i<state.tracks.length;i++) if(state.tracks[i].id===id) return state.tracks[i]; return null; }
function catById(id){ for(var i=0;i<state.categories.length;i++) if(state.categories[i].id===id) return state.categories[i]; return null; }
function tracksInCat(cid){ return state.tracks.filter(function(t){ return t.categoryId===cid; }); }

function fmtTime(sec){
  sec = Math.max(0, Math.floor(sec||0));
  var h = Math.floor(sec/3600), m = Math.floor((sec%3600)/60), s = sec%60;
  var ss = (s<10?'0':'')+s;
  if(h>0){ var mm=(m<10?'0':'')+m; return h+':'+mm+':'+ss; }
  return m+':'+ss;
}

/* Robust YouTube video-id extraction. Accepts watch / youtu.be / embed /
   shorts / music / m. links with extra params, or a bare 11-char id. */
function parseVideoId(input){
  if(!input) return null;
  input = String(input).trim();
  if(/^[A-Za-z0-9_-]{11}$/.test(input)) return input;
  var id = null, isUrl = false;
  try{
    var u = new URL(input);
    isUrl = true;
    var host = u.hostname.replace(/^www\./,'').replace(/^m\./,'').replace(/^music\./,'').replace(/^gaming\./,'');
    if(host === 'youtu.be'){
      id = u.pathname.slice(1).split('/')[0];
    } else if(host === 'youtube.com' || host === 'youtube-nocookie.com'){
      if(u.searchParams.get('v')) id = u.searchParams.get('v');
      if(!id){
        var m = u.pathname.match(/\/(embed|shorts|v|live)\/([A-Za-z0-9_-]{11})/);
        if(m) id = m[2];
      }
    } else {
      return null; // a URL, but not YouTube
    }
  }catch(e){ isUrl = false; /* not a URL — try a loose match below */ }
  if(!id && !isUrl){ var mm = input.match(/[A-Za-z0-9_-]{11}/); if(mm) id = mm[0]; }
  if(id && /^[A-Za-z0-9_-]{11}/.test(id)) return id.slice(0,11);
  return null;
}

function toast(msg, kind){
  var t = $('toast');
  t.textContent = msg;
  t.className = 'toast show' + (kind ? ' '+kind : '');
  clearTimeout(toast._t);
  toast._t = setTimeout(function(){ t.className = 'toast'; }, 2800);
}

/* ---------- title fetch (oEmbed, no API key) ---------- */
function fetchTitle(track){
  var url = 'https://www.youtube.com/oembed?url=' +
            encodeURIComponent('https://www.youtube.com/watch?v=' + track.videoId) + '&format=json';
  fetch(url).then(function(r){ return r.ok ? r.json() : null; }).then(function(j){
    if(j && j.title && !track.title){ track.title = j.title; save(); renderLibrary(); if(currentId===track.id) renderNowPlaying(); }
  }).catch(function(){ /* CORS/offline — title backfills from the player on first play */ });
}

/* ============================================================
   YouTube IFrame API
   ============================================================ */
window.onYouTubeIframeAPIReady = function(){
  clearTimeout(apiTimeout);
  player = new YT.Player('ytframe', {
    width:'100%', height:'100%',
    playerVars: { playsinline:1, rel:0, modestbranding:1, controls:1, fs:1 },
    events: { onReady:onPlayerReady, onStateChange:onPlayerState, onError:onPlayerError }
  });
};

/* If the API script never loads (no connection / blocked), say so. */
apiTimeout = setTimeout(function(){
  if(!apiReady){
    screenStatus.hidden = false; screenEmpty.style.display = 'none';
    screenStatus.innerHTML = 'The YouTube player couldn\u2019t load.<br>This tool streams from YouTube — check your internet connection, then reload.';
  }
}, 8000);

function onPlayerReady(){
  apiReady = true;
  clearTimeout(apiTimeout);
  applyVolume();
  // Restore last track as CUED (not auto-played) so opening the tool is silent.
  var startId = pendingId || state.settings.lastTrackId;
  if(startId){
    var t = trackById(startId);
    if(t) loadTrack(t, !!pendingId); // autoplay only if the user clicked before ready
  }
  pendingId = null;
  updateTransport();
}

function onPlayerState(e){
  var s = e.data; // -1 unstarted, 0 ended, 1 playing, 2 paused, 3 buffering, 5 cued
  var playing = (s === YT.PlayerState.PLAYING);
  projector.classList.toggle('playing', playing);
  setPlayIcon(playing);
  if(playing){ startProg(); backfillTitle(); }
  else { stopProg(); }
  if(s === YT.PlayerState.ENDED) handleEnded();
  updateTransport();
}

function onPlayerError(e){
  // 2 bad id · 5 html5 · 100 removed/private · 101/150 embedding disabled
  var map = {
    2:   'That video ID looks invalid.',
    5:   'Playback error in the embedded player.',
    100: 'That video is unavailable (removed or private).',
    101: 'The owner has disabled embedding, so it can\u2019t play here.',
    150: 'The owner has disabled embedding, so it can\u2019t play here.'
  };
  toast((map[e.data] || 'This video can\u2019t be played.') + ' Try another track.', 'err');
}

function backfillTitle(){
  if(!currentId) return;
  var t = trackById(currentId);
  if(t && !t.title && player && player.getVideoData){
    try{ var d = player.getVideoData(); if(d && d.title){ t.title = d.title; save(); renderLibrary(); renderNowPlaying(); } }catch(e){}
  }
}

/* ---------- progress loop ---------- */
function startProg(){ stopProg(); progTimer = setInterval(updateProgress, 400); updateProgress(); }
function stopProg(){ if(progTimer){ clearInterval(progTimer); progTimer = null; } }
function updateProgress(){
  if(isScrubbing || !player || !player.getDuration) return;
  var dur = player.getDuration() || 0, cur = player.getCurrentTime() || 0;
  tcCur.textContent = fmtTime(cur);
  tcDur.textContent = fmtTime(dur);
  var pct = dur > 0 ? (cur/dur*1000) : 0;
  seek.value = pct;
  seek.style.setProperty('--p', (dur>0 ? (cur/dur*100) : 0) + '%');
}

/* ---------- playback control ---------- */
function loadTrack(track, autoplay){
  currentId = track.id;
  state.settings.lastTrackId = track.id; save();
  renderNowPlaying(); renderLibrary();
  if(!apiReady || !player){ pendingId = track.id; return; }
  screenEmpty.style.display = 'none'; screenStatus.hidden = true;
  if(autoplay) player.loadVideoById(track.videoId);
  else player.cueVideoById(track.videoId);
  applyVolume();
}

function togglePlay(){
  if(!apiReady || !player) return;
  if(!currentId){
    // nothing selected: start the first available track
    if(state.tracks.length){ loadTrack(state.tracks[0], true); }
    else toast('Add a YouTube link to your library first.');
    return;
  }
  var s = player.getPlayerState();
  if(s === YT.PlayerState.PLAYING) player.pauseVideo();
  else player.playVideo();
}

function handleEnded(){
  var mode = state.settings.loopMode;
  if(mode === 'one'){ player.seekTo(0, true); player.playVideo(); }
  else if(mode === 'list'){ var nx = nextInCategory(currentId); if(nx) loadTrack(nx, true); }
  // 'off': stop naturally
}

function nextInCategory(id){
  var t = trackById(id); if(!t) return null;
  var list = tracksInCat(t.categoryId);
  if(!list.length) return null;
  var idx = -1;
  for(var i=0;i<list.length;i++){ if(list[i].id===id){ idx=i; break; } }
  return list[(idx+1) % list.length];
}

function applyVolume(){
  if(!player || !player.setVolume) return;
  player.setVolume(state.settings.volume);
  if(state.settings.muted) player.mute(); else player.unMute();
}

/* ---------- transport UI ---------- */
function setPlayIcon(playing){
  ppIcon.innerHTML = playing
    ? '<path d="M6 5h4v14H6zM14 5h4v14h-4z"/>'           // pause
    : '<path d="M8 5v14l11-7z"/>';                        // play
}
function setMuteIcon(){
  muteBtn.classList.toggle('active', state.settings.muted || state.settings.volume===0);
  muteIcon.innerHTML = (state.settings.muted || state.settings.volume===0)
    ? '<path d="M4 9v6h4l5 5V4L8 9H4zm15.6 3l2.1-2.1-1.4-1.4L18.2 10.6 16.1 8.5l-1.4 1.4 2.1 2.1-2.1 2.1 1.4 1.4 2.1-2.1 2.1 2.1 1.4-1.4z"/>'
    : '<path d="M4 9v6h4l5 5V4L8 9H4zm12.5 3a4.5 4.5 0 0 0-2.5-4v8a4.5 4.5 0 0 0 2.5-4zM14 2v2a8 8 0 0 1 0 16v2a10 10 0 0 0 0-22z"/>';
}
function updateTransport(){
  setMuteIcon();
  vol.value = state.settings.volume;
  vol.style.setProperty('--p', state.settings.volume + '%');
  document.querySelectorAll('.loopseg button').forEach(function(b){
    b.classList.toggle('on', b.dataset.loop === state.settings.loopMode);
  });
  hideBtn.classList.toggle('on', state.settings.hideVideo);
  hideBtn.textContent = state.settings.hideVideo ? 'Show video' : 'Hide video';
  projector.classList.toggle('audio', state.settings.hideVideo);
}

/* ---------- now playing ---------- */
function renderNowPlaying(){
  var t = currentId ? trackById(currentId) : null;
  if(!t){
    npTitle.textContent = 'Nothing playing';
    npTitle.classList.add('empty');
    npCat.textContent = '';
    return;
  }
  npTitle.textContent = t.title || 'Loading title\u2026';
  npTitle.classList.toggle('empty', !t.title);
  var c = catById(t.categoryId);
  npCat.textContent = c ? c.name : '';
}

/* ============================================================
   Library rendering (event-delegated)
   ============================================================ */
function renderCatSelect(){
  var cur = addCat.value;
  addCat.innerHTML = '';
  state.categories.forEach(function(c){
    var o = document.createElement('option'); o.value = c.id; o.textContent = c.name; addCat.appendChild(o);
  });
  var want = state.settings.lastCategoryId || cur;
  if(want && catById(want)) addCat.value = want;
}

function renderLibrary(){
  var q = (search.value || '').trim().toLowerCase();
  libList.innerHTML = '';

  if(state.tracks.length === 0 && !q){
    var e = document.createElement('div');
    e.className = 'empty-lib';
    e.innerHTML = 'Your library is empty.<br>Paste a YouTube link in the bar above and hit <b>+ Add</b> to start building soundscapes.';
    libList.appendChild(e);
    totalCount.textContent = '';
    renderCatSelect();
    return;
  }

  state.categories.forEach(function(cat){
    var all = tracksInCat(cat.id);
    var shown = q ? all.filter(function(t){
      return (t.title||'').toLowerCase().indexOf(q) !== -1 || t.videoId.toLowerCase().indexOf(q) !== -1;
    }) : all;
    if(q && shown.length === 0) return; // hide empty categories while searching

    var sec = document.createElement('div');
    sec.className = 'cat' + (cat.collapsed && !q ? ' collapsed' : '');
    sec.dataset.cat = cat.id;

    var head = document.createElement('div');
    head.className = 'cat-head';
    head.dataset.act = 'toggleCat'; head.dataset.cat = cat.id;
    head.innerHTML =
      '<span class="cat-caret">\u25BC</span>' +
      '<span class="cat-name"></span>' +
      '<span class="cat-count">' + all.length + '</span>' +
      '<span class="cat-tools">' +
        '<button class="minibtn" data-act="renameCat" data-cat="'+cat.id+'" title="Rename category" aria-label="Rename category">\u270E</button>' +
        '<button class="minibtn del" data-act="delCat" data-cat="'+cat.id+'" title="Delete category" aria-label="Delete category">\u2715</button>' +
      '</span>';
    head.querySelector('.cat-name').textContent = cat.name;
    sec.appendChild(head);

    var body = document.createElement('div');
    body.className = 'cat-body';
    if(shown.length === 0){
      var em = document.createElement('div'); em.className = 'cat-empty'; em.textContent = 'No tracks here yet.';
      body.appendChild(em);
    } else {
      shown.forEach(function(t){
        var row = document.createElement('div');
        row.className = 'track' + (t.id===currentId ? ' active' : '');
        row.dataset.act = 'play'; row.dataset.id = t.id;

        var img = document.createElement('img');
        img.className = 'thumb'; img.loading = 'lazy'; img.alt = '';
        img.src = 'https://img.youtube.com/vi/' + t.videoId + '/mqdefault.jpg';
        img.onerror = function(){ this.style.visibility='hidden'; };
        row.appendChild(img);

        var main = document.createElement('div');
        main.className = 't-main';
        var title = document.createElement('div');
        title.className = 't-title' + (t.title ? '' : ' pending');
        title.textContent = t.title || 'Loading title\u2026';
        var sub = document.createElement('div');
        sub.className = 't-id'; sub.textContent = t.videoId;
        main.appendChild(title); main.appendChild(sub);
        row.appendChild(main);

        var live = document.createElement('span'); live.className = 't-playing'; live.textContent = '\u25C9 LIVE';
        row.appendChild(live);

        var tools = document.createElement('span');
        tools.className = 't-tools';
        tools.innerHTML =
          '<button class="minibtn" data-act="moveTrack" data-id="'+t.id+'" title="Move to another category" aria-label="Move track">\u21C6</button>' +
          '<button class="minibtn" data-act="renameTrack" data-id="'+t.id+'" title="Rename" aria-label="Rename track">\u270E</button>' +
          '<button class="minibtn" data-act="copyLink" data-id="'+t.id+'" title="Copy YouTube link" aria-label="Copy link">\u29C9</button>' +
          '<button class="minibtn del" data-act="delTrack" data-id="'+t.id+'" title="Remove" aria-label="Remove track">\u2715</button>';
        row.appendChild(tools);

        body.appendChild(row);
      });
    }
    sec.appendChild(body);
    libList.appendChild(sec);
  });

  var n = state.tracks.length;
  totalCount.textContent = n + (n===1 ? ' track' : ' tracks');
  renderCatSelect();
}

/* ---------- library actions (delegation) ---------- */
libList.addEventListener('click', function(ev){
  var el = ev.target.closest('[data-act]');
  if(!el) return;
  var act = el.dataset.act, id = el.dataset.id, cid = el.dataset.cat;

  if(act === 'play'){ var t = trackById(id); if(t) loadTrack(t, true); return; }

  // category header tools must not also toggle collapse
  if(act === 'renameCat'){ ev.stopPropagation(); renameCategory(cid); return; }
  if(act === 'delCat'){ ev.stopPropagation(); deleteCategory(cid); return; }
  if(act === 'toggleCat'){ var c = catById(cid); if(c){ c.collapsed = !c.collapsed; save(); renderLibrary(); } return; }

  // track tools must not also trigger row play
  if(act === 'moveTrack'){ ev.stopPropagation(); moveTrack(id); return; }
  if(act === 'renameTrack'){ ev.stopPropagation(); renameTrack(id); return; }
  if(act === 'copyLink'){ ev.stopPropagation(); copyLink(id); return; }
  if(act === 'delTrack'){ ev.stopPropagation(); deleteTrack(id); return; }
});

function addTrackFromInput(){
  var raw = addInput.value;
  var vid = parseVideoId(raw);
  if(!vid){ toast('That doesn\u2019t look like a YouTube link.', 'err'); return; }
  var dupe = state.tracks.filter(function(t){ return t.videoId === vid; })[0];
  if(dupe){
    toast('Already in your library.');
    var c = catById(dupe.categoryId); if(c) c.collapsed = false;
    addInput.value = ''; renderLibrary();
    return;
  }
  var cid = addCat.value || (state.categories[0] && state.categories[0].id);
  var track = { id:uid(), videoId:vid, title:'', categoryId:cid, addedAt:Date.now() };
  state.tracks.push(track);
  state.settings.lastCategoryId = cid;
  var c2 = catById(cid); if(c2) c2.collapsed = false;
  save();
  addInput.value = '';
  renderLibrary();
  fetchTitle(track);
  toast('Added.', 'ok');
}

function renameTrack(id){
  var t = trackById(id); if(!t) return;
  var name = window.prompt('Track name:', t.title || '');
  if(name === null) return;
  t.title = name.trim(); save(); renderLibrary(); if(currentId===id) renderNowPlaying();
}

function moveTrack(id){
  var t = trackById(id); if(!t) return;
  if(state.categories.length < 2){ toast('Make another category first.'); return; }
  var names = state.categories.map(function(c,i){ return (i+1)+'. '+c.name; }).join('\n');
  var ans = window.prompt('Move to which category? Enter a number:\n\n'+names, '');
  if(ans === null) return;
  var idx = parseInt(ans,10) - 1;
  if(isNaN(idx) || !state.categories[idx]){ toast('No category '+ans+'.', 'err'); return; }
  t.categoryId = state.categories[idx].id;
  state.categories[idx].collapsed = false;
  save(); renderLibrary(); if(currentId===id) renderNowPlaying();
}

function copyLink(id){
  var t = trackById(id); if(!t) return;
  var link = 'https://www.youtube.com/watch?v=' + t.videoId;
  if(navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(link).then(function(){ toast('Link copied.', 'ok'); },
      function(){ window.prompt('Copy link:', link); });
  } else { window.prompt('Copy link:', link); }
}

function deleteTrack(id){
  var t = trackById(id); if(!t) return;
  if(!window.confirm('Remove "' + (t.title || t.videoId) + '" from the library?')) return;
  state.tracks = state.tracks.filter(function(x){ return x.id !== id; });
  if(currentId === id){
    currentId = null; state.settings.lastTrackId = null;
    if(player && player.stopVideo) player.stopVideo();
    projector.classList.remove('playing');
    screenEmpty.style.display = 'flex'; setPlayIcon(false);
  }
  save(); renderLibrary(); renderNowPlaying();
}

/* ---------- categories ---------- */
function addCategory(){
  var name = window.prompt('New category name:', '');
  if(name === null) return;
  name = name.trim(); if(!name){ return; }
  state.categories.push({ id:uid(), name:name, collapsed:false });
  save(); renderLibrary();
  toast('Category added.', 'ok');
}

function renameCategory(cid){
  var c = catById(cid); if(!c) return;
  var name = window.prompt('Category name:', c.name);
  if(name === null) return;
  name = name.trim(); if(!name) return;
  c.name = name; save(); renderLibrary(); renderNowPlaying();
}

function deleteCategory(cid){
  var c = catById(cid); if(!c) return;
  var here = tracksInCat(cid);
  if(state.categories.length === 1){
    if(here.length && !window.confirm('This is your only category. Delete it and its '+here.length+' track(s)?')) return;
    state.categories = []; state.tracks = state.tracks.filter(function(t){ return t.categoryId !== cid; });
    var fresh = { id:uid(), name:'Ambient / Misc', collapsed:false };
    state.categories.push(fresh);
    save(); renderLibrary(); return;
  }
  var dest = state.categories.filter(function(x){ return x.id !== cid; })[0];
  if(here.length){
    if(!window.confirm('Delete "'+c.name+'" and move its '+here.length+' track(s) to "'+dest.name+'"?')) return;
    here.forEach(function(t){ t.categoryId = dest.id; });
  } else {
    if(!window.confirm('Delete category "'+c.name+'"?')) return;
  }
  state.categories = state.categories.filter(function(x){ return x.id !== cid; });
  save(); renderLibrary();
}

/* ---------- export / import ---------- */
function exportLibrary(){
  var blob = new Blob([JSON.stringify(state, null, 2)], {type:'application/json'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  var d = new Date(), pad = function(n){ return (n<10?'0':'')+n; };
  a.href = url;
  a.download = 'ambience-library-' + d.getFullYear() + pad(d.getMonth()+1) + pad(d.getDate()) + '.json';
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(function(){ URL.revokeObjectURL(url); }, 1000);
  toast('Library exported.', 'ok');
}

function importLibrary(file){
  var reader = new FileReader();
  reader.onload = function(){
    try{
      var data = JSON.parse(reader.result);
      if(!data || (!Array.isArray(data.tracks) && !Array.isArray(data.categories))) throw new Error('shape');
      if(!window.confirm('Replace your current library with the imported one? Your current library will be overwritten.')) return;
      localStorage.setItem(STORE_KEY, JSON.stringify(data));
      state = loadState();
      currentId = null;
      if(player && player.stopVideo) player.stopVideo();
      projector.classList.remove('playing'); screenEmpty.style.display='flex'; setPlayIcon(false);
      renderLibrary(); renderNowPlaying(); updateTransport();
      toast('Library imported.', 'ok');
    }catch(e){ toast('That file isn\u2019t a valid library export.', 'err'); }
  };
  reader.readAsText(file);
}

/* ============================================================
   Wiring
   ============================================================ */
$('addBtn').addEventListener('click', addTrackFromInput);
addInput.addEventListener('keydown', function(e){ if(e.key === 'Enter') addTrackFromInput(); });
addCat.addEventListener('change', function(){ state.settings.lastCategoryId = addCat.value; save(); });
search.addEventListener('input', renderLibrary);
$('newCatBtn').addEventListener('click', addCategory);
$('exportBtn').addEventListener('click', exportLibrary);
$('importBtn').addEventListener('click', function(){ $('importFile').click(); });
$('importFile').addEventListener('change', function(e){ if(e.target.files[0]) importLibrary(e.target.files[0]); e.target.value=''; });

/* transport buttons */
document.querySelector('.tbtns').addEventListener('click', function(ev){
  var b = ev.target.closest('[data-act]'); if(!b) return;
  var act = b.dataset.act;
  if(!apiReady || !player){ toast('Player still loading\u2026'); return; }
  if(act==='playpause') togglePlay();
  else if(act==='restart'){ if(currentId){ player.seekTo(0,true); player.playVideo(); } }
  else if(act==='stop'){ if(player.stopVideo){ player.stopVideo(); projector.classList.remove('playing'); setPlayIcon(false); seek.value=0; seek.style.setProperty('--p','0%'); tcCur.textContent='0:00'; } }
  else if(act==='next'){ var nx = nextInCategory(currentId); if(nx) loadTrack(nx, true); else toast('No other tracks in this category.'); }
});

/* mute / hide */
muteBtn.addEventListener('click', function(){
  state.settings.muted = !state.settings.muted;
  if(player){ if(state.settings.muted) player.mute(); else { player.unMute(); if(state.settings.volume===0){ state.settings.volume=40; } } }
  applyVolume(); save(); updateTransport();
});
hideBtn.addEventListener('click', function(){
  state.settings.hideVideo = !state.settings.hideVideo; save(); updateTransport();
});

/* volume */
vol.addEventListener('input', function(){
  state.settings.volume = parseInt(vol.value,10);
  if(state.settings.volume>0) state.settings.muted = false;
  vol.style.setProperty('--p', state.settings.volume + '%');
  applyVolume(); setMuteIcon();
});
vol.addEventListener('change', save);

/* loop segmented control */
document.querySelector('.loopseg').addEventListener('click', function(ev){
  var b = ev.target.closest('[data-loop]'); if(!b) return;
  state.settings.loopMode = b.dataset.loop; save(); updateTransport();
  toast('Loop: ' + ({off:'off',one:'this track',list:'category'})[state.settings.loopMode]);
});

/* seek */
seek.addEventListener('input', function(){
  isScrubbing = true;
  if(player && player.getDuration){
    var dur = player.getDuration() || 0;
    tcCur.textContent = fmtTime(dur * (seek.value/1000));
  }
  seek.style.setProperty('--p', (seek.value/10) + '%');
});
seek.addEventListener('change', function(){
  if(player && player.getDuration){
    var dur = player.getDuration() || 0;
    player.seekTo(dur * (seek.value/1000), true);
  }
  isScrubbing = false;
});

/* keyboard: space = play/pause, arrows = seek +/- 5s (when not typing) */
document.addEventListener('keydown', function(e){
  var tag = (e.target.tagName || '').toLowerCase();
  if(tag==='input' || tag==='textarea' || tag==='select' || e.target.isContentEditable) return;
  if(e.code === 'Space'){ e.preventDefault(); togglePlay(); }
  else if(e.code === 'ArrowRight' && player && currentId){ e.preventDefault(); player.seekTo((player.getCurrentTime()||0)+5, true); }
  else if(e.code === 'ArrowLeft' && player && currentId){ e.preventDefault(); player.seekTo(Math.max(0,(player.getCurrentTime()||0)-5), true); }
});

/* ---------- first paint ---------- */
renderLibrary();
renderNowPlaying();
updateTransport();
</script>
</body>
</html>
