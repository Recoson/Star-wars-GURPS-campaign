<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KOTOR GM Console</title>
<style>
/* ============================ DESIGN SYSTEM ============================ */
:root{
  --bg:#0d1117; --bg2:#0b0e13; --panel:#151a21; --panel2:#1b222b; --raise:#212a35;
  --line:#262e38; --line2:#37434f; --faint:#52606f;
  --ink:#d8dee6; --dim:#929eac; --mute:#6b7685;
  --acc:#46c8e0; --acc-dim:#2a6e7d; --acc-bg:rgba(70,200,224,.10);
  --amber:#e0a23c; --amber-bg:rgba(224,162,60,.10);
  --red:#e0566c; --red-bg:rgba(224,86,108,.10);
  --grn:#5fc98a; --grn-bg:rgba(95,201,138,.10);
  --vio:#b58cf0;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:9px; --r2:6px; --sp:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);-webkit-text-size-adjust:100%;}
::selection{background:var(--acc-dim);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:var(--acc);}
h1,h2,h3{margin:0;font-weight:650;}
button,input,select,textarea{font-family:inherit;color:inherit;}
input,select,textarea{background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:var(--r2);padding:6px 8px;font-size:13px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-bg);}
textarea{width:100%;min-height:54px;resize:vertical;line-height:1.45;}
select{cursor:pointer;}
.mono{font-family:var(--mono);}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);
  border-radius:var(--r2);padding:7px 12px;font-size:13px;font-weight:550;cursor:pointer;transition:border-color .12s,background .12s;}
.btn:hover{border-color:var(--acc);background:var(--raise);}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#06222a;font-weight:650;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:transparent;}
.btn.mini{padding:3px 8px;font-size:12px;border-radius:5px;}
.btn.danger{color:var(--red);border-color:transparent;background:transparent;}
.btn.danger:hover{background:var(--red-bg);border-color:var(--red);}

/* ============================ APP LAYOUT ============================ */
.app{max-width:1180px;margin:0 auto;padding:0 16px 80px;}
.top{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);padding:14px 0 0;}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding-bottom:10px;}
.brand{font-size:18px;font-weight:700;letter-spacing:.2px;}
.brand .b-accent{color:var(--acc);}
.brand-sub{font-family:var(--mono);font-size:11px;color:var(--mute);}
.savedot{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);}

/* top nav of the 6 spaces */
.nav{display:flex;gap:2px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav button{position:relative;background:transparent;border:none;color:var(--dim);padding:10px 14px 11px;font-size:13.5px;font-weight:550;
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:0;}
.nav button:hover{color:var(--ink);}
.nav button.on{color:var(--ink);border-bottom-color:var(--acc);}
.nav button .ico{margin-right:6px;opacity:.85;font-size:13px;}

/* spaces */
.space{display:none;padding-top:18px;animation:fade .18s ease;}
.space.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
.space-head{margin-bottom:14px;}
.space-head h2{font-size:16px;}
.space-head .lede{color:var(--dim);font-size:13px;margin-top:3px;max-width:70ch;}

/* ============================ COMPONENTS ============================ */
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field>.lab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);}
.field select,.field input{min-width:150px;}

.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.muted{color:var(--mute);}
.empty{color:var(--mute);font-size:13px;padding:14px;border:1px dashed var(--line2);border-radius:var(--r);text-align:center;}

/* pills */
.pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:20px;background:var(--raise);color:var(--dim);border:1px solid var(--line);white-space:nowrap;}
.pill.acc{background:var(--acc-bg);color:var(--acc);border-color:transparent;}
.pill.amber{background:var(--amber-bg);color:var(--amber);border-color:transparent;}
.pill.red{background:var(--red-bg);color:var(--red);border-color:transparent;}
.pill.grn{background:var(--grn-bg);color:var(--grn);border-color:transparent;}
.pill.vio{background:rgba(181,140,240,.12);color:var(--vio);border-color:transparent;}

/* the stat-block card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.card .chead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 15px;background:linear-gradient(180deg,var(--panel2),var(--panel));border-bottom:1px solid var(--line);}
.card .ctitle{font-size:16px;font-weight:700;}
.card .cmeta{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.card .cbody{padding:14px 15px;}

/* stat grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(58px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;}
.sg .st{background:var(--bg2);padding:7px 4px 6px;text-align:center;}
.sg .st .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;color:var(--mute);text-transform:uppercase;}
.sg .st .n{font-family:var(--mono);font-size:17px;font-weight:650;line-height:1.15;margin-top:1px;}
.sg .st.hi{background:var(--acc-bg);}
.sg .st.hi .n{color:var(--acc);}
.sg .st.dim .n{color:var(--faint);}

/* sections */
.sec{padding:9px 0;border-top:1px solid var(--line);}
.sec:first-child{border-top:none;}
.sec .sec-k{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.sec .sec-v{font-size:13.5px;line-height:1.6;}
.sec .sec-v .tag{color:var(--dim);}

/* weapon lines */
.wpn{font-family:var(--mono);font-size:12.5px;padding:2px 0;}
.wpn .wn{color:var(--ink);font-weight:600;}
.wpn .wd{color:var(--amber);}
.wpn .wx{color:var(--dim);}

/* force powers */
.pows{display:flex;flex-wrap:wrap;gap:5px;}
.pow{font-family:var(--mono);font-size:11.5px;padding:2px 8px;border-radius:5px;background:var(--raise);border:1px solid var(--line);}
.pow.dark{background:var(--red-bg);border-color:transparent;color:#f0a9b6;}
.pow.dark::before{content:"\25C6 ";color:var(--red);}

/* house-rule + advisory flags */
.flag{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-radius:var(--r2);margin:10px 0;font-size:13px;line-height:1.5;border-left:3px solid var(--faint);background:var(--raise);}
.flag .fi{font-size:14px;line-height:1.3;flex:0 0 auto;}
.flag.amber{border-left-color:var(--amber);background:var(--amber-bg);}
.flag.red{border-left-color:var(--red);background:var(--red-bg);}
.flag .fk{font-weight:650;}
.flag.amber .fk{color:var(--amber);}
.flag.red .fk{color:#f0a9b6;}

/* placeholder spaces (features migrating in later passes) */
.placeholder{border:1px dashed var(--line2);border-radius:var(--r);padding:26px 22px;background:var(--panel);}
.placeholder h3{font-size:15px;margin-bottom:6px;}
.placeholder p{color:var(--dim);margin:6px 0;max-width:68ch;}
.placeholder .plist{margin:10px 0 0;padding:0;list-style:none;}
.placeholder .plist li{padding:4px 0 4px 20px;position:relative;color:var(--dim);font-size:13px;}
.placeholder .plist li::before{content:"→";position:absolute;left:0;color:var(--acc);}
.placeholder .tagline{font-family:var(--mono);font-size:11px;color:var(--mute);margin-top:14px;}

/* pass 2 — forge actions + kept roster */
.pill.mini{font-size:10px;padding:1px 6px;}
.fg-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.kept-wrap{margin-top:22px;}
.kept-head{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);padding:0 2px 8px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.kept-row{border:1px solid var(--line);border-radius:var(--r2);margin-bottom:7px;background:var(--panel);overflow:hidden;}
.kept-row .kr-main{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 12px;cursor:pointer;}
.kept-row .kr-main:hover{background:var(--panel2);}
.kept-row .kr-name{font-weight:600;font-size:14px;}
.kept-row .kr-meta{font-family:var(--mono);font-size:11.5px;color:var(--mute);}
.kept-row .kr-acts{display:flex;gap:6px;margin-left:auto;}
.kept-row .kr-acts .btn{padding:3px 9px;font-size:11.5px;}
.kept-row .kr-detail:not(:empty){padding:0 12px 12px;border-top:1px solid var(--line);}
.kept-row .kr-detail .card{border:none;background:transparent;}
.kept-row .kr-detail .card .chead{background:transparent;padding-left:0;padding-right:0;}
.kept-row .kr-detail .card .cbody{padding-left:0;padding-right:0;}

/* pass 3 — loot & gear */
.subnav{display:inline-flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:3px;margin-bottom:16px;}
.subnav button{background:transparent;border:none;color:var(--dim);padding:6px 14px;font-size:13px;font-weight:550;border-radius:6px;cursor:pointer;}
.subnav button:hover{color:var(--ink);}
.subnav button.on{background:var(--raise);color:var(--ink);}
.subpanel{display:none;}
.subpanel.on{display:block;}
#rwOut .card,#shopOut .card,#benchOut .card{margin-bottom:12px;}
.litem{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-top:1px solid var(--line);font-size:13.5px;}
.litem:first-child{border-top:none;}
.litem .li-name{font-weight:550;}
.litem .li-meta{font-family:var(--mono);font-size:12px;color:var(--mute);flex:1;}
.litem .li-tag{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;background:var(--raise);color:var(--dim);border:1px solid var(--line);}
.litem .li-price{font-family:var(--mono);font-size:13px;color:var(--amber);white-space:nowrap;}
.kvline{display:flex;gap:10px;padding:5px 0;font-size:13px;}
.kvline .kvk{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);min-width:88px;padding-top:2px;}
.kvline .kvv{flex:1;color:var(--ink);}
.bench-mods{margin:6px 0 14px;}
.bench-mods .bmhd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:6px;}
.bmod{display:flex;align-items:center;gap:10px;padding:6px 9px;border:1px solid var(--line);border-radius:6px;margin-bottom:5px;cursor:pointer;}
.bmod:hover{border-color:var(--line2);}
.bmod input{flex:0 0 auto;accent-color:var(--acc);}
.bmod .bm-n{font-weight:550;font-size:13px;}
.bmod .bm-fx{color:var(--dim);font-size:12.5px;flex:1;}
.bmod .bm-c{font-family:var(--mono);font-size:12px;color:var(--amber);white-space:nowrap;}
.bench-cmp{font-family:var(--mono);font-size:12.5px;margin:2px 0;}
.bench-cmp .bc-row{display:flex;gap:10px;padding:3px 0;}
.bench-cmp .bc-k{color:var(--mute);min-width:74px;}
.bench-cmp .bc-row.mod .bc-v{color:var(--acc);}
.bench-riders{font-size:12.5px;color:var(--dim);margin-top:7px;}
.bench-cost{display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:9px;padding-top:9px;font-family:var(--mono);font-size:13px;}
.bench-cost .bc-total{color:var(--amber);font-weight:650;}

/* pass 4 — encounter & combat */
.party-box{border:1px solid var(--line);border-radius:var(--r);padding:11px 14px 13px;margin-bottom:16px;background:var(--panel);}
.party-box .pb-hd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:10px;}
.party-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;}
.cap-toggles{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cap{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--line2);border-radius:20px;font-size:12.5px;cursor:pointer;color:var(--dim);user-select:none;}
.cap input{accent-color:var(--acc);margin:0;}
.cap.on{background:var(--acc-bg);border-color:transparent;color:var(--acc);}
.enc-line{display:flex;align-items:center;gap:10px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;font-size:13.5px;}
.enc-line .el-count{font-family:var(--mono);color:var(--acc);font-weight:650;}
.enc-line .el-rm{margin-left:auto;}
.swing{border:1px solid var(--line);border-radius:var(--r);padding:2px 14px 13px;margin:14px 0;background:var(--panel);}
.swing .sw-hd{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:12px 0 4px;}
.flag.note{border-left-color:var(--acc-dim);background:var(--raise);}
.flag.note .fk{color:var(--ink);}
.enc-units{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-top:6px;}
.enc-unit{border:1px solid var(--line);border-radius:var(--r2);padding:9px 12px;background:var(--panel);}
.enc-unit .eu-name{font-weight:600;font-size:13.5px;}
.enc-unit .eu-meta{font-family:var(--mono);font-size:11px;color:var(--mute);margin:3px 0 6px;}
.enc-unit .eu-line{font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.4;}
.cb-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.cb-round{font-family:var(--mono);font-size:15px;font-weight:650;color:var(--acc);margin-right:6px;}
.cbrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 12px;border:1px solid var(--line);border-radius:var(--r2);margin-bottom:6px;background:var(--panel);}
.cbrow.active{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc-bg);background:linear-gradient(90deg,var(--acc-bg),transparent 60%);}
.cbrow .cb-init{font-family:var(--mono);font-size:16px;font-weight:650;min-width:36px;text-align:center;}
.cbrow .cb-init .il{display:block;font-size:8px;color:var(--mute);letter-spacing:.05em;font-weight:500;}
.cbrow .cb-id{min-width:140px;display:flex;flex-direction:column;gap:1px;}
.cbrow .cb-name-in{font-weight:600;font-size:13.5px;padding:2px 5px;border-color:transparent;background:transparent;}
.cbrow .cb-name-in:hover,.cbrow .cb-name-in:focus{border-color:var(--line2);background:var(--bg2);}
.cbrow .cb-arch{font-family:var(--mono);font-size:10.5px;color:var(--mute);padding-left:5px;}
.cb-side-in{padding:3px 6px;font-size:11px;}
.cb-hp{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:13px;}
.cb-hp .dmgin{width:44px;padding:3px 5px;text-align:center;}
.cb-hp .hpv{min-width:60px;text-align:center;font-weight:600;}
.cb-hp .hpv.hurt{color:var(--amber);}
.cb-hp .hpv.down{color:var(--red);}
.cb-def{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:150px;}
.cb-conds{display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex:1;}
.cb-conds .addcond{padding:2px 5px;font-size:11px;color:var(--mute);}
.badge{font-family:var(--mono);font-size:9.5px;padding:1px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;}
.cond{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:10px;background:var(--amber-bg);color:var(--amber);cursor:pointer;}
.cond:hover{filter:brightness(1.15);}
.cb-row-rm{margin-left:auto;}

/* pass 5 — planner */
.planhd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin:10px 0 6px;}
.planhd:first-child{margin-top:4px;}
.planline{display:flex;align-items:center;gap:9px;padding:7px 11px;border:1px solid var(--line);border-radius:6px;margin-bottom:5px;cursor:pointer;font-size:13.5px;}
.planline:hover{border-color:var(--acc);background:var(--panel2);}
.planline .pl-t{font-weight:600;}
.planline .pl-arrow{color:var(--mute);}
.planline .pl-next{color:var(--dim);flex:1;font-size:13px;}
.session-card{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:4px 14px 12px;margin-bottom:18px;}
.thread{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);margin-bottom:9px;overflow:hidden;}
.th-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 12px;}
.th-head .th-title{flex:1 1 200px;font-weight:600;padding:4px 7px;border-color:transparent;background:transparent;font-size:14px;}
.th-head .th-title:hover,.th-head .th-title:focus{border-color:var(--line2);background:var(--bg2);}
.th-prog{font-family:var(--mono);font-size:11px;color:var(--mute);}
.th-body{display:none;padding:4px 12px 13px;border-top:1px solid var(--line);}
.thread.open .th-body{display:block;}
.th-grid{display:flex;gap:10px;flex-wrap:wrap;margin:9px 0;}
.fldv{display:flex;flex-direction:column;gap:4px;flex:1 1 160px;}
.fldv>.lab{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);}
.fldv.full{flex-basis:100%;}
.beats{margin:3px 0;}
.beat{display:flex;align-items:center;gap:8px;padding:3px 0;}
.beat input[type=checkbox]{accent-color:var(--acc);flex:0 0 auto;}
.beat .beat-tx{flex:1;padding:4px 7px;font-size:13px;}
.beat .beat-tx.done{text-decoration:line-through;color:var(--mute);}
.pill.blu{background:rgba(70,200,224,.10);color:var(--acc);border-color:transparent;}
.suggest{border:1px dashed var(--acc-dim);border-radius:6px;background:var(--acc-bg);padding:9px 11px;margin:9px 0 2px;}
.suggest .sg-lab{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--acc);margin-bottom:5px;}
.suggest .sg-text{font-size:13.5px;line-height:1.55;margin-bottom:9px;color:var(--ink);}
.world-box{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:11px 14px 13px;margin-bottom:16px;}
.world-box summary{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);cursor:pointer;list-style:none;}
.world-box summary::-webkit-details-marker{display:none;}
.world-box summary::before{content:"\25B8 ";color:var(--acc);}
.world-box[open] summary::before{content:"\25BE ";}
.world-box .wb-hint{color:var(--mute);font-size:12px;margin:8px 0 2px;}
.world-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.world-grid .fldv textarea{min-height:58px;}
@media(max-width:640px){.world-grid{grid-template-columns:1fr;}}
/* ===== Pass 6 — Cast + Chronicle ===== */
.cast-grid,.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:4px}
.cast-card,.fac-card,.rec-card{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:8px;padding:10px 12px}
.cast-card.side-pc{border-left-color:var(--grn)}
.cast-card.side-ally{border-left-color:var(--acc)}
.cast-card.side-rival{border-left-color:var(--red)}
.cast-card.side-npc{border-left-color:var(--line2)}
.cc-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cc-name,.rec-title{flex:1;min-width:0;font-weight:600;font-size:14px;color:var(--ink);background:transparent;border:none;border-bottom:1px solid transparent;padding:2px 0}
.cc-mini,.rec-head select{background:var(--panel);color:var(--dim);border:1px solid var(--line);border-radius:5px;font-size:11px;padding:2px 3px}
.cc-row{display:flex;gap:8px;margin-bottom:6px}
.cc-row input,.f-stand{flex:1;min-width:0;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--dim);font-size:12px;padding:3px 0}
.f-stand{width:100%;margin-bottom:6px}
.cc-notes,.cast-card textarea,.fac-card textarea,.rec-card textarea{width:100%;background:transparent;border:1px solid var(--line);border-radius:6px;color:var(--mute);font-size:12px;line-height:1.45;padding:6px 8px;resize:vertical;font-family:inherit}
.cast-card input:focus,.cast-card textarea:focus,.fac-card input:focus,.fac-card textarea:focus,.rec-card input:focus,.rec-card textarea:focus{outline:none;border-bottom-color:var(--acc);border-color:var(--acc);background:var(--raise)}
.cc-act{display:flex;align-items:center;gap:6px;margin-top:8px;flex-wrap:wrap}
.kept-wrap{margin:4px 0 14px}
.kept-label{font-size:12px;color:var(--dim);margin-bottom:6px}
.kept-empty{color:var(--mute);font-size:12px;background:var(--panel2);border:1px dashed var(--line2);border-radius:8px;padding:12px 14px}
.kept-strip{display:flex;flex-wrap:wrap;gap:6px}
.kept-chip{display:flex;align-items:center;gap:6px;background:var(--raise);border:1px solid var(--line2);border-radius:20px;padding:3px 7px 3px 12px;font-size:12px}
.kept-chip .kc-name{font-weight:600;color:var(--ink)}
.kept-chip .kc-meta{color:var(--mute);font-size:11px;margin-right:2px}
.data-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-top:6px}
.data-card{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:14px}
.data-card h3{margin:0 0 5px;font-size:14px;color:var(--ink)}
.data-card p{margin:0 0 10px;font-size:12px;color:var(--mute);line-height:1.5}
.count-note{color:var(--dim);font-size:11px;margin:8px 0 0;min-height:14px}
.imp-area{width:100%;min-height:84px;background:var(--panel);border:1px solid var(--line);border-radius:6px;color:var(--mute);font-family:var(--mono);font-size:11px;padding:8px;resize:vertical}
.rec-card{margin-bottom:10px}
.rec-head{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.rec-date{width:128px;background:transparent;border:none;border-bottom:1px solid var(--line);color:var(--dim);font-size:12px;padding:2px 0}
.rec-card details{margin-top:6px}
.rec-card summary{cursor:pointer;color:var(--acc);font-size:12px;user-select:none}
.rec-tags{width:100%;background:transparent;border:none;border-top:1px dashed var(--line);color:var(--mute);font-size:11px;padding-top:6px;margin-top:8px}
.rec-count{color:var(--dim);font-size:11px;margin:2px 0 10px}/* ===== stat block — paired columns + appearance ===== */
.sb-desc{font-size:12.5px;line-height:1.5;color:var(--mute);font-style:italic;margin-bottom:9px;padding-left:9px;border-left:2px solid var(--line2)}
.statblock{display:grid;grid-template-columns:1.05fr 1fr;gap:10px 18px;background:var(--raise);border:1px solid var(--line);border-radius:8px;padding:11px 13px;margin-bottom:11px}
.sb-attrs{display:flex;flex-direction:column;gap:6px;justify-content:center}
.sb-pair{display:flex;align-items:baseline;gap:7px;font-size:13px;white-space:nowrap}
.sb-pair .sb-k,.sb-pair .sb-k2{color:var(--dim);font-weight:600;font-size:10.5px;letter-spacing:.05em}
.sb-pair .sb-k{width:22px}
.sb-pair .sb-k2{width:30px;text-align:right}
.sb-pair .sb-v,.sb-pair .sb-v2{color:var(--ink);font-weight:700;width:30px;text-align:right;font-variant-numeric:tabular-nums}
.sb-pair .sb-arrow{color:var(--mute);font-size:11px;width:14px;text-align:center;opacity:.7}
.sb-pair .hi{color:var(--acc)}
.sb-pair .dim{color:var(--mute);opacity:.6}
.sb-derived{display:grid;grid-template-columns:repeat(2,1fr);gap:5px 8px;align-content:center}
.sb-d{display:flex;justify-content:space-between;align-items:center;background:var(--panel2);border:1px solid var(--line);border-radius:5px;padding:3px 9px;font-size:12px}
.sb-d .dk{color:var(--dim);font-size:10.5px;letter-spacing:.04em}
.sb-d .dn{color:var(--ink);font-weight:700;font-variant-numeric:tabular-nums}
.sb-d.dim{opacity:.4}
.sb-d.hi .dn{color:var(--acc)}
.eu-desc{font-size:11.5px;line-height:1.45;color:var(--mute);font-style:italic;margin-top:4px}

.ts-grid{display:grid;grid-template-columns:1fr 1.05fr;gap:8px 20px;padding:9px 0;border-top:1px solid var(--line)}

.ts-empty{color:var(--mute);font-size:13px}
.tlist{list-style:none;margin:0;padding:0;font-size:12.5px;line-height:1.4}

.tlist li:last-child{border-bottom:none}
.tlist li.tsep{height:7px;padding:0;border-bottom:none}
.sktab{width:100%;border-collapse:collapse;font-size:12.5px}
.sktab td{padding:2.5px 0;border-bottom:1px dotted var(--line);vertical-align:baseline}
.sktab tr:last-child td{border-bottom:none}
.sktab .skn{color:var(--ink);padding-right:10px}
.sktab .skv{text-align:right;color:var(--acc);font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;width:48px}

.glist li:last-child{border-bottom:none}
.gi-n{font-size:12.5px;color:var(--ink);font-weight:600}
.gi-d{font-size:11.5px;color:var(--mute);line-height:1.45;margin-top:2px}.powlist{list-style:none;margin:0;padding:0}
.powlist li{padding:5px 0;border-bottom:1px dotted var(--line)}
.powlist li:last-child{border-bottom:none}
.pw-h{display:flex;align-items:baseline;justify-content:space-between;gap:10px}
.pw-n{font-size:12.5px;color:var(--ink);font-weight:600}
.pw-fp{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}
.pw-d{font-size:11.5px;color:var(--mute);line-height:1.45;margin-top:2px}
.powrow.dark .pw-n{color:#f0a9b6}
.pw-dot{color:var(--red)}/* ===== click-to-expand rows (gear + force powers) ===== */
.acc-list{margin:0;padding:0}
.acc-row{border-bottom:1px dotted var(--line)}
.acc-row:last-child{border-bottom:none}
.acc-head{display:flex;align-items:baseline;gap:10px;padding:6px 1px;cursor:pointer;user-select:none}
.acc-row.nodesc .acc-head{cursor:default}
.acc-n{flex:1;min-width:0;font-size:12.5px;color:var(--ink);font-weight:600}
.acc-side{font-family:var(--mono);font-size:11px;color:var(--dim);white-space:nowrap}
.acc-caret{color:var(--mute);font-size:14px;line-height:1;transition:transform .15s ease;flex:none}
.acc-row.open .acc-caret{transform:rotate(90deg)}
.acc-head:hover .acc-n{color:var(--acc)}
.acc-d{display:none;font-size:11.5px;color:var(--mute);line-height:1.5;padding:0 0 9px 1px}
.acc-row.open .acc-d{display:block}
.acc-row.dark .acc-n{color:#f0a9b6}
.pw-dot{color:var(--red)}/* relationship row (cast + factions) */
.cc-rel-row{display:flex;align-items:center;gap:8px;margin:2px 0 6px}
.cc-rl{font-size:10px;color:var(--dim);font-family:var(--mono);text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.cc-rel-row select{flex:1;min-width:0}
</style>

se — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 6d(3) burn, AD 3 (cuts DR to a third); damage ÷2 per hex. 3-m burst.","brand":"Merr-Sonn","type":"High Explosive"},{"name":"Carbonite grenade","cat":"Explosive","dmg":"2d cr + encase","wt":"0.75","cost":"2,000","lc":"Res","notes":"Flash-carbonite capture device. Thrown (~ST×3 m). Fixed 2-sec fuse (flash-freeze cycle) — it CANNOT be set down to 1 second. 2-m radius: 2d cr, and each target rolls HT-2 or is ENCASED — fully helpless and immobile for 2d turns (a critical failure risks the longer carbon-freeze). Prized by bounty hunters. 2-m radius.","brand":"Hutt Cartel","type":"Cryo / Stasis"},{"name":"Pulse grenade (anti-shield)","cat":"Explosive","dmg":"3d(5) ion + shield-collapse","wt":"0.5","cost":"900","lc":"Res","notes":"SWTOR-pattern pulse charge tuned to defeat deflector screens. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Within 3 m any personal energy shield COLLAPSES instantly, plus 3d(5) ion to droids/electronics. Light effect on flesh. 3-m radius.","brand":"Republic","type":"Ion / EMP"},{"name":"Mandalorian shrapnel charge","cat":"Explosive","brand":"Mandalorian","dmg":"6d(1) cr ex + [3d] frag","wt":"0.5","cost":"650","lc":"Mil","notes":"Clan-forged anti-personnel charge — beskar-fleck shrapnel. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 6d(1) cr at the hex, ÷2 per hex, PLUS [3d] cutting fragments out to ~6 m that ignore energy shields. 3-m burst.","type":"Fragmentation"},{"name":"Conqueror breaching charge","cat":"Explosive","brand":"Mandalorian","dmg":"6d×3(3) cr ex","wt":"1.5","cost":"1,600","lc":"Mil","notes":"Mandalorian shaped demolition charge — placed, not thrown. Fixed 3-sec arming fuse (it is a placed charge) — it CANNOT be set down to 1 second. 6d×3(3) cr (~63 avg), AD 3; cracks blast doors, walls and heavy droids. ÷2 per hex. 4-m burst.","type":"High Explosive"},{"name":"Sith poison canister","cat":"Explosive","brand":"Sith Empire","dmg":"3d tox/turn cloud + fear","wt":"0.5","cost":"2,400","lc":"Illegal","notes":"Sith alchemical toxin. Thrown (~ST×3 m). Fixed 2–3-sec fuse (the canister must rupture and aerosolise) — it CANNOT be set down to 1 second. 4-m cloud lingering 1d turns: 3d toxic/turn (ignores energy shields), and anyone inside rolls HT-3 or is gripped by supernatural FEAR (−3, may flee). 4-m cloud. Vile, illegal.","type":"Gas / Chemical"},{"name":"Interdiction grenade (Sith)","cat":"Explosive","brand":"Sith Empire","dmg":"2d burn + Force-suppression","wt":"0.5","cost":"3,000","lc":"Illegal","notes":"Sith anti-Force device — a stuttering null-pulse. Thrown (~ST×3 m). Fixed 2-sec fuse (the field must charge) — it CANNOT be set down to 1 second. Within 3 m: 2d burn AND every Force-user takes −3 to all Force rolls for 1d turns as the Current is jammed. 3-m radius. Rare Sith tech.","type":"Special / Utility"},{"name":"Sonic imploder (SoroSuub)","cat":"Explosive","brand":"SoroSuub","dmg":"5d(0.5) son ex + HT-4 stun","wt":"0.5","cost":"1,400","lc":"Res","notes":"SoroSuub implosion charge — a sharp inward crack. Thrown (~ST×3 m). Fixed 2-sec fuse (resonator charge) — it CANNOT be set down to 1 second. 5d sonic, AD 0.5 (doubled physical DR resists it, bypasses energy shields); everyone in radius rolls HT-4 or is stunned 1d turns and deafened. ÷2 per hex. 4-m radius.","type":"Sonic"},{"name":"Sonic disruptor mine (SoroSuub)","cat":"Explosive","brand":"SoroSuub","dmg":"5d(0.5) son ex + stun","wt":"1","cost":"1,500","lc":"Res","notes":"SoroSuub sonic area-denial mine. Set (Traps); triggers the instant a target enters. 5d sonic, AD 0.5, + HT-3 or stunned 1d turns. ÷2 per hex. 3-m radius.","type":"Sonic"},{"name":"Spice-gas grenade (Hutt)","cat":"Explosive","brand":"Hutt Cartel","dmg":"Knockout gas (HT-3 or sleep)","wt":"0.5","cost":"1,100","lc":"Illegal","notes":"Hutt narcotic knockout gas. Thrown (~ST×3 m). Fixed 2-sec fuse (dispersal) — it CANNOT be set down to 1 second. 4-m cloud lingering 1d turns: anyone breathing rolls HT-3 or drops UNCONSCIOUS for 1d minutes (sealed/filtered masks are immune). 4-m cloud. Non-lethal capture tool.","type":"Gas / Chemical"},{"name":"Nar Shaddaa scrap-frag","cat":"Explosive","brand":"Hutt Cartel","dmg":"5d(1) cr ex + [2d] frag","wt":"0.5","cost":"300","lc":"Res","notes":"Cheap back-alley frag — crude but it works. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 5d(1) cr at the hex, ÷2 per hex, PLUS [2d] scrap fragments out to ~5 m. 3-m burst. Cheap and dirty.","type":"Fragmentation"},{"name":"Incinerator firebomb (Exchange)","cat":"Explosive","brand":"Exchange","dmg":"4d burn ex + fire field","wt":"0.5","cost":"500","lc":"Res","notes":"Exchange improvised firebomb — gelled accelerant. Thrown (~ST×3 m). Fixed 2-sec fuse (the gel must ignite) — it CANNOT be set down to 1 second. 4d burn at the hex, ÷2 per hex, then a 3-m fire field burning 1d cu/turn for 1d turns. 3-m field.","type":"Incendiary"},{"name":"Knockout-gas grenade (Exchange)","cat":"Explosive","brand":"Exchange","dmg":"Stun gas (HT-3 or stun)","wt":"0.5","cost":"600","lc":"Res","notes":"Exchange riot gas. Thrown (~ST×3 m). Fixed 2-sec fuse (dispersal) — it CANNOT be set down to 1 second. 4-m cloud 1d turns: HT-3 or stunned and nauseated (−3) for 1d turns; filtered masks immune. 4-m cloud. Non-lethal.","type":"Gas / Chemical"},{"name":"Republic frag grenade","cat":"Explosive","brand":"Republic","dmg":"6d(1) cr ex + [2d] frag","wt":"0.5","cost":"550","lc":"Mil","notes":"Republic Army mil-spec fragmentation. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 6d(1) cr, ÷2 per hex, PLUS [2d] fragments to ~5 m. 3-m burst. Issue ordnance.","type":"Fragmentation"}],"utility":[{"name":"Kolto patch","cat":"Medical","effect":"Slap-on field dressing (apply as a Ready or First Aid action). Heals 1d+4 HP total, dribbled out over the next 3 turns. Counts as 1/3 of your daily kolto saturation (3 patches = your cap for the day). Won't mend a major wound or regrow a crippled limb.","wt":"0.25","cost":"230","lc":"—","notes":"Basic field dressing. Manaan kolto.","brand":"Czerka"},{"name":"Standard med pack","cat":"Medical","effect":"The adventurer's field kit (Ready/First Aid to apply). Heals 2d+6 HP over 3 turns. Counts as HALF your daily kolto saturation — two per day, max. No good against crippling/grievous wounds.","wt":"1","cost":"450","lc":"—","notes":"The adventurer's standard field kit.","brand":"Czerka"},{"name":"Military med pack","cat":"Medical","effect":"Issue-grade auto-injector trauma pack. Heals 3d+6 HP over 3 turns (~17 avg). Using one is your FULL daily kolto saturation — it locks out any other kolto/bacta that day. Won't fix crippling wounds.","wt":"1.5","cost":"4,800","lc":"Mil","notes":"Issue-grade trauma pack. Republic & Mandalorian forces.","brand":"Republic"},{"name":"Stim Pack","cat":"Medical","effect":"Combat stimulant; inject as a Ready action. +2 ST and +2 HT for 1 hour. When it wears off you lose 2 FP (the crash). Doesn't stack with another stim already running.","wt":"0.25","cost":"450","lc":"Res","notes":"Battlefield combat enhancer. Crash after.","brand":"Czerka"},{"name":"Anti-Rad Tabs","cat":"Medical","effect":"Swallow one tab: +5 to HT rolls vs radiation for 1 hour. One use; a second tab doesn't stack the bonus, just refreshes the hour.","wt":"0.1","cost":"150","lc":"—","notes":"Common adventurer kit. Consumable.","brand":"Czerka"},{"name":"Antitox Injector","cat":"Medical","effect":"Inject as a Ready action: +3 to HT vs ingested/injected poison for 1 hour, AND one dose immediately neutralises a single known toxin already in you. One use per injector.","wt":"0.25","cost":"360","lc":"—","notes":"Standard medkit supplement.","brand":"Czerka"},{"name":"Medical Kit (field)","cat":"Medical","effect":"Reusable surgical/diagnostic kit: +2 to First Aid, Physician and Diagnosis rolls. Holds ~5 uses of consumables before it needs restocking. Required to do anything past improvised First Aid.","wt":"3","cost":"900","lc":"—","notes":"The medic's working kit.","brand":"Czerka"},{"name":"Comlink","cat":"Comms","effect":"Pocket radio: clear voice/data to orbit, or dozens of km on the ground (planet-wide with a relay or orbital booster). To eavesdrop, a listener must win a Cryptography contest (military models give +2 to resist). Battery lasts weeks.","wt":"0.2","cost":"150","lc":"—","notes":"Ubiquitous. Military models +Crypto.","brand":"SoroSuub"},{"name":"Macrobinoculars","cat":"Sensor","effect":"Hold to the eyes (Ready): cancels the −2 to −5 ranged/Vision penalty for distance when spotting or aiming. Multi-spectrum (IR/UV/thermal), clear detail out to several km. No use closer than ~10 m.","wt":"1","cost":"750","lc":"—","notes":"Useless inside minimum range.","brand":"Arakyd"},{"name":"Sensor Scanner (handheld)","cat":"Sensor","effect":"One sweep = 1 turn (Electronics Operation/Sensors): detects life, metal or energy in one direction out to ~120 m. On a margin of 3+ it pinpoints something hidden or cloaked.","wt":"1","cost":"1,200","lc":"—","notes":"Scan takes a few seconds per sweep.","brand":"Arakyd"},{"name":"Datapad","cat":"Tech","effect":"Pocket computer: data storage, runs Computer Operation tasks, hosts a slicer kit. With the right software, +2 to one relevant tech roll. Everyone in the galaxy carries one.","wt":"0.5","cost":"300","lc":"—","notes":"Everyone carries one.","brand":"SoroSuub"},{"name":"Holoprojector / Recorder","cat":"Tech","effect":"Records hours of holo (sight + sound) and replays it as a 3-D image, or transmits a live holo-feed through a linked comlink. For messages, evidence and briefings.","wt":"0.5","cost":"450","lc":"—","notes":"Evidence, messages, briefings.","brand":"SoroSuub"},{"name":"Stealth Field Generator","cat":"Stealth","effect":"Switch on (Ready): +6 to Stealth (Vision) while moving at half Move or less; near-invisible while still. A critical observer roll catches the shimmer. ~6 minutes of runtime per charge; it drops the instant you attack.","wt":"2","cost":"4,500","lc":"Mil","notes":"Power-hungry; minutes of runtime.","brand":"Bothan Spynet"},{"name":"Security Kit (slicer)","cat":"Tech","effect":"+3 to Lockpicking and Computer Hacking against electronic locks, plus mechanical bypass picks. Without it you slice/pick at −5 (improvising).","wt":"1","cost":"1,100","lc":"Res","notes":"The infiltrator's toolkit.","brand":"Locris"},{"name":"Fusioncutter / Cutting Torch","cat":"Tool","effect":"Cuts a typical door or restraint in ~30 sec, a bulkhead in minutes (much slower vs DR 30+). Doubles as an improvised weapon: 1d burn at reach C. Loud and bright — no stealth.","wt":"2","cost":"600","lc":"—","notes":"Slow on heavy plate; loud.","brand":"Czerka"},{"name":"Binders / Restraints","cat":"Gear","effect":"Cuff a captive (Ready action on a helpless/willing target): ST−6 or an Escape roll to break free. Magnetic models also clamp to a surface. Standard prisoner gear.","wt":"0.5","cost":"150","lc":"—","notes":"Standard for prisoners.","brand":"Republic"},{"name":"Liquid Cable / Syntherope + Grapple","cat":"Tool","effect":"20-m line plus a magnetic or barbed grapple head you can fire ~10 m to anchor. +2 to Climbing; the line bears up to ~300 kg.","wt":"2","cost":"300","lc":"—","notes":"Essential for verticality.","brand":"Czerka"},{"name":"Breath Mask","cat":"Survival","effect":"Worn over the face: filters smoke, toxins and thin air — auto-passes routine suffocation and gas-cloud checks. NOT a vacuum seal; useless in hard vacuum.","wt":"1","cost":"300","lc":"—","notes":"Not a vacuum seal.","brand":"Czerka"},{"name":"Rebreather","cat":"Survival","effect":"With a sealed suit, supplies ~1 hour of breathing underwater or in vacuum; negates drowning/suffocation while charged. Recharges from an air tank.","wt":"1","cost":"1,100","lc":"—","notes":"Negates drowning/suffocation while charged.","brand":"Czerka"},{"name":"Fusion Lantern / Glowrod","cat":"Survival","effect":"Glowrod: cheap, disposable, lights a ~10-m radius and cancels darkness penalties, battery lasts weeks. Fusion lantern: brighter and rechargeable. One of each is standard kit.","wt":"1","cost":"75","lc":"—","notes":"Long battery life.","brand":"Czerka"},{"name":"Survival Field Kit","cat":"Survival","effect":"+2 to Survival rolls; packs shelter, water reclamation, a fire-starter and ~3 days of rations for one person. Restock the rations after use.","wt":"5","cost":"600","lc":"—","notes":"Days of self-sufficiency.","brand":"Czerka"},{"name":"Cold-Weather Gear","cat":"Survival","effect":"Worn: auto-passes routine cold checks down to Hoth/Csilla extremes, but it's bulky — −1 to fine DX tasks while worn. Power-assisted versions handle deep-space cold.","wt":"4","cost":"450","lc":"—","notes":"Bulky; −1 to fine DX tasks.","brand":"Czerka"},{"name":"Power Cell (spare)","cat":"Gear","effect":"One reload for a blaster, powered tool or droid. Swapping a weapon cell is a Ready maneuver; a droid cell takes ~15 min. A blaster fires its listed Shots per cell — carry several.","wt":"0.2","cost":"75","lc":"—","notes":"Carry several.","brand":"Czerka"},{"name":"Utility Belt","cat":"Storage","bag":true,"capacity":8,"encReduce":0.1,"effect":"Six belt pouches and clips. Holds up to 6 small items — power cells, kolto patches, a comlink, a holdout blaster, a datapad; nothing over ~2 kg each, 8 kg total. Items ride on the hips for 10% load relief, and any one of them is a quick-draw Ready maneuver. FULL at 6 pouches.","wt":"1","cost":"230","lc":"—","notes":"Organises the loadout; the classic adventurer's belt.","brand":"Czerka"},{"name":"Utility satchel","cat":"Storage","bag":true,"capacity":30,"encReduce":0.05,"effect":"A simple shoulder satchel of tough synthcloth. Holds up to 30 kg; carried weight inside counts 5% lighter (snug, body-close load).","wt":"1","cost":"180","lc":"—","notes":"Ubiquitous spacer's bag. Cheap and unremarkable.","brand":"Czerka"},{"name":"Courier sling bag","cat":"Storage","bag":true,"capacity":25,"encReduce":0.05,"effect":"A cross-body sling favoured by messengers. Holds 25 kg; contents count 5% lighter and ride out of the way.","wt":"0.8","cost":"270","lc":"—","notes":"Fast to swing round for a one-handed grab.","brand":"Independent"},{"name":"Bandolier rig","cat":"Storage","bag":true,"capacity":15,"encReduce":0.08,"effect":"Loops and pouches across the chest for cells, grenades, and small kit. Holds 15 kg of small items; contents count 8% lighter (weight spread across the torso).","wt":"0.6","cost":"360","lc":"—","notes":"Keeps munitions to hand. Iconic smuggler look.","brand":"Merr-Sonn"},{"name":"Spacer's duffel","cat":"Storage","bag":true,"capacity":60,"encReduce":0.08,"effect":"A big soft duffel for hauling a whole kit between berths. Holds 60 kg; contents count 8% lighter.","wt":"2","cost":"330","lc":"—","notes":"Standard issue aboard freighters.","brand":"Independent"},{"name":"Field rucksack","cat":"Storage","bag":true,"capacity":80,"encReduce":0.12,"effect":"A framed military pack with a hip belt that shifts load onto the hips. Holds 80 kg; contents count 12% lighter.","wt":"3","cost":"750","lc":"—","notes":"Republic and merc infantry standard.","brand":"Independent"},{"name":"Smuggler's concealment vest","cat":"Storage","bag":true,"capacity":12,"encReduce":0.1,"effect":"A lined vest of hidden pockets. Holds 12 kg; contents count 10% lighter and grant +2 to conceal what's inside from a casual search.","wt":"0.5","cost":"1,200","lc":"Res","notes":"Sized for holdouts, spice, and credits.","brand":"Exchange"},{"name":"Verpine modular pack","cat":"Storage","bag":true,"capacity":90,"encReduce":0.18,"effect":"Verpine-engineered load-bearing pack with active weight-distribution webbing. Holds 90 kg; contents count 18% lighter.","wt":"2.5","cost":"5,400","lc":"Res","notes":"Exquisite insectoid craft. Light, balanced, expensive.","brand":"Verpine"},{"name":"Mandalorian load harness","cat":"Storage","bag":true,"capacity":50,"encReduce":0.15,"effect":"A beskar-buckled load-bearing harness worn over armour. Holds 50 kg; contents count 15% lighter. Reinforced buckles shrug off light damage.","wt":"2","cost":"2,700","lc":"Mil","dr":8,"hp":18,"notes":"Clan-forged webbing. Survives a firefight.","brand":"Mandalorian"},{"name":"Durasteel cargo case","cat":"Storage","bag":true,"capacity":50,"encReduce":0.1,"effect":"A rigid lockable durasteel case. Holds 50 kg; contents count 10% lighter and are protected by the shell. Rigid — bulky to carry far.","wt":"6","cost":"900","lc":"—","dr":6,"hp":30,"dd":2,"ddVs":"cut","notes":"Crush-resistant. Locks. Heavy when full.","brand":"Czerka"},{"name":"Czerka shipping crate (portable)","cat":"Storage","bag":true,"capacity":120,"encReduce":0.06,"effect":"A corporate stackable crate with carry handles. Holds 120 kg; contents count 6% lighter (rigid box, awkward to carry).","wt":"12","cost":"600","lc":"—","dr":5,"hp":40,"notes":"Czerka logistics standard. Two-person lift when full.","brand":"Czerka"},{"name":"Repulsor cargo sled","cat":"Storage","bag":true,"capacity":300,"encReduce":0.25,"effect":"A floating repulsorlift platform that tows behind you. Holds 300 kg; its lift bears the bulk, so towed contents count 25% lighter — the best load relief available.","wt":"8","cost":"11,000","lc":"—","dr":4,"hp":25,"notes":"Repulsor field does the lifting. Ion/EMP disables it.","brand":"Czerka"},{"name":"Beskar strongbox","cat":"Storage","bag":true,"capacity":40,"encReduce":0.1,"effect":"A small chest of refined beskar. Holds 40 kg; contents count 10% lighter and are virtually indestructible. Worth a fortune for the metal alone.","wt":"10","c function powsHTML(b){if(!b.powerObjs||!b.powerObjs.length)return b.powers?esc(b.powers):"";return "<div class=\"acc-list\">"+b.powerObjs.map(function(p){var dk=isDark(p.name);var d=(typeof POW_DESC!=="undefined"&&POW_DESC[p.name])||"";var head="<span class=\"acc-n\">"+(dk?"<span class=\"pw-dot\">\u25C6</span> ":"")+esc(p.name)+"</span><span class=\"acc-side\">"+esc(p.fp)+" FP</span>";if(!d)return "<div class=\"acc-row nodesc"+(dk?" dark":"")+"\"><div class=\"acc-head\">"+head+"</div></div>";return "<div class=\"acc-row"+(dk?" dark":"")+"\"><div class=\"acc-head\">"+head+"<span class=\"acc-caret\">\u203A</span></div><div class=\"acc-d\">"+esc(d)+"</div></div>";}).join("")+"</div>";}
function flagHTML(f){if(!f)return'';const ic=f.kind==='red'?'\u25C6':f.kind==='amber'?'\u26A0':'\u2022';return '<div class="flag '+f.kind+'"><span class="fi">'+ic+'</span><div><span class="fk">'+esc(f.k)+'</span> '+esc(f.t)+'</div></div>';}
const tagify=s=>esc(s).replace(/\u00b7/g,'<span class="tag">\u00b7</span>').replace(/;/g,'<span class="tag">;</span>');
function traitList(s){if(!s)return'<div class="ts-empty">\u2014</div>';
 var groups=String(s).split('\u00b7').map(function(g){return g.trim();}).filter(Boolean);var out='';
 groups.forEach(function(g,gi){if(gi)out+='<li class="tsep"></li>';g.split(/[,;]/).map(function(t){return t.trim();}).filter(Boolean).forEach(function(t){out+='<li>'+esc(t)+'</li>';});});
 return '<ul class="tlist">'+out+'</ul>';}
function skillTable(s){if(!s)return'<div class="ts-empty">\u2014</div>';
 var rows=String(s).split(';').map(function(x){return x.trim();}).filter(Boolean).map(function(tok){
  var mTo=tok.match(/^(.*?)\s+to\s+(\d+)$/i);if(mTo)return{n:mTo[1].trim(),v:mTo[2],to:true};
  var m=tok.match(/^(.*?)[\-\s]+(\d+)$/);if(m)return{n:m[1].trim(),v:m[2]};
  return{n:tok,v:''};});
 return '<table class="sktab"><tbody>'+rows.map(function(r){return '<tr><td class="skn">'+esc(r.n)+'</td><td class="skv">'+(r.v?(r.to?'\u2264':'')+esc(r.v):'')+'</td></tr>';}).join('')+'</tbody></table>';}
function traitsSkillsBlock(b){return '<div class="ts-grid">'
  +'<div class="ts-col"><div class="ts-k">Traits</div>'+traitList(b.traits)+'</div>'
  +'<div class="ts-col"><div class="ts-k">Skills</div>'+skillTable(b.skills)+'</div></div>';}
var GEAR_DESC_IDX=null;
function gearDescIndex(){if(GEAR_DESC_IDX)return GEAR_DESC_IDX;var m={};
 (GD.utility||[]).forEach(function(u){if(u.name)m[u.name.toLowerCase()]=u.effect||u.notes||'';});
 (GD.explosives||[]).forEach(function(e){if(e.name)m[e.name.toLowerCase()]=(e.dmg?e.dmg+' \u2014 ':'')+(e.notes||'');});
 (GD.cyber||[]).forEach(function(c){if(c.name)m[c.name.toLowerCase()]=c.notes||'';});
 (GD.armour||[]).forEach(function(a){if(a.name)m[a.name.toLowerCase()]=a.notes||'';});
 (GD.shields||[]).forEach(function(s){if(s.name)m[s.name.toLowerCase()]='DR '+s.dr+' vs '+s.vs+(s.notes?'. '+s.notes:'');});
 GEAR_DESC_IDX=m;return m;}
function gearClip(t,n){n=n||220;t=String(t).replace(/\s+/g,' ').trim();if(t.length<=n)return t;var c=t.slice(0,n),sp=c.lastIndexOf(' ');if(sp>40)c=c.slice(0,sp);return c+'\u2026';}
function gearDesc(name){if(!name)return'';var m=gearDescIndex(),k=name.toLowerCase();
 if(m[k]!=null&&m[k]!=='')return gearClip(m[k]);
 var k2=k.replace(/\s*\([^)]*\)\s*$/,'').trim();if(m[k2])return gearClip(m[k2]);
 for(var kk in m){if(kk&&(k.indexOf(kk)===0||kk.indexOf(k)===0)&&m[kk])return gearClip(m[kk]);}
 return '';}
function gearList(s){if(!s)return"<div class=\"ts-empty\">\u2014</div>";var parts=String(s).split(/[;\u00b7]/).map(function(x){return x.trim();}).filter(Boolean);return "<div class=\"acc-list\">"+parts.map(function(it){var dash=it.indexOf(" \u2014 ");var lookup=(dash>0?it.slice(0,dash):it).replace(/^\d+\s+/,"").trim();var d=gearDesc(lookup);var head="<span class=\"acc-n\">"+esc(it)+"</span>";if(!d)return "<div class=\"acc-row nodesc\"><div class=\"acc-head\">"+head+"</div></div>";return "<div class=\"acc-row\"><div class=\"acc-head\">"+head+"<span class=\"acc-caret\">\u203A</span></div><div class=\"acc-d\">"+esc(d)+"</div></div>";}).join("")+"</div>";}
function blockCard(b,species,name){const af=armourFlag(b.attrs.DR),df=darkFlag(b);const desc=b.desc||npcLook(b,species,name);
 return '<div class="card"><div class="chead"><span class="ctitle">'+esc(name||b.archetype)+'</span><span class="cmeta">'
  +(name?'<span class="pill">'+esc(b.archetype)+'</span>':'')
  +'<span class="pill acc">'+esc(b.tier)+'</span>'
  +(species?'<span class="pill">'+esc(species)+'</span>':'')
  +'<span class="pill">~'+b.cp+' pts</span>'
  +(b.force?'<span class="pill '+(b.force==='dark'?'red':'grn')+'">'+(b.force==='dark'?'dark side':'light side')+'</span>':'')
  +'</span></div><div class="cbody">'
  +'<div class="sb-desc">'+esc(desc)+'</div>'
  +statBlock(b.attrs)

  +sec('Weapons',weaponBlockHTML(b.weapons))
  +sec('Combat style',esc(b.style))
  +(b.powers?sec('Force powers',powsHTML(b)):'')
  +sec('Gear',gearList(b.gear))
  +sec('Notes',esc(b.notes))
  +'</div></div>';}
function blockToText(b,species){var a=b.attrs||{};var sv=function(k){return(a[k]!=null&&a[k]!=='')?a[k]:'\u2014';};
 return b.archetype+' ('+b.tier+(species?' \u00b7 '+species:'')+' \u00b7 ~'+b.cp+' pts)\n'
 +'Appearance: '+(b.desc||npcLook(b,species,''))+'\n'
 +'ST '+sv('ST')+'  HP '+sv('HP')+'     DX '+sv('DX')+'  Per '+sv('Per')+'     IQ '+sv('IQ')+'  Will '+sv('Will')+'     HT '+sv('HT')+'  FP '+sv('FP')+'\n'
 +'Speed '+sv('Speed')+'  Move '+sv('Move')+'  Dodge '+sv('Dodge')+'  Parry '+sv('Parry')+'  Block '+sv('Block')+'  DR '+sv('DR')
 +'\nTraits: '+b.traits+'\nSkills: '+b.skills+'\nWeapons: '+b.weapons.replace(/\n/g,' | ')
 +'\nCombat style: '+b.style+(b.powers?'\nForce powers: '+b.powers:'')+'\nGear: '+b.gear+'\n'+b.notes;}

let lastForge=null;
function buildForge(el){
 el.innerHTML='<div class="space-head"><h2>The Forge</h2><div class="lede">Generate a rules-grounded NPC stat block from the compendium. Pick an archetype and a power tier \u2014 the build, weapons, skills and powers come straight off the data layer, and your house-rule consequences are flagged inline.</div></div>'
 +'<div class="controls">'
 +'<div class="field"><span class="lab">Archetype</span><select id="fgArch"><option value="surprise">\u2014 surprise me \u2014</option>'+ARCHE_KEYS.map(k=>'<option>'+esc(k)+'</option>').join('')+'</select></div>'
 +'<div class="field"><span class="lab">Power tier</span><select id="fgTier">'+BAND.map((t,i)=>'<option value="'+t+'"'+(i===2?' selected':'')+'>'+t+'</option>').join('')+'</select></div>'
 +'<button class="btn primary" id="fgGo">\u2692 Forge</button>'
 +'<button class="btn" id="fgAgain">\u27F3 Reroll</button>'
 +'</div><div id="forgeOut"></div><div class="kept-wrap" id="keptWrap"></div>';
 $('fgGo').onclick=doForge;$('fgAgain').onclick=doForge;
}
function doForge(){const av=$('fgArch').value;const arch=av==='surprise'?pick(ARCHE_KEYS):av;const cp=TIER_CP[$('fgTier').value]||500;const block=genBlock(arch,cp);const species=speciesForArch(arch);const name=npcName(species);lastForge={block,species,name};block.desc=npcLook(block,species,name);
 $('forgeOut').innerHTML='<div class="fg-actions"><button class="btn mini" id="fgKeep">\uD83D\uDCCC Keep</button><button class="btn mini" id="fgSheet">\u2913 Character sheet</button><button class="btn mini ghost" id="fgCopy">\u29C9 Copy</button></div>'+blockCard(block,species,name);
 $('fgKeep').onclick=keepCurrent;$('fgSheet').onclick=()=>downloadSheet(block,name,species);$('fgCopy').onclick=()=>copyText(blockToText(block,species));}

function skResolveSheet(name){if(SKMAP[name])return{base:name,spec:'',attr:SKMAP[name][0],diff:SKMAP[name][1]};const m=name.match(/^(.*?)\s*\(([^)]+)\)\s*$/);if(m&&SKMAP[m[1]])return{base:m[1],spec:m[2],attr:SKMAP[m[1]][0],diff:SKMAP[m[1]][1]};return{base:m?m[1].trim():name,spec:m?m[2]:'',attr:'DX',diff:'A'};}
function blockToSheet(b,name,species){
 const S=sheetBlank();const a=b.attrs||{};
 S.name=name||b.archetype||'NPC';S.concept=b.archetype||'';S.ptTarget=+b.cp||150;
 const sp=(GD.species||[]).find(s=>s.name===species);
 const mod=sp?{st:+sp.st||0,dx:+sp.dx||0,iq:+sp.iq||0,ht:+sp.ht||0}:{st:0,dx:0,iq:0,ht:0};
 S.species=sp?sp.name:'Human';
 const ST=+a.ST||10,DX=+a.DX||10,IQ=+a.IQ||10,HT=+a.HT||10;
 S.attr.ST=(ST-mod.st-10)*10;S.attr.HT=(HT-mod.ht-10)*10;S.attr.DX=(DX-mod.dx-10)*20;S.attr.IQ=(IQ-mod.iq-10)*20;
 S.sec.HP=((+a.HP||ST)-ST)*2;
 S.sec.Will=((+a.Will||IQ)-IQ)*5;
 S.sec.Per=((+a.Per||IQ)-IQ)*5;
 S.sec.FP=((+a.FP||HT)-HT)*3;
 const defSpeed=(HT+DX)/4;S.sec.Speed=Math.round(((+a.Speed||defSpeed)-defSpeed)*20);
 const flrSp=Math.floor(+a.Speed||defSpeed);S.sec.Move=((+a.Move||flrSp)-flrSp)*5;
 (b.skills||'').split(';').forEach(tok=>{tok=tok.trim();if(!tok||/force skills/i.test(tok))return;const m=tok.match(/^(.*)-(\d+)$/);if(!m)return;const nm=m[1].trim(),lvl=+m[2],r=skResolveSheet(nm),attrLvl=(a[r.attr]!=null?+a[r.attr]:10),rel=lvl-attrLvl,pts=skillCost(r.diff,rel);S.skills.push({name:r.base,spec:r.spec,pts:pts,attr:r.attr,diff:r.diff});});
 const parts=(b.traits||'').split('\u00b7').map(s=>s.trim()).filter(Boolean);
 if(parts[0])parts[0].split(',').forEach(n=>{n=n.trim();if(n)S.traits.push({name:n,type:'Advantage',levels:1,enh:[],lim:[],varCost:0});});
 if(parts[1])parts[1].split(',').forEach(n=>{n=n.trim();if(n)S.traits.push({name:n,type:'Disadvantage',levels:1,enh:[],lim:[],varCost:0});});
 (b.weapons||'').split('\n').forEach(line=>{const nm=line.split(' \u2014 ')[0].trim();if(!nm)return;const w=GD.weapons.find(x=>x.name===nm);if(w)S.weapons.push({name:w.name,cls:w.cls});});
 (b.gear||'').split(';').forEach(tok=>{const nm=tok.split(' \u2014 ')[0].trim();if(!nm)return;if((GD.armour||[]).some(x=>x.name===nm))S.armour.push({name:nm});else if((GD.shields||[]).some(x=>x.name===nm))S.shields.push({name:nm,equipped:true});else if((GD.utility||[]).some(x=>x.name===nm))S.gear.push({name:nm,qty:1});});
 if(b.powers){const fp=GD.forcePowers||[];b.powers.split(';').forEach(tok=>{const nm=tok.replace(/\([^)]*\)\s*$/,'').trim();if(!nm)return;const db=fp.find(p=>p.name===nm);if(db)S.force.powers.push({name:db.name,skill:db.skill||'',fp:db.fp,tier:db.tier||1,pts:db.pts||5,book:db.book||''});else S.force.powers.push({name:nm,tier:1,pts:5,book:''});});S.force.primary='Will';}
 if(b.style){const styleName=b.style.split(' \u2014 ')[0].trim();const sf=(GD.saberForms||[]).find(f=>f.name===styleName);if(sf){S.forms.push({name:sf.name,tier:1,active:false});}else{const st=(GD.battleStances||[]).find(s=>s.name===styleName);if(st)S.stances.push({name:st.name,active:false});}}
 const noteBits=[];if(b.notes)noteBits.push(b.notes);
 if(sp){if(sp.cost)noteBits.push('Species '+sp.name+' (+'+sp.cost+' pts, on top of the ~'+(b.cp||'?')+'-pt block budget). Racial traits \u2014 '+String(sp.notes||'').replace(/\s+/g,' ').trim()+' \u2014 are not auto-added; add them on the sheet for the full racial package.');}
 else if(species&&species!=='Human')noteBits.push('Intended species: '+species+' \u2014 not in the sheet catalogue, so left as Human to keep the stat line exact.');
 if(b.style)noteBits.push('Combat style: '+b.style);
 noteBits.push('Forged in the GM Console ('+(b.tier||'')+', ~'+(b.cp||'?')+' pts). Traits are best-effort name matches \u2014 review costs on the sheet.');
 S.notes=noteBits.join('\n');
 return S;
}

 R('Ch. X — Kashyyyk','c. 3941 BBY','Battle meditation proven on Mandalorian hunts. Tylo\u2019s teleport accident: the Rakatan archive, Revan\u2019s alliance, password \u201cSatele Shan\u201d, the stasis-Jedi holo, Chiss intel. Chatni won 400k betting on duels.');

function scaleShots(s,pct){return String(s).replace(/^(\d+)/,n=>Math.max(1,Math.round(+n*(1+pct/100))));}
function adjustDamage(s,dDie,dFlat){if(!dDie&&!dFlat)return s;return String(s).replace(/^(\d+)d(x\d+)?([+-]\d+)?/,(m,n,mult,mod)=>{let N=+n+(dDie||0);if(N<1)N=1;let M=(mod?+mod:0)+(dFlat||0);return N+'d'+(mult||'')+(M?(M>0?'+'+M:''+M):'');});}

function benchPopMods(){const t=$('benchType').value;let mods=ATTACH.filter(a=>a.ap===t);if(t==='weapon'){const it=benchItemObj();if(it){const r=isRanged(it);mods=mods.filter(a=>!a.for||a.for==='any'||a.for===(r?'ranged':'melee'));}}
 $('benchMods').innerHTML='<div class="bmhd">Attachments \u2014 tick to fit</div>'+(mods.length?mods.map(a=>{const idx=ATTACH.indexOf(a);return '<label class="bmod"><input type="checkbox" class="benchchk" data-idx="'+idx+'"><span class="bm-n">'+esc(a.n)+'</span><span class="bm-fx">'+esc(a.fx)+'</span><span class="bm-c">'+(a.cost?cr(a.cost):'\u2014')+(a.lc?' \u00b7 '+esc(a.lc):'')+'</span></label>';}).join(''):'<div class="empty">No attachments fit this item.</div>');benchRender();}
function benchRender(){const it=benchItemObj();const o=$('benchOut');if(!it){o.innerHTML='';return;}const chosen=[...document.querySelectorAll('.benchchk:checked')].map(c=>ATTACH[+c.dataset.idx]).filter(Boolean);o.innerHTML=($('benchType').value==='weapon')?benchWeapon(it,chosen):benchArmour(it,chosen);}
function benchWeapon(w,mods){const ST=12;const baseLine=weaponLineText(w,ST);const c=clone(w);let dDie=0,dFlat=0,adMul=1,addCost=0;const notes=[];mods.forEach(m=>{const d=m.mod||{};addCost+=num(m.cost)||0;if(d.acc)c.acc=(num(c.acc)||0)+d.acc;if(d.rof)c.rof=(num(c.rof)||0)+d.rof;if(d.rcl!=null)c.rcl=Math.max(1,(num(c.rcl)||1)+d.rcl);if(d.shotsPct&&c.shots)c.shots=scaleShots(c.shots,d.shotsPct);if(d.parry!=null&&c.parry!==''&&c.parry!=null)c.parry=(num(c.parry)||0)+d.parry;if(d.dmgDie)dDie+=d.dmgDie;if(d.dmg)dFlat+=d.dmg;if(d.adMul)adMul*=d.adMul;if(d.wt)c.wt=(num(c.wt)||0)+d.wt;if(d.note)notes.push(d.note);});if(adMul!==1)c.ad=(num(c.ad)||1)*adMul;const dmg=adjustDamage(dmgOf(c,ST),dDie,dFlat);const xtra=weaponXtra(c);const moddedLine=w.name+' \u2014 '+dmg+(xtra?' \u00b7 '+xtra:'');return benchCard(w.name,baseLine,moddedLine,mods,notes,num(w.cost)||0,addCost,'@ ST 12');}
function benchArmour(a,mods){const baseLine=a.name+' \u2014 '+itemLine(a,'Armour');const c=clone(a);let addCost=0;const notes=[];mods.forEach(m=>{const d=m.mod||{};addCost+=num(m.cost)||0;if(d.drE)c.drE=(num(c.drE)||0)+d.drE;if(d.drK)c.drK=(num(c.drK)||0)+d.drK;if(d.sealed)c.sealed=true;if(d.wt)c.wt=(num(c.wt)||0)+d.wt;if(d.note)notes.push(d.note);});const moddedLine=a.name+' \u2014 '+itemLine(c,'Armour');return benchCard(a.name,baseLine,moddedLine,mods,notes,num(a.cost)||0,addCost,'');}
function benchCard(name,baseLine,moddedLine,mods,notes,baseCost,addCost,suffix){const changed=mods.length>0;const total=baseCost+addCost;
 return '<div class="card"><div class="chead"><span class="ctitle">'+esc(name)+'</span><span class="cmeta"><span class="pill'+(changed?' acc':'')+'">'+(changed?mods.length+' upgrade'+(mods.length>1?'s':''):'stock')+'</span>'+(suffix?'<span class="pill">'+esc(suffix.replace(/^@ /,''))+'</span>':'')+'</span></div><div class="cbody">'

   PASS 4 — ENCOUNTER & COMBAT
   Encounter composer · honest "what makes this fight swing" read · tracker
   =================================================================== */
function uid(){return 'x'+Math.random().toString(36).slice(2,9);}
if(!STORE.party)STORE.party={size:4,blaster:true,melee:true,heavy:false,saber:false,disruptor:false,terrain:'mixed'};

/* ---------- the honest swing read (replaces a fake threat number) ---------- */
function capList(P){const c=[];if(P.heavy)c.push('heavy weapons');if(P.saber)c.push('a saber');if(P.disruptor)c.push('disruptors');if(P.melee)c.push('vibro/melee');return c.length?c.join(' / '):'limited tools';}
function swingRead(units,P){
 const out=[];const ref=stdBlasterRef();
 const drs=units.map(u=>+u.block.attrs.DR||0);
 const immune=drs.filter(d=>d>=ref.max).length;
 const heavy=drs.filter(d=>d>=ref.avg&&d<ref.max).length;
 const canPierce=P.heavy||P.saber||P.disruptor||P.melee;
 // armour vs the party's tools, under AD(1)
 if(immune>0){
  if(!P.heavy&&!P.saber&&!P.disruptor&&!P.melee)out.push({kind:'red',k:immune+(immune>1?' enemies are':' enemy is')+' blaster-proof.',t:'At DR \u2265'+ref.max+', standard blasters cannot wound them at all under your AD(1) rule (a '+ref.name+' tops out at '+ref.max+'). With nothing but blasters, your party literally cannot hurt these \u2014 they need a heavy weapon, a saber, or to close to vibro/melee.'});
  else out.push({kind:'amber',k:immune+' blaster-proof enemy'+(immune>1?'ies':''),t:'DR \u2265'+ref.max+' shrugs standard blasters entirely; only your '+capList(P)+' can bite. Point those at the armoured ones and don\u2019t waste blaster fire on them.'});
 }else if(heavy>0){
  out.push({kind:'amber',k:heavy+' heavily-armoured enemy'+(heavy>1?'ies':''),t:'DR ~'+ref.avg+'+ means standard blasters mostly bounce (a '+ref.name+' averages '+ref.avg+'); only strong rolls land. '+(canPierce?'Lead with your '+capList(P)+'.':'Concentrate fire, use grenades, or close to melee.')});
 }
 // enemy offence vs an armoured party
 const saberFoes=units.filter(u=>/saber/i.test(u.block.weapons||'')).length;
 const darkCasters=units.filter(u=>u.block.force==='dark').length;
 const heavyFoes=units.filter(u=>/disruptor|cannon|repeating|heavy blaster rifle|missile|rocket|lance|plasma/i.test(u.block.weapons||'')).length;
 if(saberFoes)out.push({kind:'red',k:saberFoes+' lightsaber'+(saberFoes>1?'s':'')+' on the field',t:'They parry and deflect blaster bolts \u2014 ranged fire into them is unreliable. Flank, swarm, use grenades or area effects, or force a melee where deflection won\u2019t save them.'});
 if(darkCasters)out.push({kind:'red',k:darkCasters+' dark-side caster'+(darkCasters>1?'s':''),t:'Lightning and drains ignore armour DR and hit Will/HT. Your ruleset drops morality, so nothing throttles them \u2014 expect them spent freely. Break line of sight and close the gap fast.'});
 if(heavyFoes&&!saberFoes)out.push({kind:'amber',k:heavyFoes+' enemy with armour-piercing / heavy weapons',t:'Disruptors, heavy blasters and the like punch through plate \u2014 these threaten even an armoured PC. Use hard cover, don\u2019t trust DR alone.'});
 if(!saberFoes&&!darkCasters&&!heavyFoes)out.push({kind:'note',k:'Enemy fire is standard.',t:'If your party wears DR \u2265'+ref.avg+', the same AD(1) rule blunts them right back \u2014 their blasters mostly bounce off your plate. Their edge here is numbers, not penetration.'});
 // action economy
 const n=units.length;
 if(P.size){const ratio=n/P.size;
  if(ratio>=2)out.push({kind:'amber',k:'Outnumbered \u2014 '+n+' vs '+P.size,t:'Action economy favours them at about '+(Math.round(ratio*10)/10)+'\u00d7 the attacks per round. Funnel them through doorways or cover, lean on area effects, and stay out of the open.'});
  else if(ratio<=0.5)out.push({kind:'note',k:'You outnumber them \u2014 '+P.size+' vs '+n,t:'Focus-fire to drop attackers early and tilt the action economy further your way.'});
 }
 // terrain
 if(P.terrain==='open')out.push({kind:'note',k:'Open ground.',t:'Range and numbers dominate \u2014 blasters and grenades shine, and melee/saber foes must cross the killing field to reach you.'});
 else if(P.terrain==='tight')out.push({kind:'note',k:'Tight quarters.',t:'Corridors negate ranged advantage and favour melee, sabers and ambush. A blaster line gets a shot or two before contact.'});
 return out;
}

const COMMON_CONDS=['Stunned','Reeling','Prone','Shock-1','Shock-2','Grappled','Unconscious','Bleeding','Aiming','Defending'];

const PAY=["the two sides finally collide with the crew caught between them","the prize sits behind one last door","the mastermind steps into the open","the crew has to choose who walks away","everything the thread has built comes due at once"];
const BAD=["the trail goes cold for good","the wrong side wins outright","an innocent pays the price","the crew's name turns to poison across the sector","the prize falls into far worse hands"];
const STAKE=["the cache","the contract","the prisoner","the data","the territory","the leverage"];
const CWORLD_FAC=["a rival crew","a Sith cell","a Hutt cartel","the local garrison","an Exchange front","a Mandalorian clan","a Republic taskforce","a smuggler ring"];
const CWORLD_PLACE=["the lower city","a backwater moon","the spaceport","a Sith-held district","the cantina quarter","an orbital station","the old ruins"];
const CWORLD_POWER=["a Sith lord","a crime boss","a Republic officer","a Jedi watchman","a Hutt","a bounty broker","a clan chief"];
function worldArr(key,fb){const raw=((STORE.world&&STORE.world[key])||'').split('\n').map(s=>s.trim()).filter(Boolean);return raw.length?raw:fb;}
function moveWeights(t){
 const bs=t.beats||[],done=bs.filter(b=>b.done).length,tot=bs.length,prog=tot?done/tot:0;
 const w={complication:3,escalation:3,faction:2,npc:2,reversal:2,clock:1,ally:1,payoff:1};
 if((t.status||'active')==='seed'){w.complication+=2;w.faction+=2;w.clock+=1;w.payoff=0;}
 if(prog>=0.6){w.payoff+=4;w.reversal+=2;w.complication=Math.max(1,w.complication-1);}
 if((t.scale||'M')==='L'){w.faction+=1;w.reversal+=1;}
 const lean=(STORE.world&&STORE.world.lean)||'neutral';
 if(lean==='darker'){w.escalation+=2;w.reversal+=2;w.clock+=2;}
 else if(lean==='political'){w.faction+=3;}
 else if(lean==='personal'){w.npc+=3;w.reversal+=1;}
 else if(lean==='action'){w.escalation+=2;w.clock+=2;w.payoff+=1;}
 return w;}
function weightedPick(w){const ks=Object.keys(w).filter(k=>w[k]>0);let tot=0;ks.forEach(k=>tot+=w[k]);let r=Math.random()*tot;for(const k of ks){r-=w[k];if(r<=0)return k;}return ks[0];}
const MOVE_TPL={
 complication:["A complication at {where}: {comp}, and it puts {who} on the back foot.","What looked simple sours \u2014 {comp} \u2014 and the crew has to improvise."],
 escalation:["The stakes jump: {esc}. {payoff} is harder to reach now, and costs more.","{who} escalates \u2014 {esc} \u2014 and the crew can\u2019t stay on the fence."],
 faction:["{wfaction} moves on {where}: it {fac}. They want {stake} for themselves.","A third hand \u2014 {wfaction} \u2014 {fac}, cutting across the crew\u2019s play for {payoff}."],
 npc:["{who} {npc} \u2014 last session\u2019s choices have a consequence now.","Someone close to {who} surfaces and {npc}, changing how the crew is seen."],
 reversal:["A reversal: {twist}. What the crew believed about {who} was wrong.","The truth turns over \u2014 {twist} \u2014 and {payoff} isn\u2019t what it seemed."],
 clock:["A clock starts: {clock}. The crew has until it runs out before {bad}.","Time tightens \u2014 {clock} \u2014 and dithering means {bad}."],
 ally:["An opening at {where}: {ally}. Real leverage, if the crew moves fast.","A break \u2014 {ally} \u2014 but the window won\u2019t stay open long."],
 payoff:["It comes to a head: {pay}. {payoff} is in reach, but {wpower} stands in the way.","The confrontation lands \u2014 {pay} \u2014 and there\u2019s no walking it back."]
};
function fillTpl(tpl,t){
 const who=t.who&&t.who.trim()?t.who.trim():pick(["the crew's contact","the people involved","the local players"]);
 const where=t.where&&t.where.trim()?t.where.trim():pick(["the site","the district","the area"]);
 const payoff=t.payoff&&t.payoff.trim()?t.payoff.trim():pick(["the prize","what\u2019s at stake","the objective"]);
 const s={who,where,payoff,wfaction:pick(worldArr('factions',CWORLD_FAC)),wplace:pick(worldArr('places',CWORLD_PLACE)),wpower:pick(worldArr('powers',CWORLD_POWER)),tension:pick(worldArr('tensions',["the brewing conflict","the power vacuum","the old grudge"])),comp:pick(COMP),esc:pick(ESC),fac:pick(FAC),npc:pick(NPC),twist:pick(TWIST),clock:pick(CLOCK),ally:pick(ALLY),pay:pick(PAY),bad:pick(BAD),stake:pick(STAKE)};
 return tpl.replace(/\{(\w+)\}/g,(m,k)=>s[k]!=null?s[k]:m);}
function rollContinuation(id){const t=(STORE.threads||[]).find(x=>x.id===id);if(!t)return;const mv=weightedPick(moveWeights(t));planSuggest[id]={move:mv,text:fillTpl(pick(MOVE_TPL[mv]),t)};renderThread();}
function acceptSuggest(id){const t=(STORE.threads||[]).find(x=>x.id===id);const s=planSuggest[id];if(!t||!s)return;(t.beats=t.beats||[]).push({id:uid(),text:s.text,done:false});delete planSuggest[id];saveStore();renderThread();}
function dismissSuggest(id){delete planSuggest[id];renderThread();}

/* ---------- thread cards ---------- */
function threadCard(t){
 const bs=t.beats||[];const sc=t.scale||'M',stt=t.status||'active';const prog=threadProg(t);const cat=t.category||'';
 const beats=bs.map((b,i)=>'<div class="beat"><input type="checkbox" data-act="beatdone" data-bi="'+i+'" '+(b.done?'checked':'')+'><input class="beat-tx'+(b.done?' done':'')+'" data-act="beattext" data-bi="'+i+'" value="'+esc(b.text)+'" placeholder="what happens\u2026"><button class="btn mini danger" data-act="beatdel" data-bi="'+i+'">\u2715</button></div>').join('');
 const sug=planSuggest[t.id];
 const sugBox=sug?'<div class="suggest"><div class="sg-lab">Suggested next beat \u00b7 '+esc(sug.move)+'</div><div class="sg-text">'+esc(sug.text)+'</div><div class="row"><button class="btn mini primary" data-act="sugaccept">Accept as beat</button><button class="btn mini" data-act="sugroll">\u27F3 Reroll</button><button class="btn mini ghost" data-act="sugdismiss">dismiss</button></div></div>':'';
 const opt=(v,cur,lbl)=>'<option value="'+v+'"'+(cur===v?' selected':'')+'>'+lbl+'</option>';
 return '<div class="thread'+(t.open?' open':'')+'" data-id="'+t.id+'">'
  +'<div class="th-head">'
   +'<span class="pill '+(SCALE_PILL[sc]||'')+'">'+sc+'</span>'
   +'<span class="pill '+(stt==='active'?'acc':(stt==='done'?'':'blu'))+'">'+esc(STATUS_LABEL[stt]||stt)+'</span>'
   +(cat?'<span class="pill '+(CAT_PILL[cat]||'')+' mini">'+esc(CAT_LABEL[cat]||cat)+'</span>':'')
   +'<input class="th-title" data-field="title" value="'+esc(t.title)+'" placeholder="thread title">'
   +(prog?'<span class="th-prog">'+prog+' beats</span>':'')
   +'<button class="btn mini ghost" data-act="toggle">'+(t.open?'hide':'details')+'</button>'
   +'<button class="btn mini danger" data-act="del">\u2715</button>'
  +'</div>'
  +'<div class="th-body">'
   +'<div class="th-grid">'
    +'<div class="fldv" style="flex:0 0 120px"><span class="lab">Scale</span><select data-field="scale">'+opt('S',sc,'small')+opt('M',sc,'medium')+opt('L',sc,'large')+'</select></div>'
    +'<div class="fldv" style="flex:0 0 140px"><span class="lab">Status</span><select data-field="status">'+opt('seed',stt,'seed')+opt('active',stt,'active')+opt('hold',stt,'on hold')+opt('done',stt,'resolved')+'</select></div>'
    +'<div class="fldv"><span class="lab">Current situation</span><input data-field="situation" value="'+esc(t.situation)+'" placeholder="where this thread stands now"></div>'
   +'</div>'
   +'<div class="th-grid">'
    +'<div class="fldv" style="flex:0 0 165px"><span class="lab">Category</span><select data-field="category"><option value=""'+(cat?'':' selected')+'>\u2014 uncategorised</option>'+Object.keys(CAT_LABEL).map(function(k){return '<option value="'+k+'"'+(cat===k?' selected':'')+'>'+esc(CAT_LABEL[k])+'</option>';}).join('')+'</select></div>'
    +'<div class="fldv"><span class="lab">Asked by</span><input data-field="askedBy" value="'+esc(t.askedBy||'')+'" placeholder="who set it in motion / who it\u2019s for"></div>'
    +'<div class="fldv"><span class="lab">Faction</span><input data-field="faction" value="'+esc(t.faction||'')+'" placeholder="outfit involved"></div>'
   +'</div>'
   +'<div class="fldv full"><span class="lab">Beats <span class="muted">(tick as they land; the first un-ticked beat is the next move)</span></span><div class="beats">'+beats+'</div>'
    +'<div class="row" style="margin-top:5px"><button class="btn mini" data-act="beatadd">\uFF0B add beat</button><button class="btn mini" data-act="sugroll">\uD83C\uDFB2 suggest next beat</button></div>'+sugBox+'</div>'
   +'<div class="th-grid">'
    +'<div class="fldv"><span class="lab">Who</span><input data-field="who" value="'+esc(t.who)+'" placeholder="NPCs / faction"></div>'
    +'<div class="fldv"><span class="lab">Where</span><input data-field="where" value="'+esc(t.where)+'" placeholder="world / site"></div>'
    +'<div class="fldv"><span class="lab">Payoff</span><input data-field="payoff" value="'+esc(t.payoff)+'" placeholder="reward / stakes"></div>'
   +'</div>'
   +'<div class="fldv full"><span class="lab">Notes</span><textarea data-field="notes">'+esc(t.notes)+'</textarea></div>'
  +'</div></div>';
}
function renderThread(){
 const th=STORE.threads||[];const filter=planFilterVal().toLowerCase();const stf=(($('planStatus')||{}).value)||'';const ctf=(($('planCat')||{}).value)||'';
 let items=th;
 if(stf)items=items.filter(t=>(t.status||'active')===stf);
 if(ctf)items=items.filter(t=>(t.category||'')===ctf);
 if(filter)items=items.filter(t=>(((t.title||'')+' '+(t.situation||'')+' '+(t.who||'')+' '+(t.where||'')+' '+(t.askedBy||'')+' '+(t.faction||'')+' '+(t.notes||'')).toLowerCase().includes(filter)));
 const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();
 if($('planCount'))$('planCount').textContent=th.length+' thread'+(th.length===1?'':'s');
 const box=$('planList');if(!box)return;
 if(!items.length){box.innerHTML='<div class="empty">'+(th.length?'No threads match.':'No plot threads yet. Add one, or seed a hook\u00b7twist\u00b7payoff skeleton.')+'</div>';return;}
 box.innerHTML=items.map(threadCard).join('');
}
function planAddBlank(){STORE.threads.unshift({id:uid(),title:'',scale:'M',status:'active',situation:'',category:'',askedBy:'',faction:'',beats:[],who:'',where:'',payoff:'',notes:'',open:true});saveStore();renderThread();}
function planSeed(){STORE.threads.unshift({id:uid(),title:'New thread',scale:'M',status:'seed',situation:'',category:'',askedBy:'',faction:'',beats:[{id:uid(),text:'Hook \u2014 how the crew gets pulled in',done:false},{id:uid(),text:'Complication \u2014 the twist that raises the stakes',done:false},{id:uid(),text:'Payoff \u2014 the confrontation and what it costs',done:false}],who:'',where:'',payoff:'',notes:'',open:true});saveStore();renderThread();}

/* ---------- build the space ---------- */
function buildPlanner(el){
 const W=STORE.world;
 const leanOpt=(v,l)=>'<option value="'+v+'"'+(W.lean===v?' selected':'')+'>'+l+'</option>';
 el.innerHTML='<div class="space-head"><h2>Planner</h2><div class="lede">Every live plot thread in one place, with each thread\u2019s next beat lined up as a runnable session agenda. Stuck on what happens next? Roll a continuation off the thread\u2019s own state \u2014 sharper if you fill in the world below.</div></div>'
 +'<details class="world-box"><summary>World context \u2014 optional, feeds the continuation roller</summary>'
  +'<div class="wb-hint">One per line. Leave blank to use generic KOTOR-era fallbacks. Paste your factions, places and power players here and rolled beats will name them.</div>'
  +'<div class="world-grid">'
   +'<div class="fldv"><span class="lab">Factions / outfits</span><textarea id="wFac" placeholder="The Exchange&#10;Sith garrison on ...&#10;House ...">'+esc(W.factions)+'</textarea></div>'
   +'<div class="fldv"><span class="lab">Places / worlds</span><textarea id="wPlace" placeholder="Nar Shaddaa lower city&#10;the Dxun camp&#10;...">'+esc(W.places)+'</textarea></div>'
   +'<div class="fldv"><span class="lab">Power players</span><textarea id="wPow" placeholder="Darth ...&#10;the Hutt ...&#10;Master ...">'+esc(W.powers)+'</textarea></div>'
   +'<div class="fldv"><span class="lab">Tensions / flashpoints</span><textarea id="wTen" placeholder="the kolto blockade&#10;a contested succession&#10;...">'+esc(W.tensions)+'</textarea></div>'
  +'</div>'
  +'<div class="row" style="margin-top:10px"><div class="field"><span class="lab">Continuation lean</span><select id="wLean">'+leanOpt('neutral','Neutral')+leanOpt('darker','Darker / grim')+leanOpt('political','Political')+leanOpt('personal','Personal')+leanOpt('action','Action')+'</select></div></div>'
 +'</details>'
 +'<div class="controls">'
  +'<button class="btn primary" id="planAdd">\uFF0B New thread</button>'
  +'<button class="btn" id="planSeed">\uD83C\uDFB2 Seed skeleton</button>'
  +'<div class="field"><span class="lab">Status</span><select id="planStatus"><option value="">all</option><option value="active">active</option><option value="seed">seed</option><option value="hold">on hold</option><option value="done">resolved</option></select></div>'
  +'<div class="field"><span class="lab">Category</span><select id="planCat"><option value="">all</option>'+Object.keys(CAT_LABEL).map(function(k){return '<option value="'+k+'">'+esc(CAT_LABEL[k])+'</option>';}).join('')+'</select></div>'
  +'<div class="field"><span class="lab">Find</span><input id="planFilter" placeholder="search threads"></div>'
  +'<span class="muted" id="planCount" style="align-self:center"></span>'
 +'</div>'
 +'<div id="planLineOut"></div>'
 +'<div id="planList"></div>';
 // world wiring
 const wsave=()=>saveStore();
 $('wFac').oninput=e=>{W.factions=e.target.value;wsave();};
 $('wPlace').oninput=e=>{W.places=e.target.value;wsave();};
 $('wPow').oninput=e=>{W.powers=e.target.value;wsave();};
 $('wTen').oninput=e=>{W.tensions=e.target.value;wsave();};
 $('wLean').onchange=e=>{W.lean=e.target.value;wsave();};
 // controls
 $('planAdd').onclick=planAddBlank;$('planSeed').onclick=planSeed;
 $('planStatus').onchange=renderThread;$('planCat').onchange=renderThread;$('planFilter').oninput=renderThread;
 // delegated list handlers (attached once; #planList persists)
 const list=$('planList');
 list.addEventListener('change',e=>{const card=e.target.closest('[data-id]');if(!card)return;const t=(STORE.threads||[]).find(x=>x.id===card.dataset.id);if(!t)return;const act=e.target.dataset.act;
  if(act==='beatdone'){const i=+e.target.dataset.bi;if((t.beats||[])[i]){t.beats[i].done=e.target.checked;saveStore();renderThread();}return;}
  if(act==='beattext'){const i=+e.target.dataset.bi;if((t.beats||[])[i]){t.beats[i].text=e.target.value;saveStore();const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();}return;}
  if(e.target.dataset.field!==undefined){const f=e.target.dataset.field;t[f]=e.target.value;saveStore();if(f==='scale'||f==='status'||f==='category')renderThread();else{const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();}}
 });
 list.addEventListener('click',e=>{const card=e.target.closest('[data-id]');if(!card)return;const t=(STORE.threads||[]).find(x=>x.id===card.dataset.id);if(!t)return;const actEl=e.target.closest('[data-act]');const act=actEl?actEl.dataset.act:null;if(!act)return;
  if(act==='toggle'){t.open=!t.open;card.classList.toggle('open');actEl.textContent=t.open?'hide':'details';return;}
  if(act==='del'){if(confirm('Delete this thread?')){STORE.threads=STORE.threads.filter(x=>x.id!==t.id);delete planSuggest[t.id];saveStore();renderThread();}return;}
  if(act==='beatadd'){(t.beats=t.beats||[]).push({id:uid(),text:'',done:false});saveStore();renderThread();return;}
  if(act==='beatdel'){const i=+actEl.dataset.bi;if((t.beats||[])[i]!=null){t.beats.splice(i,1);saveStore();renderThread();}return;}
  if(act==='sugroll'){rollContinuation(t.id);return;}
  if(act==='sugaccept'){acceptSuggest(t.id);return;}
  if(act==='sugdismiss'){dismissSuggest(t.id);return;}
 });
 // session line → jump to thread
 const lo=$('planLineOut');
 lo.addEventListener('click',e=>{const el2=e.target.closest('[data-goto]');if(!el2)return;const t=(STORE.threads||[]).find(x=>x.id===el2.dataset.goto);if(!t)return;t.open=true;renderThread();const card=$('planList').querySelector('[data-id="'+t.id+'"]');if(card&&card.scrollIntoView)card.scrollIntoView({behavior:'smooth',block:'center'});});
 renderThread();
}
