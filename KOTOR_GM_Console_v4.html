/* ---------- the warband composer ---------- */
function composeWarband(opts){
 opts=opts||{};
 const cpAvg=opts.cp||pick([125,250,250,500,500,500,900,900,1400]);
 const facKey=opts.fac||'surprise';
 const fac=resolveFaction(facKey);
 let count=opts.count||ri(3,8); count=Math.max(1,Math.min(24,count));
 const Lavg=levelFor(cpAvg);
 const userBudget=opts.budget||0;
 const defBudget=gearBudget(fac.gear,cpAvg);
 const budget=userBudget||defBudget;
 const units=[];
 const hasLeader=count>=3;
 const nGrunts=hasLeader?count-1:count;
 for(let i=0;i<nGrunts;i++){
  let cp=cpAvg;
  // jitter: a chunk of the rank-and-file are a tier below the average
  if(nGrunts>=3){const r=Math.random();if(r<0.40&&Lavg>1)cp=TIER_CP[BAND[Lavg-2]];else if(r>0.92&&Lavg<5)cp=TIER_CP[BAND[Lavg]];}
  const arch=wpick(fac.arche),sp=wpick(fac.sp);
  const b=genBlock(arch,cp,userBudget||gearBudget(fac.gear,cp));
  const nm=npcName(sp);b.desc=npcLook(b,sp,nm);
  units.push({name:nm,species:sp,block:b,role:'grunt'});
 }
 if(hasLeader){
  const leadCp=Lavg<5?TIER_CP[BAND[Lavg]]:TIER_CP[BAND[4]];
  const leadArch=fac.lead;
  const sp=wpick(fac.sp);
  const b=genBlock(leadArch,leadCp,userBudget||gearBudget(fac.gear,leadCp));
  // ~55% of leaders carry a rolled signature weapon
  if(Math.random()<0.55){
   const cls=({saber:'lightsaber',blasterRifle:'rifle',pistol:'pistol',heavy:'heavy',vibro:'vibro'})[(ARCHE[leadArch]||{}).weap]||'auto';
   const f=forgeWeapon({cat:cls,minRarity:'masterwork'});
   const rest=(b.weapons||'').split('\n').slice(1);
   b.weapons=[f.line].concat(rest).join('\n');
   b.signature=f.name;b.sigCard=f;
  }
  const nm=npcName(sp);b.desc=npcLook(b,sp,nm);
  units.push({name:nm,species:sp,block:b,role:'leader'});
 }
 // leader first for display
 units.sort((a,b)=>(b.role==='leader'?1:0)-(a.role==='leader'?1:0));
 const flav=pick(["They are already here when the party arrives — there is no avoiding this.","The fight finds the party before they are ready for it.","They have the high ground, the numbers, or the nerve — pick your poison.","This is a deliberate ambush; they chose the ground.","Word travelled faster than the party did. They were expected."]);
 const banner='<div class="swing" style="margin-bottom:14px"><div class="sw-hd">'+esc(fac.label)+' \u00b7 '+count+(count===1?' enemy':' enemies')+' \u00b7 avg '+BAND[Lavg-1]+' ('+cpAvg+' pts) \u00b7 gear \u2264 '+cr(budget)+'</div><div class="muted" style="padding:0 0 8px">'+esc(flav)+(hasLeader?' One of them leads \u2014 marked below.':'')+'</div></div>';
 lastEncounter={units,banner};
 renderEncounter();
}

function forgeBase(cat){const W=GD.weapons;const isM=w=>w.cls==='Melee',isR=w=>w.cls==='Ranged';
 const byCat=re=>W.filter(w=>re.test(w.cat||''));
 const notTrain=w=>!/training/i.test(w.name);
 if(cat==='lightsaber')return pick(byCat(/Lightsaber/).filter(notTrain));

 if(cat==='pistol')return pick(byCat(/Beam \(Pistol\)|Guns \(Pistol\)/));
 if(cat==='vibro')return pick(W.filter(w=>isM(w)&&/Vibro|Sword|Staff|Polearm|Spear|Axe|Saber|Shortsword|Broadsword/.test(w.cat||'')&&!/Lightsaber/.test(w.cat||'')));
 if(cat==='heavy')return pick(byCat(/Gunner|LAW/));
 if(cat==='exotic')return pick(W.filter(w=>/son|ion|cor|disint/i.test(w.dtype||'')||/Crossbow|Liquid|Thrown/.test(w.cat||'')));
 // auto — weighted across the common classes
 const r=Math.random();
 if(r<0.30)return forgeBase('rifle');
 if(r<0.52)return forgeBase('pistol');
 if(r<0.74)return forgeBase('vibro');
 if(r<0.86)return forgeBase('lightsaber');

}

function forgeApply(w,mods,crystal){const ST=12;const c=clone(w);
 let dDie=crystal?(crystal.die||0):0,dFlat=crystal?(crystal.flat||0):0,adMul=1,addCost=0;const riders=[];let lc=w.lc||"";
 if(crystal&&crystal.rider)riders.push(crystal.rider);
 mods.forEach(m=>{const d=m.mod||{};addCost+=num(m.cost)||0;if(m.lc)lc=lcWorse(lc,m.lc);
  if(d.acc)c.acc=(num(c.acc)||0)+d.acc;
  if(d.rof)c.rof=(num(c.rof)||0)+d.rof;
  if(d.rcl!=null)c.rcl=Math.max(1,(num(c.rcl)||1)+d.rcl);
  if(d.shotsPct&&c.shots)c.shots=scaleShots(c.shots,d.shotsPct);
  if(d.parry!=null&&c.parry!==''&&c.parry!=null)c.parry=(num(c.parry)||0)+d.parry;
  if(d.dmgDie)dDie+=d.dmgDie;
  if(d.dmg)dFlat+=d.dmg;
  if(d.adMul)adMul*=d.adMul;
  if(d.wt)c.wt=(num(c.wt)||0)+d.wt;
  if(d.note)riders.push(d.note);});
 if(adMul!==1)c.ad=(num(c.ad)||1)*adMul;
 const dmg=adjustDamage(dmgOf(c,ST),dDie,dFlat);
 const xtra=weaponXtra(c);
 return {c,dmg,xtra,riders,addCost,lc};
}

 if(rar.key==='standard')return base.name;
 if(rar.key==='fine')return Math.random()<0.5?(pick(WF_MAKER)+'-tuned '+base.name):('fine '+base.name);
 if(rar.key==='refined')return pick(WF_MAKER)+' '+base.name;
 if(rar.key==='masterwork')return Math.random()<0.5?(base.name+', a masterwork of '+pick(WF_MAKER)+' make'):(pick(WF_NAME_A)+pick(WF_NAME_B));
 // prototype / unique / legendary — a proper name + epithet
 const pn=pick(WF_NAME_A)+pick(WF_NAME_B);
 const ep=pick(WF_EPITHET);
 return pn+', '+ep+' \u2014 '+(rar.key==='legendary'?'a legendary ':rar.key==='prototype'?'a prototype ':'a unique ')+(base.name.toLowerCase());
}

function forgeWeapon(opts){opts=opts||{};
 const base=opts.base||forgeBase(opts.cat||'auto');
 const isSaber=/Lightsaber/.test(base.cat||'');
 const ranged=isRanged(base);
 let rar=opts.rarity?rarityByKey(opts.rarity):rollRarity(opts.minRarity);
 // pick crystal (sabers always) + mods up to rarity.mods
 let crystal=null;
 if(isSaber){
  // higher rarity → richer crystal pool weighting
  let pool=WF_CRYSTALS.slice();
  if(rar.mods>=3)pool=pool.filter(x=>x.cost>0||Math.random()<0.4);
  crystal=wpick((pool.length?pool:WF_CRYSTALS).map(x=>[x,x.w]));
 }
 const modPool=isSaber?WF_MODS_SABER:(ranged?WF_MODS_RANGED:WF_MODS_MELEE);
 const nMods=Math.max(0,rar.mods-(isSaber?1:0)); // the crystal counts as one "mod slot" for sabers
 const mods=picks(modPool,Math.min(nMods,modPool.length));
 const ap=forgeApply(base,mods,crystal);
 const name=forgeName(base,rar,isSaber?'lightsaber':(ranged?'ranged':'melee'));
 const line=name+' \u2014 '+ap.dmg+(ap.xtra?' \u00b7 '+ap.xtra:'');
 // cost
 const baseCost=(base.cost==='build'||!base.cost)?14000:(num(base.cost)||0);
 let cost=Math.round(baseCost*rar.mult+ap.addCost+(crystal?crystal.cost:0));
 cost=roundVal(cost);
 // budget downgrade: shed mods until it fits (leaders use this)
 let outMods=mods.slice(),outAp=ap;
 if(opts.budget){let guard=0;while(cost>opts.budget&&outMods.length>0&&guard++<10){outMods=outMods.slice(0,-1);outAp=forgeApply(base,outMods,crystal);cost=roundVal(Math.round(baseCost*rar.mult+outAp.addCost+(crystal?crystal.cost:0)));}}
 const finalLine=name+' \u2014 '+outAp.dmg+(outAp.xtra?' \u00b7 '+outAp.xtra:'');
 return {name,base,rarity:rar,crystal,mods:outMods,riders:outAp.riders,line:finalLine,dmg:outAp.dmg,xtra:outAp.xtra,cost,lc:outAp.lc,origin:pick(WF_ORIGIN)};
}

function forgeCard(f){
 const rpill=f.rarity.key==='standard'?'pill':(f.rarity.unique?'pill vio':'pill acc');
 const crystalRow=f.crystal?'<div class="kvline"><span class="kvk">Crystal</span><span class="kvv">'+esc(f.crystal.n)+' \u00b7 '+esc(f.crystal.col)+' blade</span></div>':'';
 const modRow=(f.mods&&f.mods.length)?'<div class="kvline"><span class="kvk">Worked with</span><span class="kvv">'+esc(f.mods.map(m=>m.n).join(' \u00b7 '))+'</span></div>':'';
 const riders=(f.riders&&f.riders.length)?'<div class="bench-riders">Riders: '+esc(f.riders.join(' \u00b7 '))+'</div>':'';
 return '<div class="card"><div class="chead"><span class="ctitle">'+esc(f.name)+'</span><span class="cmeta">'
  +'<span class="'+rpill+'">'+esc(f.rarity.label)+'</span>'
  +(f.lc?'<span class="pill">LC '+esc(f.lc)+'</span>':'')
  +'<span class="pill">'+(f.cost?cr(f.cost):'beyond price')+'</span></span></div>'
  +'<div class="cbody">'+sec('Stats',esc(f.line))+crystalRow+modRow+riders
  +'<div class="kvline"><span class="kvk">Found</span><span class="kvv">'+esc(f.origin)+'</span></div>'
  +'<div class="fg-actions" style="margin-top:8px"><button class="btn mini ghost" data-forgecopy="'+esc(f.line.replace(/"/g,'&quot;'))+'">copy line</button></div>'

}

const COMP=["a double-cross leaves the crew holding the blame","a Sith patrol seals the district","the contact turns up dead before they can talk","a rival crew already got there first","the prize is hotter than promised and everyone knows the crew has it","an old debt comes calling at the worst moment","the only clean exit is suddenly being watched"];

function worldArr(key,fb){const raw=((STORE.world&&STORE.world[key])||'').split('\n').map(s=>s.trim()).filter(Boolean);return raw.length?raw:fb;}
function moveWeights(t){
 const bs=t.beats||[],done=bs.filter(b=>b.done).length,tot=bs.length,prog=tot?done/tot:0;
 const w={complication:3,escalation:3,faction:2,npc:2,reversal:2,clock:1,ally:1,payoff:1};
 if((t.status||'active')==='seed'){w.complication+=2;w.faction+=2;w.clock+=1;w.payoff=0;}
 if(prog>=0.6){w.payoff+=4;w.reversal+=2;w.complication=Math.max(1,w.complication-1);}
 if((t.scale||'M')==='L'){w.faction+=1;w.reversal+=1;}
 const lean=(STORE.world&&STORE.world.lean)||'neutral';
 if(lean==='darker'){w.escalation+=2;w.reversal+=2;w.clock+=2;}
 else if(lean==='political'){w.faction+=3;}
 else if(lean==='personal'){w.npc+=3;w.reversal+=1;}
 else if(lean==='action'){w.escalation+=2;w.clock+=2;w.payoff+=1;}
 return w;}
function weightedPick(w){const ks=Object.keys(w).filter(k=>w[k]>0);let tot=0;ks.forEach(k=>tot+=w[k]);let r=Math.random()*tot;for(const k of ks){r-=w[k];if(r<=0)return k;}return ks[0];}
const MOVE_TPL={
 complication:["A complication at {where}: {comp}, and it puts {who} on the back foot.","What looked simple sours \u2014 {comp} \u2014 and the crew has to improvise."],
 escalation:["The stakes jump: {esc}. {payoff} is harder to reach now, and costs more.","{who} escalates \u2014 {esc} \u2014 and the crew can\u2019t stay on the fence."],
 faction:["{wfaction} moves on {where}: it {fac}. They want {stake} for themselves.","A third hand \u2014 {wfaction} \u2014 {fac}, cutting across the crew\u2019s play for {payoff}."],
 npc:["{who} {npc} \u2014 last session\u2019s choices have a consequence now.","Someone close to {who} surfaces and {npc}, changing how the crew is seen."],
 reversal:["A reversal: {twist}. What the crew believed about {who} was wrong.","The truth turns over \u2014 {twist} \u2014 and {payoff} isn\u2019t what it seemed."],
 clock:["A clock starts: {clock}. The crew has until it runs out before {bad}.","Time tightens \u2014 {clock} \u2014 and dithering means {bad}."],
 ally:["An opening at {where}: {ally}. Real leverage, if the crew moves fast.","A break \u2014 {ally} \u2014 but the window won\u2019t stay open long."],
 payoff:["It comes to a head: {pay}. {payoff} is in reach, but {wpower} stands in the way.","The confrontation lands \u2014 {pay} \u2014 and there\u2019s no walking it back."]
};
function fillTpl(tpl,t){
 const who=t.who&&t.who.trim()?t.who.trim():pick(["the crew's contact","the people involved","the local players"]);
 const where=t.where&&t.where.trim()?t.where.trim():pick(["the site","the district","the area"]);
 const payoff=t.payoff&&t.payoff.trim()?t.payoff.trim():pick(["the prize","what\u2019s at stake","the objective"]);
 const s={who,where,payoff,wfaction:pick(worldArr('factions',CWORLD_FAC)),wplace:pick(worldArr('places',CWORLD_PLACE)),wpower:pick(worldArr('powers',CWORLD_POWER)),tension:pick(worldArr('tensions',["the brewing conflict","the power vacuum","the old grudge"])),comp:pick(COMP),esc:pick(ESC),fac:pick(FAC),npc:pick(NPC),twist:pick(TWIST),clock:pick(CLOCK),ally:pick(ALLY),pay:pick(PAY),bad:pick(BAD),stake:pick(STAKE)};

function renderThread(){
 const th=STORE.threads||[];const filter=planFilterVal().toLowerCase();const stf=(($('planStatus')||{}).value)||'';const ctf=(($('planCat')||{}).value)||'';

 if(ctf)items=items.filter(t=>(t.category||'')===ctf);
 if(filter)items=items.filter(t=>(((t.title||'')+' '+(t.situation||'')+' '+(t.who||'')+' '+(t.where||'')+' '+(t.askedBy||'')+' '+(t.faction||'')+' '+(t.notes||'')).toLowerCase().includes(filter)));
 const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();
 if($('planCount'))$('planCount').textContent=th.length+' thread'+(th.length===1?'':'s');

 if(!items.length){box.innerHTML='<div class="empty">'+(th.length?'No threads match.':'No plot threads yet. Add one, or seed a hook\u00b7twist\u00b7payoff skeleton.')+'</div>';return;}
 box.innerHTML=items.map(threadCard).join('');
}

function buildPlanner(el){
 const W=STORE.world;
 const leanOpt=(v,l)=>'<option value="'+v+'"'+(W.lean===v?' selected':'')+'>'+l+'</option>';
 el.innerHTML='<div class="space-head"><h2>Planner</h2><div class="lede">Every live plot thread in one place, with each thread\u2019s next beat lined up as a runnable session agenda. Stuck on what happens next? Roll a continuation off the thread\u2019s own state \u2014 sharper if you fill in the world below.</div></div>'

  +'</div>'
  +'<div class="row" style="margin-top:10px"><div class="field"><span class="lab">Continuation lean</span><select id="wLean">'+leanOpt('neutral','Neutral')+leanOpt('darker','Darker / grim')+leanOpt('political','Political')+leanOpt('personal','Personal')+leanOpt('action','Action')+'</select></div></div>'
 +'</details>'
 +'<div class="controls">'
  +'<button class="btn primary" id="planAdd">\uFF0B New thread</button>'
  +'<button class="btn" id="planSeed">\uD83C\uDFB2 Seed skeleton</button>'
  +'<div class="field"><span class="lab">Status</span><select id="planStatus"><option value="">all</option><option value="active">active</option><option value="seed">seed</option><option value="hold">on hold</option><option value="done">resolved</option></select></div>'
  +'<div class="field"><span class="lab">Category</span><select id="planCat"><option value="">all</option>'+Object.keys(CAT_LABEL).map(function(k){return '<option value="'+k+'">'+esc(CAT_LABEL[k])+'</option>';}).join('')+'</select></div>'
  +'<div class="field"><span class="lab">Find</span><input id="planFilter" placeholder="search threads"></div>'
  +'<span class="muted" id="planCount" style="align-self:center"></span>'
 +'</div>'
 +'<div id="planLineOut"></div>'
 +'<div id="planList"></div>';
 // world wiring
 const wsave=()=>saveStore();
 $('wFac').oninput=e=>{W.factions=e.target.value;wsave();};
 $('wPlace').oninput=e=>{W.places=e.target.value;wsave();};
 $('wPow').oninput=e=>{W.powers=e.target.value;wsave();};
 $('wTen').oninput=e=>{W.tensions=e.target.value;wsave();};
 $('wLean').onchange=e=>{W.lean=e.target.value;wsave();};
 // controls
 $('planAdd').onclick=planAddBlank;$('planSeed').onclick=planSeed;
 $('planStatus').onchange=renderThread;$('planCat').onchange=renderThread;$('planFilter').oninput=renderThread;
 // delegated list handlers (attached once; #planList persists)
 const list=$('planList');
 list.addEventListener('change',e=>{const card=e.target.closest('[data-id]');if(!card)return;const t=(STORE.threads||[]).find(x=>x.id===card.dataset.id);if(!t)return;const act=e.target.dataset.act;
  if(act==='beatdone'){const i=+e.target.dataset.bi;if((t.beats||[])[i]){t.beats[i].done=e.target.checked;saveStore();renderThread();}return;}
  if(act==='beattext'){const i=+e.target.dataset.bi;if((t.beats||[])[i]){t.beats[i].text=e.target.value;saveStore();const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();}return;}
  if(e.target.dataset.field!==undefined){const f=e.target.dataset.field;t[f]=e.target.value;saveStore();if(f==='scale'||f==='status'||f==='category')renderThread();else{const lo=$('planLineOut');if(lo)lo.innerHTML=planLine();}}
 });
 list.addEventListener('click',e=>{const card=e.target.closest('[data-id]');if(!card)return;const t=(STORE.threads||[]).find(x=>x.id===card.dataset.id);if(!t)return;const actEl=e.target.closest('[data-act]');const act=actEl?actEl.dataset.act:null;if(!act)return;
  if(act==='toggle'){t.open=!t.open;card.classList.toggle('open');actEl.textContent=t.open?'hide':'details';return;}
  if(act==='del'){if(confirm('Delete this thread?')){STORE.threads=STORE.threads.filter(x=>x.id!==t.id);delete planSuggest[t.id];saveStore();renderThread();}return;}
  if(act==='beatadd'){(t.beats=t.beats||[]).push({id:uid(),text:'',done:false});saveStore();renderThread();return;}
  if(act==='beatdel'){const i=+actEl.dataset.bi;if((t.beats||[])[i]!=null){t.beats.splice(i,1);saveStore();renderThread();}return;}
  if(act==='sugroll'){rollContinuation(t.id);return;}
  if(act==='sugaccept'){acceptSuggest(t.id);return;}

 });

 renderThread();
}

y wiry, faster and harder than he looks.","rel":{"close":["Chatni","bonded to Meetra Surik"],"friends":["Mical (frenemy)","the crew","DeLuca"],"allies":["the Restored Jedi"],"tension":["Mical (mutual ribbing)","those he abandoned"],"enemies":["the Hunter","the Genoharadan"]},"tag":""},{"name":"Satele Shan","aliases":[],"who":"Human · Jedi · daughter of Revan and Bastila Shan","desc":"The heir of two legends, drawn into the crew's orbit on Makeb. Prone to super-focus and to feeling things stir in the Unknown Regions. Travels aboard the Dara Dara, brightening it with growing things — bound to a fated escape near Korriban that will cost Kao Cen his life.","look":"Looks: a young human woman. Build: slender and slight, graceful but easily wearied; gentle and curious.","rel":{"close":["Kao Cen Darach"],"friends":["the crew","Chatni","Tylo"],"allies":["the Restored Jedi"],"tension":["the stirring she senses in the Unknown Regions"]},"tag":""},{"name":"Bao-Dur","aliases":[],"who":"Iridonian Zabrak · tech-savant · veteran of Malachor","desc":"The Exile's old engineer, builder of the Mass Shadow Generator and tinkerer of small droids. Cheerful to the point of blowing himself up; teaches Chatni the personal shield.","look":"Looks: an Iridonian Zabrak with a cybernetic arm. Build: tall and lean-muscled, with a workman's wiry strength and a perpetual, alarming good cheer.","rel":{"close":["Meetra Surik"],"friends":["the crew","Chatni"],"allies":["the Restored Jedi"]},"tag":""},{"name":"Mira","aliases":[],"who":"Human · former bounty huntress · Jedi of the new Order","desc":"A sharp, watchful survivor of Nar Shaddaa who teaches Chatni the craft of teaching, and misses nothing — including a certain rogue's late-night kiss.","look":"Looks: a sharp-eyed human woman. Build: small and lithe, all bounty-hunter quickness.","rel":{"friends":["Chatni","the new Order"],"allies":["the Restored Jedi"]},"tag":""},{"name":"Brianna","aliases":[],"who":"Echani · Jedi · keeper of Ilum","desc":"An Echani warrior-scholar who trains Chatni and remains to hold Ilum as the others move on. Carries a hot-tempered feud with another of the Order's women, and a wary eye on Atton.","look":"Looks: an Echani — chalk-pale skin, silver-white hair, pale eyes. Build: tall, lithe, and athletic, bred to read a fight like spoken language.","rel":{"close":["the Order"],"friends":["Cardina Thul","Chatni"],"allies":["the Restored Jedi"],"tension":["Atton (wary)","a rival sister"]},"tag":""},{"name":"Mical","aliases":[],"who":"Human · scholar-Jedi · keeper of forbidden books","desc":"A gentle, learned Jedi with an underground collection of dangerous texts, a steady supply of good tea, and counsel Chatni trusts. He helps her drain the Book of Shadows of its power. Meetra dislikes him.","look":"Looks: a fair-haired human with ink-stained hands. Build: slender and of average height, a scholar's frame rather than a fighter's.","rel":{"friends":["Chatni","Atton"],"allies":["the Restored Jedi"],"tension":["Meetra (she dislikes him)","Tylo (ribbing)"]},"tag":""},{"name":"Visas Marr","aliases":[],"who":"Miraluka seer · survivor of Nihilus","desc":"The blind Miraluka who once served the world-eater Nihilus and survived him. A reference point for understanding DeLuca, whose devotion to a monstrous \"master\" mirrors her own past. Linked, in Chatni's meditations, to Bastila.","look":"Looks: a veiled Miraluka. Build: slender and willowy, quiet and self-contained.","rel":{"friends":["the Order","Bastila Shan (linked)"],"allies":["the Restored Jedi"]},"tag":""},{"name":"Master Voll","aliases":[],"who":"Human · Jedi hardliner · Force-severed","desc":"A dogmatic master who once tried to kill Chatni outright. Captured by the crew on Ilum and severed from the Force at Meetra's order — a living warning of where the old certainties lead. A warrior people remaking themselves between conquest and honor.","look":"Looks: a grim human Jedi, now hollow and Force-blind. Build: gaunt and severe, diminished since his severing.","rel":{"tension":["the Order that severed him"],"enemies":["Chatni","the crew","Meetra"]},"tag":""},{"name":"Canderous Ordo","aliases":[],"who":"Human · Mandalorian veteran · companion of Revan","desc":"The aging legend who took the mask of Mandalore at the close of the Dark Wars, then spent years in seclusion before quietly regathering the clans. Slowly bent by the Freedon Nadd tomb until the crew freed his mind and he stepped down. Kept alive — and made an addict for it — by Chatni's healing, he has become her devoted \"guard dog,\" ready to kill on her word.","look":"Looks: an old, scarred human warrior. Build: big and broad-framed, heavy and powerful even in age; immensely rich, fond of rare anti-lightsaber war-materiel.","rel":{"close":["Chatni (devotee)"],"friends":["Torren Wren","the crew"],"allies":["the Mandalorian clans","the Restored Jedi (by the crew)"],"tension":["his addiction to the life Chatni gave him"],"enemies":["the Freedon Nadd influence (overcome)"]},"tag":""},{"name":"Torren Wren","aliases":[],"who":"Human · leader of the reunified Mandalorian clans","desc":"Canderous's chosen successor — steady, honorable, pragmatic — steering his people from conquest toward honor, craft, and the role of galactic first-responders won at the Csilla Accords. Deals with Chatni on \"mutual trust,\" and quietly set Sekan to watch the crew.","look":"Looks: a commanding human Mandalorian of Clan Wren. Build: tall and broad, powerfully built and physically imposing — \"kinda hot,\" by one operative's professional assessment.","rel":{"close":["Canderous","Alra Wren"],"friends":["Sekan","Chatni","the crew"],"allies":["the Republic (oversight)","the Wookiees","Baron Venlath (the Sekan meeting)"],"tension":["the Exchange"],"enemies":["the Genoharadan","Clan Vizsla (sought)"]},"tag":""},{"name":"Dax Vein","aliases":[],"who":"Human · chieftain of the reborn Clan Nightfall","desc":"Inheritor of Clan Nightfall after Sekan gave up the chieftaincy to keep questing — holder of the clan Sekan rebuilt from the ashes of Clan Varad.","look":"Looks: a human Mandalorian. Build: solid and muscular, a seasoned brawler.","rel":{"friends":["Sekan"],"allies":["Clan Nightfall","the Mandalorian clans","Torren Wren"]},"tag":""},{"name":"Kultak","aliases":[],"who":"Human · Mandalorian hunter · Chatni's \"bro\"","desc":"Chatni's brother-in-arms among the Kashyyyk Mandalorians, leader of the hunting parties she enhanced with battle meditation and her partner in a Czerka-archive break-in.","look":"Looks: a blunt human Mandalorian. Build: stocky and bulky, low and strong.","rel":{"friends":["Chatni"],"allies":["the Kashyyyk clans","Torren Wren"]},"tag":""},{"name":"Drax","aliases":[],"who":"Human · chieftain of the Kashyyyk Mandalorians","desc":"Took the chieftaincy of the Kashyyyk-based clans after Sekan moved on, holding the foothold negotiated with the Wookiees.","look":"Looks: a hard human Mandalorian. Build: broad and heavy-set, a frontline fighter.","rel":{"allies":["the Kashyyyk clans","Torren Wren"]},"tag":""},{"name":"Brunos","aliases":[],"who":"Human · Mandalorian tracker · bonded to Chatni","desc":"A tracker to whom Chatni accidentally formed a lasting Force-bond during an enhanced hunt — the one bond she chose not to sever. A precognitive people of the wind-scoured moon Iktotch — lately freed, lately powerful, governed by the Fourfold Wind, and now arbiters of the galaxy.","look":"Looks: a weathered human Mandalorian. Build: lean and rangy, built for the long pursuit.","rel":{"close":["bonded to Chatni"],"allies":["the Mandalorian clans"]},"tag":""},{"name":"General Kladar","aliases":[],"who":"Iktotchi general · commander of the Stormguard · Tylo's close friend and old war-ally","desc":"Tylo's brother-in-arms from the wars and a leading commander of the Stormguard — the Iktotchi war-host that rises in times of galactic strife. The two share coffee, deep friendship, and a grim shared premonition of an enormous war to come — exactly the kind of strife that would call the Stormguard to the fore of the Fourfold Wind. Now facing an arranged marriage the crew will not let him forget — with Tylo to stand as best man.","look":"Looks: a horned Iktotchi officer. Build: tall and broad, military-straight and grave.","rel":{"close":["Tylo Dara"],"friends":["the crew (through Tylo)"],"allies":["the Stormguard","the Iktotchi delegation","the new Order"]},"tag":""},{"name":"The Keeper of the Ember","aliases":[],"who":"Iktotchi seer-priestess · head of the Ember Conclave (Fire) · keeper of tradition","desc":"Head of the Ember Conclave — the Iktotchi sect of tradition and conservatism, keepers of the kept flame and the oldest, deepest visions. It was she who read Chatni's heritage and laid bare the Nightsister prophecy and the ancient history of the Kwa, the Rakata, and the Sith. In the Fourfold Wind she speaks for the old ways — slow to change, and slower to forgive.","look":"Looks: a horned Iktotchi priestess robed in the reds and golds of the kept flame. Build: tall and gaunt, severe and unhurried.","rel":{"allies":["the Levin & Gale Conclaves","the Stormguard","the new Order","the Iktotchi"],"tension":["Chatni (wary of her potential)","the Levin Conclave (her opposite)"]},"tag":""},{"name":"The Stormspeaker","aliases":[],"who":"Iktotchi seer · Voice of the Levin Conclave (Lightning) · of action and response","desc":"Voice of the Levin Conclave — the sect of action and response, named for the sudden bolt. Where the Ember waits, the Levin strikes: the instant a vision flares, they move. In the Fourfold Wind they are the decisive ones, forever urging the moon to act rather than abide.","look":"Looks: a horned Iktotchi seer. Build: wiry and sharp-featured, quick-eyed and restless.","rel":{"allies":["the Ember & Gale Conclaves","the Stormguard","the new Order","the Iktotchi"],"tension":["the Ember Conclave (her opposite)"]},"tag":""},{"name":"The Windwarden","aliases":[],"who":"Iktotchi seer-elder · Warden of the Gale Conclave (Air) · of balance and swaying motion","desc":"Warden of the Gale Conclave — the sect of balance and swaying motion, named for the turning wind that bends but never breaks. The Gale are the moderators and the swing of the Fourfold Wind, leaning now toward the Ember, now toward the Levin, keeping the moon's course from veering too far in either direction. It was the Gale who adopted Chatni and dressed her in their ceremonial robes at her honoring on Iktotch. Those who hold worlds, votes, and fleets.","look":"Looks: a horned Iktotchi elder. Build: tall and spare, calm and far-seeing.","rel":{"friends":["Chatni (of the Gale, by adoption)"],"allies":["the Ember & Levin Conclaves","the Stormguard","the new Order","the Iktotchi"]},"tag":""},{"name":"Cardina Thul","aliases":[],"who":"Human · Matriarch of House Thul · Queen of Alderaan","desc":"Chatni's longtime employer and friend, risen from noble matriarch to crowned monarch of Alderaan — having gutted rival houses to consolidate the throne and taken the restored Jedi enclave onto her world. Loyal to Chatni, wary of Meetra, building her own alliances. Will one day force Chatni to choose a side.","look":"Looks: a striking human noblewoman of Alderaan. Build: tall, slender, and regal, devastating in a crown and royal robes.","rel":{"close":["Chatni (besties)"],"friends":["Brianna","the crew"],"allies":["the Jedi enclave","Chancellor Cressa","the Republic"],"tension":["Meetra Surik"],"enemies":["House Rist","the gutted rival houses","the Genoharadan"]},"tag":""},{"name":"Chancellor Cressa","aliases":[],"who":"Human · Supreme Chancellor of the Galactic Republic","desc":"The weary leader of a bankrupt Republic, holding a fragile union together and quietly bankrolling the Restoration. Set Chatni the Genoharadan-hunt; a shrewd cards-player who bleeds opponents dry and angles for Mandalorian beskar.","look":"Looks: a sharp human stateswoman. Build: small and slight, worn thin by office, with a gambler's stillness.","rel":{"allies":["the crew (employer)","Cardina Thul","the Jedi","the Mandalorians"],"tension":["the great powers she must balance"],"enemies":["the Genoharadan","the Silent Hand"]},"tag":""},{"name":"Senator Mon Gazza","aliases":[],"who":"Human · honest senator · leader of the Mining Coalition","desc":"A rare clean politician, husband and father, genuinely fighting crime and corruption — twice spared by Chatni, once interrogated atop his own spire. Emerges from the accords as leader of the Outer Rim's new Mining Coalition.","look":"Looks: a decent, nervous human. Build: average height and a little soft, an administrator's frame; family on Gaza Monopolium.","rel":{"friends":["Chatni (grudging)"],"allies":["the Mining Coalition","the Outer Rim","the Republic"],"tension":["Chatni (who once held a knife to his world)"],"enemies":["the Genoharadan","corruption"]},"tag":""},{"name":"Baron Hektor Venlath","aliases":[],"who":"Human · Corellian baron · summit power","desc":"A vain Corellian noble, proud of his rare drink and his secrets — bound by translocator to a shadowy bargain. A fuzzy, useful acquaintance Chatni began cultivating before Torren asked her to broker a meeting between him and Sekan.","look":"Looks: a human baron of Corellia. Build: portly and well-fed, vain about his cellar and his collar.","rel":{"friends":["Chatni (cultivating)"],"allies":["Corellia","Torren Wren (the brokered meeting)"],"tension":["the hidden bargain that holds him"]},"tag":""},{"name":"Senator Skassa","aliases":[],"who":"Twi'lek · senator · replacement appointee","desc":"The Twi'lek who took the senate seat left empty by the senator Chatni killed — a newcomer to the great table at Csilla.","look":"Looks: a Twi'lek with trailing lekku. Build: lithe and willowy, supple and graceful.","rel":{"allies":["the Republic senate"]},"tag":""},{"name":"Mallow Wok","aliases":[],"who":"Ithorian · minister of agriculture","desc":"Steward of the Republic's agriculture, who brokered grain deals with the Chiss (who cannot farm their ice world) — sidelining the Open Palm. A peaceful steward of growing things.","look":"Looks: an Ithorian \"Hammerhead,\" with twin throats and a botanist's calm. Build: tall and lumbering, broad and slow-moving.","rel":{"allies":["the Chiss (grain trade)","the Republic"],"tension":["the Open Palm (sidelined)"]},"tag":""},{"name":"Magister Hoola","aliases":[],"who":"Muun · banking magister","desc":"A banking power who noticed Chatni at Csilla and whispered to Baroness Elo — a financier with menace under the manners, his ties reaching toward the cabal in the dark.","look":"Looks: a Muun, of the species that runs the galaxy's banks. Build: very tall and gaunt, long-limbed and pale.","rel":{"allies":["Baroness Elo","the banking guild"],"tension":["Chatni (suspicious of her)"]},"tag":""},{"name":"Baroness Elo","aliases":[],"who":"Muun · head of the banking guild · Genoharadan","desc":"Head of the galaxy's banking guild — and, secretly, one of the fourteen Genoharadan: the financial power behind the cabal's reach into every government and corporation, and one of the few of its inner circle still living.","look":"Looks: a Muun banker. Build: tall and gaunt, austere and unreadable.","rel":{"allies":["Magister Hoola","the banking guild","the Genoharadan"],"enemies":["GOTO","the crew (unknowing, for now)"]},"tag":""},{"name":"Admiral Raan","aliases":[],"who":"Human · Republic admiral · cabal-adjacent","desc":"A Republic admiral Senator Valia confided in — not a sworn member of the Genoharadan, but a man who knew more of its workings than he should have. Crime lords, fixers, agents, and the threats that stalk the crew.","look":"Looks: a stiff human flag officer. Build: average and upright, parade-ground rigid.","rel":{"allies":["the Republic"],"tension":["what he was told by Valia"]},"tag":""},{"name":"Luxa","aliases":[],"who":"Zeltron · Second Hand of the Exchange","desc":"A slick, relentlessly talkative operator who extorted Chatni on Tatooine, climbed to Second Hand of the Exchange, and turns up everywhere — flirting with Tylo, flipping off Chatni across a cantina, surviving a near-fatal brawl with the Hunter. As much recurring nuisance as genuine threat, he runs GOTO's quiet errands.","look":"Looks: a Zeltron — red-pink skin, pheromone-laced charm. Build: tall and lean, striking and well-dressed, with a bottomless capacity for boasting.","rel":{"friends":["Tylo (flirts with)","Atton (begrudging)"],"allies":["GOTO","the Exchange"],"tension":["Chatni (frenemy)","Alra Wren"],"enemies":["the Hunter"]},"tag":""},{"name":"GOTO","aliases":[],"who":"Droid intelligence · crime-lord power-broker","desc":"A hidden droid intelligence running a vast criminal-political network, devoted to stabilizing the Republic by any means. Exposed Chatni's secrets, named the Genoharadan as her hunters, and bargained for her help against them. Reportedly killed the Hunter and walked away from Csilla in cuffs — then out of them.","look":"Looks: a GO-TO-class droid. Build: a small hovering sphere, no larger than a head — while his true body is a starship of computers.","rel":{"allies":["Luxa","the Republic's stability","(uses) Chatni"],"tension":["Chatni (he manipulates her)"],"enemies":["the Genoharadan","the Exchange's rivals"]},"tag":""},{"name":"The Hunter","aliases":[],"who":"Synthetic assassin · the Genoharadan's blade","desc":"The most dangerous of the Genoharadan — fully geared and shielded, the architect of the Csilla clone-army. When beheaded he proved no living man at all: sparks, not blood. Reported destroyed at Csilla, but his body was never recovered, and his clones may yet remain. The crew's most feared threat.","look":"Looks: presents as a blond, handsome man behind an extraordinary personal shield — but bleeds sparks. Build: tall, athletic, broad-shouldered; a synthetic killer wearing a man's face.","rel":{"allies":["the Genoharadan (its survivors)","its own clones"],"enemies":["Chatni","Atton","GOTO","everyone"]},"tag":""},{"name":"Morsha","aliases":[],"who":"Selkath elder · keeper of a small general store in Ahto City · Atton's home away from home","desc":"An old Selkath grandmother whose family runs a small general store on Ahto City's walkways. Atton pulled her kin out of trouble more times than anyone will count, and the family answered the only way Selkath can: they made him one of their own — the reason he walks Manaan as an honorary Selkath, welcomed where few off-worlders are. Her shop is his harbour: a back room, a hot meal, and no questions asked.","look":"Looks: a Selkath — grey-blue and barbeled, her eyes gone pale with age. Build: small and stooped, slow on land, still quick-fingered at the till.","rel":{"close":["Atton Rand (honorary kin)","her family"],"friends":["Chatni","the Order of Shasa"]},"tag":""},{"name":"Vessa","aliases":[],"who":"Bith · master skin-grafter of Coruscant","desc":"A rare, funny little surgeon whose flawless grafts let Chatni become the Mirialan \"Paya\" and Atton a fish-faced stranger. A discreet asset to those who can pay.","look":"Looks: a Bith — bulb-headed, great-eyed, fine-fingered. Build: small and slight, with a surgeon's delicate hands.","rel":{"allies":["Chatni & Atton (for a price)"]},"tag":""},{"name":"Nerudo","aliases":[],"who":"Chiss of House Inrokini · security agent · interrogator","desc":"The sharp Chiss interrogator at Csilla who suspected Chatni of everything — and was largely right. A scion of House Inrokini, the ruling family that holds the Ascendancy's industry, science, and communications, he is a dangerous, courteous duelist of words.","look":"Looks: a Chiss — blue-skinned, red-eyed. Build: tall, lean, and precise, every motion economical.","rel":{"allies":["House Inrokini","the Chiss Ascendancy"],"tension":["Chatni","the crew"]},"tag":""},{"name":"Detective Vesh'ra'sabosen","aliases":[],"who":"Chiss of House Sabosen · summit investigator","desc":"The Chiss investigator who drugged and interrogated Mon Gazza at Csilla, hunting the timeline of Chatni's involvement with the Genoharadan affair. Of House Sabosen, the ruling family that holds justice and law, making her interest a matter of cold Chiss jurisprudence.","look":"Looks: a Chiss woman — blue-skinned, red-eyed. Build: slender and upright, every question precise.","rel":{"allies":["House Sabosen","the Chiss Ascendancy"],"enemies":["Chatni (her quarry)"]},"tag":""},{"name":"Vogga the Hutt","aliases":[],"who":"Hutt · crime lord of Nar Shaddaa · shipping & fuel baron","desc":"An ancient, immensely wealthy Hutt controlling vast shipping, fuel, and spice out of the Smuggler's Moon — a potential contact (and creditor) Chatni has weighed leaning on, though she shares the galaxy's distaste for dealing with Hutts.","look":"Looks: a Hutt. Build: a vast, bloated, sluggish colossus, draped in his own wealth and guarded by kath hounds.","rel":{"allies":["Chatni (possible contact, reluctantly)"],"enemies":["the Exchange","rival cartels"]},"tag":""},{"name":"Jana Lorso","aliases":[],"who":"Human · Czerka executive","desc":"A sharp, ambitious Czerka executive — one of the corporate names Chatni might buy, bribe, or lean on for information. Cold and careerist, she embodies the soulless efficiency of the company she serves.","look":"Looks: a hard-eyed human corporate officer. Build: trim and sharply-dressed, brisk and impatient.","rel":{"allies":["Czerka"],"tension":["Chatni (potential leverage)"]},"tag":""},{"name":"The Rival Candidate","aliases":[],"who":"Dathomiri Nightsister · matriarch-candidate","desc":"A new Nightsister candidate, risen in the last two years and swollen with the stolen strength of all the slain candidates, groomed by the surviving mothers expressly to destroy Chatni — the dark mirror of everything Chatni has refused to become.","look":"Looks: a Dathomiri witch of Chatni's own Rattataki bloodline. Build: lean and powerful, crackling with borrowed strength.","rel":{"allies":["the Nightsister mothers","Mother Githzerion"],"enemies":["Chatni"]},"tag":""},{"name":"Mother Githzerion","aliases":[],"who":"Dathomiri · Nightsister matriarch · keeper of the Book of Shadows","desc":"An ancient matriarch of Dathomir who holds the original Book of Shadows and guides the rival candidate — one of the voices calling to Chatni across the stars to \"return.\" The great names of the past who are not gone — vanished, absent, or still serving.","look":"Looks: an ancient Dathomiri witch-mother, pale and sigil-marked. Build: stooped and gaunt, withered but radiating power.","rel":{"allies":["the rival candidate","the Nightsister mothers"],"enemies":["Chatni"]},"tag":""},{"name":"Revan","aliases":[],"who":"Human · Jedi general · Dark Lord · redeemer — vanished","desc":"The defining figure of the age: savior of the Republic, then its conqueror as a Sith Lord, then its savior again. Allied in secret with ancient powers, left a \"Foundry\" still being hunted, and vanished into the Unknown Regions driven by a prophecy of a gathering threat no one else believed. Father of Satele Shan. His fate is unknown.","look":"Looks: a masked human. Build: of average height and athletic, unremarkable until the mask and the legend.","rel":{"close":["Bastila Shan","Satele Shan (daughter)"],"allies":["ancient powers of the deep rim","his own lost crew"],"tension":["the prophecy that drives him"]},"tag":"legend"},{"name":"Bastila Shan","aliases":[],"who":"Human · Jedi · mistress of battle meditation · mother of Satele","desc":"The battle-seer whose gift could turn the tide of fleets, who bound her fate to Revan's and bore his daughter, Satele. She lingers at the edges of the present — appearing in Chatni's battle-meditation visions and linked to Visas Marr.","look":"Looks: a human Jedi. Build: slender and composed, grave and luminous.","rel":{"close":["Revan","Satele Shan (daughter)"],"friends":["Visas Marr (linked)","the meditations of Chatni"],"allies":["the legacy of the Jedi"]},"tag":"legend"},{"name":"Carth Onasi","aliases":[],"who":"Human · Republic admiral · companion of Revan","desc":"The steadfast Republic pilot who stood with Revan from the fall of Taris to the Star Forge — loyalty itself, in a galaxy of betrayals. Alive and risen high: a serving Republic admiral who sat at the great table on Csilla, outranked there only by political powers. Those who have died in the course of the story — set apart from the living. The recent dead of the campaign, and the ancient dead of the wars.","look":"Looks: a weathered human officer, grey at the temples. Build: solid and upright, slightly above average height, a soldier's bearing unbroken by the years.","rel":{"friends":["the legacy of Revan's crew"],"allies":["the Galactic Republic","the great-power summit"],"tension":["the political powers who outrank him"]},"tag":"legend"},{"name":"Senator Valia","aliases":[],"who":"Quarren · chief of Quarren security & military · Genoharadan · deceased","desc":"A banking-guild power and architect of the demilitarization scheme \"Scalpel,\" who refused aid to the Wookiees and obstructed the fight against crime. Kidnapped by Chatni and Atton, severed from the Force, broken for the Genoharadan's secrets — then killed.","look":"Looks: a Quarren — squid-faced, tentacle-bearded. Build: was tall and cold, stiffly imperious.","rel":{"enemies":["Chatni","Atton","the Wookiees","Mon Gazza"]},"tag":"deceased"},{"name":"Director Polard","aliases":[],"who":"Human · second head of Czerka · Genoharadan \"Shaper\" · deceased","desc":"Chatni's former handler and second-in-command of Czerka, secretly one of the fourteen Genoharadan — the man who fingered Chatni to the cabal. Executed by the Hunter at the Kabaal with the words \"for the Republic.\"","look":"Looks: a polished human executive. Build: was average and trim, smooth and corporate.","rel":{"enemies":["Chatni","(killed by) the Hunter"]},"tag":"deceased"},{"name":"Kovacs","aliases":[],"who":"Human · Genoharadan envoy · deceased","desc":"The cabal's envoy, who came to the Kabaal in Mandalorian-styled Sith armor of Revan's era — and died there at Chatni and Atton's hands.","look":"Looks: a human in archaic war-plate. Build: was broad and armored, a heavy presence.","rel":{"enemies":["the crew"]},"tag":"deceased"},{"name":"Geneticist Vein","aliases":[],"who":"Arkanian · Genoharadan scientist · gene-splicer · deceased","desc":"The cabal's scientist, researching whether the Force could be cloned or ran in the blood — work that underpinned the Hunter's clone-army. Killed at the Kabaal.","look":"Looks: an Arkanian — pale, white-eyed, clawed — his thick lenses fused to his skull. Build: was thin and stooped, hunched over his work.","rel":{"enemies":["the crew"]},"tag":"deceased"},{"name":"The Prince","aliases":[],"who":"Genoharadan elder · the silent leader · deceased","desc":"The aged, robed figure who presided over the Kabaal — \"the one who no longer speaks.\" The apparent head of the fourteen, whose true name and species were never learned. Killed in Chatni's opening strike.","look":"Looks: an ancient, robed figure. Build: was frail and bent, swallowed in his robes.","rel":{"enemies":["the crew"]},"tag":"deceased"},{"name":"Jera","aliases":[],"who":"Human · rogue dark-sider · Sith alchemist · deceased","desc":"A manipulative dark-side adept and master of traps who tricked Chatni into the cursed bowl, drained its power, and tied herself to the dark well of Dathomir. Slain on Ord Cestus, her dying curse a warning: \"When they return, you will be the first to die.\"","look":"Looks: a fallen human dark-sider with a red blade. Build: was lean and predatory, all sharp angles.","rel":{"enemies":["the crew","Meetra","Dathomir's true line"]},"tag":"deceased"},{"name":"Lord Ratek","aliases":[],"who":"Human · minor Sith · Jera's pet adept · deceased","desc":"A small, sinister dark-sider Jera produced as an ally, to Meetra's fury; fell alongside her at Ord Cestus.","look":"Looks: a human dark-sider. Build: was small and slight, sinister out of proportion to his size.","rel":{"enemies":["the crew","Meetra"]},"tag":"deceased"},{"name":"Darth Malak","aliases":[],"who":"Human · fallen Dark Lord of the Sith · deceased","desc":"Revan's closest friend and his betrayer, who fired on his own master to seize the title of Dark Lord, wielded the Star Forge, and died at Revan's hand above Lehon.","look":"Looks: a bald human Dark Lord, his lower jaw replaced by a metal vocabulator. Build: was very tall and massive, broad and brutal.","rel":{"enemies":["Revan","the Republic"]},"tag":"deceased"},{"name":"Kreia","aliases":[],"who":"Human · the Exile's teacher · Dark Lord of the Triumvirate · deceased","desc":"The blind old woman whose counsel guided the Exile through the Dark Wars — and who was, all along, the third of the Triumvirate. Her ghost lingered on Malachor; her voice still whispers in a purple lightsaber.","look":"Looks: a blind, aged human woman. Build: was small and stooped, frail-seeming and utterly dangerous.","rel":{"enemies":["the Masters she slew","the Jedi she despised"]},"tag":"deceased"},{"name":"Darth Nihilus","aliases":[],"who":"Once human · the world-devouring void · deceased","desc":"A hunger given form — a wound in the Force that consumed the life of whole worlds and the Force itself. Visas Marr's old master, destroyed by the Exile aboard his flagship, the Ravager.","look":"Looks: once a human, became a robed void behind a cracked white mask. Build: was tall and gaunt-seeming, more absence than body.","rel":{"enemies":["the Exile","all living things"]},"tag":"deceased"},{"name":"Darth Sion","aliases":[],"who":"Human corpse · the Lord of Pain · deceased","desc":"A dead man who refused to die, his shattered body held together by nothing but hatred — unmade at last not by the blade but by the Exile's proof that his hate could no longer sustain him. Every faction of consequence — what each governs, whom it counts as ally and rival, where it trades, and what it wants. Every government, people, order, house, ruling family, corporation, and syndicate stands here as its own entry — none stacked together. Governments and great powers first, then movements and neutral powers, the corporations, and the syndicates of the dark.","look":"Looks: a human corpse of cracked grey stone. Build: was broad and broken, a ruined giant held together by rage.","rel":{"enemies":["the Exile"]},"tag":"deceased"}];

const LK_TIES=[['close','Close'],['friends','Friends'],['allies','Allies'],['tension','Tension'],['enemies','Enemies']];
function lkNorm(t){return String(t||'').toLowerCase();}
function lkResolve(entry){ // map a relationship string to an index entry, if any
 const e=lkNorm(entry).replace(/\([^)]*\)/g,'').trim(); if(!e)return null;
 let hit=NPC_INDEX.find(n=>lkNorm(n.name)===e); if(hit)return hit;
 hit=NPC_INDEX.find(n=>n.aliases.some(a=>lkNorm(a)===e)); if(hit)return hit;
 const tok=e.split(/\s+/)[0]; if(tok.length<3||/^(the|her|his|its|own)$/.test(tok))return null;
 return NPC_INDEX.find(n=>lkNorm(n.name).split(/\s+/)[0]===tok)||null;
}
function lkScore(n,q){
 const nm=lkNorm(n.name),al=n.aliases.map(lkNorm);
 if(nm.startsWith(q)||al.some(a=>a.startsWith(q)))return 100;
 if(nm.includes(q)||al.some(a=>a.includes(q)))return 80;
 if(lkNorm(n.who).includes(q))return 60;
 if(lkNorm(n.desc).includes(q))return 30;
 return 0;
}
function lkTies(p){ // forward + reverse ties for a primary entry
 const out=new Map(); // name -> {npc,label}
 LK_TIES.forEach(([k,lab])=>{(p.rel[k]||[]).forEach(ent=>{
  const hit=lkResolve(ent); if(hit&&hit.name!==p.name&&!out.has(hit.name))out.set(hit.name,{npc:hit,label:lab});
 });});
 NPC_INDEX.forEach(n=>{ if(n.name===p.name||out.has(n.name))return;
  LK_TIES.forEach(([k,lab])=>{(n.rel[k]||[]).forEach(ent=>{
   const hit=lkResolve(ent); if(hit&&hit.name===p.name&&!out.has(n.name))out.set(n.name,{npc:n,label:lab+' (theirs)'});
  });});
 });
 return [...out.values()];
}
function lkPill(n){return n.tag?'<span class="lk-pill '+(n.tag==='deceased'?'dead':n.tag)+'">'+n.tag+'</span>':'';}
function lkChips(p){
 let h='';
 LK_TIES.forEach(([k,lab])=>{(p.rel[k]||[]).forEach(ent=>{
  const hit=lkResolve(ent);
  h+='<span class="lk-chip'+(hit?' go" data-go="'+esc(hit.name)+'"':'"')+'><b>'+lab+'</b> '+esc(ent)+'</span>';
 });});
 return h?'<div class="lk-rels">'+h+'</div>':'';
}
function lkCardFull(n){
 return '<div class="lk-card lk-primary"><div class="lk-name">'+esc(n.name)
  +(n.aliases.length?' <span class="lk-alias">'+esc(n.aliases.join(' · '))+'</span>':'')+lkPill(n)+'</div>'
  +'<div class="lk-who">'+esc(n.who)+'</div>'
  +'<div class="lk-desc">'+esc(n.desc)+'</div>'
  +(n.look?'<div class="lk-look">'+esc(n.look)+'</div>':'')
  +lkChips(n)+'</div>';
}
function lkCardMini(n,tie){
 return '<div class="lk-card lk-go" data-go="'+esc(n.name)+'"><div class="lk-mini"><span class="lk-name">'+esc(n.name)+'</span>'
  +(tie?'<span class="lk-pill tie">'+esc(tie)+'</span>':'')+lkPill(n)
  +'<span class="lk-alias">'+esc(n.who)+'</span></div>'
  +'<div class="lk-mini-desc">'+esc(n.desc)+'</div></div>';
}
function renderLookup(){
 const el=$('lkResults'); if(!el)return;
 const q=lkNorm(lkQuery).trim();
 if(!q){el.innerHTML='<div class="lk-hint">'+NPC_INDEX.length+' people of the Record indexed. Type a name or a title — the best match comes first, then everyone with direct ties to them.</div>';return;}
 const scored=NPC_INDEX.map(n=>({n,s:lkScore(n,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s||a.n.name.localeCompare(b.n.name));
 if(!scored.length){el.innerHTML='<div class="kept-empty">No one in the Record matches “'+esc(lkQuery)+'”.</div>';return;}
 const prim=scored[0].n;
 let h=lkCardFull(prim);
 const ties=lkTies(prim);
 if(ties.length){h+='<div class="lk-sect">Tied to '+esc(prim.name)+'</div>'+ties.map(t=>lkCardMini(t.npc,t.label)).join('');}
 const rest=scored.slice(1).filter(x=>!ties.some(t=>t.npc.name===x.n.name));
 const direct=rest.filter(x=>x.s>=60),ment=rest.filter(x=>x.s<60);
 if(direct.length)h+='<div class="lk-sect">Also matches</div>'+direct.map(x=>lkCardMini(x.n,'')).join('');
 if(ment.length)h+='<div class="lk-sect">Mentioned in</div>'+ment.map(x=>lkCardMini(x.n,'mention')).join('');
 el.innerHTML=h;
 el.querySelectorAll('[data-go]').forEach(c=>{c.onclick=e=>{e.stopPropagation();lkQuery=c.dataset.go;const i=$('lkSearch');if(i)i.value=lkQuery;renderLookup();window.scrollTo({top:0,behavior:'smooth'});};});
}
