 a drinking contest. Saved from a plague-death on Tatooine by Chatni; later recalled by Torren to Mandalorian service."}, {"name": "T3-M4", "side": "npc", "species": "Astromech droid", "role": "veteran of Revan's and the Exile's journeys", "status": "alive", "notes": "A legendary little utility droid that has outlived Dark Lords; rolls with the crew, occasionally helping himself to a sample of someone's blood for safekeeping."}, {"name": "Meetra Surik", "side": "npc", "species": "Human", "role": "Grand Master of the Restored Jedi Order", "status": "alive", "notes": "aka \"the Exile\" · \"the Victorious\". The last Jedi to walk the Purge openly, and the woman who rebuilt the Order — brilliant, hardened, and frighteningly willing to do what a crisis demands. Long shadowed by Kreia's lingering presence until freed of it; now pregnant, and stepping back from the front lines."}, {"name": "Kao Cen Darach", "side": "npc", "species": "Iridonian Zabrak", "role": "Jedi Master · brought into the Order by the crew", "status": "alive", "notes": "A revered master of the saber and of a rare, decision-reading philosophy of the Force. Never a Purge-era survivor — the crew sought him out on Makeb and earned his trust."}, {"name": "Atton Rand", "side": "npc", "species": "Human", "role": "rogue · gambler · grey blade · one of two living Trakata masters", "status": "alive", "notes": "A survivor of the Dark Wars with a sharp tongue, a hidden past, and a habit of punching his own ship into hyperspace. Hires out to Chatni, teaches her the deceptive Trakata technique, and leaves men to die when it suits him."}, {"name": "Satele Shan", "side": "npc", "species": "Human", "role": "Jedi · daughter of Revan and Bastila Shan", "status": "alive", "notes": "The heir of two legends, drawn into the crew's orbit on Makeb. Prone to super-focus and to feeling things stir in the Unknown Regions."}, {"name": "Bao-Dur", "side": "npc", "species": "Iridonian Zabrak", "role": "tech-savant · veteran of Malachor", "status": "alive", "notes": "aka \"Baldur\". The Exile's old engineer, builder of the Mass Shadow Generator and tinkerer of small droids. Cheerful to the point of blowing himself up; teaches Chatni the personal shield."}, {"name": "Mira", "side": "npc", "species": "Human", "role": "former bounty huntress · Jedi of the new Order", "status": "alive", "notes": "A sharp, watchful survivor of Nar Shaddaa who teaches Chatni the craft of teaching, and misses nothing — including a certain rogue's late-night kiss."}, {"name": "Brianna", "side": "npc", "species": "Echani", "role": "Jedi · keeper of Ilum", "status": "alive", "notes": "aka \"Breanna\" · the Last Handmaiden. An Echani warrior-scholar who trains Chatni and remains to hold Ilum as the others move on. Carries a hot-tempered feud with another of the Order's women, and a wary eye on Atton."}, {"name": "Mical", "side": "npc", "species": "Human", "role": "scholar-Jedi · keeper of forbidden books", "status": "alive", "notes": "aka \"Mikael\" / \"Michael\" · the Disciple. A gentle, learned Jedi with an underground collection of dangerous texts, a steady supply of good tea, and counsel Chatni trusts. He helps her drain the Book of Shadows of its power."}, {"name": "Visas Marr", "side": "npc", "species": "Miraluka seer", "role": "survivor of Nihilus", "status": "alive", "notes": "The blind Miraluka who once served the world-eater Nihilus and survived him. A reference point for understanding DeLuca, whose devotion to a monstrous \"master\" mirrors her own past."}, {"name": "Master Voll", "side": "npc", "species": "Human", "role": "Jedi hardliner · Force-severed", "status": "alive", "notes": "A dogmatic master who once tried to kill Chatni outright. Captured by the crew on Ilum and severed from the Force at Meetra's order — a living warning of where the old certainties lead."}, {"name": "Canderous Ordo", "side": "npc", "species": "Human", "role": "Mandalorian veteran · companion of Revan", "status": "alive", "notes": "aka \"Candi\" · former Mandalore. The aging legend who took the mask of Mandalore at the close of the Dark Wars, then spent years in seclusion before quietly regathering the clans. Slowly bent by the Freedon Nadd tomb until the crew freed his mind and he stepped down."}, {"name": "Torren Wren", "side": "npc", "species": "Human", "role": "leader of the reunified Mandalorian clans", "status": "alive", "notes": "aka \"Mandalore the Dawn\". Canderous's chosen successor — steady, honorable, pragmatic — steering his people from conquest toward honor, craft, and the role of galactic first-responders won at the Csilla Accords. Deals with Chatni on \"mutual trust,\" and quietly set Sekan to watch the crew."}, {"name": "Dax Vein", "side": "npc", "species": "Human", "role": "chieftain of the reborn Clan Nightfall", "status": "alive", "notes": "Inheritor of Clan Nightfall after Sekan gave up the chieftaincy to keep questing — holder of the clan Sekan rebuilt from the ashes of Clan Varad."}, {"name": "Kultak", "side": "npc", "species": "Human", "role": "Mandalorian hunter · Chatni's \"bro\"", "status": "alive", "notes": "Chatni's brother-in-arms among the Kashyyyk Mandalorians, leader of the hunting parties she enhanced with battle meditation and her partner in a Czerka-archive break-in."}, {"name": "Drax", "side": "npc", "species": "Human", "role": "chieftain of the Kashyyyk Mandalorians", "status": "alive", "notes": "Took the chieftaincy of the Kashyyyk-based clans after Sekan moved on, holding the foothold negotiated with the Wookiees."}, {"name": "Brunos", "side": "npc", "species": "Human", "role": "Mandalorian tracker · bonded to Chatni", "status": "alive", "notes": "A tracker to whom Chatni accidentally formed a lasting Force-bond during an enhanced hunt — the one bond she chose not to sever."}, {"name": "General Kladar", "side": "npc", "species": "Iktotchi general", "role": "commander of the Stormguard · Tylo's close friend and old war-ally", "status": "alive", "notes": "Tylo's brother-in-arms from the wars and a leading commander of the Stormguard — the Iktotchi war-host that rises in times of galactic strife. The two share coffee, deep friendship, and a grim shared premonition of an enormous war to come — exactly the kind of strife that would c"}, {"name": "The Keeper of the Ember", "side": "npc", "species": "Iktotchi seer-priestess", "role": "head of the Ember Conclave (Fire) · keeper of tradition", "status": "alive", "notes": "Head of the Ember Conclave — the Iktotchi sect of tradition and conservatism , keepers of the kept flame and the oldest, deepest visions. It was she who read Chatni's heritage and laid bare the Nightsister prophecy and the ancient history of the Kwa, the Rakata, and the Sith."}, {"name": "The Stormspeaker", "side": "npc", "species": "Iktotchi seer", "role": "Voice of the Levin Conclave (Lightning) · of action and response", "status": "alive", "notes": "Voice of the Levin Conclave — the sect of action and response , named for the sudden bolt. Where the Ember waits, the Levin strikes: the instant a vision flares, they move."}, {"name": "The Windwarden", "side": "npc", "species": "Iktotchi seer-elder", "role": "Warden of the Gale Conclave (Air) · of balance and swaying motion", "status": "alive", "notes": "Warden of the Gale Conclave — the sect of balance and swaying motion , named for the turning wind that bends but never breaks. The Gale are the moderators and the swing of the Fourfold Wind, leaning now toward the Ember, now toward the Levin, keeping the moon's course from veerin"}, {"name": "Cardina Thul", "side": "npc", "species": "Human", "role": "Matriarch of House Thul · Queen of Alderaan", "status": "alive", "notes": "Chatni's longtime employer and friend, risen from noble matriarch to crowned monarch of Alderaan — having gutted rival houses to consolidate the throne and taken the restored Jedi enclave onto her world. Loyal to Chatni, wary of Meetra, building her own alliances."}, {"name": "Chancellor Cressa", "side": "npc", "species": "Human", "role": "Supreme Chancellor of the Galactic Republic", "status": "alive", "notes": "The weary leader of a bankrupt Republic, holding a fragile union together and quietly bankrolling the Restoration. Set Chatni the Genoharadan-hunt; a shrewd cards-player who bleeds opponents dry and angles for Mandalorian beskar."}, {"name": "Senator Mon Gazza", "side": "npc", "species": "Human", "role": "honest senator · leader of the Mining Coalition", "status": "alive", "notes": "A rare clean politician, husband and father, genuinely fighting crime and corruption — twice spared by Chatni, once interrogated atop his own spire. Emerges from the accords as leader of the Outer Rim's new Mining Coalition."}, {"name": "Baron Hektor Venlath", "side": "npc", "species": "Human", "role": "Corellian baron · summit power", "status": "alive", "notes": "A vain Corellian noble, proud of his rare drink and his secrets — bound by translocator to a shadowy bargain. A fuzzy, useful acquaintance Chatni began cultivating before Torren asked her to broker a meeting between him and Sekan."}, {"name": "Senator Skassa", "side": "npc", "species": "Twi'lek", "role": "senator · replacement appointee", "status": "alive", "notes": "The Twi'lek who took the senate seat left empty by the senator Chatni killed — a newcomer to the great table at Csilla."}, {"name": "Mallow Wok", "side": "npc", "species": "Ithorian", "role": "minister of agriculture", "status": "alive", "notes": "Steward of the Republic's agriculture, who brokered grain deals with the Chiss (who cannot farm their ice world) — sidelining the Open Palm. A peaceful steward of growing things."}, {"name": "Magister Hoola", "side": "npc", "species": "Muun", "role": "banking magister", "status": "alive", "notes": "A banking power who noticed Chatni at Csilla and whispered to Baroness Elo — a financier with menace under the manners, his ties reaching toward the cabal in the dark."}, {"name": "Baroness Elo", "side": "npc", "species": "Muun", "role": "head of the banking guild · Genoharadan", "status": "alive", "notes": "Head of the galaxy's banking guild — and, secretly, one of the fourteen Genoharadan: the financial power behind the cabal's reach into every government and corporation, and one of the few of its inner circle still living."}, {"name": "Admiral Raan", "side": "npc", "species": "Human", "role": "Republic admiral · cabal-adjacent", "status": "alive", "notes": "A Republic admiral Senator Valia confided in — not a sworn member of the Genoharadan, but a man who knew more of its workings than he should have."}, {"name": "Luxa", "side": "npc", "species": "Zeltron", "role": "Second Hand of the Exchange", "status": "alive", "notes": "A slick, relentlessly talkative operator who extorted Chatni on Tatooine, climbed to Second Hand of the Exchange, and turns up everywhere — flirting with Tylo, flipping off Chatni across a cantina, surviving a near-fatal brawl with the Hunter. As much recurring nuisance as genuin"}, {"name": "GOTO", "side": "npc", "species": "Droid intelligence", "role": "crime-lord power-broker", "status": "alive", "notes": "A hidden droid intelligence running a vast criminal-political network, devoted to stabilizing the Republic by any means. Exposed Chatni's secrets, named the Genoharadan as her hunters, and bargained for her help against them."}, {"name": "The Hunter", "side": "npc", "species": "Synthetic assassin", "role": "the Genoharadan's blade", "status": "alive", "notes": "The most dangerous of the Genoharadan — fully geared and shielded, the architect of the Csilla clone-army. When beheaded he proved no living man at all: sparks, not blood."}, {"name": "Vessa", "side": "npc", "species": "Bith", "role": "master skin-grafter of Coruscant", "status": "alive", "notes": "A rare, funny little surgeon whose flawless grafts let Chatni become the Mirialan \"Paya\" and Atton a fish-faced stranger. A discreet asset to those who can pay."}, {"name": "Nerudo", "side": "npc", "species": "Chiss of House Inrokini", "role": "security agent · interrogator", "status": "alive", "notes": "The sharp Chiss interrogator at Csilla who suspected Chatni of everything — and was largely right. A scion of House Inrokini , the ruling family that holds the Ascendancy's industry, science, and communications, he is a dangerous, courteous duelist of words."}, {"name": "Detective Vesh'ra'sabosen", "side": "npc", "species": "Chiss of House Sabosen", "role": "summit investigator", "status": "alive", "notes": "aka \"Veshra\". The Chiss investigator who drugged and interrogated Mon Gazza at Csilla, hunting the timeline of Chatni's involvement with the Genoharadan affair. Of House Sabosen , the ruling family that holds justice and law, making her interest a matter of cold Chiss jurisprudence."}, {"name": "Vogga the Hutt", "side": "npc", "species": "Hutt", "role": "crime lord of Nar Shaddaa · shipping & fuel baron", "status": "alive", "notes": "An ancient, immensely wealthy Hutt controlling vast shipping, fuel, and spice out of the Smuggler's Moon — a potential contact (and creditor) Chatni has weighed leaning on, though she shares the galaxy's distaste for dealing with Hutts."}, {"name": "Jana Lorso", "side": "npc", "species": "Human", "role": "Czerka executive", "status": "alive", "notes": "A sharp, ambitious Czerka executive — one of the corporate names Chatni might buy, bribe, or lean on for information. Cold and careerist, she embodies the soulless efficiency of the company she serves."}, {"name": "The Rival Candidate", "side": "npc", "species": "Dathomiri Nightsister", "role": "matriarch-candidate", "status": "alive", "notes": "A new Nightsister candidate, risen in the last two years and swollen with the stolen strength of all the slain candidates, groomed by the surviving mothers expressly to destroy Chatni — the dark mirror of everything Chatni has refused to become."}, {"name": "Mother Githzerion", "side": "npc", "species": "Dathomiri", "role": "Nightsister matriarch · keeper of the Book of Shadows", "status": "alive", "notes": "An ancient matriarch of Dathomir who holds the original Book of Shadows and guides the rival candidate — one of the voices calling to Chatni across the stars to \"return.\""}, {"name": "Revan", "side": "npc", "species": "Human", "role": "Jedi general · Dark Lord · redeemer — vanished", "status": "alive", "notes": "The defining figure of the age: savior of the Republic, then its conqueror as a Sith Lord, then its savior again. Allied in secret with ancient powers, left a \"Foundry\" still being hunted, and vanished into the Unknown Regions driven by a prophecy of a gathering threat no one els"}, {"name": "Bastila Shan", "side": "npc", "species": "Human", "role": "Jedi · mistress of battle meditation · mother of Satele", "status": "alive", "notes": "The battle-seer whose gift could turn the tide of fleets, who bound her fate to Revan's and bore his daughter, Satele. She lingers at the edges of the present — appearing in Chatni's battle-meditation visions and linked to Visas Marr."}, {"name": "Carth Onasi", "side": "npc", "species": "Human", "role": "Republic admiral · companion of Revan", "status": "alive", "notes": "The steadfast Republic pilot who stood with Revan from the fall of Taris to the Star Forge — loyalty itself, in a galaxy of betrayals. Alive and risen high: a serving Republic admiral who sat at the great table on Csilla, outranked there only by political powers."}, {"name": "Senator Valia", "side": "npc", "species": "Quarren", "role": "chief of Quarren security & military · Genoharadan · deceased", "status": "alive", "notes": "A banking-guild power and architect of the demilitarization scheme \"Scalpel,\" who refused aid to the Wookiees and obstructed the fight against crime. Kidnapped by Chatni and Atton, severed from the Force, broken for the Genoharadan's secrets — then killed."}, {"name": "Director Polard", "side": "npc", "species": "Human", "role": "second head of Czerka · Genoharadan \"Shaper\" · deceased", "status": "alive", "notes": "Chatni's former handler and second-in-command of Czerka, secretly one of the fourteen Genoharadan — the man who fingered Chatni to the cabal. Executed by the Hunter at the Kabaal with the words \"for the Republic.\""}, {"name": "Kovacs", "side": "npc", "species": "Human", "role": "Genoharadan envoy · deceased", "status": "alive", "notes": "The cabal's envoy, who came to the Kabaal in Mandalorian-styled Sith armor of Revan's era — and died there at Chatni and Atton's hands."}, {"name": "Geneticist Vein", "side": "npc", "species": "Arkanian", "role": "Genoharadan scientist · gene-splicer · deceased", "status": "alive", "notes": "The cabal's scientist, researching whether the Force could be cloned or ran in the blood — work that underpinned the Hunter's clone-army. Killed at the Kabaal."}, {"name": "The Prince", "side": "npc", "species": "Genoharadan elder", "role": "the silent leader · deceased", "status": "alive", "notes": "The aged, robed figure who presided over the Kabaal — \"the one who no longer speaks.\" The apparent head of the fourteen, whose true name and species were never learned. Killed in Chatni's opening strike."}, {"name": "Jera", "side": "npc", "species": "Human", "role": "rogue dark-sider · Sith alchemist · deceased", "status": "alive", "notes": "aka \"Jerra\". A manipulative dark-side adept and master of traps who tricked Chatni into the cursed bowl, drained its power, and tied herself to the dark well of Dathomir. Slain on Ord Cestus, her dying curse a warning: \"When they return, you will be the first to die.\""}, {"name": "Lord Ratek", "side": "npc", "species": "Human", "role": "minor Sith · Jera's pet adept · deceased", "status": "alive", "notes": "A small, sinister dark-sider Jera produced as an ally, to Meetra's fury; fell alongside her at Ord Cestus."}, {"name": "Darth Malak", "side": "npc", "species": "Human", "role": "fallen Dark Lord of the Sith · deceased", "status": "alive", "notes": "Revan's closest friend and his betrayer, who fired on his own master to seize the title of Dark Lord, wielded the Star Forge, and died at Revan's hand above Lehon."}, {"name": "Kreia", "side": "npc", "species": "Human", "role": "the Exile's teacher · Dark Lord of the Triumvirate · deceased", "status": "alive", "notes": "aka Darth Traya · the Lord of Betrayal. The blind old woman whose counsel guided the Exile through the Dark Wars — and who was, all along, the third of the Triumvirate. Her ghost lingered on Malachor; her voice still whispers in a purple lightsaber."}, {"name": "Darth Nihilus", "side": "npc", "species": "Once human", "role": "the world-devouring void · deceased", "status": "alive", "notes": "A hunger given form — a wound in the Force that consumed the life of whole worlds and the Force itself. Visas Marr's old master, destroyed by the Exile aboard his flagship, the Ravager."}, {"name": "Darth Sion", "side": "npc", "species": "Human corpse", "role": "the Lord of Pain · deceased", "status": "alive", "notes": "A dead man who refused to die, his shattered body held together by nothing but hatred — unmade at last not by the blade but by the Exile's proof that his hate could no longer sustain him."}];
const FAC_SEED=[{"name": "Clan Wren", "notes": "Led by Torren Wren (Mandalore the Dawn) and home to the artificer Alra; steers the people from conquest toward honor and craft.", "standing": "Rules Holds the mask of Mandalore — the ruling clan"}, {"name": "Clan Ordo", "notes": "The clan of Canderous, who took the mask at the close of the Dark Wars and quietly regathered the clans before passing it on.", "standing": "Elder & prestigious; its old Mandalore now rides with the crew"}, {"name": "Clan Nightfall", "notes": "Refounded by Sekan from the ashes of Clan Varad and now led by Dax Vein — a young, ascendant line.", "standing": "Ascendant — reborn and rising"}, {"name": "The Kashyyyk Clans", "notes": "A frontier holding under chieftain Drax, kept by accord with the Wookiees, where Kultak and Drax hunt.", "standing": "Established frontier hold, by Wookiee accord"}, {"name": "Clan Vizsla", "notes": "A storied line scattered in the long fall of the Mandalorians, still hunted by Torren's people.", "standing": "Lost — whereabouts unknown, actively sought"}, {"name": "Clan Varad", "notes": "The clan Sekan broke and supplanted; its remnants were folded into the reborn Clan Nightfall.", "standing": "Broken — absorbed into Clan Nightfall"}, {"name": "House Nuruodo", "notes": "Military and foreign affairs — the warships ringing Csilla and the diplomats who set the terms of the summit and of Chiss neutrality.", "standing": "Ascendant Leads the Ascendancy's galactic engagement in the summit era"}, {"name": "House Csapla", "notes": "Resources, colonization, and what farming the ice worlds allow; provided the host Aristocra who convened the summit.", "standing": "Economic backbone & summit host; co-first among equals"}, {"name": "House Inrokini", "notes": "Industry, science, and communications — the makers and the listeners. House of the agent Nerudo.", "standing": "Influential and watchful; rising with the new technological age"}, {"name": "House Sabosen", "notes": "Health, education, and justice; keepers of the rigid social order. House of Detective Veshra.", "standing": "Steady — the courts and conscience of the Ascendancy"}, {"name": "House Thul", "notes": "Merchant-risen brokers of trade and the planet's economy, ascendant under Queen Cardina; patron of the Jedi and Chatni's employer.", "standing": "In Power Ascendant to the throne — the ruling house"}, {"name": "House Organa", "notes": "The eldest, most respected house; diplomats and Republic-founders, anchored by the Organa–Alde axis.", "standing": "Most respected; chief counterweight to Thul"}, {"name": "House Ulgo", "notes": "A house of soldiers and stern discipline, eyeing the throne with martial ambition.", "standing": "Rising martial power"}, {"name": "House Rist", "notes": "Legendary assassins and spies, descended from a crime lord; the techno-slaver nemesis of Tylo Dara.", "standing": "Powerful in the shadows"}, {"name": "House Panteer", "notes": "The ancient royal line, brought low and driven into hiding after the murder of its heir.", "standing": "Fallen — a crown in exile"}, {"name": "House Alde", "notes": "Alderaan's oldest surviving house; eccentric scholars of antiquity, long allied to Organa.", "standing": "Influential by prestige"}, {"name": "House Baliss", "notes": "A minor house that climbs by flattery, brokerage, and timely alliance.", "standing": "Minor — rising"}, {"name": "House Cortess", "notes": "Vassal vintners, keepers of Alderaan's famed vineyards and high vintages.", "standing": "Minor / vassal"}, {"name": "House Teral", "notes": "Newly-rich merchant-soldiers angling hard for a seat at the high table.", "standing": "Minor — ambitious"}, {"name": "House Killesa", "notes": "Financiers and moneylenders who hold the debts of greater houses.", "standing": "Minor — but leveraged"}, {"name": "House Girard", "notes": "Jurists and parliamentary speakers, masters of Alderaan's labyrinthine law.", "standing": "Minor — influential in law"}, {"name": "House Frayus", "notes": "Proud, insular landholders of the high country, owners of mines and mountain passes.", "standing": "Minor — insular"}, {"name": "House Qel-Nosh", "notes": "Patrons of the great salons, galleries, and concert halls — influence by culture.", "standing": "Minor — cultural"}, {"name": "House Antilles", "notes": "Shipwrights and pilots who hold Alderaan's small but proud space-guard.", "standing": "Minor"}, {"name": "The Levin Conclave", "notes": "Lightning — of action and response; the sudden strike, led by the Stormspeaker.", "standing": "Ascendant Drives the bold new era — the new Order and the arbiter role"}, {"name": "The Gale Conclave", "notes": "Air — of balance and swaying motion; the turning wind, led by the Windwarden. Chatni's adoptive sect.", "standing": "The swing — currently leaning to the Levin, holding the balance"}, {"name": "The Ember Conclave", "notes": "Fire — of tradition and conservatism; the kept flame, led by the Keeper of the Ember.", "standing": "In the minority — resisting the pace of change"}, {"name": "The Stormguard", "notes": "The military war-host, commanded by General Kladar; rises only in times of strife.", "standing": "Rising — gathering against the war the seers foresee"}];
const REC_CREW=[{"title": "The Iktotchi in the Dark", "summary": "House Thul · the casino · the train · the cleared house For years Chatni served the Alderaanian noblewoman Cardina Thul under the name Nerry — a quiet, useful operative in a quiet, useful life. That ended when a horned stranger interrupted her breakfast: Tylo Dara , an Iktotchi ex-Jedi master who ha", "full": "House Thul · the casino · the train · the cleared house For years Chatni served the Alderaanian noblewoman Cardina Thul under the name Nerry — a quiet, useful operative in a quiet, useful life. That ended when a horned stranger interrupted her breakfast: Tylo Dara , an Iktotchi ex-Jedi master who had been hunting her for half a year on the strength of his premonitions, trailed by the Mandalorian Sekan Nightfall , who would not let an unfinished duel with Tylo go. Cardina set them all on a single mission — the discovery that Iktotchi were being held and tortured somewhere in the house's reach. Tylo played bait and was duly snatched from a casino and nearly frozen in carbonite; Chatni shadowed", "tags": "crew, session"}, {"title": "Six Months Beneath the Sea", "summary": "a hidden world · the underwater Sith bases · Jera · the Jedi temple Cardina sent the crew — now joined by the blind, dangerous DeLuca — on a months-long expedition to recover secrets House Thul wanted buried. They found ships dragged down by a strange seismic event, a fortune in credits to be launde", "full": "a hidden world · the underwater Sith bases · Jera · the Jedi temple Cardina sent the crew — now joined by the blind, dangerous DeLuca — on a months-long expedition to recover secrets House Thul wanted buried. They found ships dragged down by a strange seismic event, a fortune in credits to be laundered (which Chatni promptly mined with a bomb), and, beneath the waves, a chain of dead Sith bunkers : a Sith woman's helmet, lightsaber scars on the walls, and submarines pointing deeper still. Two months of self-taught submarining later they reached a second base — and were met by the rogue dark-sider Jera . Tylo charmed a truce: the crew would fetch what Jera wanted from a third, flooding base i", "tags": "crew, session"}, {"title": "The Mandalore and the Tomb", "summary": "the jungle moon · Canderous · Freedon Nadd · Alra Wren On the Mandalore-held moon of Dxun the crew met Alra Wren — a spirited Mandalorian artificer Chatni adored on sight — and the aging Canderous Ordo , still bearing the mask of Mandalore. For Sekan this was a revelation: only here did he learn tha", "full": "the jungle moon · Canderous · Freedon Nadd · Alra Wren On the Mandalore-held moon of Dxun the crew met Alra Wren — a spirited Mandalorian artificer Chatni adored on sight — and the aging Canderous Ordo , still bearing the mask of Mandalore. For Sekan this was a revelation: only here did he learn that Canderous had survived the Dark Wars at all, had taken up the mask, and had quietly drawn the scattered clans back together — and that this reborn Mandalorian power now stood as an ally to the very crew he travelled with. Sekan fought for the honor of his line and won, becoming a chieftain. While hunting a lost Mandalorian the crew battled a dark-side beast, and Chatni's spirit sight located the", "tags": "crew, session"}, {"title": "The Grey Blade Reclaimed", "summary": "the shattered world · the Sith academy · the abandoned saber · Kreia's ghost The \"lost\" lightsaber the crew sought on the gravity-wracked corpse of Malachor was no stranger's — it was Tylo's own , the blade he had cast aside in the ruined Sith academy years before, when the agony of this place at th", "full": "the shattered world · the Sith academy · the abandoned saber · Kreia's ghost The \"lost\" lightsaber the crew sought on the gravity-wracked corpse of Malachor was no stranger's — it was Tylo's own , the blade he had cast aside in the ruined Sith academy years before, when the agony of this place at the end of the Dark Wars forced him to renounce his powers. He had come back to take it up again. But Malachor does not give its dead back freely: the lingering ghost of Kreia — Darth Traya still haunted the academy, and as Tylo's hand closed on the hilt the spirit-echo nearly killed him. He survived transformed — no longer simply a Jedi, but grey , his power returned and changed all at once. Chatni", "tags": "crew, session"}, {"title": "The Gathering of the Force", "summary": "the ice caves · Meetra Surik · the bowl · Master Voll · the crystal Ilum was where the scattered Force survivors had gathered around Meetra Surik , the Exile herself, alongside Brianna , Mira , the rogue dark-sider Jera , and the hardliner Master Voll — who had once tried to blow Chatni's head apart", "full": "the ice caves · Meetra Surik · the bowl · Master Voll · the crystal Ilum was where the scattered Force survivors had gathered around Meetra Surik , the Exile herself, alongside Brianna , Mira , the rogue dark-sider Jera , and the hardliner Master Voll — who had once tried to blow Chatni's head apart. Chatni and the Exile took each other's measure; Meetra learned Chatni's true name and saw the Nightsister beneath the alias. Tylo dueled and beat Jera. The crew handed DeLuca's care to Meetra. The cursed bowl finally revealed itself as a dark-side trap; Meetra, furious, forced Jera to help undo it and to sever the Force from the murderous Master Voll. Chatni built a flawless gas trap to capture ", "tags": "crew, session"}, {"title": "The Shan and the Zabrak", "summary": "the floating mesas · Satele Shan · Kao Cen Darach On the lush resort-world of Makeb, Chatni and Tylo together won over two extraordinary allies who had stood apart from the reborn Order — and brought them into it. The first was Satele Shan , in this telling the daughter of Revan and Bastila Shan , h", "full": "the floating mesas · Satele Shan · Kao Cen Darach On the lush resort-world of Makeb, Chatni and Tylo together won over two extraordinary allies who had stood apart from the reborn Order — and brought them into it. The first was Satele Shan , in this telling the daughter of Revan and Bastila Shan , heir to the two greatest legends of the age. The second was the Zabrak master Kao Cen Darach — a warrior-philosopher who had never been one of Meetra's KOTOR-era survivors, and who joined the Jedi only because the crew of the Dara Dara sought him out and earned his trust. He would become one of Chatni's truest teachers. On the long voyage home Chatni learned a lightsaber stance from Kao Cen and pra", "tags": "crew, session"}, {"title": "Twenty-Six Thousand", "summary": "a Silent Hand warship · the rescue · the bomb Back on Ilum, Chatni refused Meetra's \"gorilla\" assault in favor of her own signature: a teleport-door breach and a 10-kilogram bomb, funded personally by the Exile at 400,000 credits. Tylo flew them in under stolen camo-crystals and set them beside the ", "full": "a Silent Hand warship · the rescue · the bomb Back on Ilum, Chatni refused Meetra's \"gorilla\" assault in favor of her own signature: a teleport-door breach and a 10-kilogram bomb, funded personally by the Exile at 400,000 credits. Tylo flew them in under stolen camo-crystals and set them beside the prisoner's cell; Chatni cracked the force-field under fire (rolling brilliantly), they pulled the man free through her portal — he snatched an artifact on the way — and she detonated. The warship died, and twenty-six thousand with it. Chatni felt every one of them. She is, by her own grim accounting, a committer of war crimes now. Chapter VIII · c. 3942 BBY · The Matriarch's Mark", "tags": "crew, session"}, {"title": "Spirit Sever", "summary": "the Ilum wilds · the Nightsister mothers Meditating alone on her \"slight genocide,\" Chatni was ambushed in her own mind by the old Nightsister matriarchs of Dathomir . She killed the previous mother and forced the rest back, waking exhausted and covered in the burning tattoos of the matriarch's sigi", "full": "the Ilum wilds · the Nightsister mothers Meditating alone on her \"slight genocide,\" Chatni was ambushed in her own mind by the old Nightsister matriarchs of Dathomir . She killed the previous mother and forced the rest back, waking exhausted and covered in the burning tattoos of the matriarch's sigil — and possessing a new and terrible power: spirit sever . The mark of a matriarchal candidate had surfaced; her heritage would not leave her alone. Chapter IX · c. 3941 BBY · Dxun & Tatooine", "tags": "crew, session"}, {"title": "The Succession and the Zombies", "summary": "Canderous fading · Torren Wren · the Rakghoul desert · Luxa Returning to Dxun, the crew found morale in ruins: the Freedon Nadd tomb had grown stronger and the aging Canderous, never having left the moon, was being slowly bent by it. Chatni gently healed his mind enough that he could be persuaded to", "full": "Canderous fading · Torren Wren · the Rakghoul desert · Luxa Returning to Dxun, the crew found morale in ruins: the Freedon Nadd tomb had grown stronger and the aging Canderous, never having left the moon, was being slowly bent by it. Chatni gently healed his mind enough that he could be persuaded to step down, naming the steady Torren Wren as the new Mandalore. They took the recovering Canderous with them to Tatooine to buy ships for Meetra's struggling people. Tatooine was a Czerka misery of queues and quarantine. The crew dug out four buried ships, took three, and answered an SOS from a mercenary band and their Cathar archaeologist client — finding them besieged by Czerka workers turned to", "tags": "crew, session"}, {"title": "The Wookiee Exodus and Revan's Allies", "summary": "the Mandalorian relocation · battle meditation · the Rakatan archive The Mandalorians had abandoned Dxun for Kashyyyk , negotiating with the Wookiee chieftain for a foothold. Chatni offered Torren her battle meditation; he answered that it was \"not a deal but mutual trust,\" and let her enhance his h", "full": "the Mandalorian relocation · battle meditation · the Rakatan archive The Mandalorians had abandoned Dxun for Kashyyyk , negotiating with the Wookiee chieftain for a foothold. Chatni offered Torren her battle meditation; he answered that it was \"not a deal but mutual trust,\" and let her enhance his hunting parties through her brother-in-arms Kultak . During one hunt Tylo pressed the wrong control in an ancient structure and vanished — teleported to a hidden Rakatan archive , where a triangle-headed being interrogated him. Tylo bluffed his way through by invoking Revan (who had allied with these beings) and the password of Satele Shan, daughter of Bastila . In return he was given a holo catalo", "tags": "crew, session"}, {"title": "GOTO, the Genoharadan, and a Name Revealed", "summary": "the Mandalorian summit · the Exile · the secret meeting Aboard a Mandalorian warship the crew reached the Citadel for a great pre-Summit council. There the shape of the galaxy's near future was drawn: the Mandalorians gained standing; the Jedi Order regained its privileges under the Republic and the", "full": "the Mandalorian summit · the Exile · the secret meeting Aboard a Mandalorian warship the crew reached the Citadel for a great pre-Summit council. There the shape of the galaxy's near future was drawn: the Mandalorians gained standing; the Jedi Order regained its privileges under the Republic and the world of Python (Tython); the Iktotchi were named arbiters of disputes; and Cardina Thul took the Jedi enclave onto her own world. In a smaller, sealed meeting, the crime-lord intelligence GOTO exposed Chatni utterly — her true name, her Black Cell past, her old contract with HK-47 — and revealed the true power behind her troubles: the Genoharadan , a tiny cabal of immensely connected people who ", "tags": "crew, session"}, {"title": "From Herdessa to the Kabaal", "summary": "Mon Gazza · the Hoth Czerka station · the Valia kidnapping · the summit massacre · the Hunter The hunt ranged across the galaxy. On Herdessa , GOTO confirmed he wanted the Genoharadan dead too, and pointed the way.", "full": "Mon Gazza · the Hoth Czerka station · the Valia kidnapping · the summit massacre · the Hunter The hunt ranged across the galaxy. On Herdessa , GOTO confirmed he wanted the Genoharadan dead too, and pointed the way. Atop a spire, Chatni interrogated the honest Senator Mon Gazza , learning of Senator Valia — Quarren security chief and banking-guild power — and the demilitarization scheme called Scalpel . At a Czerka station near Hoth , Chatni teleported through the archives, killed a Force-sensitive Black Cell agent, and learned the worst of it: Czerka was researching Rakatan technology, hunting the Foundry and a record left by Revan, and tracking something for fourteen years. As the crew fled", "tags": "crew, session"}, {"title": "The Day of Peace", "summary": "the Selkath ocean-world · Atton Atton took Chatni to Manaan , the Selkath ocean-world and the galaxy's source of kolto, where he was known and welcomed and she was gifted a ring marking her as a guest of the Selkath. For one day there was no war: extraordinary food, a submarine ride, an underwater m", "full": "the Selkath ocean-world · Atton Atton took Chatni to Manaan , the Selkath ocean-world and the galaxy's source of kolto, where he was known and welcomed and she was gifted a ring marking her as a guest of the Selkath. For one day there was no war: extraordinary food, a submarine ride, an underwater meditation in which Chatni reached enlightenment — and Atton held her hand. It was, she realized, the only true peace she had felt. He finished teaching her the deceptive Trakata saber technique on the way home. Chapter XIV · c. 3941 BBY · Iktotch", "tags": "crew, session"}, {"title": "Tylo's Honors and the Nightsister Prophecy", "summary": "the Iktotchi homeworld · the new Order · Chatni's heritage On Tylo's homeworld moon of Iktotch , the precognitive Iktotchi welcomed him as a hero, heaped him with honors and titles, and — at his charismatic urging — granted the founding of a new Order . They tested Chatni's heritage through their vi", "full": "the Iktotchi homeworld · the new Order · Chatni's heritage On Tylo's homeworld moon of Iktotch , the precognitive Iktotchi welcomed him as a hero, heaped him with honors and titles, and — at his charismatic urging — granted the founding of a new Order . They tested Chatni's heritage through their visions and the seers of the Ember Conclave : she learned she is a matriarchal candidate of Dathomir, that a dark prophecy holds she could \"push the galaxy into darkness\" if she united the Nightsisters, and the deep history of her people — that the Kwa first gave Dathomir and Iktotch the Force and the stars, that the Rakata then enslaved and the Sith later slaughtered, and that a banished Jedi had s", "tags": "crew, session"}, {"title": "Queen of the Mountain", "summary": "Cardina ascendant · the Jedi enclave · Bao-Dur, Mira, Satele Returning to Alderaan, the crew found Cardina Thul transformed — crowned, royal, having \"gutted\" rival houses to consolidate power, and hosting the restored Jedi enclave on her world. There Chatni trained: teaching from Mira , personal-shi", "full": "Cardina ascendant · the Jedi enclave · Bao-Dur, Mira, Satele Returning to Alderaan, the crew found Cardina Thul transformed — crowned, royal, having \"gutted\" rival houses to consolidate power, and hosting the restored Jedi enclave on her world. There Chatni trained: teaching from Mira , personal-shield work from the explosively cheerful Bao-Dur , and quiet hours with Satele Shan , whose focus had begun to drift toward something stirring in the Unknown Regions. They also glimpsed a perfect double of the Hunter on Alderaan — proof of cloning. Cardina, now a monarch, made plain that Chatni would one day have to choose a side. Chapter XVI · c. 3941 BBY · Tython", "tags": "crew, session"}, {"title": "The Crossroads", "summary": "the Jedi cradle · the path decisions · severing Dathomir On Tython , the ancient Jedi homeworld now granted to the Order, Chatni weighed her future against the counsel of Meetra, the scholar Mical , and the Zabrak master Kao Cen Darach . Her bonds, her tattoos, and the well of dark power on Dathomir", "full": "the Jedi cradle · the path decisions · severing Dathomir On Tython , the ancient Jedi homeworld now granted to the Order, Chatni weighed her future against the counsel of Meetra, the scholar Mical , and the Zabrak master Kao Cen Darach . Her bonds, her tattoos, and the well of dark power on Dathomir were all chains. She ended her master-apprentice tie to Tylo, and resolved on the hardest road: to sever herself from Dathomir entirely. The act nearly killed her and shattered her lightsaber, but Canderous — now an addict for the life she had given him, and oddly devoted — stood guard over her body until it was done. Chapter XVII · c. 3941 BBY · Csilla", "tags": "crew, session"}, {"title": "The Summit and the Impostors", "summary": "the Chiss homeworld · the Iktotchi arbiters · the doppelgänger crisis The great Summit on Csilla convened in the Chiss capital — an ice world of rigid blood-hierarchy, ringed by Chiss warships and stationed Silent Hand vessels, security so total that lightsabers were catalogued at the door. Here the", "full": "the Chiss homeworld · the Iktotchi arbiters · the doppelgänger crisis The great Summit on Csilla convened in the Chiss capital — an ice world of rigid blood-hierarchy, ringed by Chiss warships and stationed Silent Hand vessels, security so total that lightsabers were catalogued at the door. Here the Iktotchi sat as the summit's neutral arbiters , and every great power of the galaxy gathered in one place: Republic, Jedi, Mandalorians, Chiss, the corporations and banking guilds, Cardina's Alderaan, the Selkath, and the Exchange's ever-present Luxa . Chatni worked the security levels, mapping patrols and tagging the Genoharadan ships for Cressa's trap. Then the killing began. Sekan spotted a do", "tags": "crew, session"}, {"title": "The Reckoning with Jera", "summary": "the echo of Dathomir · battle meditation · the Book of Shadows Suspecting the dark-sider Jera of meddling with Dathomir, the crew lured her into a duel. From her ship Chatni wove her finest battle meditation, painting a chamber floor-to-ceiling in her own blood as a ritual focus, while Tylo, Sekan, ", "full": "the echo of Dathomir · battle meditation · the Book of Shadows Suspecting the dark-sider Jera of meddling with Dathomir, the crew lured her into a duel. From her ship Chatni wove her finest battle meditation, painting a chamber floor-to-ceiling in her own blood as a ritual focus, while Tylo, Sekan, and a now-thriving Canderous fought Jera, her pet Sith Lord Ratek , and a channeling Nightsister. They won without a scratch. Struck down, Jera spat a dying curse and an omen — \"When they return, you will be the first to die\" — and surrendered her ghost. The crew took her ship, her saber, and a copy of the Book of Shadows ; Canderous, fully alive and now Chatni's strange devotee, declared her his ", "tags": "crew, session"}, {"title": "The White Blade", "summary": "the meditations · the lightsaber reborn · holocrons · Atton Back on Tython, Chatni at last walked her own road. Two weeks of meditation in the light-side springs offered her three paths — communion, empowerment, or binding — and she chose herself: skill, knowledge, and a deeper understanding of the ", "full": "the meditations · the lightsaber reborn · holocrons · Atton Back on Tython, Chatni at last walked her own road. Two weeks of meditation in the light-side springs offered her three paths — communion, empowerment, or binding — and she chose herself: skill, knowledge, and a deeper understanding of the Force and its language, working with the Force rather than chaining it. She rebuilt her shattered weapon from the broken pieces and the ancient saber-parts she had gathered — a blade with three states, blue-eyed and pure white, that had waited thousands of years for a wielder who needed it rather than wanted it. She mastered the creation of holocrons and a portal-network few living have managed. A", "tags": "crew, session"}, {"title": "The Buried Vault", "summary": "the artificial ice-world · Soah the Infernal One · the imprisoned races · the descent Seeking materials for her holocrons, Chatni and Tylo (with Satele) made for Bel Savas , an ice world whose artificial ecosystems concealed a colossal Rakatan vault . Inside they found a handful of escaped slaves of", "full": "the artificial ice-world · Soah the Infernal One · the imprisoned races · the descent Seeking materials for her holocrons, Chatni and Tylo (with Satele) made for Bel Savas , an ice world whose artificial ecosystems concealed a colossal Rakatan vault . Inside they found a handful of escaped slaves of a race called the Gormak , hundreds of thousands more in stasis pods, and — at the bottom — the last living Rakatan emperor, Soah the Infernal One , imprisoned by his own people for experimenting on his own kind, and quietly insane after millennia of forced dreaming. He knew Revan; he held fifty-six imprisoned races and millions of individuals; and he set the crew a devil's bargain to free them. ", "tags": "crew, session"}];

he", "tags": "lore, history"}, {"title": "The Swoop Race & the Ebon Hawk", "date": "c. 3956 BBY", "summary": "Bastila is found captive of the Vulkars; Revan wins her freedom in the swoop arena, humiliating the gang leader Brejik .", "tags": "lore, history"}, {"title": "The Jedi Enclave & the First Star Map", "date": "c. 3956 BBY", "summary": "At the quiet Enclave, the Council senses Revan's potential and — concealing the truth — retrains the amnesiac as a Jedi.", "tags": "lore, history"}, {"title": "The Sand People & the Krayt Dragon", "date": "c. 3956 BBY", "summary": "On the desert world, Revan navigates the war between settlers and the Sand People, makes peace with the Tusken chieftain, and braves the Krayt Dragon's cave to claim the ", "tags": "lore, history"}, {"title": "The Wookiee Uprising & Jolee Bindo", "date": "c. 3956 BBY", "summary": "Beneath Czerka's slaving operation, Revan frees the Wookiee homeworld — restoring Zaalbar's exiled father Freyyr and casting down the treacherous chieftain Chuundar .", "tags": "lore, history"}, {"title": "The Selkath Courts & the Hrakert Rift", "date": "c. 3956 BBY", "summary": "On the neutral kolto-world, Revan threads Republic and Sith intrigue through the Selkath courts, then descends to the doomed underwater station at the Hrakert Rift, where", "tags": "lore, history"}, {"title": "The Sith Academy & the Tombs", "date": "c. 3956 BBY", "summary": "In the Valley of the Dark Lords, Revan infiltrates the Sith Academy under masters Uthar Wynn and Yuthura Ban , plundering the ancient tombs for the final Star Map fragmen", "tags": "lore, history"}, {"title": "Tylo Dara, Estranged", "date": "c. 3956 BBY", "summary": "The horrors of Malachor and the Council's blindness had left Tylo Dara partially estranged from the Order.", "tags": "lore, history"}, {"title": "The Leviathan & the Truth of Revan", "date": "c. 3956 BBY", "summary": "The Ebon Hawk is caught in the tractor beam of Malak's flagship, the Leviathan , commanded by the tives, gathering them first on the", "tags": "lore, history"}, {"title": "The Rise of the Silent Hand", "date": "c. 3941 BBY", "summary": "A populist movement under a hidden demagogue, \"The Listener,\" spreads through riot and assassination — and declares whole worlds, like Ilum, Nar Shaddaa, and the resort-w", "tags": "lore, history"}, {"title": "The New Order of the Galaxy", "date": "", "summary": "From the Csilla Summit: the Jedi Order is formally restored under Republic charter and granted the world of Tython , its ancient cradle.", "tags": "lore, history"}, {"title": "The Unexplained — What the Chronicle Omits", "date": "", "summary": "Rumor, anomaly, and absence.", "tags": "lore, history"}];

if(!STORE.cast){STORE.cast=CAST_SEED.map(c=>{const dead=/deceased/i.test(c.role||'');return Object.assign({id:uid()},c,{status:dead?'dead':(c.status||'alive')});});saveStore();}
if(!STORE.factions){STORE.factions=FAC_SEED.map(f=>Object.assign({id:uid()},f));saveStore();}
if(!STORE.records){STORE.records=[].concat(
  REC_CREW.map((r,i)=>Object.assign({id:uid(),kind:'crew',ord:i},r)),
  REC_LORE.map((r,i)=>Object.assign({id:uid(),kind:'lore',ord:i},r))
);saveStore();}

/* ---- side / status presentation ---- */
const SIDE_LABEL={pc:'PC',ally:'Ally',npc:'NPC',rival:'Rival'};
const SIDE_RANK={pc:0,ally:1,rival:2,npc:3};
const STATUS_LABEL_C={alive:'alive',dead:'dead',unknown:'unknown',captured:'captured'};
const REL_LABEL={none:'\u2014',ally:'Ally',patron:'Patron/Employer',contact:'Contact',rival:'Rival',enemy:'Enemy',owesus:'Owes us',weowe:'We owe',bond:'Bond',family:'Family',neutral:'Neutral'};
const REL_PILL={none:'',ally:'grn',patron:'acc',contact:'blu',rival:'amber',enemy:'red',owesus:'grn',weowe:'amber',bond:'vio',family:'vio',neutral:''};
function matchq(q,fields){if(!q)return true;q=String(q).toLowerCase();return fields.some(f=>String(f==null?'':f).toLowerCase().indexOf(q)>=0);}
function selOpts(map,cur){return Object.keys(map).map(k=>'<option value="'+k+'"'+(k===cur?' selected':'')+'>'+esc(map[k])+'</option>').join('');}

/* module-level view state */
let castQuery='',castSide='all',facQuery='',recQuery='',recKind='all';

/* ======================= CAST ======================= */
function buildCast(el){
 el.innerHTML='<div class="space-head"><h2>Cast</h2><div class="lede">Everyone who matters \u2014 your three player characters, the people they\u2019ve met, and the powers that move the galaxy. Pre-loaded from your Galactic Record; everything here is editable and yours.</div></div>'
 +'<div class="subnav" id="castSub"><button class="on" data-sub="people">People</button><button data-sub="factions">Factions</button></div>'
 // ---- people ----
 +'<div class="subpanel on" id="csp-people">'
  +'<div class="controls">'
   +'<div class="field" style="flex:1;min-width:160px"><span class="lab">Search</span><input type="text" id="castSearch" placeholder="name, species, role, notes\u2026"></div>'
   +'<div class="field"><span class="lab">Show</span><select id="castSideF"><option value="all">All</option><option value="pc">PCs</option><option value="ally">Allies</option><option value="npc">NPCs</option><option value="rival">Rivals</option></select></div>'
   +'<button class="btn" id="castAdd">+ Add person</button>'
  +'</div>'
  +'<div class="kept-wrap" id="castKeptWrap"></div>'
  +'<div class="cast-grid" id="castList"></div>'
 +'</div>'
 // ---- factions ----
 +'<div class="subpanel" id="csp-factions">'
  +'<div class="controls">'
   +'<div class="field" style="flex:1;min-width:160px"><span class="lab">Search</span><input type="text" id="facSearch" placeholder="faction, standing, notes\u2026"></div>'
   +'<button class="btn" id="facAdd">+ Add faction</button>'
  +'</div>'
  +'<div class="fac-grid" id="facList"></div>'
 +'</div>';

 $('castSub').onclick=e=>{const b=e.target.closest('button');if(b)switchCastSub(b.dataset.sub);};
 const cs=$('castSearch');cs.value=castQuery;cs.oninput=e=>{castQuery=e.target.value;renderCast();};
 const csf=$('castSideF');csf.value=castSide;csf.onchange=e=>{castSide=e.target.value;renderCast();};
 $('castAdd').onclick=addPerson;
 const fs=$('facSearch');fs.value=facQuery;fs.oninput=e=>{facQuery=e.target.value;renderFactions();};
 $('facAdd').onclick=addFaction;

 // delegated edits — people
 const cl=$('castList');
 cl.addEventListener('input',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(!id||!f)return;if(t.tagName==='SELECT')return;updatePerson(id,f,t.value,false);});
 cl.addEventListener('change',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(!id||!f||t.tagName!=='SELECT')return;updatePerson(id,f,t.value,true);});
 cl.addEventListener('click',e=>{const b=e.target.closest('[data-act]');if(!b)return;const id=b.dataset.id,act=b.dataset.act;
   if(act==='del'){const c=STORE.cast.find(x=>x.id===id);if(c&&!confirm('Delete '+(c.name||'this entry')+'?'))return;deletePerson(id);}
   else if(act==='combat'){castToCombat(id);}
   else if(act==='sheet'){const c=STORE.cast.find(x=>x.id===id);if(c&&c.block)downloadSheet(c.block,c.name,c.species);}
 });
 // delegated edits — factions
 const fl=$('facList');
 fl.addEventListener('input',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(!id||!f||t.tagName==='SELECT')return;updateFaction(id,f,t.value);});
 fl.addEventListener('change',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(id&&f&&t.tagName==='SELECT'){updateFaction(id,f,t.value);renderFactions();}});
 fl.addEventListener('click',e=>{const b=e.target.closest('[data-act="facdel"]');if(!b)return;const f=STORE.factions.find(x=>x.id===b.dataset.id);if(f&&!confirm('Delete '+(f.name||'this faction')+'?'))return;deleteFaction(b.dataset.id);});

 renderCastKept();renderCast();renderFactions();
}
function switchCastSub(sub){const w=$('castSub');if(!w)return;[...w.children].forEach(b=>b.classList.toggle('on',b.dataset.sub===sub));['people','factions'].forEach(s=>{const el=$('csp-'+s);if(el)el.classList.toggle('on',s===sub);});}

/* Forge -> Cast bridge: strip of kept NPCs */
function renderCastKept(){const el=$('castKeptWrap');if(!el)return;const k=STORE.kept||[];
 if(!k.length){el.innerHTML='<div class="kept-empty">No forged NPCs kept yet. Forge a stat block in the Forge and hit \uD83D\uDCCC Keep \u2014 it\u2019ll appear here to add to the cast or drop into combat.</div>';return;}
 el.innerHTML='<div class="kept-label">Forged &amp; kept <span class="muted">('+k.length+')</span> \u2014 drop into the cast, the tracker, or the sheet</div><div class="kept-strip">'+k.map(x=>
   '<span class="kept-chip"><span class="kc-name">'+esc(x.name)+'</span><span class="kc-meta">'+esc(x.arch||'')+' \u00b7 '+esc(x.tier||'')+'</span>'
   +'<button class="btn ghost mini" data-kact="combat" data-id="'+x.id+'" title="Send to Combat">\u2192 Combat</button>'
   +'<button class="btn ghost mini" data-kact="sheet" data-id="'+x.id+'" title="Download character sheet">\u2913 sheet</button>'
   +'<button class="btn mini" data-kact="cast" data-id="'+x.id+'" title="Add to cast">+ cast</button></span>').join('')+'</div>';
 el.querySelectorAll('[data-kact]').forEach(b=>b.onclick=()=>{const x=STORE.kept.find(z=>z.id===b.dataset.id);if(!x)return;const a=b.dataset.kact;
   if(a==='combat'){cbAddRows([rowFromBlock(x.name,'enemy',x.block)]);route('combat');switchCombatSub('combat');toast('Sent '+x.name+' to Combat');}
   else if(a==='sheet'){downloadSheet(x.block,x.name,x.species);}
   else if(a==='cast'){castFromKept(b.dataset.id);}
 });
}
function castFromKept(id){const x=STORE.kept.find(z=>z.id===id);if(!x)return;
 if(STORE.cast.some(c=>c.block&&c.name===x.name&&c.arch===x.arch)){toast(x.name+' is already in the cast');return;}
 STORE.cast.unshift({id:uid(),name:x.name,side:'npc',species:x.species||'',role:(x.arch||'')+(x.tier?' \u00b7 '+x.tier:''),status:'alive',notes:'',block:x.block,arch:x.arch,tier:x.tier,cp:x.cp,force:x.force});
 saveStore();switchCastSub('people');renderCast();toast('Added '+x.name+' to cast');
}
function castToCombat(id){const c=STORE.cast.find(x=>x.id===id);if(!c||!c.block)return;cbAddRows([rowFromBlock(c.name,c.side==='pc'||c.side==='ally'?'ally':'enemy',c.block)]);route('combat');switchCombatSub('combat');toast('Sent '+c.name+' to Combat');}

/* people list */
function castFiltered(){return (STORE.cast||[]).filter(c=>(castSide==='all'||c.side===castSide)&&matchq(castQuery,[c.name,c.species,c.role,c.notes,REL_LABEL[c.relationship||'none']]));}
function castCard(c){const side=c.side||'npc';const rel=c.relationship||'none';
 return '<div class="cast-card side-'+side+'" data-id="'+c.id+'">'
  +'<div class="cc-head">'
   +'<input class="cc-name" data-id="'+c.id+'" data-field="name" value="'+esc(c.name||'')+'" placeholder="name">'
   +(rel!=='none'?'<span class="pill '+(REL_PILL[rel]||'')+' mini">'+esc(REL_LABEL[rel])+'</span>':'')
   +'<select class="cc-mini" data-id="'+c.id+'" data-field="side">'+selOpts(SIDE_LABEL,side)+'</select>'
   +'<select class="cc-mini" data-id="'+c.id+'" data-field="status">'+selOpts(STATUS_LABEL_C,c.status||'alive')+'</select>'
   +'<button class="btn ghost mini" data-id="'+c.id+'" data-act="del" title="Delete">\u2715</button>'
  +'</div>'
  +'<div class="cc-row">'
   +'<input data-id="'+c.id+'" data-field="species" value="'+esc(c.species||'')+'" placeholder="species">'
   +'<input data-id="'+c.id+'" data-field="role" value="'+esc(c.role||'')+'" placeholder="role / affiliation">'
  +'</div>'
  +'<div class="cc-rel-row"><span class="cc-rl">Relationship</span><select class="cc-mini cc-relsel" data-id="'+c.id+'" data-field="relationship">'+selOpts(REL_LABEL,rel)+'</select></div>'
  +'<textarea class="cc-notes" data-id="'+c.id+'" data-field="notes" rows="2" placeholder="notes\u2026">'+esc(c.notes||'')+'</textarea>'
  +(c.block?'<div class="cc-act"><button class="btn ghost mini" data-id="'+c.id+'" data-act="combat">\u2192 Combat</button><button class="btn ghost mini" data-id="'+c.id+'" data-act="sheet">\u2913 sheet</button><span class="muted" style="font-size:11px">linked block \u00b7 '+esc(c.arch||'')+(c.tier?' \u00b7 '+esc(c.tier):'')+'</span></div>':'')
 +'</div>';
}
function renderCast(){const el=$('castList');if(!el)return;const list=castFiltered().slice().sort((a,b)=>(SIDE_RANK[a.side]-SIDE_RANK[b.side])||String(a.name||'').localeCompare(String(b.name||'')));
 const total=(STORE.cast||[]).length;const pc=(STORE.cast||[]).filter(c=>c.side==='pc').length;
 if(!list.length){el.innerHTML='<div class="kept-empty">No one matches \u2014 clear the search or filter. ('+total+' in the cast)</div>';return;}
 el.innerHTML=list.map(castCard).join('');
 const head=$('castSub');if(head&&!$('castCount')){/*noop*/}
}
function addPerson(){const c={id:uid(),name:'',side:'npc',species:'',role:'',status:'alive',relationship:'none',notes:''};STORE.cast.unshift(c);saveStore();castSide='all';castQuery='';const csf=$('castSideF');if(csf)csf.value='all';const cs=$('castSearch');if(cs)cs.value='';renderCast();const f=$('castList').querySelector('.cast-card[data-id="'+c.id+'"] .cc-name');if(f)f.focus();}
function deletePerson(id){STORE.cast=STORE.cast.filter(c=>c.id!==id);saveStore();renderCast();}
function updatePerson(id,field,val,rerender){const c=STORE.cast.find(x=>x.id===id);if(!c)return;c[field]=val;saveStore();if(rerender)renderCast();}

/* factions list */
function facFiltered(){return (STORE.factions||[]).filter(f=>matchq(facQuery,[f.name,f.standing,f.notes]));}
function facCard(f){const rel=f.relationship||'none';
 return '<div class="fac-card" data-id="'+f.id+'">'
  +'<div class="cc-head">'
   +'<input class="cc-name" data-id="'+f.id+'" data-field="name" value="'+esc(f.name||'')+'" placeholder="faction">'
   +(rel!=='none'?'<span class="pill '+(REL_PILL[rel]||'')+' mini">'+esc(REL_LABEL[rel])+'</span>':'')

  +'</div>'
  +'<input class="f-stand" data-id="'+f.id+'" data-field="standing" value="'+esc(f.standing||'')+'" placeholder="standing / status">'
  +'<div class="cc-rel-row"><span class="cc-rl">Relationship</span><select class="cc-mini cc-relsel" data-id="'+f.id+'" data-field="relationship">'+selOpts(REL_LABEL,rel)+'</select></div>'
  +'<textarea data-id="'+f.id+'" data-field="notes" rows="2" placeholder="notes\u2026">'+esc(f.notes||'')+'</textarea>'
 +'</div>';
}
function renderFactions(){const el=$('facList');if(!el)return;const list=facFiltered();const total=(STORE.factions||[]).length;
 if(!list.length){el.innerHTML='<div class="kept-empty">No factions match \u2014 clear the search. ('+total+' total)</div>';return;}
 el.innerHTML=list.map(facCard).join('');
}
function addFaction(){const f={id:uid(),name:'',standing:'',relationship:'none',notes:''};STORE.factions.unshift(f);saveStore();facQuery='';const fs=$('facSearch');if(fs)fs.value='';renderFactions();const n=$('facList').querySelector('.fac-card[data-id="'+f.id+'"] .cc-name');if(n)n.focus();}
function deleteFaction(id){STORE.factions=STORE.factions.filter(f=>f.id!==id);saveStore();renderFactions();}
function updateFaction(id,field,val){const f=STORE.factions.find(x=>x.id===id);if(!f)return;f[field]=val;saveStore();}

 +'</div>';

 $('chronSub').onclick=e=>{const b=e.target.closest('button');if(b)switchChronSub(b.dataset.sub);};
 const rs=$('recSearch');rs.value=recQuery;rs.oninput=e=>{recQuery=e.target.value;renderRecords();};
 const rkf=$('recKindF');rkf.value=recKind;rkf.onchange=e=>{recKind=e.target.value;renderRecords();};
 $('recAdd').onclick=addRecord;
 $('dataExport').onclick=exportBundle;
 $('dataMerge').onclick=()=>doImport('merge');
 $('dataReplace').onclick=()=>doImport('replace');
 $('dataDoc').onclick=generateChronicleDoc;
 const counts=recCounts();$('expNote')&&($('expNote').textContent='Currently holding '+(STORE.cast||[]).length+' people, '+(STORE.factions||[]).length+' factions, '+(STORE.threads||[]).length+' threads, '+counts.total+' records.');

 const rl=$('recList');
 rl.addEventListener('input',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(!id||!f||t.tagName==='SELECT')return;updateRecord(id,f,t.value,false);});
 rl.addEventListener('change',e=>{const t=e.target,id=t.dataset.id,f=t.dataset.field;if(!id||!f||t.tagName!=='SELECT')return;updateRecord(id,f,t.value,true);});
 rl.addEventListener('click',e=>{const b=e.target.closest('[data-act="recdel"]');if(!b)return;const r=(STORE.records||[]).find(x=>x.id===b.dataset.id);if(r&&!confirm('Delete \u201c'+(r.title||'this record')+'\u201d?'))return;deleteRecord(b.dataset.id);});

function switchChronSub(sub){const w=$('chronSub');if(!w)return;[...w.children].forEach(b=>b.classList.toggle('on',b.dataset.sub===sub));['records','data'].forEach(s=>{const el=$('chp-'+s);if(el)el.classList.toggle('on',s===sub);});}
function recCounts(){const r=STORE.records||[];return{total:r.length,crew:r.filter(x=>x.kind==='crew').length,lore:r.filter(x=>x.kind==='lore').length};}

/* records list */

function recFiltered(){return recSorted().filter(r=>(recKind==='all'||r.kind===recKind)&&matchq(recQuery,[r.title,r.summary,r.full,r.tags,r.date]));}
function recCard(r){const kindPill=r.kind==='crew'?'<span class="pill blu mini">Crew\u2019s Trail</span>':'<span class="pill vio mini">Chronicle</span>';

   +'<input class="rec-date" data-id="'+r.id+'" data-field="date" value="'+esc(r.date||'')+'" placeholder="date / session">'
   +'<button class="btn ghost mini" data-act="recdel" data-id="'+r.id+'" title="Delete">\u2715</button>'
  +'</div>'
  +'<textarea data-id="'+r.id+'" data-field="summary" rows="2" placeholder="summary\u2026">'+esc(r.summary||'')+'</textarea>'
  +'<details'+(r.full?'':'')+'><summary>Full account</summary><textarea data-id="'+r.id+'" data-field="full" rows="6" placeholder="full account\u2026" style="margin-top:6px">'+esc(r.full||'')+'</textarea></details>'
  +'<input class="rec-tags" data-id="'+r.id+'" data-field="tags" value="'+esc(r.tags||'')+'" placeholder="tags (comma-separated)">'

 el.innerHTML='<div class="rec-count">'+list.length+' shown \u00b7 '+c.total+' total</div>'+list.map(recCard).join('');

function addRecord(){const r={id:uid(),kind:'crew',ord:-Date.now(),title:'',date:'',summary:'',full:'',tags:'crew, session'};STORE.records.unshift(r);saveStore();recQuery='';recKind='all';const rs=$('recSearch');if(rs)rs.value='';const rkf=$('recKindF');if(rkf)rkf.value='all';renderRecords();const f=$('recList').querySelector('.rec-card[data-id="'+r.id+'"] .rec-title');if(f)f.focus();}
function deleteRecord(id){STORE.records=STORE.records.filter(r=>r.id!==id);saveStore();renderRecords();}
function updateRecord(id,field,val,rerender){const r=STORE.records.find(x=>x.id===id);if(!r)return;r[field]=val;saveStore();if(rerender)renderRecords();}

/* ===================== DATA: export / import / document ===================== */
function stamp(){return new Date().toISOString().slice(0,10);}
function exportBundle(){
 const bundle={_app:'KOTOR GM Console',_schema:4,_kind:'campaign-bundle',_exported:new Date().toISOString(),store:STORE};
 download('kotor_console_'+stamp()+'.json',JSON.stringify(bundle,null,2),'application/json');
 toast('Campaign bundle saved');
}
const ARR_KEYS=['kept','cast','factions','records','threads'];
function mergeArr(cur,inc){cur=Array.isArray(cur)?cur.slice():[];const idx={};cur.forEach((o,i)=>{if(o&&o.id!=null)idx[o.id]=i;});inc.forEach(o=>{if(o&&o.id!=null&&idx[o.id]!=null)cur[idx[o.id]]=o;else cur.push(o);});return cur;}
function applyImport(inc,mode){
 Object.keys(inc).forEach(k=>{
  if(ARR_KEYS.indexOf(k)>=0&&Array.isArray(inc[k])){STORE[k]=(mode==='replace')?inc[k]:mergeArr(STORE[k],inc[k]);}
  else{STORE[k]=inc[k];} // world/party/combat & scalars: take incoming
 });
 saveStore();rebuildAll();
}
function doImport(mode){
 const f=$('dataFile'),paste=$('dataPaste');
 const handle=txt=>{let data;try{data=JSON.parse(txt);}catch(err){$('impNote').textContent='Could not parse JSON: '+err.message;toast('Import failed \u2014 invalid JSON');return;}
   const inc=(data&&data.store&&typeof data.store==='object')?data.store:data;
   if(!inc||typeof inc!=='object'){$('impNote').textContent='No usable data found in that file.';return;}
   if(mode==='replace'&&!confirm('Replace EVERYTHING in this console with the imported bundle? Your current data will be overwritten.'))return;
   applyImport(inc,mode);
   const c=recCounts();$('impNote')&&($('impNote').textContent=(mode==='replace'?'Replaced. ':'Merged. ')+'Now '+(STORE.cast||[]).length+' people, '+(STORE.factions||[]).length+' factions, '+(STORE.threads||[]).length+' threads, '+c.total+' records.');
   toast(mode==='replace'?'Campaign replaced':'Campaign merged');
 };
 if(f&&f.files&&f.files[0]){const rd=new FileReader();rd.onload=()=>handle(String(rd.result));rd.onerror=()=>toast('Could not read file');rd.readAsText(f.files[0]);}
 else if(paste&&paste.value.trim()){handle(paste.value);}
 else{$('impNote').textContent='Choose a file or paste JSON first.';}
}
function rebuildAll(){const m={forge:typeof buildForge==='function'?buildForge:null,combat:typeof buildCombat==='function'?buildCombat:null,loot:typeof buildLoot==='function'?buildLoot:null,plan:typeof buildPlanner==='function'?buildPlanner:null,cast:buildCast,chron:buildChronicle};
 Object.keys(m).forEach(id=>{const el=$('sp-'+id);if(el&&m[id])m[id](el);});
 if(typeof wireKept==='function')wireKept();if(typeof renderKept==='function')renderKept();
}

/* readable standalone chronicle document */
function chronDoc(){
 const STAT={seed:'On the horizon',active:'In play',hold:'On hold',done:'Resolved'};
 const cast=(STORE.cast||[]).slice().sort((a,b)=>(SIDE_RANK[a.side]-SIDE_RANK[b.side])||String(a.name||'').localeCompare(String(b.name||'')));
 const facs=STORE.factions||[];const threads=STORE.threads||[];const recs=recSorted();
 let h='';
 h+='<h1>The Dara Dara Campaign</h1><p class="sub">Campaign chronicle \u2014 generated '+esc(new Date().toLocaleDateString())+'</p>';
 // cast
 h+='<h2>The Cast</h2>';
 ['pc','ally','rival','npc'].forEach(side=>{const g=cast.filter(c=>c.side===side);if(!g.length)return;h+='<h3>'+(side==='pc'?'Player characters':side==='ally'?'Allies':side==='rival'?'Rivals':'Notable figures')+'</h3>';
   g.forEach(c=>{var crel=(c.relationship&&c.relationship!=='none')?REL_LABEL[c.relationship]:'';h+='<div class="ce"><span class="cn">'+esc(c.name||'\u2014')+'</span> <span class="cm">'+esc([c.species,c.role,crel].filter(Boolean).join(' \u00b7 '))+(c.status&&c.status!=='alive'?' \u00b7 ['+esc(c.status)+']':'')+'</span>'+(c.notes?'<div class="cd">'+esc(c.notes)+'</div>':'')+'</div>';});
 });
 // factions
 if(facs.length){h+='<h2>Powers &amp; Factions</h2>';facs.forEach(f=>{var frel=(f.relationship&&f.relationship!=='none')?REL_LABEL[f.relationship]:'';var fm=[f.standing,frel].filter(Boolean).join(' \u00b7 ');h+='<div class="ce"><span class="cn">'+esc(f.name||'\u2014')+'</span>'+(fm?' <span class="cm">'+esc(fm)+'</span>':'')+(f.notes?'<div class="cd">'+esc(f.notes)+'</div>':'')+'</div>';});}
 // threads
 if(threads.length){h+='<h2>Open Threads</h2>';['active','seed','hold','done'].forEach(st=>{const g=threads.filter(t=>(t.status||'seed')===st);if(!g.length)return;g.forEach(t=>{h+='<div class="th"><span class="cn">'+esc(t.title||'Untitled thread')+'</span> <span class="pill">'+(STAT[st]||st)+'</span>'+(t.category?' <span class="pill">'+esc(CAT_LABEL[t.category]||t.category)+'</span>':'');var tm=[t.faction?('Faction: '+t.faction):'',t.askedBy?('Asked by: '+t.askedBy):''].filter(Boolean).join(' \u00b7 ');if(tm)h+='<div class="cm">'+esc(tm)+'</div>';if(t.situation)h+='<div class="cd">'+esc(t.situation)+'</div>';const bs=(t.beats||[]).filter(b=>b&&b.text);if(bs.length){h+='<ul>'+bs.map(b=>'<li'+(b.done?' class="done"':'')+'>'+esc(b.text)+'</li>').join('')+'</ul>';}h+='</div>';});});}
 // records
 if(recs.length){h+='<h2>The Chronicle</h2>';let last='';recs.forEach(r=>{const sec=r.kind==='crew'?'The Crew\u2019s Trail':'The Galactic Chronicle';if(sec!==last){h+='<h3>'+sec+'</h3>';last=sec;}
   h+='<div class="rec"><div class="rt">'+esc(r.title||'\u2014')+(r.date?' <span class="rd">'+esc(r.date)+'</span>':'')+'</div>';if(r.summary)h+='<p>'+esc(r.summary)+'</p>';if(r.full&&r.full!==r.summary)h+='<p class="full">'+esc(r.full)+'</p>';h+='</div>';});}
 const css='body{background:#12161d;color:#d7dde6;font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif;max-width:860px;margin:0 auto;padding:40px 24px}h1{font-size:30px;margin:0 0 2px;color:#f0f4f8}h2{font-size:22px;color:#46c8e0;border-bottom:1px solid #2a3340;padding-bottom:6px;margin:34px 0 14px}h3{font-size:16px;color:#b9c4d0;margin:20px 0 8px;text-transform:uppercase;letter-spacing:.05em}.sub{color:#7d8a99;margin:0 0 8px}.ce,.th,.rec{margin:0 0 14px}.cn,.rt{font-weight:700;color:#eef2f6}.cm,.rd{color:#8b97a6;font-size:13px}.cd,.rec p{color:#aab4c0;font-size:14px;margin:3px 0 0}.rec p.full{color:#8b97a6;font-size:13px;margin-top:6px}.th ul{margin:6px 0 0;padding-left:20px}.th li{color:#aab4c0}.th li.done{color:#5f6b78;text-decoration:line-through}.pill{font-size:11px;background:#1c2530;border:1px solid #2a3340;border-radius:20px;padding:1px 8px;color:#9aa6b4}';
 return '<!doctype html><html><head><meta charset="utf-8"><title>The Dara Dara Campaign \u2014 Chronicle</title><style>'+css+'</style></head><body>'+h+'</body></html>';
}
function generateChronicleDoc(){download('Dara_Dara_Chronicle_'+stamp()+'.html',chronDoc(),'text/html');toast('Chronicle document generated');}

document.addEventListener('click',function(e){var h=e.target.closest&&e.target.closest('.acc-head');if(!h)return;var row=h.parentNode;if(!row||row.className.indexOf('acc-row')<0)return;if(!row.querySelector('.acc-d'))return;row.classList.toggle('open');});
if(document.readyState==='loading')document.addEventListener('DOMContentLoaded',init);else init();
})();
</script>
