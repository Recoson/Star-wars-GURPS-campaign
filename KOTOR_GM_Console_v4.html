<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>KOTOR GM Console</title>
<style>
/* ============================ DESIGN SYSTEM ============================ */
:root{
  --bg:#0d1117; --bg2:#0b0e13; --panel:#151a21; --panel2:#1b222b; --raise:#212a35;
  --line:#262e38; --line2:#37434f; --faint:#52606f;
  --ink:#d8dee6; --dim:#929eac; --mute:#6b7685;
  --acc:#46c8e0; --acc-dim:#2a6e7d; --acc-bg:rgba(70,200,224,.10);
  --amber:#e0a23c; --amber-bg:rgba(224,162,60,.10);
  --red:#e0566c; --red-bg:rgba(224,86,108,.10);
  --grn:#5fc98a; --grn-bg:rgba(95,201,138,.10);
  --vio:#b58cf0;
  --mono:ui-monospace,"SF Mono",Menlo,Consolas,"Roboto Mono",monospace;
  --sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --r:9px; --r2:6px; --sp:14px;
}
*{box-sizing:border-box;}
html,body{margin:0;padding:0;}
body{background:var(--bg);color:var(--ink);font:14px/1.5 var(--sans);-webkit-text-size-adjust:100%;}
::selection{background:var(--acc-dim);color:#fff;}
::-webkit-scrollbar{width:10px;height:10px;}
::-webkit-scrollbar-thumb{background:var(--line2);border-radius:6px;}
::-webkit-scrollbar-track{background:transparent;}
a{color:var(--acc);}
h1,h2,h3{margin:0;font-weight:650;}
button,input,select,textarea{font-family:inherit;color:inherit;}
input,select,textarea{background:var(--bg2);border:1px solid var(--line2);color:var(--ink);border-radius:var(--r2);padding:6px 8px;font-size:13px;}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--acc);box-shadow:0 0 0 2px var(--acc-bg);}
textarea{width:100%;min-height:54px;resize:vertical;line-height:1.45;}
select{cursor:pointer;}
.mono{font-family:var(--mono);}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line2);background:var(--panel2);color:var(--ink);
  border-radius:var(--r2);padding:7px 12px;font-size:13px;font-weight:550;cursor:pointer;transition:border-color .12s,background .12s;}
.btn:hover{border-color:var(--acc);background:var(--raise);}
.btn.primary{background:var(--acc);border-color:var(--acc);color:#06222a;font-weight:650;}
.btn.primary:hover{filter:brightness(1.08);}
.btn.ghost{background:transparent;}
.btn.mini{padding:3px 8px;font-size:12px;border-radius:5px;}
.btn.danger{color:var(--red);border-color:transparent;background:transparent;}
.btn.danger:hover{background:var(--red-bg);border-color:var(--red);}

/* ============================ APP LAYOUT ============================ */
.app{max-width:1180px;margin:0 auto;padding:0 16px 80px;}
.top{position:sticky;top:0;z-index:30;background:linear-gradient(var(--bg),var(--bg) 70%,transparent);padding:14px 0 0;}
.brandrow{display:flex;align-items:baseline;gap:12px;flex-wrap:wrap;padding-bottom:10px;}
.brand{font-size:18px;font-weight:700;letter-spacing:.2px;}
.brand .b-accent{color:var(--acc);}
.brand-sub{font-family:var(--mono);font-size:11px;color:var(--mute);}
.savedot{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--faint);}

/* top nav of the 6 spaces */
.nav{display:flex;gap:2px;border-bottom:1px solid var(--line);overflow-x:auto;scrollbar-width:none;}
.nav::-webkit-scrollbar{display:none;}
.nav button{position:relative;background:transparent;border:none;color:var(--dim);padding:10px 14px 11px;font-size:13.5px;font-weight:550;
  cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;margin-bottom:-1px;border-radius:0;}
.nav button:hover{color:var(--ink);}
.nav button.on{color:var(--ink);border-bottom-color:var(--acc);}
.nav button .ico{margin-right:6px;opacity:.85;font-size:13px;}

/* spaces */
.space{display:none;padding-top:18px;animation:fade .18s ease;}
.space.on{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(3px);}to{opacity:1;transform:none;}}
.space-head{margin-bottom:14px;}
.space-head h2{font-size:16px;}
.space-head .lede{color:var(--dim);font-size:13px;margin-top:3px;max-width:70ch;}

/* ============================ COMPONENTS ============================ */
.controls{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end;margin-bottom:16px;}
.field{display:flex;flex-direction:column;gap:4px;}
.field>.lab{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);}
.field select,.field input{min-width:150px;}

.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
.muted{color:var(--mute);}
.empty{color:var(--mute);font-size:13px;padding:14px;border:1px dashed var(--line2);border-radius:var(--r);text-align:center;}

/* pills */
.pill{display:inline-flex;align-items:center;gap:4px;font-family:var(--mono);font-size:11px;font-weight:600;
  padding:2px 7px;border-radius:20px;background:var(--raise);color:var(--dim);border:1px solid var(--line);white-space:nowrap;}
.pill.acc{background:var(--acc-bg);color:var(--acc);border-color:transparent;}
.pill.amber{background:var(--amber-bg);color:var(--amber);border-color:transparent;}
.pill.red{background:var(--red-bg);color:var(--red);border-color:transparent;}
.pill.grn{background:var(--grn-bg);color:var(--grn);border-color:transparent;}
.pill.vio{background:rgba(181,140,240,.12);color:var(--vio);border-color:transparent;}

/* the stat-block card */
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--r);overflow:hidden;}
.card .chead{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:13px 15px;background:linear-gradient(180deg,var(--panel2),var(--panel));border-bottom:1px solid var(--line);}
.card .ctitle{font-size:16px;font-weight:700;}
.card .cmeta{display:flex;gap:6px;flex-wrap:wrap;margin-left:auto;}
.card .cbody{padding:14px 15px;}

/* stat grid */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(58px,1fr));gap:1px;background:var(--line);border:1px solid var(--line);border-radius:var(--r2);overflow:hidden;margin-bottom:14px;}
.sg .st{background:var(--bg2);padding:7px 4px 6px;text-align:center;}
.sg .st .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.05em;color:var(--mute);text-transform:uppercase;}
.sg .st .n{font-family:var(--mono);font-size:17px;font-weight:650;line-height:1.15;margin-top:1px;}
.sg .st.hi{background:var(--acc-bg);}
.sg .st.hi .n{color:var(--acc);}
.sg .st.dim .n{color:var(--faint);}

/* sections */
.sec{padding:9px 0;border-top:1px solid var(--line);}
.sec:first-child{border-top:none;}
.sec .sec-k{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--mute);margin-bottom:4px;}
.sec .sec-v{font-size:13.5px;line-height:1.6;}
.sec .sec-v .tag{color:var(--dim);}

/* weapon lines */
.wpn{font-family:var(--mono);font-size:12.5px;padding:2px 0;}
.wpn .wn{color:var(--ink);font-weight:600;}
.wpn .wd{color:var(--amber);}
.wpn .wx{color:var(--dim);}

/* force powers */
.pows{display:flex;flex-wrap:wrap;gap:5px;}
.pow{font-family:var(--mono);font-size:11.5px;padding:2px 8px;border-radius:5px;background:var(--raise);border:1px solid var(--line);}
.pow.dark{background:var(--red-bg);border-color:transparent;color:#f0a9b6;}
.pow.dark::before{content:"\25C6 ";color:var(--red);}

/* house-rule + advisory flags */
.flag{display:flex;gap:9px;align-items:flex-start;padding:9px 12px;border-radius:var(--r2);margin:10px 0;font-size:13px;line-height:1.5;border-left:3px solid var(--faint);background:var(--raise);}
.flag .fi{font-size:14px;line-height:1.3;flex:0 0 auto;}
.flag.amber{border-left-color:var(--amber);background:var(--amber-bg);}
.flag.red{border-left-color:var(--red);background:var(--red-bg);}
.flag .fk{font-weight:650;}
.flag.amber .fk{color:var(--amber);}
.flag.red .fk{color:#f0a9b6;}

/* placeholder spaces (features migrating in later passes) */
.placeholder{border:1px dashed var(--line2);border-radius:var(--r);padding:26px 22px;background:var(--panel);}
.placeholder h3{font-size:15px;margin-bottom:6px;}
.placeholder p{color:var(--dim);margin:6px 0;max-width:68ch;}
.placeholder .plist{margin:10px 0 0;padding:0;list-style:none;}
.placeholder .plist li{padding:4px 0 4px 20px;position:relative;color:var(--dim);font-size:13px;}
.placeholder .plist li::before{content:"→";position:absolute;left:0;color:var(--acc);}
.placeholder .tagline{font-family:var(--mono);font-size:11px;color:var(--mute);margin-top:14px;}

/* pass 2 — forge actions + kept roster */
.pill.mini{font-size:10px;padding:1px 6px;}
.fg-actions{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;}
.kept-wrap{margin-top:22px;}
.kept-head{font-family:var(--mono);font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);padding:0 2px 8px;border-bottom:1px solid var(--line);margin-bottom:8px;}
.kept-row{border:1px solid var(--line);border-radius:var(--r2);margin-bottom:7px;background:var(--panel);overflow:hidden;}
.kept-row .kr-main{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 12px;cursor:pointer;}
.kept-row .kr-main:hover{background:var(--panel2);}
.kept-row .kr-name{font-weight:600;font-size:14px;}
.kept-row .kr-meta{font-family:var(--mono);font-size:11.5px;color:var(--mute);}
.kept-row .kr-acts{display:flex;gap:6px;margin-left:auto;}
.kept-row .kr-acts .btn{padding:3px 9px;font-size:11.5px;}
.kept-row .kr-detail:not(:empty){padding:0 12px 12px;border-top:1px solid var(--line);}
.kept-row .kr-detail .card{border:none;background:transparent;}
.kept-row .kr-detail .card .chead{background:transparent;padding-left:0;padding-right:0;}
.kept-row .kr-detail .card .cbody{padding-left:0;padding-right:0;}

/* pass 3 — loot & gear */
.subnav{display:inline-flex;gap:2px;background:var(--bg2);border:1px solid var(--line);border-radius:8px;padding:3px;margin-bottom:16px;}
.subnav button{background:transparent;border:none;color:var(--dim);padding:6px 14px;font-size:13px;font-weight:550;border-radius:6px;cursor:pointer;}
.subnav button:hover{color:var(--ink);}
.subnav button.on{background:var(--raise);color:var(--ink);}
.subpanel{display:none;}
.subpanel.on{display:block;}
#rwOut .card,#shopOut .card,#benchOut .card{margin-bottom:12px;}
.litem{display:flex;align-items:baseline;gap:10px;padding:6px 0;border-top:1px solid var(--line);font-size:13.5px;}
.litem:first-child{border-top:none;}
.litem .li-name{font-weight:550;}
.litem .li-meta{font-family:var(--mono);font-size:12px;color:var(--mute);flex:1;}
.litem .li-tag{font-family:var(--mono);font-size:10px;padding:1px 6px;border-radius:4px;background:var(--raise);color:var(--dim);border:1px solid var(--line);}
.litem .li-price{font-family:var(--mono);font-size:13px;color:var(--amber);white-space:nowrap;}
.kvline{display:flex;gap:10px;padding:5px 0;font-size:13px;}
.kvline .kvk{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);min-width:88px;padding-top:2px;}
.kvline .kvv{flex:1;color:var(--ink);}
.bench-mods{margin:6px 0 14px;}
.bench-mods .bmhd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:6px;}
.bmod{display:flex;align-items:center;gap:10px;padding:6px 9px;border:1px solid var(--line);border-radius:6px;margin-bottom:5px;cursor:pointer;}
.bmod:hover{border-color:var(--line2);}
.bmod input{flex:0 0 auto;accent-color:var(--acc);}
.bmod .bm-n{font-weight:550;font-size:13px;}
.bmod .bm-fx{color:var(--dim);font-size:12.5px;flex:1;}
.bmod .bm-c{font-family:var(--mono);font-size:12px;color:var(--amber);white-space:nowrap;}
.bench-cmp{font-family:var(--mono);font-size:12.5px;margin:2px 0;}
.bench-cmp .bc-row{display:flex;gap:10px;padding:3px 0;}
.bench-cmp .bc-k{color:var(--mute);min-width:74px;}
.bench-cmp .bc-row.mod .bc-v{color:var(--acc);}
.bench-riders{font-size:12.5px;color:var(--dim);margin-top:7px;}
.bench-cost{display:flex;justify-content:space-between;border-top:1px solid var(--line);margin-top:9px;padding-top:9px;font-family:var(--mono);font-size:13px;}
.bench-cost .bc-total{color:var(--amber);font-weight:650;}

/* pass 4 — encounter & combat */
.party-box{border:1px solid var(--line);border-radius:var(--r);padding:11px 14px 13px;margin-bottom:16px;background:var(--panel);}
.party-box .pb-hd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin-bottom:10px;}
.party-row{display:flex;gap:16px;flex-wrap:wrap;align-items:flex-end;}
.cap-toggles{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.cap{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border:1px solid var(--line2);border-radius:20px;font-size:12.5px;cursor:pointer;color:var(--dim);user-select:none;}
.cap input{accent-color:var(--acc);margin:0;}
.cap.on{background:var(--acc-bg);border-color:transparent;color:var(--acc);}
.enc-line{display:flex;align-items:center;gap:10px;padding:7px 12px;border:1px solid var(--line);border-radius:6px;margin-bottom:6px;font-size:13.5px;}
.enc-line .el-count{font-family:var(--mono);color:var(--acc);font-weight:650;}
.enc-line .el-rm{margin-left:auto;}
.swing{border:1px solid var(--line);border-radius:var(--r);padding:2px 14px 13px;margin:14px 0;background:var(--panel);}
.swing .sw-hd{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);padding:12px 0 4px;}
.flag.note{border-left-color:var(--acc-dim);background:var(--raise);}
.flag.note .fk{color:var(--ink);}
.enc-units{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:10px;margin-top:6px;}
.enc-unit{border:1px solid var(--line);border-radius:var(--r2);padding:9px 12px;background:var(--panel);}
.enc-unit .eu-name{font-weight:600;font-size:13.5px;}
.enc-unit .eu-meta{font-family:var(--mono);font-size:11px;color:var(--mute);margin:3px 0 6px;}
.enc-unit .eu-line{font-family:var(--mono);font-size:11.5px;color:var(--dim);line-height:1.4;}
.cb-top{display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-bottom:14px;}
.cb-round{font-family:var(--mono);font-size:15px;font-weight:650;color:var(--acc);margin-right:6px;}
.cbrow{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 12px;border:1px solid var(--line);border-radius:var(--r2);margin-bottom:6px;background:var(--panel);}
.cbrow.active{border-color:var(--acc);box-shadow:0 0 0 1px var(--acc-bg);background:linear-gradient(90deg,var(--acc-bg),transparent 60%);}
.cbrow .cb-init{font-family:var(--mono);font-size:16px;font-weight:650;min-width:36px;text-align:center;}
.cbrow .cb-init .il{display:block;font-size:8px;color:var(--mute);letter-spacing:.05em;font-weight:500;}
.cbrow .cb-id{min-width:140px;display:flex;flex-direction:column;gap:1px;}
.cbrow .cb-name-in{font-weight:600;font-size:13.5px;padding:2px 5px;border-color:transparent;background:transparent;}
.cbrow .cb-name-in:hover,.cbrow .cb-name-in:focus{border-color:var(--line2);background:var(--bg2);}
.cbrow .cb-arch{font-family:var(--mono);font-size:10.5px;color:var(--mute);padding-left:5px;}
.cb-side-in{padding:3px 6px;font-size:11px;}
.cb-hp{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:13px;}
.cb-hp .dmgin{width:44px;padding:3px 5px;text-align:center;}
.cb-hp .hpv{min-width:60px;text-align:center;font-weight:600;}
.cb-hp .hpv.hurt{color:var(--amber);}
.cb-hp .hpv.down{color:var(--red);}
.cb-def{font-family:var(--mono);font-size:11px;color:var(--dim);min-width:150px;}
.cb-conds{display:flex;gap:4px;flex-wrap:wrap;align-items:center;flex:1;}
.cb-conds .addcond{padding:2px 5px;font-size:11px;color:var(--mute);}
.badge{font-family:var(--mono);font-size:9.5px;padding:1px 6px;border-radius:4px;text-transform:uppercase;letter-spacing:.04em;}
.cond{font-family:var(--mono);font-size:10.5px;padding:2px 8px;border-radius:10px;background:var(--amber-bg);color:var(--amber);cursor:pointer;}
.cond:hover{filter:brightness(1.15);}
.cb-row-rm{margin-left:auto;}

/* pass 5 — planner */
.planhd{font-family:var(--mono);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--mute);margin:10px 0 6px;}
.planhd:first-child{margin-top:4px;}
.planline{display:flex;align-items:center;gap:9px;padding:7px 11px;border:1px solid var(--line);border-radius:6px;margin-bottom:5px;cursor:pointer;font-size:13.5px;}
.planline:hover{border-color:var(--acc);background:var(--panel2);}
.planline .pl-t{font-weight:600;}
.planline .pl-arrow{color:var(--mute);}
.planline .pl-next{color:var(--dim);flex:1;font-size:13px;}
.session-card{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:4px 14px 12px;margin-bottom:18px;}
.thread{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);margin-bottom:9px;overflow:hidden;}
.th-head{display:flex;align-items:center;gap:9px;flex-wrap:wrap;padding:9px 12px;}
.th-head .th-title{flex:1 1 200px;font-weight:600;padding:4px 7px;border-color:transparent;background:transparent;font-size:14px;}
.th-head .th-title:hover,.th-head .th-title:focus{border-color:var(--line2);background:var(--bg2);}
.th-prog{font-family:var(--mono);font-size:11px;color:var(--mute);}
.th-body{display:none;padding:4px 12px 13px;border-top:1px solid var(--line);}
.thread.open .th-body{display:block;}
.th-grid{display:flex;gap:10px;flex-wrap:wrap;margin:9px 0;}
.fldv{display:flex;flex-direction:column;gap:4px;flex:1 1 160px;}
.fldv>.lab{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--mute);}
.fldv.full{flex-basis:100%;}
.beats{margin:3px 0;}
.beat{display:flex;align-items:center;gap:8px;padding:3px 0;}
.beat input[type=checkbox]{accent-color:var(--acc);flex:0 0 auto;}
.beat .beat-tx{flex:1;padding:4px 7px;font-size:13px;}
.beat .beat-tx.done{text-decoration:line-through;color:var(--mute);}
.pill.blu{background:rgba(70,200,224,.10);color:var(--acc);border-color:transparent;}
.suggest{border:1px dashed var(--acc-dim);border-radius:6px;background:var(--acc-bg);padding:9px 11px;margin:9px 0 2px;}
.suggest .sg-lab{font-family:var(--mono);font-size:10px;letter-spacing:.05em;text-transform:uppercase;color:var(--acc);margin-bottom:5px;}
.suggest .sg-text{font-size:13.5px;line-height:1.55;margin-bottom:9px;color:var(--ink);}
.world-box{border:1px solid var(--line);border-radius:var(--r);background:var(--panel);padding:11px 14px 13px;margin-bottom:16px;}
.world-box summary{font-family:var(--mono);font-size:11px;letter-spacing:.05em;text-transform:uppercase;color:var(--dim);cursor:pointer;list-style:none;}
.world-box summary::-webkit-details-marker{display:none;}
.world-box summary::before{content:"\25B8 ";color:var(--acc);}
.world-box[open] summary::before{content:"\25BE ";}
.world-box .wb-hint{color:var(--mute);font-size:12px;margin:8px 0 2px;}
.world-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:10px;}
.world-grid .fldv textarea{min-height:58px;}
@media(max-width:640px){.world-grid{grid-template-columns:1fr;}}
/* ===== Pass 6 — Cast + Chronicle ===== */
.cast-grid,.fac-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:10px;margin-top:4px}
.cast-card,.fac-card,.rec-card{background:var(--panel2);border:1px solid var(--line);border-left:3px solid var(--line2);border-radius:8px;padding:10px 12px}
.cast-card.side-pc{border-left-color:var(--grn)}
.cast-card.side-ally{border-left-color:var(--acc)}
.cast-card.side-rival{border-left-color:var(--red)}
.cast-card.side-npc{border-left-color:var(--line2)}
.cc-head{display:flex;align-items:center;gap:7px;margin-bottom:6px}
.cc-name,.rec-title{flex:1;min-width:0;font-weight:600;font-size:14px;color:var(--ink);background:transparent;border:none;border-bottom:1px solid transparent;padding:2px 0}
.cc-mini,.rec-head select{background:var(--panel);color:var(--dim);border:1px solid var(--line);border-radius:5px;font-size:11px;padding:2px 3px}

centrate maneuver). 6d(2) burn — Armour Divisor 2 HALVES the target's DR; damage ÷2 per hex out. No fragments; strong hits cause knockback. 3-m burst.","brand":"BlasTech","type":"High Explosive"},{"name":"Thermal detonator","cat":"Explosive","dmg":"6d×3(2) burn ex","wt":"0.5","cost":"6,000","lc":"Illegal","notes":"Baradium fusion device — used by many factions, not Mandalorians alone. Thrown (~ST×3 m) or placed; adjustable 0–10-sec timer. UNLIKE most grenades it can detonate the instant it leaves your hand, with no end-of-turn delay. 6d×3(2) burn (~63 avg) at the hex, AD 2; damage ÷2 per hex, lethal several m out. 4-m burst. Tightly controlled / illegal.","brand":"Mandalorian","type":"High Explosive"},{"name":"Ion grenade","cat":"Explosive","dmg":"6d(5) ion ex (droids/cyborgs)","wt":"0.5","cost":"750","lc":"Res","notes":"Arakyd anti-droid / electronics burst. Thrown (~ST×3 m). Fixed 2-sec fuse (ion capacitors must spin up) — it CANNOT be set down to 1 second. 6d(5) ion — AD 5 tears through droid/cyborg/powered-armour DR and overloads electronics; near-harmless to organics. Damage ÷2 per hex. 3-m radius. Disables, doesn't kill flesh.","brand":"Arakyd","type":"Ion / EMP"},{"name":"Cryoban grenade","cat":"Explosive","dmg":"4d(1) cr + slow","wt":"0.5","cost":"900","lc":"Res","notes":"Freezing coolant burst. Thrown (~ST×3 m). Fixed 2-sec fuse (cryo-coolant release is not instant) — it CANNOT be set down to 1 second. 4d(1) cr at the hex, ÷2 per hex. Any penetrating hit halves the target's Move for 1d turns (HT negates the slow); a strong hit can freeze a limb or pin them. 3-m radius. Non-lethal control.","brand":"Czerka","type":"Cryo / Stasis"},{"name":"Sonic grenade","cat":"Explosive","dmg":"5d(0.5) son ex + HT-3 stun","wt":"0.5","cost":"1,200","lc":"Res","notes":"Sonic shock in a wide radius. Thrown (~ST×3 m). Fixed 2-sec fuse (resonator must charge) — it CANNOT be set down to 1 second. 5d sonic, AD 0.5 — DOUBLED physical DR resists it, but it bypasses energy shields. Everyone in the radius also rolls HT-3 or is stunned 1d turns and deafened. Damage ÷2 per hex. 4-m radius.","brand":"SoroSuub","type":"Sonic"},{"name":"Flash-bang (flashbang)","cat":"Explosive","dmg":"HT-4 aff (blind+deaf 1d turns)","wt":"0.5","cost":"300","lc":"Res","notes":"Non-lethal breaching charge. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Everyone within 4 m who can see or hear it rolls HT-4; failure = BLINDED and deafened for 1d turns, −5 to all actions even on success for 1 turn. No real damage. 4-m radius.","brand":"Merr-Sonn","type":"Stun / Flash"},{"name":"Gas grenade (acid/corrosive)","cat":"Explosive","dmg":"3d cor/turn cloud","wt":"0.5","cost":"1,200","lc":"Illegal","notes":"Corrosive aerosol. Thrown (~ST×3 m). Fixed 2–3-sec fuse (the canister must rupture and disperse) — it CANNOT be set down to 1 second. Lays a 4-m cloud that lingers ~1d turns (drift with wind); anyone inside takes 3d corrosion per turn (ignores energy shields, eats armour). No knockback. 4-m cloud.","brand":"Exchange","type":"Gas / Chemical"},{"name":"Incendiary grenade","cat":"Explosive","dmg":"4d burn ex + fire field","wt":"0.5","cost":"750","lc":"Mil","notes":"Adhesive-gel firebomb. Thrown (~ST×3 m). Fixed 2-sec fuse (the gel must ignite) — it CANNOT be set down to 1 second. 4d burn at the hex, ÷2 per hex, then leaves a 3-m fire field burning 1d cu/turn for 1d turns; clings and is hard to put out. 3-m field.","brand":"Merr-Sonn","type":"Incendiary"},{"name":"Plasma/thermal charge (placed)","cat":"Explosive","dmg":"6d×4(3) burn ex","wt":"1","cost":"1,500","lc":"Mil","notes":"Breaching/demolition charge — placed, not thrown. Fixed 3-sec minimum arming fuse (it is a placed charge) — it CANNOT be set down to 1 second. or remote/timer. 6d×4(3) burn (~84 avg), AD 3; flattens doors, droids and walls. Damage ÷2 per hex. 5-m burst.","brand":"Republic","type":"High Explosive"},{"name":"Proximity mine","cat":"Explosive","dmg":"6d×2(2) cr ex","wt":"1","cost":"1,200","lc":"Mil","notes":"Pressure/motion-triggered anti-personnel mine. Set (Traps skill); detonates the instant a target enters its trigger hex — no fuse delay. 6d×2(2) cr (~42 avg), AD 2; damage ÷2 per hex; heavy knockback. 3-m burst.","brand":"Locris","type":"Fragmentation"},{"name":"Magnetic limpet mine","cat":"Explosive","dmg":"6d×3(3) burn ex","wt":"1.5","cost":"1,800","lc":"Mil","notes":"Magnetic anti-vehicle/anti-droid charge — clamps to hull or plating. Fixed 2-sec minimum fuse (magnetic seat + arming) — it CANNOT be set down to 1 second. or remote. 6d×3(3) burn (~63 avg), AD 3; shaped toward the surface. Damage ÷2 per hex. 3-m burst.","brand":"Locris","type":"High Explosive"},{"name":"Plasma mine (anti-droid)","cat":"Explosive","dmg":"6d(5) ion ex","wt":"1","cost":"1,400","lc":"Res","notes":"Anti-droid mine. Set (Traps); triggers instantly on a droid/powered target entering. 6d(5) ion, AD 5 — shreds droid/cyborg DR and electronics, near-harmless to flesh. Damage ÷2 per hex. 3-m radius.","brand":"Locris","type":"High Explosive"},{"name":"Adhesive grenade (glop)","cat":"Explosive","dmg":"Adhesive — root (no damage)","wt":"0.5","cost":"500","lc":"Res","notes":"Locris Syndicate glop bomb. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Sprays fast-setting polymer over a 3-m radius; everyone caught rolls HT or is ROOTED (Move 0, −4 DX) for 1d turns — a strong failure glues them fully helpless. Burns, blades or solvent free a victim. 3-m radius. Non-lethal control.","brand":"Locris","type":"Special / Utility"},{"name":"Stun grenade","cat":"Explosive","dmg":"HT-4 aff (stun 1d turns)","wt":"0.5","cost":"450","lc":"Res","notes":"BlasTech stun bomb — neural-shock, less flash than a flashbang. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Everyone within 3 m rolls HT-4 or is STUNNED 1d turns (knocked down on a bad failure). Harmless to droids. 3-m radius. Non-lethal.","brand":"BlasTech","type":"Stun / Flash"},{"name":"Concussion grenade","cat":"Explosive","dmg":"5d cr ex (knockback)","wt":"0.5","cost":"700","lc":"Mil","notes":"Merr-Sonn pure-kinetic concussion — overpressure, no fragments. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 5d cr at the hex, ÷2 per hex; very strong knockback (≈1 m per full ST−2 of damage rolled) and a HT-2 roll or be knocked down. 3-m burst.","brand":"Merr-Sonn","type":"Fragmentation"},{"name":"Smoke grenade","cat":"Explosive","dmg":"Concealment cloud (no damage)","wt":"0.5","cost":"200","lc":"—","notes":"Screening smoke (optical + IR baffling variants sold). Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Fills a 4-m cloud that lasts 2d turns (drifts with wind): −6 to hit anything through it and blocks line of sight; thermal-smoke models also defeat infrared/sensors. 4-m cloud. No damage.","brand":"BlasTech","type":"Special / Utility"},{"name":"EMP grenade","cat":"Explosive","dmg":"HT-6 vs electronics; drops shields","wt":"0.5","cost":"800","lc":"Res","notes":"Arakyd electromagnetic-pulse bomb — targets systems, not bodies. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Within 3 m: personal energy shields COLLAPSE, droids and powered devices roll HT-6 or shut down 1d turns, comms and sensors scramble. Near-harmless to unarmoured flesh. 3-m radius.","brand":"Arakyd","type":"Ion / EMP"},{"name":"Bioplague grenade (rakghoul)","cat":"Explosive","dmg":"3d tox/turn cloud + disease","wt":"0.5","cost":"2,500","lc":"Illegal","notes":"Sith bio-canister — weeping, infectious ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). Within 3 m any personal energy shield COLLAPSES instantly, plus 3d(5) ion to droids/electronics. Light effect on flesh. 3-m radius.","brand":"Republic","type":"Ion / EMP"},{"name":"Mandalorian shrapnel charge","cat":"Explosive","brand":"Mandalorian","dmg":"6d(1) cr ex + [3d] frag","wt":"0.5","cost":"650","lc":"Mil","notes":"Clan-forged anti-personnel charge — beskar-fleck shrapnel. Thrown (~ST×3 m). 1-sec fuse — it goes off at the end of this turn cycle (it resolves after everyone has acted, like a Concentrate maneuver). 6d(1) cr at the hex, ÷2 per hex, PLUS [3d] cutting fragments out to ~6 m that ignore energy shields. 3-m burst.","type":"Fragmentation"},{"name":"Conqueror breaching charge","cat":"Explosive","brand":"Mandalorian","dmg":"6d×3(3) cr ex","wt":"1.5","cost":"1,600","lc":"Mil","notes":"Mandalorian shaped demolition charge — placed, not thrown. Fixed 3-sec arming fuse (it is a placed charge) — it CANNOT be set down to 1 second. 6d×3(3) cr (~63 avg), AD 3; cracks blast doors, walls and heavy droids. ÷2 per hex. 4-m burst.","type":"High Explosive"},{"name":"Sith poison canister","cat":"Explosive","brand":"Sith Empire","dmg":"3d tox/turn cloud + fear","wt":"0.5","cost":"2,400","lc":"Illegal","notes":"Sith alchemical toxin. Thrown (~ST×3 m). Fixed 2–3-sec fuse (the canister must rupture and aerosolise) — it CANNOT be set down to 1 second. 4-m cloud lingering 1d turns: 3d toxic/turn (ignores energy shields), and anyone inside rolls HT-3 or is gripped by supernatural FEAR (−3, may flee). 4-m cloud. Vile, illegal.","type":"Gas / Chemical"},{"name":"Interdiction grenade (Sith)","cat":"Explosive","brand":"Sith Empire","dmg":"2d burn + Force-suppression","wt":"0.5","cost":"3,000","lc":"Illegal","notes":"Sith anti-Force device — a stuttering null-pulse. Thrown (~ST×3 m). Fixed 2-sec fuse (the field must charge) — it CANNOT be set down als 3d+6 HP over 3 turns (~17 avg). Using one is your FULL daily kolto saturation — it locks out any other kolto/bacta that day. Won't fix crippling wounds.","wt":"1.5","cost":"4,800","lc":"Mil","notes":"Issue-grade trauma pack. Republic & Mandalorian forces.","brand":"Republic"},{"name":"Stim Pack","cat":"Medical","effect":"Combat stimulant; inject as a Ready action. +2 ST and +2 HT for 1 hour. When it wears off you lose 2 FP (the crash). Doesn't stack with another stim already running.","wt":"0.25","cost":"450","lc":"Res","notes":"Battlefield combat enhancer. Crash after.","brand":"Czerka"},{"name":"Anti-Rad Tabs","cat":"Medical","effect":"Swallow one tab: +5 to HT rolls vs radiation for 1 hour. One use; a second tab doesn't stack the bonus, just refreshes the hour.","wt":"0.1","cost":"150","lc":"—","notes":"Common adventurer kit. Consumable.","brand":"Czerka"},{"name":"Antitox Injector","cat":"Medical","effect":"Inject as a Ready action: +3 to HT vs ingested/injected poison for 1 hour, AND one dose immediately neutralises a single known toxin already in you. One use per injector.","wt":"0.25","cost":"360","lc":"—","notes":"Standard medkit supplement.","brand":"Czerka"},{"name":"Medical Kit (field)","cat":"Medical","effect":"Reusable surgical/diagnostic kit: +2 to First Aid, Physician and Diagnosis rolls. Holds ~5 uses of consumables before it needs restocking. Required to do anything past improvised First Aid.","wt":"3","cost":"900","lc":"—","notes":"The medic's working kit.","brand":"Czerka"},{"name":"Comlink","cat":"Comms","effect":"Pocket radio: clear voice/data to orbit, or dozens of km on the ground (planet-wide with a relay or orbital booster). To eavesdrop, a listener must win a Cryptography contest (military models give +2 to resist). Battery lasts weeks.","wt":"0.2","cost":"150","lc":"—","notes":"Ubiquitous. Military models +Crypto.","brand":"SoroSuub"},{"name":"Macrobinoculars","cat":"Sensor","effect":"Hold to the eyes (Ready): cancels the −2 to −5 ranged/Vision penalty for distance when spotting or aiming. Multi-spectrum (IR/UV/thermal), clear detail out to several km. No use closer than ~10 m.","wt":"1","cost":"750","lc":"—","notes":"Useless inside minimum range.","brand":"Arakyd"},{"name":"Sensor Scanner (handheld)","cat":"Sensor","effect":"One sweep = 1 turn (Electronics Operation/Sensors): detects life, metal or energy in one direction out to ~120 m. On a margin of 3+ it pinpoints something hidden or cloaked.","wt":"1","cost":"1,200","lc":"—","notes":"Scan takes a few seconds per sweep.","brand":"Arakyd"},{"name":"Datapad","cat":"Tech","effect":"Pocket computer: data storage, runs Computer Operation tasks, hosts a slicer kit. With the right software, +2 to one relevant tech roll. Everyone in the galaxy carries one.","wt":"0.5","cost":"300","lc":"—","notes":"Everyone carries one.","brand":"SoroSuub"},{"name":"Holoprojector / Recorder","cat":"Tech","effect":"Records hours of holo (sight + sound) and replays it as a 3-D image, or transmits a live holo-feed through a linked comlink. For messages, evidence and briefings.","wt":"0.5","cost":"450","lc":"—","notes":"Evidence, messages, briefings.","brand":"SoroSuub"},{"name":"Stealth Field Generator","cat":"Stealth","effect":"Switch on (Ready): +6 to Stealth (Vision) while moving at half Move or less; near-invisible while still. A critical observer roll catches the shimmer. ~6 minutes of runtime per charge; it drops the instant you attack.","wt":"2","cost":"4,500","lc":"Mil","notes":"Power-hungry; minutes of runtime.","brand":"Bothan Spynet"},{"name":"Security Kit (slicer)","cat":"Tech","effect":"+3 to Lockpicking and Computer Hacking against electronic locks, plus mechanical bypass picks. Without it you slice/pick at −5 (improvising).","wt":"1","cost":"1,100","lc":"Res","notes":"The infiltrator's toolkit.","brand":"Locris"},{"name":"Fusioncutter / Cutting Torch","cat":"Tool","effect":"Cuts a typical door or restraint in ~30 sec, a bulkhead in minutes (much slower vs const tagify=s=>esc(s).replace(/\u00b7/g,'<span class="tag">\u00b7</span>').replace(/;/g,'<span class="tag">;</span>');
function traitList(s){if(!s)return'<div class="ts-empty">\u2014</div>';
 var groups=String(s).split('\u00b7').map(function(g){return g.trim();}).filter(Boolean);var out='';
 groups.forEach(function(g,gi){if(gi)out+='<li class="tsep"></li>';g.split(/[,;]/).map(function(t){return t.trim();}).filter(Boolean).forEach(function(t){out+='<li>'+esc(t)+'</li>';});});
 return '<ul class="tlist">'+out+'</ul>';}
function skillTable(s){if(!s)return'<div class="ts-empty">\u2014</div>';
 var rows=String(s).split(';').map(function(x){return x.trim();}).filter(Boolean).map(function(tok){
  var mTo=tok.match(/^(.*?)\s+to\s+(\d+)$/i);if(mTo)return{n:mTo[1].trim(),v:mTo[2],to:true};
  var m=tok.match(/^(.*?)[\-\s]+(\d+)$/);if(m)return{n:m[1].trim(),v:m[2]};
  return{n:tok,v:''};});
 return '<table class="sktab"><tbody>'+rows.map(function(r){return '<tr><td class="skn">'+esc(r.n)+'</td><td class="skv">'+(r.v?(r.to?'\u2264':'')+esc(r.v):'')+'</td></tr>';}).join('')+'</tbody></table>';}

var GEAR_DESC_IDX=null;
function gearDescIndex(){if(GEAR_DESC_IDX)return GEAR_DESC_IDX;var m={};
 (GD.utility||[]).forEach(function(u){if(u.name)m[u.name.toLowerCase()]=u.effect||u.notes||'';});
 (GD.explosives||[]).forEach(function(e){if(e.name)m[e.name.toLowerCase()]=(e.dmg?e.dmg+' \u2014 ':'')+(e.notes||'');});
 (GD.cyber||[]).forEach(function(c){if(c.name)m[c.name.toLowerCase()]=c.notes||'';});
 (GD.armour||[]).forEach(function(a){if(a.name)m[a.name.toLowerCase()]=a.notes||'';});
 (GD.shields||[]).forEach(function(s){if(s.name)m[s.name.toLowerCase()]='DR '+s.dr+' vs '+s.vs+(s.notes?'. '+s.notes:'');});

function gearClip(t,n){n=n||220;t=String(t).replace(/\s+/g,' ').trim();if(t.length<=n)return t;var c=t.slice(0,n),sp=c.lastIndexOf(' ');if(sp>40)c=c.slice(0,sp);return c+'\u2026';}
function gearDesc(name){if(!name)return'';var m=gearDescIndex(),k=name.toLowerCase();
 if(m[k]!=null&&m[k]!=='')return gearClip(m[k]);
 var k2=k.replace(/\s*\([^)]*\)\s*$/,'').trim();if(m[k2])return gearClip(m[k2]);
 for(var kk in m){if(kk&&(k.indexOf(kk)===0||kk.indexOf(k)===0)&&m[kk])return gearClip(m[kk]);}
 return '';}
function gearList(s){if(!s)return"<div class=\"ts-empty\">\u2014</div>";var parts=String(s).split(/[;\u00b7]/).map(function(x){return x.trim();}).filter(Boolean);return "<div class=\"acc-list\">"+parts.map(function(it){var dash=it.indexOf(" \u2014 ");var lookup=(dash>0?it.slice(0,dash):it).replace(/^\d+\s+/,"").trim();var d=gearDesc(lookup);var head="<span class=\"acc-n\">"+esc(it)+"</span>";if(!d)return "<div class=\"acc-row nodesc\"><div class=\"acc-head\">"+head+"</div></div>";return "<div class=\"acc-row\"><div class=\"acc-head\">"+head+"<span class=\"acc-caret\">\u203A</span></div><div class=\"acc-d\">"+esc(d)+"</div></div>";}).join("")+"</div>";}
function blockCard(b,species,name){const af=armourFlag(b.attrs.DR),df=darkFlag(b);const desc=b.desc||npcLook(b,species,name);
 return '<div class="card"><div class="chead"><span class="ctitle">'+esc(name||b.archetype)+'</span><span class="cmeta">'
  +(name?'<span class="pill">'+esc(b.archetype)+'</span>':'')

  +(species?'<span class="pill">'+esc(species)+'</span>':'')

function blockToText(b,species){var a=b.attrs||{};var sv=function(k){return(a[k]!=null&&a[k]!=='')?a[k]:'\u2014';};
 return b.archetype+' ('+b.tier+(species?' \u00b7 '+species:'')+' \u00b7 ~'+b.cp+' pts)\n'

 +'ST '+sv('ST')+'  HP '+sv('HP')+'     DX '+sv('DX')+'  Per '+sv('Per')+'     IQ '+sv('IQ')+'  Will '+sv('Will')+'     HT '+sv('HT')+'  FP '+sv('FP')+'\n'

 +'\nCombat style: '+b.style+(b.powers?'\nForce powers: '+b.powers:'')+'\nGear: '+b.gear+'\n'+b.notes;}

 $('forgeOut').innerHTML='<div class="fg-actions"><button class="btn mini" id="fgKeep">\uD83D\uDCCC Keep</button><button class="btn mini" id="fgSheet">\u2913 Character sheet</button><button class="btn mini ghost" id="fgCopy">\u29C9 Copy</button></div>'+blockCard(block,species,name);

 /* ============================ HELPERS ============================ */
 const R=a=>a[Math.floor(Math.random()*a.length)];
 const cap=s=>s.charAt(0).toUpperCase()+s.slice(1);
 const aan=w=>('aeiouAEIOU'.indexOf((w||'x').charAt(0))>=0?'an ':'a ')+w;
 const sentenceCase=s=>s.replace(/(^\s*[a-z])|([.!?]\s+[a-z])/g,m=>m.toUpperCase());
 function RN(a,n){const c=a.slice();const o=[];while(o.length<n&&c.length){o.push(c.splice(Math.floor(Math.random()*c.length),1)[0]);}return o;}
 function weightedDistinct(pairs,n){const pool=pairs.map(p=>[p[0],p[1]]);const out=[];while(out.length<n&&pool.length){let tot=0;pool.forEach(p=>tot+=p[1]);let r=Math.random()*tot,idx=0;for(let i=0;i<pool.length;i++){r-=pool[i][1];if(r<=0){idx=i;break;}}out.push(pool[idx][0]);pool.splice(idx,1);}return out;}
 function speciesMix(P,F,wk,ck){
  const map={};P.sp.forEach(p=>{map[p[0]]=(map[p[0]]||0)+p[1];});
  if(F&&F.sp)F.sp.forEach(p=>{map[p[0]]=(map[p[0]]||0)+p[1];});
  let pool=Object.keys(map).map(k=>[k,map[k]]);
  const bump=(list,f)=>pool.forEach(p=>{if(list.indexOf(p[0])>=0)p[1]=Math.max(1,Math.round(p[1]*f));});
  if(wk==='opulent'||wk==='affluent'){bump(ELITE,1.8);bump(LABOR,0.4);}
  if(wk==='poor'||wk==='destitute'){bump(LABOR,1.7);bump(ELITE,0.6);}
  if(ck==='lawless'||ck==='cutthroat'){bump(TOUGH,1.8);}
  if(Math.random()<0.45){const r=R(RARE);if(!pool.some(p=>p[0]===r))pool.push([r,1]);}
  const n=3+Math.floor(Math.random()*3);
  return weightedDistinct(pool,n);
 }
 function whoSentence(mix){
  if(mix.length===1)return 'almost entirely '+mix[0];
  const head='mostly '+mix[0]+' and '+mix[1];const rest=mix.slice(2);
  if(rest.length===0)return head;
  if(rest.length===1)return head+', with a scattering of '+rest[0];
  return head+', with '+rest.slice(0,-1).join(', ')+', and the odd '+rest[rest.length-1];
 }
 function makeName(A){const nn=A.nn;const s=Math.floor(Math.random()*4);
  if(s===0)return 'The '+R(NAMEADJ)+' '+R(nn);
  if(s===1)return R(nn)+' '+R(NUM);
  if(s===2)return 'The '+R(nn);
  return R(['Old','Low','High','Far','Dead','Red','Blind','New'])+' '+R(nn);}
 function makeEstab(type,wk){
  const noun=R(type.nm);let name;const s=Math.random();
  if(s<0.5)name=R(PROP)+'\u2019s '+noun;
  else if(s<0.8)name='The '+R(NAMEADJ)+' '+noun;
  else name='The '+noun;
  let line=R(type.desc);
  if((wk==='opulent'||wk==='affluent')&&Math.random()<0.5)line='an upscale take on '+line;
  if((wk==='poor'||wk==='destitute')&&Math.random()<0.5)line='a run-down '+line.replace(/^an? /,'');
  return {name:name,line:line};
 }
 function pickEstabs(area,wk,F){
  const aff=ESTAB.filter(e=>e.areas.indexOf(area)>=0);
  const pool=(aff.length>=4?aff:ESTAB).slice();
  const want=3+Math.floor(Math.random()*2); // 3-4
  const chosenTypes=[];
  if(F&&F.estab){const fid=R(F.estab);if(ESTAB_BY_ID[fid]&&pool.indexOf(ESTAB_BY_ID[fid])<0)pool.push(ESTAB_BY_ID[fid]);if(ESTAB_BY_ID[fid])chosenTypes.push(ESTAB_BY_ID[fid]);}
  const rest=pool.filter(e=>chosenTypes.indexOf(e)<0);
  RN(rest,want-chosenTypes.length).forEach(e=>chosenTypes.push(e));
  return chosenTypes.slice(0,want).map(t=>makeEstab(t,wk));
 }

 /* ============================ GENERATE ============================ */
 function resolveField(val,LIST){
  const v=(val||'').trim().toLowerCase();if(!v)return '';
  let f=LIST.find(o=>o[1].toLowerCase()===v);if(f)return f[0];
  f=LIST.find(o=>o[0].toLowerCase()===v);if(f)return f[0];
  f=LIST.find(o=>o[1].toLowerCase().indexOf(v)>=0);if(f)return f[0];
  return '__none__';
 }
 function lbl(LIST,k){const f=LIST.find(x=>x[0]===k);return f?f[1]:k;}

 function generate(){
  const realPlanets=PLIST.filter(o=>o[0]!=='custom').map(o=>o[0]);
  const areaKeys=Object.keys(AREAS);
  let pin=$('scnP').value, customName=null;
  let pk=resolveField(pin,PLIST);
  if(pk===''){pk=R(realPlanets);}
  else if(pk==='__none__'){if(pin.trim()){customName=pin.trim();pk='custom';}else pk=R(realPlanets);}
  let ak=resolveField($('scnA').value,ALIST); if(ak===''||ak==='__none__')ak=R(areaKeys);
  let fk=resolveField($('scnF').value,FLIST); if(fk===''||fk==='__none__')fk=null;
  const sel=(id,map)=>{const v=$(id).value;return (v&&v!=='any')?v:R(Object.keys(map));};
  const wk=sel('scnW',WEALTH), ck=sel('scnC',CRIME), mk=sel('scnM',MOOD);

  const P=PLANETS[pk]||PLANETS.custom, A=AREAS[ak], W=WEALTH[wk], CR=CRIME[ck], M=MOOD[mk], F=fk?FACTIONS[fk]:null;
  const loc = (pk==='custom'&&customName) ? ('in a rough settlement on '+customName) : R(P.loc);
  const name=makeName(A);
  const ptag = (pk==='custom'&&customName)?customName:lbl(PLIST,pk);
  const tag=[lbl(WLIST,wk),lbl(ALIST,ak)].join(' ')+(F?(' \u00b7 '+F.name):'')+' \u00b7 '+ptag+' \u00b7 '+lbl(CLIST,ck)+' \u00b7 '+lbl(MLIST,mk);

  const mix=speciesMix(P,F,wk,ck);
  const estabs=pickEstabs(ak,wk,F);

  // standouts (one may be a faction figure)
  const roles=RN(A.role,2), acts=RN(ACT,2), spots=RN(SPOT,2);
  const sp2=RN(mix.length>=2?mix:mix.concat(mix),2);
  const stand1=(F&&Math.random()<0.6)?(R(F.who)) : (aan(sp2[0])+' '+roles[0]+' who '+acts[0]);
  const stand2=aan(sp2[1])+' '+roles[1]+' who '+acts[1];

  // ---- READ-ALOUD narration (two paragraphs, spoken pacing) ----
  let p1=R(OPENERS)+R(ENTRIES)+' you\u2019re '+loc+'. ';
  p1+='First thing that hits you is '+R(A.feat)+' \u2014 '+R(W.mat)+', '+R(W.clean)+'. ';
  if(Math.random()<0.6)p1+='It\u2019s all '+R(P.arch)+'. ';
  p1+='There\u2019s '+R(SMELL)+' in the air, and somewhere '+R(SPOT)+', '+R(SOUND)+'. ';
  p1+=(Math.random()<0.5?R(M.air):('The whole place feels '+R(M.adj)+'.'))+' ';
  p1+=cap(R(P.env))+'.';
  if(F){p1+=' '+F.tone+(Math.random()<0.6?(' You can\u2019t miss it \u2014 '+F.sign+'.'):'');}
  p1=sentenceCase(p1);

  let p2='Looking around, the crowd\u2019s '+whoSentence(mix)+' \u2014 '+R(W.crowd)+'. ';
  p2+=cap(stand1)+' '+spots[0]+', and '+stand2+' '+spots[1]+'. ';
  // weave 2-3 establishments
  const woven=estabs.slice(0,Math.min(3,estabs.length));
  const ew=RN(EWHERE,woven.length);
  p2+='As for what\u2019s actually here \u2014 ';
  p2+=woven.map((e,i)=>ew[i]+', '+e.line+(Math.random()<0.5?(' \u2014 that\u2019d be '+e.name):'')).join('; ')+'. ';
  if(Math.random()<0.6)p2+=R(CLOSERS);
  p2=sentenceCase(p2);

  // ---- GM reference ----
  const hookPool=[...RN(A.seed,Math.min(3,A.seed.length)),cap(R(CR.event))+'.',R(RUMOR),cap(R(P.col))+'.'];
  if(F)hookPool.push(cap(F.hook)+'.');
  const hooks=RN(hookPool,2+Math.floor(Math.random()*2));
  const senses='Smell: '+cap(R(SMELL))+'. Sound: '+cap(R(SOUND))+'. On offer: '+R(W.goods)+'. Security: '+R(CR.sec)+'.';
  const whoRef='The crowd is '+whoSentence(mix)+'. Standouts: '+stand1+'; '+stand2+'.';

  render({name:name,tag:tag,p1:p1.trim(),p2:p2.trim(),estabs:estabs,hooks:hooks,senses:senses,whoRef:whoRef});

  STORE.scene={P:$('scnP').value,A:$('scnA').value,F:$('scnF').value,W:$('scnW').value,C:$('scnC').value,M:$('scnM').value};
  STORE.scene._last={name:name,tag:tag,p1:p1.trim(),p2:p2.trim(),estabs:estabs,hooks:hooks,senses:senses,whoRef:whoRef};
  if(typeof saveStore==='function')saveStore();
 }

 function render(s){
  const lab=(t,c)=>'<div style="font-family:var(--mono);font-size:10.5px;letter-spacing:.10em;text-transform:uppercase;color:'+c+';margin:0 0 5px">'+t+'</div>';
  let h='<div style="font-size:19px;font-weight:700;color:var(--amber);letter-spacing:.01em">'+s.name+'</div>';
  h+='<div style="font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:var(--dim);margin-top:3px">'+s.tag+'</div>';
  // read-aloud
  h+='<div style="margin-top:15px;border-left:2px solid var(--amber);padding:2px 0 2px 13px">';
  h+=lab('\u25b8 Read aloud','var(--amber)');
  h+='<p style="margin:0 0 9px;color:var(--ink);line-height:1.72">'+s.p1+'</p>';
  h+='<p style="margin:0;color:var(--ink);line-height:1.72">'+s.p2+'</p></div>';
  // gm reference
  h+='<div style="margin-top:16px;border-top:1px solid var(--line);padding-top:13px">';
  h+=lab('Places of note','var(--acc)');
  h+='<ul style="margin:0 0 13px;padding-left:18px;color:var(--ink);line-height:1.6">'+s.estabs.map(e=>'<li style="margin-bottom:3px"><b style="color:var(--ink)">'+e.name+'</b> \u2014 '+e.line+'</li>').join('')+'</ul>';
  h+=lab('Who\u2019s here','var(--acc)')+'<div style="color:var(--ink);line-height:1.6;margin-bottom:13px">'+s.whoRef+'</div>';
  h+=lab('Hooks (GM)','var(--vio)')+'<ul style="margin:0 0 13px;padding-left:18px;color:var(--ink);line-height:1.6">'+s.hooks.map(x=>'<li style="margin-bottom:3px">'+x+'</li>').join('')+'</ul>';
  h+='<div style="font-size:12.5px;color:var(--dim);border-top:1px solid var(--line);padding-top:9px">'+s.senses+'</div></div>';
  $('scnOut').innerHTML=h;
  const tx=s.name+'\n'+s.tag+'\n\nREAD ALOUD\n'+s.p1+'\n\n'+s.p2+'\n\nPLACES OF NOTE\n'+s.estabs.map(e=>'- '+e.name+' \u2014 '+e.line).join('\n')+'\n\nWHO\u2019S HERE\n'+s.whoRef+'\n\nHOOKS (GM)\n'+s.hooks.map(x=>'- '+x).join('\n')+'\n\n'+s.senses+'\n';
  $('scnOut').dataset.txt=tx;
 }

 function surprise(){
  $('scnP').value='';$('scnA').value='';$('scnW').value='any';$('scnC').value='any';$('scnM').value='any';
  $('scnF').value=Math.random()<0.55?lbl(FLIST,R(FLIST.map(o=>o[0]))):'';
  generate();
 }
 function copyOut(){const tx=$('scnOut').dataset.txt||'';if(!tx)return;const done=()=>{if(typeof toast==='function')toast('Scene copied');};
  if(navigator.clipboard&&navigator.clipboard.writeText){navigator.clipboard.writeText(tx).then(done,()=>fb(tx,done));}else fb(tx,done);}
 function fb(tx,done){try{const ta=document.createElement('textarea');ta.value=tx;ta.style.position='fixed';ta.style.opacity='0';document.body.appendChild(ta);ta.select();document.execCommand('copy');document.body.removeChild(ta);done();}catch(e){}}

 const optsel=(list,sel)=>list.map(o=>'<option value="'+o[0]+'"'+(o[0]===sel?' selected':'')+'>'+o[1]+'</option>').join('');
 const field=(lab2,id,list,sel)=>'<label style="display:flex;flex-direction:column;gap:3px;font-size:11px;color:var(--dim);font-family:var(--mono);letter-spacing:.04em;text-transform:uppercase">'+lab2+'<select id="'+id+'" style="min-width:120px">'+optsel(list,sel)+'</select></label>';
 const sv=(STORE&&STORE.scene)||{};
 const pv=sv.P!==undefined?sv.P:'', av=sv.A!==undefined?sv.A:'', fvv=sv.F!==undefined?sv.F:'';
 sec.innerHTML=
  '<div class="card">'

  +search('Faction','scnF',FLIST,'No particular faction\u2026',fvv)
  +search('Area','scnA',ALIST,'Any area (roll)\u2026',av)

  +field('Setting','scnM',MLIST,sv.M||'any')
  +'</div>'
  +'<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:14px">'
  +'<button class="btn primary" id="scnGen">\u21bb Generate scene</button>'
  +'<button class="btn ghost" id="scnSurprise">\u2682 Surprise me</button>'
  +'<button class="btn ghost" id="scnCopy">\u2398 Copy</button>'
  +'</div>'
  +'<div id="scnOut" style="margin-top:16px;border-top:1px solid var(--line);padding-top:14px"></div>'
  +'</div></div>';
 $('scnGen').addEventListener('click',generate);
 $('scnSurprise').addEventListener('click',surprise);
 $('scnCopy').addEventListener('click',copyOut);
 ['scnP','scnF','scnA'].forEach(id=>$(id).addEventListener('keydown',e=>{if(e.key==='Enter')generate();}));
 if(sv._last)render(sv._last);
 else $('scnOut').innerHTML='<div class="empty">No scene yet. Type a world (or leave it blank), pick an area, and hit <b>Generate</b> \u2014 or just <b>Surprise me</b>.</div>';
}

function buildFleet(el){
 if(!el)return;
 var h='<div class="space-head"><h2>Fleet \u2014 NPC Ship Blocks</h2><div class="lede">Ship-scale combat reads like the ground game: Handling is the DX a ship flies and dodges on, Hull HP is its HP, and the crew roll their own skills (Pilot, Gunner, Mechanic). 1 hex = 100 m, 1-second turns. Damage is FLAT at ship scale, no roll. Shields (SP) soak first, then Hull DR, then Hull HP. Drop these into the character sheet vehicle tracker, or run them by hand.</div></div>';
 h+='<div style="display:grid;gap:12px;padding:4px 0;">';
 FLEET.forEach(function(s){
  h+='<div style="border:1px solid var(--line);border-left:3px solid var(--amber);border-radius:6px;background:var(--panel);padding:12px 14px;">'
   +'<div style="font-weight:600;font-size:1.06em;color:var(--amber);margin-bottom:6px;">'+s.name+'</div>'
   +'<div style="display:flex;flex-wrap:wrap;gap:5px 14px;font-size:.92em;color:var(--ink);margin-bottom:6px;">'
     +'<span><b style="color:var(--dim);font-weight:600;">Class</b> '+s.cls+'</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">SM</b> '+s.sm+'</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">Hull HP</b> '+s.hp+'</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">Hull DR</b> '+s.dr+'</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">Shields</b> '+s.sp+' SP</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">Hnd</b> '+s.hnd+'</span>'
     +'<span><b style="color:var(--dim);font-weight:600;">Move</b> '+s.move+' hex</span>'
   +'</div>'
   +'<div style="font-size:.9em;color:var(--acc);margin-bottom:4px;">'+s.wpn+'</div>'
   +'<div style="font-size:.85em;color:var(--dim);line-height:1.45;">Crew: '+s.crew+'. '+s.note+'</div>'
   +'</div>';
 });
 h+='</div>';
 el.innerHTML=h;
}
function init(){
 const main=$('main');main.innerHTML='';const nav=$('nav');nav.innerHTML='';
 SPACES.forEach(s=>{const b=document.createElement('button');b.innerHTML='<span class="ico">'+s.ico+'</span>'+s.name;b.dataset.sp=s.id;b.onclick=()=>route(s.id);nav.appendChild(b);const sec=document.createElement('section');sec.className='space';sec.id='sp-'+s.id;main.appendChild(sec);});
 buildForge($('sp-forge'));wireKept();renderKept();
 buildCombat($('sp-combat'));
 buildFleet($('sp-fleet'));
 buildLoot($('sp-loot'));
 buildPlanner($('sp-plan'));
 buildCast($('sp-cast'));
 buildChronicle($('sp-chron'));
 buildFlags($('sp-flags'));
 buildScene($('sp-scene'));
 route('forge');doForge();

function skResolveSheet(name){if(SKMAP[name])return{base:name,spec:'',attr:SKMAP[name][0],diff:SKMAP[name][1]};const m=name.match(/^(.*?)\s*\(([^)]+)\)\s*$/);if(m&&SKMAP[m[1]])return{base:m[1],spec:m[2],attr:SKMAP[m[1]][0],diff:SKMAP[m[1]][1]};return{base:m?m[1].trim():name,spec:m?m[2]:'',attr:'DX',diff:'A'};}
function blockToSheet(b,name,species){
 const S=sheetBlank();const a=b.attrs||{};
 S.name=name||b.archetype||'NPC';S.concept=b.archetype||'';S.ptTarget=+b.cp||150;
 const sp=(GD.species||[]).find(s=>s.name===species);
 const mod=sp?{st:+sp.st||0,dx:+sp.dx||0,iq:+sp.iq||0,ht:+sp.ht||0}:{st:0,dx:0,iq:0,ht:0};
 S.species=sp?sp.name:'Human';
 const ST=+a.ST||10,DX=+a.DX||10,IQ=+a.IQ||10,HT=+a.HT||10;
 S.attr.ST=(ST-mod.st-10)*10;S.attr.HT=(HT-mod.ht-10)*10;S.attr.DX=(DX-mod.dx-10)*20;S.attr.IQ=(IQ-mod.iq-10)*20;
 S.sec.HP=((+a.HP||ST)-ST)*2;
 S.sec.Will=((+a.Will||IQ)-IQ)*5;
 S.sec.Per=((+a.Per||IQ)-IQ)*5;
 S.sec.FP=((+a.FP||HT)-HT)*3;
 const defSpeed=(HT+DX)/4;S.sec.Speed=Math.round(((+a.Speed||defSpeed)-defSpeed)*20);
 const flrSp=Math.floor(+a.Speed||defSpeed);S.sec.Move=((+a.Move||flrSp)-flrSp)*5;
 (b.skills||'').split(';').forEach(tok=>{tok=tok.trim();if(!tok||/force skills/i.test(tok))return;const m=tok.match(/^(.*)-(\d+)$/);if(!m)return;const nm=m[1].trim(),lvl=+m[2],r=skResolveSheet(nm),attrLvl=(a[r.attr]!=null?+a[r.attr]:10),rel=lvl-attrLvl,pts=skillCost(r.diff,rel);S.skills.push({name:r.base,spec:r.spec,pts:pts,attr:r.attr,diff:r.diff});});
 const parts=(b.traits||'').split('\u00b7').map(s=>s.trim()).filter(Boolean);
 if(parts[0])parts[0].split(',').forEach(n=>{n=n.trim();if(n)S.traits.push({name:n,type:'Advantage',levels:1,enh:[],lim:[],varCost:0});});
 if(parts[1])parts[1].split(',').forEach(n=>{n=n.trim();if(n)S.traits.push({name:n,type:'Disadvantage',levels:1,enh:[],lim:[],varCost:0});});
 (b.weapons||'').split('\n').forEach(line=>{const nm=line.split(' \u2014 ')[0].trim();if(!nm)return;const w=GD.weapons.find(x=>x.name===nm);if(w)S.weapons.push({name:w.name,cls:w.cls});});
 (b.gear||'').split(';').forEach(tok=>{const nm=tok.split(' \u2014 ')[0].trim();if(!nm)return;if((GD.armour||[]).some(x=>x.name===nm))S.armour.push({name:nm});else if((GD.shields||[]).some(x=>x.name===nm))S.shields.push({name:nm,equipped:true});else if((GD.utility||[]).some(x=>x.name===nm))S.gear.push({name:nm,qty:1});});
 if(b.powers){const fp=GD.forcePowers||[];b.powers.split(';').forEach(tok=>{const nm=tok.replace(/\([^)]*\)\s*$/,'').trim();if(!nm)return;const db=fp.find(p=>p.name===nm);if(db)S.force.powers.push({name:db.name,skill:db.skill||'',fp:db.fp,tier:db.tier||1,pts:db.pts||5,book:db.book||''});else S.force.powers.push({name:nm,tier:1,pts:5,book:''});});S.force.primary='Will';}
 if(b.style){const styleName=b.style.split(' \u2014 ')[0].trim();const sf=(GD.saberForms||[]).find(f=>f.name===styleName);if(sf){S.forms.push({name:sf.name,tier:1,active:false});}else{const st=(GD.battleStances||[]).find(s=>s.name===styleName);if(st)S.stances.push({name:st.name,active:false});}}
 const noteBits=[];if(b.notes)noteBits.push(b.notes);
 if(sp){if(sp.cost)noteBits.push('Species '+sp.name+' (+'+sp.cost+' pts, on top of the ~'+(b.cp||'?')+'-pt block budget). Racial traits \u2014 '+String(sp.notes||'').replace(/\s+/g,' ').trim()+' \u2014 are not auto-added; add them on the sheet for the full racial package.');}
 else if(species&&species!=='Human')noteBits.push('Intended species: '+species+' \u2014 not in the sheet catalogue, so left as Human to keep the stat line exact.');
 if(b.style)noteBits.push('Combat style: '+b.style);
 noteBits.push('Forged in the GM Console ('+(b.tier||'')+', ~'+(b.cp||'?')+' pts). Traits are best-effort name matches \u2014 review costs on the sheet.');
 S.notes=noteBits.join('\n');
 return S;
}
function downloadSheet(b,name,species){if(!b){toast('No stat block to export.');return;}const S=blockToSheet(b,name,species);const fn=(S.name||'character').replace(/[^\w\- ]+/g,'').trim()||'character';download(fn+'.json',JSON.stringify(S,null,2),'application/json');toast('Sheet JSON saved \u2014 open it on the character sheet via Import');}

 STORE.threads=STORE.threads||[];STORE.records=STORE.records||[];STORE.factions=STORE.factions||[];STORE.cast=STORE.cast||[];

 /* ── MAIN QUESTS ── */
 T('The Genoharadan Remnant','Main Quest','active','Genoharadan','Kabaal ambush killed 5 of 6 (Kovacs, the Prince, the scientist, Polard — shot by the Hunter himself, "for the Republic"). The Hunter proved synthetic; GOTO claims he is dead and is liquidating his assets, but Hunter-clones have been sighted on Alderaan. The Black Codex went down with the station. Still at large: Geneticist Vein (force-cloning research), Baroness Elo (Banking Guild), Admiral Raan (informed, not core). Thousands of grown shapeshifters remain off-planet; priority list: GOTO > Jedi > Cardina > Kadaar > Mandalorians > Open Palm > Organa > Republic > Bankers > Czerka.','Dismantle the network; recover or destroy the Black Codex.');
 T('The Foundry & Revan\u2019s Record','Main Quest','active','','Rakatan tablet memorised at the Kabaal; Czerka actively researching Rakatan technology and force arrays (Kashyyyk array activated). Meetra wants the Foundry found before deciding what to do with it; Mical consulted, agrees with Chatni\u2019s caution.','Locate the Foundry before Czerka or worse does.');
 T('The Star Forge Return Protocol','Main Quest','active','Czerka Corporation','Decoded Czerka intercepts: 14 years of probe tracking, some via HK-47, and a return-call protocol to the Star Forge dated ~2 years out (clock is running).','Be there when the call goes out — or stop it.');
 T('The Outer Rim Darkness','Main Quest','active','','DeLuca\u2019s father is somewhere in deep space — DeLuca mirrors Visas\u2019s bond-pattern to her master Nihilus, the planet-killer. Dark-side entities lure force-users to the rims. The Delma force beast sensed Chatni and vanished; Tylo fought and pushed it back. An unknown colossal ship obliterated the Czerka Hoth station.','Identify the power moving in the unknown regions.');
 T('The Matriarch\u2019s Mark','Main Quest','active','Dathomir Nightsisters','Chatni bears the matriarchal candidate tattoos; Mother Githzerion fell to her in the psychic battle. Six candidates dead, a new rival emerged 1\u20132 years ago. Iktotchi fire-sect prophecy: if she unites the nightsisters she pushes the galaxy into darkness. Mical\u2019s options: become Nightmother / find a new well and kill Dathomir\u2019s / re-bond but separate. A light-side well on Tython would accept her — at a price.','Chatni chooses her fate before judgement finds her.');
 T('Bel Savas — the Buried Vault','Main Quest','active','','Rakatan vault under the artificial ice-world: escaped Gormak slaves, hundreds of thousands in stasis, and at the bottom Soah the Infernal One, last Rakatan emperor, imprisoned by his own kind for experimenting on his people.','Decide the fate of Soah and the sleeping Gormak.');
 T('The Jedi in Stasis','Main Quest','active','Restored Jedi Order','Rakatan archive on Kashyyyk (password: Satele Shan) yielded a holo of hundreds of supposedly-dead Jedi held in stasis on a named world, plus intel on the Chiss/Open Palm systems.','Mount the recovery before someone else reads the same archive.');
 T('The New Order & Summit Politics','Main Quest','active','Restored Jedi Order','Iktotchi sanctioned the crew\u2019s new order (Tylo titled). Meetra\u2019s leadership hardens — mass mediation bonds at Csilla, pregnancy straining her control. Cardina (now ruling Alderaan) is building counter-alliances and told Chatni she must eventually choose a side.','Keep the order from becoming either Meetra\u2019s hammer or Cardina\u2019s pawn.');

 /* ── SIDE OBJECTIVES ── */
 T('Kressa\u2019s payment — 8M + the planet','Side Objective','active','Galactic Republic','Chancellor Cressa owes 8M cr + a planet for the Genoharadan job; held in escrow over Tylo\u2019s 60% demand. Unresolved and salty.','Settle the split; collect.');
 T('Crinto mercenary group — owed mission','Side Objective','active','','Saved from the rakghoul zone on Tatooine; they owe the crew one mission, plus the 5k they grudged.','Call in the favour at the right moment.');
 T('Kultak\u2019s debt','Side Objective','active','Mandalorian Clans','The Mandalorian archivist owes the crew; already useful once in the Czerka archives on Kashyyyk.','');
 T('Baron Venlath\u2019s translocator','Side Objective','active','Galactic Republic','Touch-read at Csilla: \u201cBetter keep your end of the bargain.\u201d The Baron is connected to someone.','Find out what bargain — and with whom.');
 T('Luxa, Second Hand of the Exchange','Side Objective','active','The Exchange','Exchange declared the Chiss\u2019 first official enemy after the summit. Luxa fought the Hunter and lived (mind briefly machine-dead). His payment for the Alra rescue was suspiciously cheap; motives unclear, flirtation constant.','Stay ahead of whatever he\u2019s setting up.');
 T('Mon Gazza\u2019s crusade','Side Objective','active','Galactic Republic','Spared twice, the senator now runs his own anti-corruption movement; was drugged and re-questioned at Csilla by Detective Vesh\u2019ra\u2019sabosen about Chatni\u2019s timeline.','Protect the investment; he is being used to date her movements.');
 T('The 45 million credits','Side Objective','active','','The laundered fortune from the deep expedition sits in the hold. Heavy, traceable, useful.','Launder or deploy it.');
 T('Holocron fragment hunt','Side Objective','active','','Small holocron = 10 fragments + frame (7-day forging); large = 50 + kyber + 5 frames (30 days). Fragments are spice-payload rare; finding one is an event.','Stock the forge.');
 T('Chiss attention','Side Objective','active','Chiss Ascendancy','Agent Nerudo: \u201cI would appreciate if you\u2019d stop tracking me across the galaxy.\u201d Detective Vesh\u2019ra\u2019sabosen is building a timeline of Chatni\u2019s involvement. The Ascendancy is polite, thorough, and watching.','Decide whether the Chiss are problem or partner.');
 T('Alra\u2019s exile clock','Side Objective','active','Mandalorian Clans','Exiled six months to ride with the crew; the clock runs. Best girl.','Renew, return, or recruit permanently.');
 T('Jera and the bowl\u2019s harvest','Side Objective','active','Sith Remnant','Jera tricked Chatni into the blood-bowl and harvested its power; she also matches the description of the Sith the Genoharadan courted to hunt Chatni.','The reckoning is owed.');

 /* ── JOURNAL — THE CREW\u2019S TRAIL ── */
 R('Ch. I — Alderaan: The Iktotchi in the Dark','c. 3943 BBY','Chatni (as \u201cNerry\u201d, in Cardina Thul\u2019s service) is found by Tylo Dara, Iktotchi ex-Jedi hunting his premonitions, with Sekan Nightfall in tow. Casino bait, the train raid, the cleared house: captive Iktotchi freed, working partnership forged in mutual irritation.');
 R('Ch. II — The Deep Expedition','c. 3943 BBY','Six months for House Thul with DeLuca: the ship graveyard, the laundered trillions (45M kept), warp-fuel fever dreams, submarine training, three drowned bases, the deal with Sith Lady Jera, lightsaber metals yoinked, the Jedi temple opened by DeLuca \u2014 whose amplified meditation lit up hundreds of force-sensitives for the Silent Hand. Chatni nearly died to a ship cannon; weeks in kolto. Ship renamed Dara Dara.');
 R('Ch. III — Dxun','c. 3942 BBY','Mandalorian camp: Sekan\u2019s duels, Canderous met, Freedon Nadd\u2019s tomb located via spirit sight, Alra won for six months, a bone-door left aboard Chatni\u2019s parked ship.');
 R('Ch. IV — Malachor V','c. 3942 BBY','Suits from Nar Shaddaa, then the dead world: the Sith academy, Tylo touched the saber and met Kreia \u2014 grey now \u2014 and the planet died behind them.');
 R('Ch. V — Ilum','c. 3942 BBY','Meetra\u2019s gathering: Brianna, Mira, Jera, Master Voll. The blood-bowl deception, Voll force-severed via Chatni\u2019s gas trap and Jera\u2019s rip, the crystal excavated, missions assigned.');
 R('Ch. VI — Makeb','c. 3942 BBY','The long detour: Satele Shan and Kao Cen Darach recruited, lightsaber finished en route, lakes, bruises, stances learned.');
 R('Ch. VII — The Leviathan Strike','c. 3942 BBY','The rescue: doors and a 10 kg bomb, Meetra-funded. Perfect insertion, the prisoner extracted (artifact in hand), 26,000 dead in the detonation. Chatni felt every one of them.');
 R('Ch. VIII — The Matriarch\u2019s Mark','c. 3942 BBY','Meditating on the deaths, Chatni was attacked in-mind by the old mothers; she killed Mother Githzerion, woke tattooed as a matriarchal candidate, and gained Spirit Sever.');
 R('Ch. IX — Dxun & Tatooine','c. 3941 BBY','Canderous yields to Torren Wren. Tatooine ship recovery: rakghoul quarantine breached for the Crinto mercs, Alra nearly lost, Luxa\u2019s costly help bought, ships delivered.');
 R('Ch. X — Kashyyyk','c. 3941 BBY','Battle meditation proven on Mandalorian hunts. Tylo\u2019s teleport accident: the Rakatan archive, Revan\u2019s alliance, password \u201cSatele Shan\u201d, the stasis-Jedi holo, Chiss intel. Chatni won 400k betting on duels.');
 R('Ch. XI — The Citadel','c. 3941 BBY','The summit: GOTO named her, named the Genoharadan, and exploded on exit. Kressa\u2019s hunt commissioned. Cardina crowned and given the Jedi. Luxa promoted. Tylo\u2019s shared war-premonition with General Kladar.');
 R('Ch. XII — The Genoharadan Hunt','c. 3941 BBY','Kashyyyk archives (Kultak), Herdessa (GOTO\u2019s ledger, Mon Gazza\u2019s tower), the Hoth station raid and the unknown ship that erased it, Valia\u2019s kidnapping with Atton (Vessa\u2019s skin-grafts), her mind broken: 14 members, 5 bodies, the Kabaal. The ambush: five dead, the Hunter synthetic, the Codex lost with the station.');
 R('Ch. XIII — Manaan','c. 3941 BBY','Atton\u2019s holiday: the ring, the best food ever, underwater enlightenment, a held hand, and a terrible lightsaber lesson.');
 R('Ch. XIV — Iktotch','c. 3941 BBY','Tylo honoured and contracted; the new order sanctioned. The fire-sect\u2019s history of Dathomir and the prophecy: unite the nightsisters and the galaxy darkens.');
 R('Ch. XV — Alderaan, Again','c. 3941 BBY','Queen Cardina\u2019s rebuilt capital; the Jedi enclave (Mira teaching, Bao-Dur\u2019s shields, younglings); the 45M lifted aboard; tattoo meditation: six candidates dead, one new.');
 R('Ch. XVI — Tython','c. 3941 BBY','Candy mended; Mical\u2019s counsel on the three fates; the light-side well found; the master-apprentice bond with Tylo ended cleanly.');
 R('Ch. XVII — Csilla','c. 3941 BBY','The Chiss summit and the shapeshifter crisis: 35 infiltrated, the priority list, Meetra\u2019s mass mediation and revealed pregnancy, the lobby battles, Chatni\u2019s knee, Nerudo\u2019s interrogation, Hunter vs Luxa, the Exchange declared enemy. The Delma beast sensed.');
 R('Ch. XVIII — Ord Cestus','c. 3941 BBY','(Per the Galactic Record \u2014 see record for detail.)');
 R('Ch. XIX — Tython, Again','c. 3940 BBY','(Per the Galactic Record \u2014 see record for detail.)');
 R('Ch. XX — Bel Savas: The Buried Vault','c. 3940 BBY','The artificial ice-world\u2019s Rakatan vault: escaped Gormak, hundreds of thousands in stasis, and Soah the Infernal One imprisoned at the bottom.');

 /* ── NEW / UPDATED QUESTS ── */
 T('The Foundry — galaxy-wide holocron','Main Quest','active','','Three sources now triangulate it: Jera\u2019s star-data, the Bel Savas terminal map, and the Gormak leader\u2019s ancestral chart. Together they reveal the network of Rakatan temple-worlds is itself a <b>galaxy-spanning holocron</b> — and the Foundry sits at its centre, with the Star Forge linked to further points. Czerka and the Genoharadan are hunting the same prize.','Reach the Foundry before Czerka / the returning Sith.');
 T('Bel Savas — Soah & the 26.4 million','Main Quest','active','','The vault holds <b>56 enslaved races, 26.4M individuals</b> in stasis. At the bottom: <b>Soah the Infernal One</b>, last Rakatan emperor, imprisoned by his own kind for experimenting on his people — he does NOT wish to be freed yet (unfinished experiments) but controls the vault. 200 Gormak rescued so far; he threatens to cut life-support on a 4-day clock. Freeing the rest needs a repaired surface pylon for mass teleportation. Comms device obtained. Decision deferred to Meetra.','Decide the fate of 26.4M sleepers and of Soah.');
 T('Xesh, the Awakened','Main Quest','active','Restored Jedi Order','An ancient Force-being woken from the Bel Savas pods — Dathomiri of the deep past (Singing Mountain Clan / Spider-sect era), now under Meetra\u2019s watch on Tython with activatable restraints. Drains in the light-side well (he is dark-born) but Tython \u201cwelcomes Tau back as its lost child.\u201d He searches, with desperate hope, for someone named <b>Shae</b>. Breanna wants him dead.','Learn what Xesh is for — ally, key, or weapon.');
 T('The Hunter is a clone collective','Main Quest','active','The Genoharadan','Dreamwalk intel: \u201cHunter\u201d is a 27-year Republic SIS asset, now a <b>collective of clones</b> with scrambled identity — none knows the original\u2019s body, age or gender; each believes itself the real one. Behind the <b>Paragus station explosion</b> (Telos\u2019 fuel supply) and the Csilla chaos. Hatred for Jedi and Sith alike, yet ordered \u201cmake sure the Jedi survive the Purge.\u201d Chatni\u2019s two missions wrecked their plans.','Find the title behind \u201cHunter\u201d and the head of Czerka who signs the missions.');
 T('They are coming for GOTO','Side Objective','active','The Genoharadan','The Genoharadan\u2019s next move: <b>break GOTO\u2019s programming and recruit him</b> — they need his bio-geneticists to resume cloning. Kressa is said to hold a GOTO shutdown. Warned via Meetra.','Protect or pre-empt GOTO before they flip him.');
 T('The Gondian-belt ghost ship','Side Objective','active','','In the destroyed Gondian belt a derelict screams with the dead — one voice is self-aware and aware of Chatni: the <b>Hunter title</b>, not the man. Whatever the ship holds is deeply tied to it.','Board the ghost ship — carefully.');
 T('Chatni\u2019s three light paths','Side Objective','active','','Two weeks meditating in Tython\u2019s light well gave her three futures to choose her power-medium: <b>Communion (grazer)</b>, <b>Self-empowerment (predator)</b>, or <b>Binding (force of nature)</b>. An older light well exists on a red-sand world she\u2019s never seen.','Chatni chooses her path.');

 /* ── JOURNAL ── */
 R('Ch. XXI — Ord Cestus: The Rival &amp; Jera\u2019s End','c. 3940 BBY','The nightsisters reach for Chatni in-mind — the rival candidate, powered by the six dead candidates and guided by two Nightmothers, with Jera drawing openly from Dathomir\u2019s dark well. Tylo goads Jera into a duel; Chatni battle-meditates from the ship (a last gift to dying Canderous). Jera brings a Sith and a coven-channelling nightsister; the crew wins without a scratch. Jera, struck down, spends her ghost to curse Tylo and warns Chatni: \u201cwhen they return you will be the first to die.\u201d Spoils: a copy of the Book of Shadows and Jera\u2019s saber. Canderous, kept alive, becomes an addict — and fiercely, alarmingly loyal.');
 R('Ch. XXII — Illum &amp; Tython: Bloodline &amp; the Three Paths','c. 3940 BBY','Jera\u2019s ship looted (its droid fooled into thinking the crew are Sith Lords). Her logs confirm Chatni is of the <b>main bloodline</b>, and that the missing candidates\u2019 power was funnelled into the rival to match her. Bad artifacts destroyed on Ilum; Sith tablets memorised. On Tython, Mikael counsels Chatni on finding a new power-medium beyond blood; two weeks in the light well yield the three paths (Communion / Self-empowerment / Binding) and a glimpse of an older, red-sand light well.');
 R('Ch. XXIII — Bel Savas: Soah the Infernal One','c. 3940 BBY','Beneath the artificial ice-world, the Gormak — escaped slaves (Binion the techie, their leader) — are trying to free their people. Three options to open the pods; the crew takes the light/dark disruption route to the core and meets <b>Soah the Infernal One</b>, last Rakatan emperor, imprisoned by his own for experimenting on his kind. 56 races, 26.4M sleepers. He gives messages for Meetra, Kao Cen (dead) and Satele, a comms device, and — through the slave-leader\u2019s ancestral map — the revelation that the temple network is a galaxy-wide holocron centred on the Foundry. 200 rescued against a 4-day life-support clock.');
 R('Ch. XXIV — Tython: Xesh Returns','c. 3940 BBY','The crew brings Xesh — an ancient Force-being from the pods, Dathomiri of the deepest past — back to Tython. Breanna nearly kills him on sight; Meetra, trusting Chatni\u2019s intuition, grants him guarded sanctuary. He has never seen a bed or eaten his fill; he sleeps in meditation on the floor and searches, desperate, for someone named Shae. The light well drains then welcomes him (\u201cTau, its lost child\u201d). He shares lost nightsister lore — Singing Mountain Clan, the Spider sect, the cycle of becoming. Beneath the temple sleeps Ood Bnar, a living-tree Jedi.');
 R('Ch. XXV — The Hunter, Unmasked (in dream)','c. 3940 BBY','Dreamwalking with full control, Chatni rides the Hunter\u2019s mind: a 27-year SIS clone-collective, identity scrambled, behind the Paragus/Telos fuel-station explosion and the Csilla chaos. Their next target is GOTO — break him, recruit him, resume cloning. \u201cMake sure the Jedi survive the Purge.\u201d She warns Meetra (Kressa holds a GOTO shutdown). The Gondian-belt derelict screams with a self-aware Hunter-voice that knows her.');
 R('Ch. XXVI — Corellia: The Cascades (the date)','c. 3940 BBY','Between vault shifts, Atton lands at Bel Savas, offers his last name \u201cas a friend,\u201d and takes Chatni to Corellia — a 1.2M-credit dress (haggled down), Selkath silk, and a rare gas-cascade event reached by a sideways glass elevator. Pazaak, banter, and a quiet swerve away from passion toward something gentler. (In progress.)');

function scaleShots(s,pct){return String(s).replace(/^(\d+)/,n=>Math.max(1,Math.round(+n*(1+pct/100))));}
function adjustDamage(s,dDie,dFlat){if(!dDie&&!dFlat)return s;return String(s).replace(/^(\d+)d(x\d+)?([+-]\d+)?/,(m,n,mult,mod)=>{let N=+n+(dDie||0);if(N<1)N=1;let M=(mod?+mod:0)+(dFlat||0);return N+'d'+(mult||'')+(M?(M>0?'+'+M:''+M):'');});}

function benchPopMods(){const t=$('benchType').value;let mods=ATTACH.filter(a=>a.ap===t);if(t==='weapon'){const it=benchItemObj();if(it){const r=isRanged(it);mods=mods.filter(a=>!a.for||a.for==='any'||a.for===(r?'ranged':'melee'));}}
 $('benchMods').innerHTML='<div class="bmhd">Attachments \u2014 tick to fit</div>'+(mods.length?mods.map(a=>{const idx=ATTACH.indexOf(a);return '<label class="bmod"><input type="checkbox" class="benchchk" data-idx="'+idx+'"><span class="bm-n">'+esc(a.n)+'</span><span class="bm-fx">'+esc(a.fx)+'</span><span class="bm-c">'+(a.cost?cr(a.cost):'\u2014')+(a.lc?' \u00b7 '+esc(a.lc):'')+'</span></label>';}).join(''):'<div class="empty">No attachments fit this item.</div>');benchRender();}
function benchRender(){const it=benchItemObj();const o=$('benchOut');if(!it){o.innerHTML='';return;}const chosen=[...document.querySelectorAll('.benchchk:checked')].map(c=>ATTACH[+c.dataset.idx]).filter(Boolean);o.innerHTML=($('benchType').value==='weapon')?benchWeapon(it,chosen):benchArmour(it,chosen);}
function benchWeapon(w,mods){const ST=12;const baseLine=weaponLineText(w,ST);const c=clone(w);let dDie=0,dFlat=0,adMul=1,addCost=0;const notes=[];mods.forEach(m=>{const d=m.mod||{};addCost+=num(m.cost)||0;if(d.acc)c.acc=(num(c.acc)||0)+d.acc;if(d.rof)c.rof=(num(c.rof)||0)+d.rof;if(d.rcl!=null)c.rcl=Math.max(1,(num(c.rcl)||1)+d.rcl);if(d.shotsPct&&c.shots)c.shots=scaleShots(c.shots,d.shotsPct);if(d.parry!=null&&c.parry!==''&&c.parry!=null)c.parry=(num(c.parry)||0)+d.parry;if(d.dmgDie)dDie+=d.dmgDie;if(d.dmg)dFlat+=d.dmg;if(d.adMul)adMul*=d.adMul;if(d.wt)c.wt=(num(c.wt)||0)+d.wt;if(d.note)notes.push(d.note);});if(adMul!==1)c.ad=(num(c.ad)||1)*adMul;const dmg=adjustDamage(dmgOf(c,ST),dDie,dFlat);const xtra=weaponXtra(c);const moddedLine=w.name+' \u2014 '+dmg+(xtra?' \u00b7 '+xtra:'');return benchCard(w.name,baseLine,moddedLine,mods,notes,num(w.cost)||0,addCost,'@ ST 12');}
function benchArmour(a,mods){const baseLine=a.name+' \u2014 '+itemLine(a,'Armour');const c=clone(a);let addCost=0;const notes=[];mods.forEach(m=>{const d=m.mod||{};addCost+=num(m.cost)||0;if(d.drE)c.drE=(num(c.drE)||0)+d.drE;if(d.drK)c.drK=(num(c.drK)||0)+d.drK;if(d.sealed)c.sealed=true;if(d.wt)c.wt=(num(c.wt)||0)+d.wt;if(d.note)notes.push(d.note);});const moddedLine=a.name+' \u2014 '+itemLine(c,'Armour');return benchCard(a.name,baseLine,moddedLine,mods,notes,num(a.cost)||0,addCost,'');}
function benchCard(name,baseLine,moddedLine,mods,notes,baseCost,addCost,suffix){const changed=mods.length>0;const total=baseCost+addCost;
 return '<div class="card"><div class="chead"><span class="ctitle">'+esc(name)+'</span><span class="cmeta"><span class="pill'+(changed?' acc':'')+'">'+(changed?mods.length+' upgrade'+(mods.length>1?'s':''):'stock')+'</span>'+(suffix?'<span class="pill">'+esc(suffix.replace(/^@ /,''))+'</span>':'')+'</span></div><div class="cbody">'
  +'<div class="bench-cmp"><div class="bc-row"><span class="bc-k">Stock</span><span class="bc-v">'+esc(baseLine)+'</span></div>'
  +(changed?'<div class="bc-row mod"><span class="bc-k">Modified</span><span class="bc-v">'+esc(moddedLine)+'</span></div>':'')+'</div>'
  +(notes.length?'<div class="bench-riders">Riders: '+esc(notes.join(' \u00b7 '))+'</div>':'')
  +'<div class="bench-cost"><span>Base '+cr(baseCost)+(addCost?' + upgrades '+cr(addCost):'')+'</span><span class="bc-total">'+cr(total)+'</span></div>'
  +'</div></div>';}
