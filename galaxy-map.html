<style>
  :root{--void:#020610;--void2:#04101e;--panel:#082236;--ink:#dff1fb;--ink-soft:#a7cbe0;--ink-dim:#5f8aa8;
    --holo:#5fd6ff;--holo-bright:#aef0ff;--holo-deep:#1d5b80;--gold:#e7c66b;--blood:#ff6a5a;
    --line:rgba(95,214,255,.30);--line-soft:rgba(95,214,255,.13);
    --serif:"EB Garamond",Georgia,serif;--body:"Spectral",Georgia,serif;--display:"Orbitron",sans-serif;--deco:"Orbitron",sans-serif;}
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--void);color:var(--ink);font-family:var(--body);}
  body{display:flex;flex-direction:column;}
  header{flex:0 0 auto;display:flex;align-items:center;gap:12px;padding:9px 14px;flex-wrap:wrap;z-index:30;
    background:linear-gradient(180deg,rgba(8,34,54,.96),rgba(4,16,30,.92));border-bottom:1px solid var(--line);box-shadow:0 0 22px rgba(31,91,128,.35);}
  .brand{display:flex;flex-direction:column;line-height:1;margin-right:4px;}
  .brand .t{font-family:var(--deco);font-weight:700;font-size:15px;color:var(--holo-bright);letter-spacing:.06em;text-shadow:0 0 12px rgba(95,214,255,.6);}
  .brand .s{font-family:var(--display);font-size:8px;letter-spacing:.3em;text-transform:uppercase;color:var(--ink-dim);margin-top:5px;}
  .search{position:relative;flex:1 1 230px;max-width:360px;min-width:150px;}
  .search input{width:100%;background:rgba(2,12,22,.85);border:1px solid var(--line);border-radius:3px;color:var(--ink);font-family:var(--body);font-size:15px;padding:9px 12px 9px 32px;outline:none;}
  .search input:focus{border-color:var(--holo);box-shadow:0 0 0 2px rgba(95,214,255,.22);}
  .search .ico{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--holo);font-size:13px;}
  .results{position:absolute;top:calc(100% + 4px);left:0;right:0;background:var(--panel);border:1px solid var(--line);border-radius:4px;max-height:340px;overflow-y:auto;z-index:40;display:none;box-shadow:0 14px 40px rgba(0,0,0,.6);}
  .results.open{display:block;} .results .row{padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--line-soft);display:flex;align-items:center;gap:9px;}
  .results .row:last-child{border-bottom:0;} .results .row:hover,.results .row.active{background:rgba(95,214,255,.14);}
  .results .dot{width:9px;height:9px;border-radius:50%;flex:0 0 auto;} .results .nm{font-family:var(--body);font-size:14px;color:var(--ink);}
  .results .meta{font-size:11.5px;color:var(--ink-dim);font-style:italic;margin-left:auto;font-family:var(--serif);}
  .results .star{color:var(--holo);font-size:11px;} .results .none{padding:11px 12px;color:var(--ink-dim);font-style:italic;}
  .tools{display:flex;gap:6px;align-items:center;margin-left:auto;}
  .btn{background:rgba(2,12,22,.7);border:1px solid var(--line);color:var(--ink-soft);font-family:var(--display);font-size:10px;letter-spacing:.1em;padding:8px 10px;border-radius:3px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
  .btn:hover{border-color:var(--holo);color:var(--holo-bright);box-shadow:0 0 10px rgba(95,214,255,.3);} .btn.icon{font-size:15px;padding:7px 10px;line-height:1;}
  .stage{flex:1 1 auto;position:relative;overflow:hidden;cursor:grab;background:radial-gradient(1200px 900px at 50% 45%,rgba(12,40,66,.5),transparent 70%),var(--void);} .stage.grabbing{cursor:grabbing;}
  canvas#cv{position:absolute;inset:0;width:100%;height:100%;touch-action:none;}
  .scan{position:absolute;inset:0;pointer-events:none;z-index:5;opacity:.4;
    background:repeating-linear-gradient(0deg,rgba(95,214,255,.035) 0px,rgba(95,214,255,.035) 1px,transparent 2px,transparent 4px);mix-blend-mode:screen;}
  .vig{position:absolute;inset:0;pointer-events:none;z-index:6;box-shadow:inset 0 0 220px rgba(2,6,16,.9);}
  .count{position:absolute;top:9px;left:13px;z-index:18;font-family:var(--display);font-size:9px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);background:rgba(2,12,22,.6);padding:5px 9px;border-radius:3px;border:1px solid var(--line-soft);}
  .hint-z{position:absolute;bottom:13px;left:50%;transform:translateX(-50%);z-index:18;font-family:var(--serif);font-style:italic;font-size:12px;color:var(--ink-dim);background:rgba(2,12,22,.55);padding:5px 12px;border-radius:20px;pointer-events:none;transition:opacity .4s;}
  .tip{position:absolute;z-index:50;pointer-events:none;background:rgba(2,12,22,.95);border:1px solid var(--line);border-radius:3px;padding:5px 10px;font-family:var(--display);font-size:11px;letter-spacing:.04em;color:var(--holo-bright);transform:translate(-50%,-160%);white-space:nowrap;display:none;box-shadow:0 0 12px rgba(95,214,255,.3);}
  .tip small{display:block;font-family:var(--serif);font-style:italic;letter-spacing:0;color:var(--ink-dim);font-size:11px;text-align:center;text-transform:none;}
  .info{position:absolute;top:0;right:0;height:100%;width:352px;max-width:88vw;z-index:25;background:linear-gradient(180deg,rgba(8,28,46,.98),rgba(3,12,22,.98));border-left:1px solid var(--line);transform:translateX(102%);transition:transform .28s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:-18px 0 50px rgba(0,0,0,.5);}
  .info.open{transform:translateX(0);}
  .info .x{position:absolute;top:11px;right:14px;cursor:pointer;color:var(--ink-dim);font-size:21px;z-index:3;} .info .x:hover{color:var(--holo-bright);}
  .info .scroll{overflow-y:auto;padding:0 0 40px;}
  .portrait{width:100%;height:196px;position:relative;background:radial-gradient(120% 90% at 50% 16%,rgba(20,52,82,.6),rgba(3,12,22,.2));border-bottom:1px solid var(--line-soft);overflow:hidden;}
  .portrait canvas{position:absolute;inset:0;width:100%;height:100%;}
  .portrait .frame{position:absolute;inset:0;pointer-events:none;box-shadow:inset 0 0 40px rgba(95,214,255,.18);border-bottom:1px solid var(--line);}
  .pbody{padding:18px 22px 0;}
  .info .eyebrow{font-family:var(--display);font-size:9px;letter-spacing:.22em;text-transform:uppercase;color:var(--holo);}
  .info h2{font-family:var(--deco);font-weight:700;font-size:21px;color:var(--holo-bright);margin:7px 0 2px;line-height:1.1;text-shadow:0 0 14px rgba(95,214,255,.4);}
  .info .alias{font-family:var(--serif);font-style:italic;color:var(--ink-dim);font-size:14px;margin-bottom:14px;}
  .info .ctrlband{display:flex;align-items:center;gap:9px;padding:10px 12px;border-radius:4px;background:rgba(2,12,22,.55);border:1px solid var(--line-soft);margin-bottom:8px;}
  .info .ctrlband .sw{width:15px;height:15px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.5);}
  .info .ctrlband .who{font-family:var(--display);font-size:12.5px;letter-spacing:.02em;} .info .ctrlband .who small{display:block;font-family:var(--display);font-size:7.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:3px;}
  .info .lead{font-family:var(--serif);font-style:italic;color:var(--holo);font-size:13px;margin:0 2px 14px;}
  .info .lead b{font-family:var(--display);font-style:normal;font-size:8px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);display:block;margin-bottom:2px;}
  .info dl{margin:0 0 4px;display:grid;grid-template-columns:auto 1fr;gap:7px 14px;}
  .info dt{font-family:var(--display);font-size:8px;letter-spacing:.13em;text-transform:uppercase;color:var(--holo);align-self:center;} .info dd{margin:0;font-size:14px;color:var(--ink-soft);}
  .info .sec{font-family:var(--display);font-size:8.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--holo);border-bottom:1px solid var(--line-soft);padding-bottom:5px;margin:18px 0 10px;}
  .chips{display:flex;flex-wrap:wrap;gap:6px;} .chip{display:inline-flex;align-items:center;gap:6px;font-size:12.5px;font-family:var(--serif);background:rgba(2,12,22,.5);border:1px solid var(--line-soft);border-radius:20px;padding:4px 10px 4px 8px;color:var(--ink-soft);}
  .chip .d{width:9px;height:9px;border-radius:50%;} .chip.ill{border-color:rgba(255,106,90,.5);color:#ffb0a6;background:rgba(60,18,16,.4);}
  .info .note{font-family:var(--serif);font-style:italic;font-size:14.5px;color:var(--ink);line-height:1.55;margin-top:6px;}
  .info .uncharted{font-family:var(--serif);font-style:italic;font-size:13.5px;color:var(--ink-dim);line-height:1.5;margin-top:6px;}
  .panel{position:absolute;z-index:20;background:linear-gradient(180deg,rgba(8,28,46,.96),rgba(3,12,22,.96));border:1px solid var(--line);border-radius:5px;overflow:hidden;transition:transform .25s;width:238px;max-width:72vw;box-shadow:0 0 18px rgba(31,91,128,.25);}
  .panel .head{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:8px 12px;border-bottom:1px solid var(--line-soft);background:rgba(95,214,255,.07);}
  .panel .head .t{font-family:var(--display);font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--holo-bright);} .panel .head .c{color:var(--ink-dim);font-size:12px;transition:transform .25s;}
  .panel .body{padding:10px 12px 12px;max-height:48vh;overflow-y:auto;}
  .legend{left:13px;bottom:13px;} .legend.closed{transform:translateY(calc(100% - 35px));} .legend.closed .head .c{transform:rotate(180deg);}
  .layers{right:13px;bottom:13px;} .layers.closed{transform:translateY(calc(100% - 35px));} .layers.closed .head .c{transform:rotate(180deg);}
  .sub{font-family:var(--display);font-size:7.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--ink-dim);margin:11px 0 6px;} .sub:first-child{margin-top:0;}
  .frow{display:flex;align-items:center;gap:8px;padding:3px 6px;border-radius:3px;cursor:pointer;font-size:12.5px;color:var(--ink-soft);font-family:var(--serif);}
  .frow:hover{background:rgba(95,214,255,.1);} .frow.active{background:rgba(95,214,255,.2);color:var(--ink);}
  .frow .d{width:11px;height:11px;border-radius:50%;flex:0 0 auto;border:1px solid rgba(0,0,0,.4);} .frow.active .d{box-shadow:0 0 0 2px rgba(255,255,255,.5);}
  .frow .lead{font-size:10px;color:var(--ink-dim);font-style:italic;margin-left:auto;max-width:96px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .rrow{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--ink-soft);font-family:var(--serif);margin:4px 0;}
  .rrow .ln{width:22px;height:0;border-top:2px solid var(--holo);flex:0 0 auto;} .rrow .ln.ill{border-top-style:dotted;}
  .hint{font-size:10.5px;color:var(--ink-dim);font-style:italic;font-family:var(--serif);line-height:1.4;margin-top:9px;}
  .clearf{margin-top:10px;width:100%;}
  .tog{display:flex;align-items:center;gap:9px;padding:5px 6px;border-radius:3px;cursor:pointer;font-size:12px;color:var(--ink-soft);font-family:var(--serif);}
  .tog:hover{background:rgba(95,214,255,.08);}
  .sw-box{width:30px;height:16px;border-radius:9px;background:rgba(60,90,110,.4);position:relative;flex:0 0 auto;transition:background .15s;}
  .sw-box::after{content:"";position:absolute;top:2px;left:2px;width:12px;height:12px;border-radius:50%;background:var(--ink-dim);transition:all .15s;}
  .tog.on .sw-box{background:rgba(95,214,255,.45);} .tog.on .sw-box::after{left:16px;background:var(--holo-bright);}
  .scroll::-webkit-scrollbar,.panel .body::-webkit-scrollbar,.results::-webkit-scrollbar{width:8px;}
  .scroll::-webkit-scrollbar-thumb,.panel .body::-webkit-scrollbar-thumb,.results::-webkit-scrollbar-thumb{background:var(--holo-deep);border-radius:4px;}
  /* travel planner */
  .travelbar{position:absolute;top:9px;left:50%;transform:translateX(-50%);z-index:22;display:flex;align-items:stretch;gap:0;
    background:linear-gradient(180deg,rgba(8,28,46,.96),rgba(3,12,22,.96));border:1px solid var(--line);border-radius:5px;overflow:hidden;box-shadow:0 0 18px rgba(31,91,128,.3);max-width:94vw;}
  .travelbar .seg{display:flex;flex-direction:column;justify-content:center;padding:5px 11px;border-right:1px solid var(--line-soft);min-width:96px;}
  .travelbar .seg:last-child{border-right:0;}
  .travelbar .lab{font-family:var(--display);font-size:7px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:2px;}
  .travelbar .val{font-family:var(--body);font-size:13px;color:var(--holo-bright);white-space:nowrap;max-width:150px;overflow:hidden;text-overflow:ellipsis;}
  .travelbar .val.empty{color:var(--ink-dim);font-style:italic;}
  .travelbar select{background:rgba(2,12,22,.6);border:1px solid var(--line-soft);color:var(--ink);font-family:var(--body);font-size:12px;border-radius:3px;padding:3px 4px;outline:none;max-width:150px;}
  .travelbar .seg.act{cursor:pointer;} .travelbar .seg.act:hover{background:rgba(95,214,255,.1);}
  .travelbar .seg.go{background:rgba(95,214,255,.12);cursor:pointer;justify-content:center;align-items:center;min-width:78px;}
  .travelbar .seg.go:hover{background:rgba(95,214,255,.22);} .travelbar .seg.go .val{font-family:var(--display);font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--holo-bright);}
  .travelbar .seg.result .val{color:var(--gold);font-size:15px;}
  .travelbar .clr{cursor:pointer;color:var(--ink-dim);font-size:16px;padding:0 9px;display:flex;align-items:center;}
  .travelbar .clr:hover{color:var(--blood);}
  .pickhint{position:absolute;top:54px;left:50%;transform:translateX(-50%);z-index:22;font-family:var(--serif);font-style:italic;font-size:12px;color:var(--holo);background:rgba(2,12,22,.7);padding:4px 12px;border-radius:20px;border:1px solid var(--line-soft);display:none;}
  .pickhint.show{display:block;}
  /* lane info panel reuse .info; lane chips */
  .lanehdr{padding:18px 22px 0;}
  .legrow{display:flex;align-items:center;gap:8px;margin:9px 0;}
  .legrow .ln{width:30px;height:0;flex:0 0 auto;}
  .check{display:flex;align-items:flex-start;gap:9px;padding:8px 0;border-bottom:1px solid var(--line-soft);}
  .check:last-child{border-bottom:0;} .check .ico{color:var(--holo);font-size:13px;margin-top:1px;}
  .check .nm2{font-family:var(--display);font-size:12px;color:var(--ink);letter-spacing:.02em;} .check .ds{font-family:var(--serif);font-style:italic;font-size:12.5px;color:var(--ink-dim);}
  @media(max-width:680px){.brand .t{font-size:13px;}.info{width:322px;}.panel{width:190px;}.btn.lbl{display:none;}.travelbar .seg{min-width:78px;padding:5px 7px;}}
</style></head>

10.744],"rl":"Grand Master Meetra Surik","st":"The reborn Jedi cradle, still raw and half-built. Granted the ancient world by the Accords, the Order rebuilds its enclaves and trains a thin new generation under Meetra Surik's careful hand. Tython hums with purpose and scarcity in equal measure — rich in meaning, poor in numbers, and watched with interest by powers who would prefer the Jedi small."},"Alderaan":{"c":"ind","p":["rep","jedi"],"e":["agri","trade","banking"],"w":3,"a":"the jewel of the Core","pt":"temperate","o":"A jewel-world of noble houses consolidating under the ascendant House Thul; now shelters the restored Jedi enclave.","xy":[10.272,10.043],"rl":"Cardina Thuul, of the ascendant House Thul","st":"Building strong and fast. Under the ruthless, efficient rule of Cardina Thuul, Alderaan has turned its noble rivalries into a single sharpened instrument of statecraft — hard in negotiation, generous to the Republic it has chosen to back, and rising with startling speed into a true Core power. An ally, certainly. A rival-in-waiting, just as certainly. Few worlds have used the present age so well."},"Corellia":{"c":"rep","p":["rep"],"e":["shipyard","trade","industry"],"w":3,"a":"the Corellian shipworks","pt":"temperate","o":"Proud shipbuilding world at the crossing of the Corellian Run and Trade Spine; cradle of pilots and smugglers.","xy":[10.535,11.855],"rl":"Republic governance; the great shipwright guilds","st":"Roaring back to life. With the Republic pouring reconstruction into the Core, Corellia's yards run hot once more, turning out hulls for the rebuilt navy and freighters for everyone else. Proud, independent-minded, and full of pilots and smugglers both, it is one of the great winners of the turn inward — though its famously loose customs make it a sieve the Republic cannot quite plug."},"Kuat":{"c":"rep","p":["rep"],"e":["shipyard","military"],"w":2,"a":null,"pt":"temperate","o":"Ringed by vast orbital shipyards that build the backbone of the Republic Navy.","xy":[10.856,10.569],"rl":"Republic governance; the Kuat shipwright houses","st":"Working at capacity. The orbital rings forge the warships of the consolidating navy as fast as the slips allow, and Kuati prestige has never been higher. The whole world's fortune now rides on Republic rearmament contracts — a dependence that is also its only real vulnerability."},"Duro":{"c":"rep","p":["rep"],"e":["shipyard","trade"],"w":1,"a":null,"pt":"barren","o":"A polluted homeworld whose people live in orbital habitats and crew the galaxy's freighters.","xy":[10.535,11.855],"rl":"Republic governance; orbital habitat authorities","st":"Steady and busy. Its people crew a vast share of the galaxy's freighters, and the inward turn has them hauling reconstruction cargo by the megaton. A quiet, essential cog — prospering modestly while the great powers posture."},"Chandrila":{"c":"rep","p":["rep"],"e":["agri","trade"],"w":1,"a":null,"pt":"temperate","o":"A serene garden world that supplies the Senate with grain and statesmen.","xy":[9.45,9.404],"rl":"Republic governance; the civic assemblies","st":"Calm and comfortable. A serene garden-world feeding grain and statesmen to the Senate, largely spared the wars and content to remain so. Its measured voice carries weight in Core councils out of all proportion to its size."},"Brentaal IV":{"c":"rep","p":["rep"],"e":["trade","banking"],"w":2,"a":"Brentaal","pt":"desert","o":"A great commercial junction where the Perlemian and Hydian routes cross — riches and intrigue in equal measure.","xy":[9.541,9.576],"rl":"Republic governance; the merchant houses","st":"Thriving on the crossroads. Where the great lanes meet, Brentaal grows fat on the reconstruction traffic flooding the Core — and on the intrigue that always pools at a chokepoint. Wealthy, scheming, and indispensable to anyone moving cargo coreward."},"Fondor":{"c":"rep","p":["rep"],"e":["shipyard","military"],"w":1,"a":null,"pt":"barren","o":"Rival shipwright to Kuat, its yards forging warships for half the Core.","xy":[9.249,13.666],"rl":"Republic governance; the Fondor shipwright concerns","st":"Quietly ascendant. Long Kuat's lesser rival, Fondor's yards have won a growing slice of the rearmament work, and the world is using the moment to climb. Ambitious, and not above poaching contracts from its neighbors."},"Anaxes":{"c":"rep","p":["rep"],"e":["military"],"w":1,"a":null,"pt":"temperate","o":"A fortress-world and naval academy long charged with the defense of the Core.","xy":[9.366,9.692],"rl":"Republic Navy command","st":"A fortress in its element. As the Republic concentrates its strength inward, the old defense-world and naval academy has become central rather than peripheral — its academies full, its yards refitting the home fleet. The consolidation suits Anaxes perfectly."},"Balmorra":{"c":"rep","p":["rep","czerka"],"e":["industry","military"],"w":2,"a":null,"pt":"barren","o":"A grimy factory-world of weapons foundries and droid lines, courted by every arms-buyer in the galaxy.","xy":[10.901,10.499],"rl":"Republic governance; courted by Czerka and the arms-buyers","st":"Grimly busy. Its weapons foundries and droid lines run day and night, supplying the rearming Republic while Czerka and a dozen other buyers circle for the surplus. Prosperous, polluted, and perpetually for sale to the highest bidder."},"Commenor":{"c":"rep","p":["rep"],"e":["trade"],"w":1,"a":null,"pt":"temperate","o":"A free-trading world and major waystation just beyond the Core.","xy":[11.324,10.92],"rl":"Republic governance; the free-trade authorities","st":"Bustling and opportunistic. A free-trading waystation just beyond the Core, Commenor profits from every cargo the looser Core market sends its way — a comfortable, commercial world making quiet money in interesting times."},"Telos":{"c":"rep","p":["rep","jedi","czerka"],"e":["trade","agri"],"w":3,"a":"Telos IV · the Restoration's first work","pt":"temperate","o":"Flagship of the Republic's restoration, its orbital Citadel Station the gateway to a slowly healing world.","xy":[14.982,4.763],"rl":"Republic governance; the Citadel Station authority","st":"The showpiece of the Restoration, and it knows it. Telos IV's recovery — orbital Citadel Station presiding over a world clawing back to life — is the Republic's proof that worlds can be rebuilt, and it draws investment and pilgrims accordingly. A genuine success story, leaned on perhaps too hard as a symbol."},"Taris":{"c":"rep","p":["rep","czerka","exch"],"e":["trade","industry"],"w":2,"a":null,"pt":"city","o":"Once-glittering city-world bombed to ruin in the Jedi Civil War; now painfully rebuilt, layer by layer.","xy":[11.689,7.063],"rl":"Republic governance; the reconstruction authority","st":"Rebuilding from ruin, layer by painful layer. Once bombed to slag, Taris is slowly reclaiming its shattered cityscape under Republic reconstruction credits — a generation's work, riddled with ruin-divers, swoop gangs, and the buried dangers of the old city. Hope and rubble in equal measure."},"Ilum":{"c":"jedi","p":["jedi","rep"],"e":["crystal"],"w":3,"a":"the crystal world","pt":"ice","o":"A sacred world of frozen caverns where the Jedi cut their kyber crystals; held now by the new Order.","xy":[4.975,7.543],"rl":"The Restored Jedi Order","st":"Sacred, frozen, and guarded. The kyber caverns are once more the Jedi's to cut, and the Order keeps the world close and quiet. Its true significance is strategic: whoever influences Ilum influences the Jedi's ability to arm — which is why it is watched far more than its icy emptiness suggests."},"Dantooine":{"c":"rep","p":["rep","jedi"],"e":["agri","ruins"],"w":3,"a":null,"pt":"temperate","o":"A quiet world of grass and farmsteads, its ruined Jedi enclave a monument to the Order's near-extinction.","xy":[9.957,4.375],"rl":"Republic governance; a small Jedi presence","st":"Peaceful and recovering. Grass, farmsteads, and the haunted ruin of the old enclave — Dantooine is a quiet agricultural world that has seen too much history and now wants only to grow its crops. A waypoint and a refuge more than a power."},"Mygeeto":{"c":"ind","p":["czerka"],"e":["banking","crystal","mining"],"w":1,"a":null,"pt":"ice","o":"An icy crystal-mining world run by the banking interests, its frozen cities built on cold profit.","xy":[8.46,5.076],"rl":"Banking-interest administration","st":"Cold and profitable. The crystal-mining world remains firmly in the grip of the banking clans, its frozen cities built on careful margins. Indifferent to the galaxy's dramas so long as the crystal keeps flowing and the ledgers keep balancing."},"Sullust":{"c":"ind","p":["rep"],"e":["energy","mining","shipyard"],"w":2,"a":null,"pt":"volcanic","o":"A volcanic world of underground cities and the great SoroSuub works — fuel, ore, and starships for the southern Rim.","xy":[10.535,17.815],"rl":"SoroSuub corporate governance","st":"Strategically vital and quietly nervous. The volcanic refineries pump fuel and ore into the southern lanes, and with Republic patrols gone from the deeper Rim, SoroSuub finds itself guarding its own arteries. Rich, industrious, and increasingly aware of how exposed its fuel-wealth makes it."},"Eriadu":{"c":"rep","p":["rep","mining"],"e":["trade","industry"],"w":2,"a":null,"pt":"city","o":"Grim industrial capital of the southern Outer Rim, a Republic anchor where the Hydian meets the Rimma.","xy":[10.535,18.283],"rl":"Republic governance; the Eriadu trade authority","st":"The Republic's southern anchor, holding the line. Where the Hydian meets the Rimma, Eriadu is the last great Republic-aligned hub before the abandoned Rim — and it has grown in importance precisely as the Republic pulled back around it. Grim, industrious, ambitious, and increasingly the gatekeeper of the south."},"Kashyyyk":{"c":"ind","p":["rep","mando","czerka"],"e":["timber","agri","slaves"],"w":3,"a":"the Wookiee homeworld","pt":"forest","o":"Towering forest-world of the Wookiees — newly granting the Mandalorians a foothold, while Czerka still eyes its people as cargo.","xy":[13.72,9.868],"rl":"Wookiee chieftains; contested by Czerka and the clans","st":"Free in name, contested in fact. The Wookiees hold their forest-world and have granted the Mandalorians a foothold, but Czerka still eyes their people as cargo and the withdrawal of Republic oversight has emboldened the slavers. Proud and dangerous, and watching its skies closely."},"Ord Mantell":{"c":"ind","p":["rep","exch","bsun"],"e":["trade","smuggling","piracy"],"w":2,"a":null,"pt":"temperate","o":"A mercenary's bazaar of bounty halls and junk-cities, where any blaster or secret can be bought.","xy":[9.015,7.413],"rl":"Local warlords and bounty guilds; Exchange and Black Sun presence","st":"A mercenary's bazaar in its element. With the Republic gone from the frontier, Ord Mantell's junk-cities and bounty halls do brisker business than ever — every blaster, secret, and contract for sale, and three syndicates quietly competing for the cut. Lawless, lively, and exactly where a desperate crew goes for work."},"Iktotchon":{"c":"ikto","p":["ikto","rep","jedi"],"e":["mining","trade"],"w":3,"a":"Iktotch · the Fourfold Wind","pt":"barren","o":"Storm-blasted home of the precognitive Iktotchi — lately freed, lately powerful, installed as the galaxy's neutral arbiters.","xy":[12.434,14.017],"rl":"the Fourfold Wind (Ember · Levin · Gale · Stormguard)","st":"Lately freed and rapidly rising. Installed as the galaxy's neutral arbiters, the precognitive Iktotchi have parlayed their foresight into real influence, and their storm-blasted world has become a place powers come to be judged. The Fourfold Wind steers a careful course between its four contending sects — but its standing has never been higher."},"Bothawui":{"c":"ind","p":["rep","exch"],"e":["trade","banking"],"w":1,"a":null,"pt":"temperate","o":"Center of the Bothans' famous spynet, where information is the only currency that matters.","xy":[15.18,14.309],"rl":"the Bothan clans and their spynet","st":"Selling secrets in a golden age for them. With the galaxy realigning and everyone hungry for information, the Bothan spynet's stock has soared. Bothawui grows quietly rich brokering what others need to know — neutral, indispensable, and trusted by no one, least of all each other."},"Iridonia":{"c":"ind","p":["rep","mando"],"e":["mining","military"],"w":1,"a":null,"pt":"barren","o":"The unforgiving homeworld of the Zabrak, a people of warriors, wanderers, and stubborn pride.","xy":[7.847,7.063],"rl":"Zabrak clan councils","st":"Hard and self-reliant. The Zabrak homeworld asks nothing of the Republic and expects nothing in return, sending its warriors and wanderers out into a galaxy that suddenly has more work for hard people than it can fill. Tougher than its modest wealth suggests."},"Mandalore":{"c":"mando","p":["mando","rep"],"e":["beskar","military","mining"],"w":3,"a":"Manda'yaim","pt":"temperate","o":"Returned heart of the reunified clans, where Torren Wren forges a people poised between conquest and honor.","xy":[12.638,7.297],"rl":"Mandalore the Dawn (Torren Wren)","st":"Reborn and on the rise — carefully. Torren Wren steers the reunified clans from conquest toward honor and craft, building a legitimate power on a returned homeworld, a legal beskar forge, and lucrative peacekeeping contracts policing the frontier the Republic left. Watched warily by everyone who remembers the Mandalorian Wars, and aware of it."},"Concord Dawn":{"c":"mando","p":["mando"],"e":["agri"],"w":1,"a":null,"pt":"temperate","o":"A pastoral Mandalorian protectorate of farmers and foundlings, breadbasket to the warrior clans.","xy":[12.571,7.289],"rl":"Mandalorian protectorate governance","st":"Quiet, green, and vital. The breadbasket of the clans, its farms and foundlings feeding Mandalore's revival. Peaceful by Mandalorian standards, which is to say still well-armed."},"Cathar":{"c":"ind","p":["rep","mando"],"e":["agri"],"w":1,"a":null,"pt":"temperate","o":"Homeworld of the feline Cathar, still healing from the genocide of the Mandalorian Wars.","xy":[11.759,6.643],"rl":"Cathar clan councils; Republic and Mandalorian interest","st":"Healing, slowly, from genocide. The feline Cathar rebuild a people the Mandalorian Wars nearly erased — a process now complicated, and oddly aided, by the Mandalorians' own turn toward honor and restitution. Raw history sits close to the surface here."},"Onderon":{"c":"ind","p":["rep","mando"],"e":["trade","agri"],"w":3,"a":"the Iziz throne-world","pt":"temperate","o":"Fiercely independent monarchy of walled Iziz — loyal to the Republic but wary of Jedi and hostile to every cult.","xy":[12.697,9.809],"rl":"the Iziz monarchy","st":"Fiercely, prickly independent. The walled throne-world of Iziz remains loyal to the Republic in name while guarding its autonomy jealously, wary of Jedi and openly hostile to every cult and cabal. Stable and proud, sitting astride the road between Mandalore and the Rim, and determined to be nobody's vassal."},"Dxun":{"c":"wild","p":["mando"],"e":["ruins"],"w":2,"a":"the Demon Moon","pt":"jungle","o":"Onderon's savage jungle moon, holding the tomb of the Sith king Freedon Nadd and an old Mandalorian foothold.","xy":[12.73,9.74],"rl":"no governing power; Mandalorian and beast presence","st":"Wild and watchful. Onderon's jungle moon holds an old Mandalorian foothold, the tomb of a long-dead Sith king, and predators enough to deter the casual. With Republic eyes gone from the region, Dxun is quieter and lonelier than ever — which suits those who use it."},"Korriban":{"c":"dead","p":["rep"],"e":["ruins"],"w":3,"a":"the dead world of the tombs","pt":"red","o":"A silent, barren world of ancient tombs in nominal Republic-administered 'Sith space' — long abandoned, watched by no one.","xy":[15.122,5.368],"rl":"no living authority; nominal Republic administration","st":"Silent and shunned. A barren world of ancient tombs in nominally Republic-administered space, long abandoned and watched by no one in particular — least of all now, with the Republic withdrawn. The dead keep their secrets, and the galaxy is content to let them."},"Yavin":{"c":"wild","p":[],"e":["ruins"],"w":1,"a":"Yavin 4","pt":"jungle","o":"A jungle moon studded with the stone temples of the long-dead Massassi, deep in the haunted Gordian Reach.","xy":[13.236,6.781],"rl":"no governing power","st":"Empty and overgrown. The jungle moon's stone temples crumble undisturbed in the haunted Gordian Reach, far from any lane that matters. A place for those who wish not to be found."},"Manaan":{"c":"selkath","p":["selkath","rep","exch"],"e":["kolto","medical","trade"],"w":3,"a":"the ocean of kolto","pt":"ocean","o":"A neutral ocean-world and the galaxy's only source of healing kolto — courted by all, conquered by none.","xy":[12.236,11.775],"rl":"the Manaan High Council; the Order of Shasa","st":"Serene, neutral, and quietly all-powerful. Holding the galaxy's sole supply of kolto, the Selkath sell to everyone, ally with no one, and watch the great powers court them with cold patience. The withdrawal of Republic influence has if anything strengthened their hand — the medicine flows on whatever terms Manaan sets, and no one dares object."},"Tatooine":{"c":"hutt","p":["hutt","czerka","exch","mando"],"e":["mining","spice","slaves","smuggling"],"w":3,"a":"the twin-sun desert","pt":"desert","o":"A lawless desert world under Hutt sway, its claims fringed by Jawas, raiders, and smugglers.","xy":[15.327,16.763],"rl":"Hutt overlords; Jawa and raider fringes","st":"Lawless and unbothered. A desert world under loose Hutt sway, its spice and slave traffic only busier now that the Republic has stopped pretending to watch the Rim. The Hutts profit, the raiders raid, and the moisture farmers keep their heads down. Nothing here has changed but the absence of even token law."},"Ryloth":{"c":"ind","p":["exch","hutt"],"e":["spice","slaves","mining"],"w":2,"a":"the Twi'lek homeworld","pt":"desert","o":"Sun-scorched, ice-shadowed homeworld of the Twi'leks — a wellspring of ryll spice and, to its sorrow, of slaves.","xy":[15.677,17.581],"rl":"Twi'lek clan-heads; heavy Exchange and Hutt presence","st":"Exploited and exposed. The Twi'lek homeworld bleeds ryll spice and, to its sorrow, slaves into the underworld trade — and with Republic patrols gone, the cartels and the Exchange operate with a free hand. A world rich in product and poor in protection, exactly the kind the withdrawal has left most vulnerable."},"Nal Hutta":{"c":"hutt","p":["hutt"],"e":["spice","slaves","trade"],"w":2,"a":"Hutta · the Glorious Jewel","pt":"swamp","o":"Throne-world of the Hutt kajidics, a fetid swamp ruled from gilded palaces by the oldest crime dynasties.","xy":[16.261,12.736],"rl":"the Hutt kajidics (Bogga the Hutt and the barons)","st":"Fat, scheming, and ascendant. The throne-world of the Hutt cartels has come through every war untouched and emerged richer with each, and the Republic's retreat from the Rim has only widened its reach. The kajidics intrigue endlessly against one another from their gilded palaces — but against the outside galaxy, they have rarely been stronger."},"Nar Shaddaa":{"c":"hutt","p":["hutt","exch","bsun","czerka","silent"],"e":["smuggling","spice","slaves","blackmarket","trade"],"w":3,"a":"the Smuggler's Moon","pt":"city","o":"The vertical city-moon of Nal Hutta — every vice, cargo, and fugitive in the galaxy passes through its neon canyons.","xy":[16.35,12.62],"rl":"the Hutt kajidics; every syndicate and broker","st":"The underworld's beating heart, busier than ever. Every vice, cargo, and fugitive in the galaxy passes through the Smuggler's Moon, and the realignment has sent the traffic soaring — refugees, contraband, fortunes, and secrets all moving through its neon canyons. Dangerous, vital, and the surest place in the galaxy to buy anything forbidden."},"Kessel":{"c":"ind","p":["hutt","exch","czerka"],"e":["spice","slaves","mining"],"w":2,"a":"the spice mines","pt":"barren","o":"A grim prison-world of glitterstim spice mines worked by slaves, ringed by black holes and patrolled by every cartel.","xy":[17.372,10.218],"rl":"Hutt and cartel mine-bosses; slave labor","st":"Grim and grinding on. The spice mines run on slave labor and cartel muscle, ringed by black holes and patrolled by every syndicate with a stake. The withdrawal changed nothing here except to remove the last distant threat of Republic interference. The glitterstim flows; the slaves do not."},"Dathomir":{"c":"ind","p":["geno"],"e":["ruins"],"w":3,"a":"the witch-world","pt":"red","o":"A wild red world of rancors and clan-witches — cradle of the Nightsisters, and the dark well Chatni has turned from.","xy":[12.112,6.362],"rl":"the Nightsister clans","st":"Wild, red, and best avoided. The witch-world's rancor-riding clans keep to themselves, trading rarely and trusting never, their dark traditions undisturbed by a galaxy that has learned to leave them be. Rumor links them to older, hidden hands — which only deepens the unease."},"Hoth":{"c":"wild","p":[],"e":[],"w":1,"a":null,"pt":"ice","o":"A barren iceball of blizzards and wampas, useful only as a place no one thinks to look.","xy":[8.051,18.633],"rl":"no governing power","st":"Frozen and empty. A barren iceball of blizzards and wampas, valuable only as a place no one thinks to look — which, in the present age, is a value some are willing to pay for."},"Bespin":{"c":"ind","p":["rep","exch"],"e":["energy","mining"],"w":1,"a":"Cloud City","pt":"gas","o":"A banded gas giant whose floating platforms mine precious tibanna gas from the clouds.","xy":[8.022,18.516],"rl":"independent and corporate platform authorities","st":"Quietly essential. The cloud-city platforms skim precious tibanna gas from the giant's depths, feeding the weapon-makers of half the galaxy. Small, remote, and far more strategically important than its resort-world reputation suggests."},"Naboo":{"c":"ind","p":["rep"],"e":["agri","energy"],"w":2,"a":null,"pt":"temperate","o":"A serene world of green hills and plasma-rich depths, shared with the underwater Gungans.","xy":[12.317,17.056],"rl":"the elected monarchy; the Gungan councils","st":"Peaceful and prosperous. A serene world of green hills and plasma-rich depths, shared between humans and Gungans, largely insulated from the galaxy's troubles. Content, cultured, and quietly wealthy — the kind of world the great powers forget until they need something."},"Dac":{"c":"ind","p":["rep"],"e":["shipyard","trade"],"w":2,"a":"Mon Cala · the ocean world","pt":"ocean","o":"A blue ocean-world of the Mon Calamari and Quarren, builders of beautiful starships.","xy":[18.044,6.712],"rl":"the Mon Calamari and Quarren councils","st":"Building beautiful ships and watching the seas. The ocean-world of Mon Cala turns out some of the galaxy's finest vessels, and its yards have caught the spillover of Republic rearmament. United enough to prosper, divided enough between its two peoples to bear watching."},"Ord Cestus":{"c":"ind","p":["exch"],"e":["industry"],"w":2,"a":null,"pt":"desert","o":"A cavern-riddled world famed for its droid-works — where the dark adept Jera and Lord Ratek met their end.","xy":[12.288,6.011],"rl":"the cestus droadworks consortium","st":"Industrious and opportunistic. The cavern-world's famous droid-works sell to all comers, and a galaxy rearming and rebuilding is a galaxy that wants droids. Profiting quietly, and not too particular about its buyers."},"Makeb":{"c":"hutt","p":["hutt","rep","mining"],"e":["mining","energy"],"w":2,"a":null,"pt":"temperate","o":"A mesa-world of deep mineral wealth under Hutt lease — where the crew sought out the master Kao Cen Darach.","xy":[14.507,13.58],"rl":"Hutt lease-holders; Republic and mining interest","st":"Rich underfoot and contested above. The mesa-world's deep mineral wealth sits under Hutt lease, with Republic and independent miners angling for a share. A prize that several powers covet and none fully controls — the kind of place a clever crew can profit in the gaps."},"Malachor":{"c":"dead","p":[],"e":["ruins"],"w":3,"a":"Malachor V · the shattered world","pt":"barren","o":"A broken, lightning-scarred world torn apart at the close of the Mandalorian Wars — a wound in the galaxy, shunned by all.","xy":[13.815,20.576],"rl":"no authority; shunned by all","st":"A wound in the galaxy, left to bleed in silence. The shattered, lightning-scarred world remains exactly as the Mandalorian Wars left it — broken, haunted, and avoided by every sane astrogator. Nothing rules here, and nothing ever will."},"Bel Savas":{"c":"ind","p":["czerka","exch"],"e":["mining","ruins"],"w":2,"a":"the buried vaults","pt":"ice","o":"A frozen graveyard-world of buried vaults and dig-sites, where Czerka teams claw old secrets from the ice.","xy":[14.6,21.4],"rl":"Czerka excavation authority; Exchange interest","st":"A frozen dig-site humming with quiet greed. Czerka teams claw old secrets and rare ore from the buried vaults, and the withdrawal of Republic oversight lets them work without inconvenient questions. What exactly they are unearthing, they do not say — which is reason enough to wonder."},"Lehon":{"c":"wild","p":[],"e":["ruins"],"w":2,"a":"Rakata Prime · the Unknown World","pt":"ocean","o":"A remote ocean world of coral atolls hiding the dead Star Forge and the ruins of the long-fallen Rakata.","xy":[4.354,11.395],"rl":"no authority; the dead Rakata ruins","st":"Remote, forgotten, and far off every chart. The ocean world hides the dead Star Forge and the ruins of the fallen Rakata behind the mass-shadows of the Unknown Regions. Effectively unreachable, and quietly significant to anyone who knows what sleeps there."},"Csilla":{"c":"chiss","p":["chiss"],"e":["banking","industry"],"w":3,"a":"the Chiss capital","pt":"ice","o":"Frozen seat of the Chiss Ascendancy, deep in the Unknown Regions — and host to the galaxy-defining Csilla Accords.","xy":[3.055,8.816],"rl":"the Aristocra and the Four Ruling Families","st":"Ascendant from behind its frozen veil. Host of the Accords that redrew the galaxy, the Chiss have stepped from rumor to kingmaker — warding the Unknown Regions, declining alliance and open trade, and studying the wider galaxy with cold patience before committing to it. Trusted by all to hold the scales precisely because it wants nothing from any of them. Its one quiet dependence: it cannot feed its ice-worlds, and must buy its bread."},"Geonosis":{"c":"ind","p":["czerka"],"e":["industry","mining"],"w":1,"a":null,"pt":"desert","o":"A harsh rock world of insectoid hive-foundries, churning out droids and weapons for any buyer.","xy":[15.385,16.465],"rl":"the Geonosian hive-queens","st":"Churning out arms for anyone. The insectoid hive-foundries produce droids and weapons at scale, and a rearming, realigning galaxy is excellent for business. Alien, insular, and indifferent to who its products are pointed at."},"Mustafar":{"c":"ind","p":["czerka","mining"],"e":["mining","energy"],"w":1,"a":null,"pt":"volcanic","o":"A hellscape of lava rivers where mining guilds dredge rare minerals from the molten crust.","xy":[9.132,19.802],"rl":"mining-guild operators","st":"Hellish and lucrative. The lava-world's guilds dredge rare minerals from the molten crust at brutal cost in lives and machines. Remote and grim, its output too valuable for anyone to shut down."},"Rishi":{"c":"ind","p":["exch","bsun"],"e":["piracy","smuggling"],"w":1,"a":null,"pt":"jungle","o":"A backwater tropical world near the edge of charted space, long a nest for pirates.","xy":[16.174,15.186],"rl":"pirate captains and smuggler crews","st":"A pirate nest on the edge of the charts, emboldened. With Republic patrols withdrawn from the deep Rim, Rishi's tropical backwaters shelter raiders and smugglers operating more openly than they have in years. A haven, a hideout, and a hazard."},"Felucia":{"c":"wild","p":["hutt"],"e":["agri"],"w":1,"a":null,"pt":"jungle","o":"A surreal world of giant fungi and luminous jungle, harvested quietly for rare compounds.","xy":[15.765,6.186],"rl":"no central authority; Hutt harvesting interests","st":"Strange, fertile, and lightly plundered. The fungal jungle-world yields rare compounds harvested quietly by Hutt-backed crews, with no government to speak of and few visitors who stay long. Beautiful and quietly dangerous."},"Dagobah":{"c":"wild","p":[],"e":[],"w":1,"a":null,"pt":"swamp","o":"An uncharted, Force-heavy swamp world, drowned in mist and untouched by civilization.","xy":[10.622,19.451],"rl":"no authority; uninhabited","st":"Untouched and unmarked. A mist-drowned swamp world, dense with the Force and empty of civilization, on no trade route and in no one's plans. The galaxy passes it by entirely — which may be the point."},"Saleucami":{"c":"ind","p":["exch"],"e":["agri","smuggling"],"w":1,"a":null,"pt":"desert","o":"A dusty frontier of scattered oases and quiet homesteads — a good place to disappear.","xy":[16.291,8.348],"rl":"scattered homesteader communities","st":"A quiet frontier, filling with the displaced. The dusty world's oases and homesteads have drawn refugees and those wishing to vanish, and the withdrawal has left it to govern itself loosely. A good place to disappear, and an easy one to prey upon."},"Toydaria":{"c":"ind","p":["hutt","exch"],"e":["trade","smuggling"],"w":1,"a":null,"pt":"swamp","o":"A swampy buffer-world of shrewd traders who play the Hutts and the Republic against each other.","xy":[15.599,12.0],"rl":"the Toydarian merchant-kings","st":"Playing all sides, profitably. The swampy buffer-world's shrewd traders broker between Hutts and Republic, beholden to neither and skimming from both. Slippery, neutral, and quietly comfortable."},"Christophsis":{"c":"ind","p":["czerka"],"e":["crystal","mining"],"w":1,"a":null,"pt":"crystal","o":"A world of vast green crystal towers, mined for the gem-crystal that grows from its ground.","xy":[14.801,16.822],"rl":"colonial mining authorities","st":"Mining its own crystal towers. The green crystal-world's settlers harvest the gem-crystal that grows from the ground, a modest but steady trade. Remote, orderly, and largely left alone."},"Bonadan":{"c":"czerka","p":["czerka","exch"],"e":["industry","trade","mining"],"w":1,"a":null,"pt":"barren","o":"A scarred corporate world stripped for profit, its skies brown with factory smoke.","xy":[16.408,3.966],"rl":"Czerka corporate administration","st":"A company-world, stripped for profit. Czerka runs Bonadan end to end — its skies brown with factory smoke, its workers paid in company scrip, its output flowing into corporate supply chains. The withdrawal of Republic oversight has only tightened the corporation's grip. The clearest picture in the galaxy of what unchecked corporate rule looks like."}},"lanes":[{"n":"Perlemian Trade Route","col":"#5fd6ff","ill":0,"pts":[[9.541,9.576],[9.972,9.941],[15.94,6.829],[15.18,14.309]],"tier":"major","cargo":"The galaxy's oldest great artery — bulk Core manufactured goods, Jedi and Senate traffic, Ossus relic-trade, and grain heading coreward.","checks":["Coruscant","Brentaal IV","Bothawui"]},{"n":"Corellian Run","col":"#7fd6c0","ill":0,"pts":[[9.972,9.941],[10.535,11.855],[15.327,16.763],[15.677,17.581]],"tier":"major","cargo":"Heavy freight and passenger liners between the Core and the Rim — Corellian ships, Tatooine ore and spice feeding in from the fringe.","checks":["Corellia","Ord Mantell","Tatooine"]},{"n":"Corellian Trade Spine","col":"#9ab0e0","ill":0,"pts":[[10.535,18.283],[10.535,17.815],[10.535,11.855],[11.324,10.92]],"tier":"major","cargo":"Shipyards' lifeline — hulls, droids, and refined fuel from Corellia, Duro, and Sullust running down to Eriadu.","checks":["Corellia","Sullust","Eriadu"]},{"n":"Hydian Way","col":"#e7c66b","ill":0,"pts":[[10.535,18.283],[10.901,10.499],[9.972,9.941],[9.541,9.576],[4.975,7.543],[11.689,7.063],[14.982,4.763]],"tier":"major","cargo":"The longest road in the galaxy   c.save();c.beginPath();c.arc(cx,cy,R,0,6.28);c.clip();let bg=c.createRadialGradient(cx-R*0.35,cy-R*0.4,R*0.2,cx,cy,R*1.15);bg.addColorStop(0,pal[1]);bg.addColorStop(.7,pal[0]);bg.addColorStop(1,"#05070d");c.fillStyle=bg;c.fillRect(cx-R,cy-R,R*2,R*2);
  if(type==="gas"){for(let i=0;i<7;i++){const yy=cy-R+(i+rnd()*0.6)*(2*R/7);c.fillStyle=hexA(i%2?pal[2]:pal[1],.35+rnd()*0.2);c.fillRect(cx-R,yy,R*2,(2*R/7)*(0.7+rnd()*0.5));}}
  else{const blobs=14+Math.floor(rnd()*12);for(let i=0;i<blobs;i++){const a=rnd()*6.28,rr=rnd()*R*0.95,bx2=cx+Math.cos(a)*rr,by2=cy+Math.sin(a)*rr,br=R*(0.12+rnd()*0.34);c.beginPath();c.arc(bx2,by2,br,0,6.28);c.fillStyle=hexA(rnd()>.5?pal[1]:pal[2],.12+rnd()*0.22);c.fill();}
    if(type==="ocean"||type==="temperate"){c.fillStyle=hexA("#0d3a55",.25);c.fillRect(cx-R,cy-R,R*2,R*2);}
    if(type==="ice"){c.fillStyle=hexA("#ffffff",.5);c.beginPath();c.ellipse(cx,cy-R*0.85,R*0.7,R*0.4,0,0,6.28);c.fill();c.beginPath();c.ellipse(cx,cy+R*0.85,R*0.7,R*0.4,0,0,6.28);c.fill();}
    if(type==="city"){for(let i=0;i<70;i++){const a=rnd()*6.28,rr=rnd()*R*0.96;c.fillStyle=hexA("#ffe6a0",.5*rnd());c.fillRect(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr,1.2,1.2);}}
    if(type==="volcanic"){for(let i=0;i<10;i++){const a=rnd()*6.28,rr=rnd()*R*0.9;c.strokeStyle=hexA("#ffb04a",.5);c.lineWidth=1+rnd()*1.5;c.beginPath();c.moveTo(cx+Math.cos(a)*rr,cy+Math.sin(a)*rr);c.lineTo(cx+Math.cos(a+0.4)*rr*1.1,cy+Math.sin(a+0.4)*rr*1.1);c.stroke();}}}
  let sh=c.createRadialGradient(cx-R*0.5,cy-R*0.5,R*0.3,cx+R*0.3,cy+R*0.3,R*1.5);sh.addColorStop(0,"rgba(0,0,0,0)");sh.addColorStop(.65,"rgba(0,0,0,.05)");sh.addColorStop(1,"rgba(2,3,8,.82)");c.fillStyle=sh;c.fillRect(cx-R,cy-R,R*2,R*2);
  c.restore();c.beginPath();c.arc(cx,cy,R,0,6.28);c.lineWidth=1.4;c.strokeStyle=hexA(pal[3],.6);c.stroke();c.beginPath();c.arc(cx-R*0.38,cy-R*0.42,R*0.5,0,6.28);let sp=c.createRadialGradient(cx-R*0.38,cy-R*0.42,0,cx-R*0.38,cy-R*0.42,R*0.55);sp.addColorStop(0,"rgba(255,255,255,.18)");sp.addColorStop(1,"rgba(255,255,255,0)");c.fillStyle=sp;c.fill();}

function laneNodeName(rt,k){ // find planet nearest this waypoint
  const pt=rt.pts[k];let best=null,bd=0.0008;for(const nm in byName){const p=PL[byName[nm]];const d=(p[1]-pt[0])**2+(p[2]-pt[1])**2;if(d<bd){bd=d;best=nm;}}return best;}
function laneLengthText(rt){let sq=0;for(let k=0;k<rt.pts.length-1;k++){const a=rt.pts[k],b=rt.pts[k+1];sq+=Math.hypot(a[0]-b[0],a[1]-b[1]);}
  return sq.toFixed(1)+' grid-squares end to end — roughly '+Math.round(sq*1500).toLocaleString()+' light-years of charted lane.';}

// is a planet on a given lane (within tolerance)?
function planetOnLane(i,rt){const p=PL[i];for(let k=0;k<rt.pts.length;k++){if((p[1]-rt.pts[k][0])**2+(p[2]-rt.pts[k][1])**2<0.0008)return k;}return -1;}
// find a shared lane both endpoints sit on
function sharedLane(a,b){for(const rt of LANES){if(planetOnLane(a,rt)>=0&&planetOnLane(b,rt)>=0)return rt;}return null;}
function hardRegion(rc){return RULES.hardRegions.includes(rc);}
let GN=[],GADJ=[];
(function(){const key={};function nid(x,y){const k=x.toFixed(3)+','+y.toFixed(3);if(k in key)return key[k];const id=GN.length;GN.push([x,y]);key[k]=id;GADJ.push([]);return id;}
  LANES.forEach((rt,li)=>{const mult=rt.tier==="major"?RULES.mult.major:RULES.mult.minor;for(let k=0;k<rt.pts.length-1;k++){const a=rt.pts[k],b=rt.pts[k+1];const ia=nid(a[0],a[1]),ib=nid(b[0],b[1]);const dist=Math.hypot(a[0]-b[0],a[1]-b[1]);const cost=dist*RULES.baseHrs*mult;GADJ[ia].push({to:ib,cost,lane:li});GADJ[ib].push({to:ia,cost,lane:li});}});})();
function hardPer(rc){return RULES.hardRegions.includes(rc)?RULES.hardRegionHrs:RULES.baseHrs;}
function planRoute(si,ei,drive){const S=[PL[si][1],PL[si][2]],E=[PL[ei][1],PL[ei][2]];const N=GN.length,sIdx=N,eIdx=N+1,total=N+2;const extra={};
  function addEdge(a,b,cost,lane){(extra[a]=extra[a]||[]).push({to:b,cost,lane:lane==null?-1:lane});}
  function edgesOf(u){if(u<N)return extra[u]?GADJ[u].concat(extra[u]):GADJ[u];return extra[u]||[];}
  function connect(virt,coord,rc){const arr=[];for(let i=0;i<N;i++)arr.push([Math.hypot(GN[i][0]-coord[0],GN[i][1]-coord[1]),i]);arr.sort((p,q)=>p[0]-q[0]);if(arr.length&&arr[0][0]<0.03){const i=arr[0][1];addEdge(virt,i,0.0001);addEdge(i,virt,0.0001);return;}for(let j=0;j<Math.min(6,arr.length);j++){const dd=arr[j][0],i=arr[j][1],cost=dd*hardPer(rc)*RULES.mult.off;addEdge(virt,i,cost);addEdge(i,virt,cost);}}
  connect(sIdx,S,PL[si][3]);connect(eIdx,E,PL[ei][3]);
  {const dd=Math.hypot(S[0]-E[0],S[1]-E[1]),per=Math.max(hardPer(PL[si][3]),hardPer(PL[ei][3])),cost=dd*per*RULES.mult.off;addEdge(sIdx,eIdx,cost);addEdge(eIdx,sIdx,cost);}
  const dist=new Array(total).fill(Infinity),prev=new Array(total).fill(-1),plane=new Array(total).fill(-1),done=new Array(total).fill(false);dist[sIdx]=0;
  for(let it=0;it<total;it++){let u=-1,bd=Infinity;for(let i=0;i<total;i++)if(!done[i]&&dist[i]<bd){bd=dist[i];u=i;}if(u<0)break;done[u]=true;if(u===eIdx)break;for(const e of edgesOf(u)){const nd=dist[u]+e.cost;if(nd<dist[e.to]){dist[e.to]=nd;prev[e.to]=u;plane[e.to]=e.lane;}}}
  if(dist[eIdx]===Infinity)return null;
  const nodes=[],lu=[];let cur=eIdx;while(cur!==-1){nodes.push(cur);if(plane[cur]>=0)lu.push(plane[cur]);cur=prev[cur];}nodes.reverse();lu.reverse();
  const coords=nodes.map(n=>n===sIdx?S:n===eIdx?E:GN[n]);
  let gridDist=0;for(let k=0;k<coords.length-1;k++)gridDist+=Math.hypot(coords[k][0]-coords[k+1][0],coords[k][1]-coords[k+1][1]);
  const uniq=[];lu.forEach(l=>{if(!uniq.includes(l))uniq.push(l);});
  const passed=new Set();nodes.forEach(n=>{if(n<N){const c=GN[n];for(const nm in byName){const p=PL[byName[nm]];if((p[1]-c[0])**2+(p[2]-c[1])**2<0.0008){passed.add(nm);break;}}}});
  const checks=[];uniq.forEach(li=>{(LANES[li].checks||[]).forEach(nm=>{if(passed.has(nm)&&!checks.includes(nm))checks.push(nm);});});
  return {coords,hours:dist[eIdx]*drive,gridDist,lanes:uniq.map(li=>LANES[li].n),checks,offOnly:uniq.length===0};}
function plotCourse(){
  if(travelFrom<0||travelTo<0){armPick(travelFrom<0?'from':'to');return;}
  const drive=parseFloat(driveSel.value);
  if(travelFrom===travelTo){segResult.style.display='';resLab.textContent='Transit';resV.textContent='You are already here.';travelRoute=null;draw();return;}
  const Rt=planRoute(travelFrom,travelTo,drive);
  if(!Rt){segResult.style.display='';resLab.textContent='Transit';resV.textContent='No route';travelRoute=null;draw();return;}
  travelRoute=Rt.coords;segResult.style.display='';resLab.textContent='Est. transit';resV.textContent=fmtTime(Rt.hours);
  showTravelBreakdown(PL[travelFrom],PL[travelTo],Rt,drive);
  startShip(Rt.hours);
}function fmtTime(hours){const d=hours/RULES.hrsPerDay;
  if(hours<1)return Math.round(hours*60)+' min';
  if(hours<48)return (hours<10?hours.toFixed(1):Math.round(hours))+' hrs ('+d.toFixed(1)+' days)';
  if(d<60)return d.toFixed(1)+' days';
  return (d/30.4).toFixed(1)+' months ('+Math.round(d)+' days)';}
function detailLine(dist,perSq,mult,drive,routeName,onLane){return dist.toFixed(2)+' squares × '+perSq+'h × '+mult+' route × class '+drive+' — via '+routeName;}
function showTravelBreakdown(A,B,Rt,drive){selLane=-1;
  let h='<div class="lanehdr"><div class="eyebrow">Astrogation Plot</div><h2>'+A[0]+' → '+B[0]+'</h2>'+
    '<div style="font-family:var(--serif);font-style:italic;color:var(--ink-dim);font-size:13px;margin-bottom:4px">'+(Rt.lanes.length?Rt.lanes.join(' → '):'Open-space course')+'</div></div><div class="pbody">';
  h+='<div class="sec">Estimated Transit</div><div class="note" style="color:var(--gold);font-size:20px;font-style:normal;font-family:var(--display)">'+fmtTime(Rt.hours)+'</div>';
  h+='<div class="sec">Astrogation Breakdown</div><dl>'+
     '<dt>Distance</dt><dd>'+Rt.gridDist.toFixed(2)+' grid-squares (~'+Math.round(Rt.gridDist*1500).toLocaleString()+' ly along route)</dd>'+
     '<dt>Hyperdrive</dt><dd>Class '+drive+'</dd>'+
     '<dt>Routing</dt><dd>'+(Rt.offOnly?'Open-space plot (no charted lane links these worlds)':Rt.lanes.length+' hyperlane'+(Rt.lanes.length>1?'s, with short jumps to/from the network at the ends':''))+'</dd></dl>';
  h+='<div class="sec">Lanes Travelled</div>';
  if(Rt.lanes.length){h+='<div class="chips">'+Rt.lanes.map(n=>chip(n,'#5fd6ff',0)).join('')+'</div>';}
  else{h+='<div class="uncharted">No charted hyperlane links these worlds — this plot runs through open space, slower and unpatrolled. Direct realspace jumps must still bend around mass-shadows.</div>';}
  h+='<div class="sec">Security Checkpoints en route</div>';
  if(Rt.checks.length){h+=Rt.checks.map(nm=>{const idx=byName[nm];const cur=idx!=null?CUR[PL[idx][0]]:null;const who=cur?F[cur.c].n:'local authority';return '<div class="check"><span class="ico">⛬</span><span><span class="nm2">'+nm+'</span> · <span class="ds">inspection &amp; toll — '+who+'</span></span></div>';}).join('');}
  else{h+='<div class="uncharted">No standing checkpoints expected on this course.</div>';}
  h+='<div class="hint" style="margin-top:14px">Courses follow charted hyperlanes and transfer between them at hub worlds — direct point-to-point jumps through realspace are not possible. Times use the Saga-Edition grid model: 16 hrs/square (24 in deep/uncharted space), lanes ×0.75 major / ×1.0 trade, open plots ×1.25, times hyperdrive class.</div>';
  h+='</div>';infoBody.innerHTML=h;info.classList.add('open');}


/* ---------- ANIMATED SHIP along the plotted course ---------- */
function routeScreenPts(){return travelRoute.map(p=>[sx(p[0]),sy(p[1])]);}
function routeSegLengths(pts){const segs=[];let tot=0;for(let k=0;k<pts.length-1;k++){const L=Math.hypot(pts[k+1][0]-pts[k][0],pts[k+1][1]-pts[k][1]);segs.push(L);tot+=L;}return{segs,tot};}
function posAlong(pts,segs,tot,frac){let d=frac*tot;for(let k=0;k<segs.length;k++){if(d<=segs[k]||k===segs.length-1){const t=segs[k]?d/segs[k]:0;const x=pts[k][0]+(pts[k+1][0]-pts[k][0])*t,y=pts[k][1]+(pts[k+1][1]-pts[k][1])*t;const ang=Math.atan2(pts[k+1][1]-pts[k][1],pts[k+1][0]-pts[k][0]);return{x,y,ang};}d-=segs[k];}const n=pts.length-1;return{x:pts[n][0],y:pts[n][1],ang:0};}
function drawShip(){
  const pts=routeScreenPts();if(pts.length<2)return;
  const {segs,tot}=routeSegLengths(pts);if(tot<1)return;
  const f=shipAnim.t;
  // comet trail: draw a brightening sub-path up to the ship
  const head=posAlong(pts,segs,tot,f);
  // trail
  const trailFrac=Math.max(0,f-0.16);
  ctx.beginPath();let started=false;const steps=24;
  for(let s2=0;s2<=steps;s2++){const ff=trailFrac+(f-trailFrac)*(s2/steps);const p=posAlong(pts,segs,tot,ff);if(!started){ctx.moveTo(p.x,p.y);started=true;}else ctx.lineTo(p.x,p.y);}
  ctx.strokeStyle="#fff6d8";ctx.globalAlpha=.85;ctx.lineWidth=2.4;ctx.shadowColor="#ffe9a8";ctx.shadowBlur=12;ctx.stroke();ctx.shadowBlur=0;ctx.globalAlpha=1;
  // ship glyph
  ctx.save();ctx.translate(head.x,head.y);ctx.rotate(head.ang);
  ctx.shadowColor="#bfeaff";ctx.shadowBlur=12;
  ctx.beginPath();ctx.moveTo(9,0);ctx.lineTo(-6,5);ctx.lineTo(-3,0);ctx.lineTo(-6,-5);ctx.closePath();
  ctx.fillStyle="#eaf6ff";ctx.fill();ctx.shadowBlur=0;
  ctx.beginPath();ctx.moveTo(-3,0);ctx.lineTo(-9,2.4);ctx.lineTo(-9,-2.4);ctx.closePath();ctx.fillStyle="#5fd6ff";ctx.fill();
  ctx.restore();
  // endpoint pulse when arrived
  if(f>=1){const e=pts[pts.length-1];const pr=6+3*Math.sin(performance.now()/180);ctx.beginPath();ctx.arc(e[0],e[1],pr,0,6.28);ctx.strokeStyle="#ffd86b";ctx.globalAlpha=.7;ctx.lineWidth=1.6;ctx.stroke();ctx.globalAlpha=1;}
}
function startShip(durationHours){
  // animation duration scales gently with trip length, clamped for watchability
  const secs=Math.min(9,Math.max(2.6,Math.log10(Math.max(10,durationHours))*2.4));
  shipAnim={t:0,dur:secs*1000,start:performance.now()};shipPlay=true;
  document.getElementById('shipBtn').style.display='';
  document.getElementById('shipBtn').textContent='⏸ Pause';
  if(shipRAF)cancelAnimationFrame(shipRAF);
  loopShip();
}
function loopShip(){
  if(!shipAnim){return;}
  if(shipPlay){const now=performance.now();shipAnim.t=Math.min(1,(now-shipAnim.start)/shipAnim.dur);}
  draw();
  if(shipAnim.t<1){shipRAF=requestAnimationFrame(loopShip);}
  else{shipRAF=requestAnimationFrame(pulseShip);}
}
function pulseShip(){if(!shipAnim||shipAnim.t<1){return;}draw();shipRAF=requestAnimationFrame(pulseShip);}
function stopShip(){shipAnim=null;if(shipRAF)cancelAnimationFrame(shipRAF);shipRAF=0;document.getElementById('shipBtn').style.display='none';}
function toggleShip(){if(!shipAnim)return;
  if(shipAnim.t>=1){shipAnim.t=0;shipAnim.start=performance.now();shipPlay=true;document.getElementById('shipBtn').textContent='⏸ Pause';loopShip();return;}
  shipPlay=!shipPlay;
  if(shipPlay){shipAnim.start=performance.now()-shipAnim.t*shipAnim.dur;document.getElementById('shipBtn').textContent='⏸ Pause';loopShip();}
  else{document.getElementById('shipBtn').textContent='▶ Replay/Play';}
}
buildLegend();buildLayers();layout();updateCount();draw();
</script></body></html>
