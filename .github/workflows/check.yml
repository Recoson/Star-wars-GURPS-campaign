name: check

# Runs the existing check.py invariant/golden-math harness on every push to main,
# plus a headless-Chromium boot smoke that the dev sandbox can't run (no Chromium).
# Two independent jobs so the proven `invariants` gate always reports a clean signal
# even if the newer browser smoke needs a tweak.

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  invariants:
    name: check.py (invariants + golden math)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: python3 check.py
        run: python3 check.py

  smoke:
    name: headless-Chromium boot smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install Playwright Chromium
        run: |
          npm install playwright@latest
          npx playwright install --with-deps chromium
      - name: Boot pages, fail on uncaught JS errors
        run: node tools/ci_smoke.mjs
